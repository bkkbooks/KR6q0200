body:
  text: 住明州天童寺匡廬黃巖沙門道忞著贊四韋馱關聖同幀心縣日月氣壯山河摧邪輔正無黨無頗縛修羅于蕅絲孔中信天威之莫測走曹顢于華容道上豈義勇之有他偃月刀橫兮魂亡小醜金剛杵奮兮膽落天魔使非受靈山之屬纍承智者之切磋又安能揚靈沙界顯聖支那聲流充天壤名滿盡娑婆共乾坤而永久同劫石而不磨者哉義勇武安王麗水黃金骨荊山白玉胸面帶煙霞之紫心茹海日之紅義結桃園斧斫難開誰問天荒而地老丹凝五內劫燒不化那知爛石與枯松以神怡屋漏之襟舒至大至剛之氣秉燭固嘗達旦以力屈萬夫之勇植扶劉翊漢之忠視曹奚啻若蠓所以肝腦塗地九死從君豈無張巡許遠比干龍逢至于千秋尊廟貌百代擅英風卒莫逮于美髯公者也大覺開山達法禪師俊骨天生渥窪同追蹤直欲步天童盲無慧目憐河北破有法壇肇祖風銀碗雪盛真戒體高空月上妙靈衷語言不著閒文彩留得清光表海東緣幻法主萬法皆如幻身心即幻緣不緣如幻者幻惑曷由蠲持戒修禪慧慢山高戛天緣師最精進自視胡欿然為達真如幻神觀自靜專嵒梅光飲雪透出春風前於穆色聲外解空豈浪傳鹿門西禪師白雲坐斷幾星霜道望人同山斗仰住近仙壇生共里前身定是大梅常雙林山幢懷禪師壁立孤撐萬仞巑群峰蒼倩讓高寒一莖不動階前草西徑橫開古法壇慈築基法師黃蘆苦竹繞階臺留宿鷺鷥不剪裁住老功臣三十載騎牛懶下郡庭來海鹽朗印受法師講肆騷壇兩擅雄誰誇破句讀安公海門潮涌鴛湖緑薝蔔華開金粟紅賣盡青松人不問呼來頑石座生風剎竿長挂秦山月耿耿餘光尚在東清菴澄禪師尋師踰萬里問道越千關三事衲衣撩盡百城煙水六環金錫踏遍天下名山迷向伏牛鍊行笑從太白溫顏有時楊州出現或即瓜埠垂綸海鷗可狎華鳥獨還數聲清磬是非外一箇閒人天地間別山慧善普應禪師百城罷訪入煙蘿宗說滔滔似決河鉢洗禁池傾白月經翻古洞涌金波飲人以德同慈嫗荷法唯公絶比阿道影師名重疊賜袈裟沐盡御香多淡然宙禪師歷盡諸家破戶庭歸來活計付漁汀輕舠只傍蘆灣宿明月清風富一生自證現法師孫古箬請若有人兮黃髮番番于湘之湄在衡之阿潛修不忒獨證無頗出滋華雨入賁煙蘿椒蕃衍桂婆娑山深澤廣式生多一夔倒上黃金闕君山點破洞庭波德宗道上人言協筮蔡德孚鬼神化荊榛為瓊樓玉宇變莖草作丈六金身非君非公與含生而託命乃顧乃復脫萬口于危津悲如山而鞏固願似海而𣻳淵得不慳者施而慢者折殘者戢而暴者馴何因修羅之我妒而遺害之我瞋哉豈夙業真前定抑彼蒼固難詢也耶於乎割水吹光徒憤攘海天浩浩自空明秀文璽上人法身五分爰以戒胚孝名為戒百行之魁沙門遁世含章在醅曷從知君我以事推憶昔申酉天地崩穨楊州鶴化蛇虺風豗君憂母積負奔天台仙宮桐柏一往無回季春三月碧澗桃開母思鄉縣還奉歸來顏容母戚肝膽君催始終戀慕五十如孩遠矣君龕白石堆堆青松不賣華老嵒隈宣公遂往僧史無裁君芳莫擷我心孔悝月生華頂影砌瓊臺對此清照增我徘徊護生菴洞如關主維山嶄嶄維水泱泱為鱗介主作大悲王化龍者不知其幾何從寸至尺從尺至尋殆十千兮未央噫安得窮四海極五湖咸泳至仁之沼樂終古兮壽無疆如如上人覺來天地一蘧廬形影何從問我渠皮袋一靈都掉卻人間天上自如如諸佛如也衆聖如也彌勒如也如如亦如也越國山川齊入畫寶林忝得一浮屠悔菴上人上人諱泓登癸未甲榜即雲間沈臨秋也以申酉之變出家披緇後無疾坐逝丹霞選佛鼎需棄儒膚敏笑殷士常服羞黼冔寄東山兮以嘯傲指慧日兮而歸途噫氣澤蒸雲夢滌襟波蕩具區自慶華胥曾打破不須兩眼更愁胡處空升上人寒暑一帔走百藍歸從遍吉共燈龕如雲行舉生平一王相橋頭六度菴永明一葦變上人尤是狄三當日面脊梁豎起道如川先師剃度牛毛衆麟角數君最象賢戒香能芬馥定水更澄鮮橫身宣德門前過名動公卿豈苟焉日明上人無趣老人之孫小隱青山大隱廛城隅住老竟忘年祖翁幸有家聲在那羡諸方五味禪恆實上人猒住石梁橋畔寺卻來鬧市更安禪花開不管流年去一任春山響杜鵑明巖上人不傳千佛戒不續五家燈潛真鏟覺和光同塵穆如春風之惠物溫如冬日之愛人撮茶能幾何而消豎子膏肓之疾片言猶未了而解娥眉深嫉之顰故德之者以為僧伽之再世惡之者以為不託之愚民卒莫辨他是凡是聖又何怪乎疑鬼疑神咄要斷者樁公案分付入法界海之玄賓梅林戒先上人羃羃數竿修竹悠悠一片清陰石玲瓏而有竅蘚斑剝而染黔想勞生之擾擾籌世路之崎嶔于斯燕坐時一披襟可謂塵囂俱滌萬纍無侵者矣如是又何必木從船子而撥華亭之擢山追懶殘而支煨芋之鬵乎哉且即人間開梵宇平疇緑野建梅林青獅文上人父乏嗣因造曼殊大士相而得者文殊堂內萬菩薩君降人間第幾流尚喜夙因曾不昧再披田服更何求搜窮教海非沙數放舍聞思豈浪修臺山有問當年事前後三三莫錯酬茗柯忠清凌先生文章秋水骨節操玉壺冰讜言抒直亮之衷逆鱗不諱弼法著春秋之義元惡必懲寧觸權而去位豈阿比以為朋風裁侃侃正氣棱棱一死從君歸九土令名千載譒吳興三我蔣先生濯以江漢暴之秋陽溫良恭儉雍穆齊莊德披春雨教拂秋霜六月冰室九秋蘭堂此倣佛先生之景象而非先生之真實也必欲宛肖先生請以衛風淇澳之詩而為之題曰如切如磋如琢如磨瑟兮僩兮赫兮咺兮有匪君子終不可諼兮仲含李居士天真既散靈舍穴鼪機斤械斧日戕其萌誰補我劓孰息我黥直養無害專一惟誠羹牆堯舜寤寐老彭庸言是謹庸德之行斯文將喪大朴留貞嗟哉渾噩爰有先生同菴蔣孝廉儒宗茂叔蓮社遺民尋泗水芳而識東風之面設西河教而菲桃李之春樂有莘之道義安王蠋之賤貧衡門寄傲泌水頤真千埃涅而不淄百礪磨而不磷若乃濟人之危出友生于既死傷時之薄培孤孽於將柛則又本之至大至剛之正氣抑豈慕夫朱家郭解之為人哉尊素王居士二皇皇偉度奕奕丰神賦學把長卿之袂騷壇推正則之輪百斛珠璣時錯落於豪素千章錦繡俄經緯于缺申謂非育黃山之秀鍾白嶽之英而為鳴岡之鳳瑞世之麟也邪胡然覽德輝而四顧舉仁趾而逡巡哉嗟乎憐才無孝武誰賞子虛音緬懷人於異世徒抱膝以長吟介立昂霄柏孤芳傲雪梅安貧真似憲樂道信如回賦贍三都學詩兼七子才天衢何日步一嘯凍雲開霞標管居士上大無人乙己丘杏壇四教賴君留道源自出姚江派性水曾叨禹海流夤畏懷三非應遠覃思佩九德宜周曉空雲散霞光在清映人間卒未休靜涵張司農白雲郭功甫雙徑馮濟川心誠而一志靜而專清雖畏乎人知帝心密以簡在道本超諸形外所立如有卓然占高峰之片席得崇報之一玄千波既潰令節斯全鳴珂無復朝天日搢笏猶嚴侍御前周臣王內史謝家瓊玉樹天上石麒麟白業步東林俊彥風流厭江左玄賓抱揮戈復日之深衷蹢躅雙丸苦尤嘗膽懷攬轡澄清之雅志留連方策隱若臥薪聞逮雞鳴以起舞思將臘去而回春江天漠漠白石粼粼蠻觸正興蝸角裏生涯且復付袟綸異公王居士丹山羽翰桃浪錦鱗秋水濯其襟裾清欺庾嶺梅梢之月春風入其肺腑秀奪衛原淇澳之筠那更高才性賦慧業天甄詞工王勃王建墨妙右軍右丞鳳將翥而霞蔚龍欲驤而雲蒸固已朱紫懷探公卿袖置久當天街躍馬翰苑蜚聲胡為乎踞胡床以燕坐耽韋絶于一經於乎鸚鵡賦兮憶正平零露團兮愁夜行長纓待請拘南越宣室何人問賈生紫嵒周居士堆堆塊石方床蕭然摩詰之空其室內釣笠扶笻岸坐卓爾龐公之吸自西江心超超其遠寄氣磊磊其難降庶幾牚圜天以作蓋揭萬象使為窗于以玩金剛之智劍于以剔般若之銀缸又焉肯逐雞鶩之群低眉棱于濁世隨衍儀之後求聞達於家邦而已邪友醇周居士鮑生不作仲父遂徂山有松兮扶疏下有人兮容與頂樵笠以為冠所以不願人之文繡也荷漁竿而不釣所以不願人之膏梁之味而羞與羶逐之夫而共為徒也仲雍陳居士骨礱秋水赤砂肝參幕機曾走可汗萬里青霜懷馬革十年黃卷歎儒冠時當德祐籌難策夢覺槐都話已闌往事休嗟天啓後付將爐篆對蒲團師黃陳居士漆瞳照漢玉骨凌霜胸藏蝌蚪之字劍瑩鸊鵜之肪借箸柳營倚馬長書露布決機虎帳軍前急就符章利建侯兮萬里詎兩曜兮收光側身天地兮顧影蒼涼蒿子房之兩眼兮結張載之寸腸途不窮以致哭籍非效而猖狂乃秣名馬乃峙玄粻紉秋蘭以為佩製芰荷而為裳或隨苑風或逐雲將冀沅湘以至止思五嶽而徜徉臨絶壑兮陟危岡消半生之嵬磊兮蕩五內之鬱傷歔嗟噫嘻兮不有遠遊天外去人間何地著師黃媧石韓居士不須石上話多生鷲嶺知君夙有盟方戴華巾離少室又攜席帽出神京即真示俗晴還雨在欲行禪暗復明拿得電光為火把何妨日午打三更卓月朱漳南出師圖衛霍勳名少小期天生邁種骨能奇席前借箸堪籌策馬上揮豪可賦詩妙句驚人風動石高才涉世月臨池上楊柳已侵宮闕為幹炎荒又出師正喬崔將軍家藏鐵券金章實先朝將門之種名載夌臺天府蓋昭代公輔之儔雅度皇皇成蹊而下不言之桃李英風卓卓沒羽而中昏夜之石彪倚天揚卻寶刀早知立地端可成佛千里勒回騄耳誰問數奇不克封侯岸眉照白雪河目橫清秋太平不用擐戈甲贏得忘機狎海鷗慶雲李公攝政王旗鼓諸艱歷試倍流離壯志如山屹不移恭謹真堪追萬石勛名未肯亞驃騎曾無肺腑藏私怨只有丹誠報主知衣錦還歸行晝裏長安共說好男兒春雨雷金吾丰神奕奕貌桓桓氣自干霄劍自寒閒跨征鞍平樂浪笑凌夜雪獵三韓亞夫勛業能嗣武太尉家聲正未闌最喜昔人長健羡金吾仍作父時官平菴李居士孤騫稽叔夜超放李通玄落筆龍蛇走摛詞星斗縣白狂群欲殺甫意獨相憐吾道窮方甚奇君塞不遷中符汪居士孝義敦仁世遜賢獨居那更倍乾乾傳家二字唯清白教子多方只敬顓高誼千秋曾想見斯民三代幸依然相胥狗苟蠅營日不有君芳孰自憐南伯王文學玉專白璧器擅瑚璉攄詞追長吉好學等顏淵俄乘風以化去忽騎鯨而上仙舟亡夜澤鶴沒瑤天才兮何富壽兮何慳此西河之所以隕涕尼父之所以痛傷也咄蝴蝶夢中方栩栩大千覺後一空床扶漢程居士其靜也祇其動也跜其笑也熙怡其問學涔澬其文章陸離其骨權奇其度淵夷其人美且䰄又乞題早歲行樂二十君非四十君據今題昔事紛紜何如景子都拈卻華自飄香鼻自聞鼻自聞見故吾達磨元是老臊胡載甫戴烈士偶來竹院暫過僧堂有心存家國何慮問閒忙散子房巨萬之資為報韓以擊政揭賓王號召之檄思反周而為唐衷偕白日兮同赤志並瑤天兮共長魂遊故主忠難化血染黃沙草亦香錫康周居士秋水丰神志潔霜賓王之國鳳鳴岡滄桑變閲人如舊舒卷時更道以常方寸有天縣日月七襄無袞補虞唐威儀留得漢官美仰止千秋尚耿光虞卿鮑居士魚遊荇藻文章動人在林泉道味高案上琴書曾不御九天風韻落松濤中仁陳居士參得瓶窯誰字禪不疑鼻孔大頭縣上生何用金臺接超步還乘腳底蓮崑石馮居士亦真亦俗非釋非仙虛堂隱坐兀爾忘緣美如崑璧之藏石靜若徽音之在絃乃有不識好惡底諸方東塗西抹傾盡狐涎可憐摩詰空無語三十二人落蹄筌彊桂嘗多知辛識辣導師頻遇汲幽造玄仁以裕後義以光前恆納衆流污不為天下先風波險而歷老世路危而便旋任外魔兮力捍是法社兮身肩其尤虎跑山中之泉潤濡莫盡錢塘江上之月光照無偏者也肖嵒范居士陋巷長甘顏子貧卻疑前是范丹身忮求雪蕩心無介富貴雲浮樂自親柳下不慚妻諡惠周宗何怪趾稱麟即今庭砌多蘭桂天道于卿見大均子穀居士入山圖一世才名數獨慳天風不姤遁天山杖頭明月橫千界笠下清風起百彎將置古今歸旦暮盡情官佛付潺湲多生受得靈山記只恐松門未易關雲間徐式澄不趨朝市不入山林朱明兮正晝泖水兮方深荷姍姍以獻笑柳絲絲以垂陰科頭兮箕踞散髮兮披襟何人兮知此意白石兮識君心孝卿費居士蕭蕭野服炯炯雙眸步既前而且卻思方動而又籌直欲攜笻天外去畏將清景落閻浮摶九張居士生天成佛總隨緣靈運徒勞論後前與世浮沈心不競羡君白作地行仙道耕田居士繪行樂為道耕圖請贊漫書于上問君空手底將鋤歎世心田長刺多拈起青原垂足斧斫開忠國倚松蘿菩提揀作靈苗種般若渟為灌溉河謾謂道耕無著莫插鍬叉手任婆娑聖先朱居士世路風波日險巇放身只合碧山涯千尋嵒壁侵雲直百尺松枝偃蓋垂寵辱無驚神自王市朝不問夢恆怡惠連得句有芳草抱膝何妨更賦詩秋嵐朱居士悟有為之非實知夢幻之難停芒鞋半歷江南保社藜杖曾敲幾處戶庭居塵而扮出塵之相在世而懷出世之經咦如筏喻者法尚應捨何有越格超情漢肯耽著乎金鎖與玄扃君不見勘破趙州無字後一回舉著一回新祖生顧居士香焚柏子了深經忘卻人間歲月更茶熟過來還溼口應知念底事分明心不競意何營逐鹿徒成蕉下夢清修且自課生平永孝戴奇童苗而不秀孔茲哀邁種瓊華為孰開遮莫九天從謫降卻歸天賦玉樓臺對清影思悠哉咄拈起迷盧方外擲碧霄長看月徘徊龔與參乞題二親肖像臨終念佛而逝四大空如幻十虛見所緣西方何處是暮鼓日徒縣咄潭影踏翻亡朕跡雙輪杲杲挂青天徐指菴為父汝仁乞題肖像諱允壽芳尋泗水壤擊堯天物齊莊生之論瑟希曾點之絃樂爾智也壽爾仁焉佩玉冠緌何濟美羡君生直太平年祇園剛姪禪師自信玉容天賦得誰將五障強名模心華爛熳開金粟法吼髿震海隅未許末山誇半杓肯隨無著道蘇嚧往南作佛嗤龍女站定腳跟真丈夫泉首座為母希菴比丘尼乞題肖像生緣鹿城夷亭曾閲春潮上婁水還看涓滴無圜頂而現本來之相方袍為標出世之模月落華胥春夢斷趙州東壁挂葫蘆師黃居士為母陳孺人乞題肖像興知陵母廢知嬰誰似高褱見獨貞不計敗成希避就唯咨忠孝樹風聲邦家念重身家念君父情深兒女情送子參戎期再造千秋一別氣何橫通睦馮道婆鬚眉粉黛閨閣丈夫矢志參方撩盡百城煙水存心作佛竟忘五障身軀驚普門匝匝之波親探洛伽疑前後三三之數遠造文殊何事峨嵋尤頓轍豈難萬行以踟蹰咄四運潛移誰舉令春來依舊百華敷元清胡道人堪歎衆鬚眉幾許蒙巾幗咄哉此閨閣偏多出世情既假金襴為服御還將鎚拂任施呈似恁殽訛公案且道如何斷評咦奮迅始稱師子步崩騰那局象王行君不見大道本無男女相至真亦復越常情又不見龍女當年酬智積彈指南方覺道成超德殷道人得母儀之大者盡婦道之恆然克咸厥家啓佑曾玄若乃專精事佛矢志逃禪萬年一念一念萬年則凌行之流亞而空室之齊賢與咦識得首山無量相騎驢新婦阿家牽復為頌曰劣相殊形不似他男名女字謾交加一般鼻孔聞香臭摸著蓮開石上華牧牛圖歷劫沒名字彰為者頭角縱然打得回無繩還自縛要知者般頑賴底任你踏遍天涯掀翻海嶽撞到彌勒佛下生時敢保討伊頭鼻不著阿呵呵他家自有好風規畢竟按圖難索摸群漁會飲圖扁舟一葉泛輕鳧日暮艤將傍葦蘆人世興亡渾不管風波出沒慣曾無忘機到處鷗堪狎招飲沿村釀可酤千古勳名悲范蠡得魚那必在江鱸劉海釣蟾圖金錢作餌帛為緡釣盡人間朝市倫貪壑難窮如廣渤情絲不斷若牽銀官居上品尤思進富積千莊尚慮貧垂手玉蟾何大意劉仙端的示迷津樂川馬居士大士當年逢海上因君感應道交深為人造福開永壽與世明宗延竹林一著去來知本據半生功行遂初心五常應復高門第家有白眉又見今聖月錢居士玉骨亭亭傲雪梅草玄誰數子雲才清言祇許嵇阮共法喜夫容富趙陪跡寄人間恆隱約心遊天外獨徘徊徵君尚復嗤彭澤五柳當門止弗栽武君求居士之乎也者得儒傳又向吾宗理會禪儒釋兩關都透了更有何事上心田尤敦素居士起死回生妙有方濟人還為作津梁功同大士真堪羡持地仍兼老藥王惟寰馬居士徽恩修了堵波連傾盡家資事佛仙檢點生平誰得似襄陽在後給孤前蔡宗五世家慶圖子穀居士請或拖金紫或林泉五世瓊芳葉更聯家洞儒宗因學佛室空幻趣為逃禪青雲那怪生高足淨沼應宜長白蓮欲問三三前後事一輪紅日正當天子穀居士行樂圖不須瑣末論生平一句身心奉剎塵舉世叢林知子穀芳名欲歇也千春
