body:
  text: 住明州天童寺匡廬黃巖沙門道忞著贊一釋迦文佛淨智莊嚴百福身出生功德廣難陳譚偏為鑿人天眼示實還宣上妙輪千聖萬靈蒙法澤十方三世入陶鈞願同含識常稽首百福莊嚴淨法身出山相耐盡青山雪夜寒捏沙誰信不成團眼睛突出明星後海闊天高地更寬且起步蹋前灣春色武陵看不盡桃華何愛到人間靈山分衛圖執應量器著布衲衣周行分衛滿缽而歸使舍匊沙者種輪王之福俾施棄瀋者獲來世之貲愍含生之薄祜示七佛之軌儀默而為矩動則成規日用飲食佑我素緇稽首世雄真大導師顧氏繡佛金鍼誰約玉絲輕幻出慈容妙德人桂魄圓時千界月華枝動處萬家春休疑晃晃非真見須信塵塵盡法身諸數從來曾未墮青青園籜又開筠無量壽佛至化宣流龍猛歸神於後淨幢高揭遍吉祈往乎前蓋其大願洪慈固群宗之所推遜抑淪肌浹髓與此方有莫解之深緣不則夫豈無琉璃光王之熾盛又豈無勝蓮華國土之長年而窮陬下邑販夫灶婦卒莫知戴焉者何也噫六字洪名下清珠於五濁潢流之水十聲寶號播真覺於含生八識之田雜毒攪成甘露海娑婆摶作四禪天此則無量壽佛之所獨維其然者也孔雀明王佛靈符曾驗雪山陽妙道今留辟萬殃七佛同音為證據千魔共攝顯真常酬因立解多生結愈病還將沒藥方稽首慈威能普濟有誰得似大明王藥師佛因源既遠果海今彰富真法藥為大醫王深慈莫測至德難量光流法界惠被十方聞名憶念脫苦銷殃如死得佩返魂之香願空為口歷劫贊揚覺諸含識咸就攜將布袋和尚晴雨占雙屐大千包口袋逢人乞箇錢天宮都不愛一笑胡盧天地終合口不知何年代問伊是聖是凡邪得恁無絓更無礙咦龍華三會轉頭來未必如今長自在三教圖圓無上覺證極真空揚聲火宅喚出群蒙孔敦仁義聃貴虛沖化分迦葉跡現儒童江海川流深廣雖異日月星宿麗天則同全真道玅衛世儒鴻十方調御誰與媲隆三皇遜聖五帝推功茫茫三界王有大雄三大士同幀稽首最勝圜聞大士七佛之師毗盧長子山從水至且休論以何因緣故集此如我智觀大士身慧目悲胸願力趾同門出入舊冤家狹路相逢那得避行行坐立共儼然日用勞生誰不爾繁興無盡諸身雲華支搖曳春風裏若將高下論渠儂拈得鼻頭失卻觜咄觀音大士大士玅色身非色而色說體同真法界對現等一切譬如十方國悉依空布列空雖平等入不起復不滅又如淨月輪一印千江徹濁潦則不彰自與淨輪絕澂濁固云殊等炤無差別是故我稽首敬禮大士月證法圓通隨心自在拈起淨缾傾江倒海滔滔汩汩紅蓮迸出善逝何來塵壤皆佛大悲為體玅智為胸青山為髮紺海為瞳月景千谿印春容萬卉充塵塵三昧裏法法圓通中甘露慧缾常瀉注大千流潤澤無窮梵相垂髮執缾瀉冰如注洞觀無際蒿目塵勞躡紅蓮兮一瓣夌萬頃兮滔滔豈顯神通來海上將接盲龜入夜潮紅蓮一瓣承足立大海中波浪如山綠楊景裏現慈容遍界誰知月滿空欲矙圓通真戶牖鳥啼華更笑春風大士常居五蘊山勞生著意夢中攀十更打盡南柯曉處處鳥鳴春樹間春樹鳴不須尋好看家家觀世音悲容藹藹慈意湛湛油雲敷漢秋月印潭有美童子自遠趨參大士無說孰審指南菡萏青荷兩兩琅玕紫玉三三根塵解互相為用聲自默兮色自譚論劫橫身生死海為憐昏墊入迷流悲繒密布縵天網願餌長垂萬里鉤化被魚龍知捧足喚將人世不回頭艤航空載蘆華月彼岸非遙孰上舟褰裳跣足孑立鼇背不修匪思不波匪楫三際剎那大千一葉支頤坐辨蓮中小汎慈舟一葉蓮橫身業海任推遷眾生魚撮知何限千界洪波片月圜瓣蓮浮海一月印波中萬別千差觀自在底觀貝葉費神多眾生想實難調治簡盡醫方沒奈何咄彼自無瘡休剜肉大家靜處薩婆訶趺坐低首捧觀貝葉修多羅非心非色而天而人如摩尼映如聞性均含生縛著根塵留礙大士圜證手眼通身紅輪一等無私炤白晝生涯萬井營何來大士轍高踞海濤中山本無鼇戴蓮從臘月紅入流因忘所即礙返諸通豈學小乘侶安禪制毒龍平菴李居士命工手繪大士相立己於前稽首作禮願言攝受因其乞贊為之題曰無緣慈力等赴群機妙應分身散周天下蛤蜊勤王金沙嫁馬鬼面神頭千變萬化四生為銅法界為冶鼓鑄含靈一真陶瀉予懷明德有若長夏載馳載驅何以並駕水漲船高泥多佛大先聖後聖其揆一也魚籃觀音愛河千尺輥閻浮拋下雲山擲玉鉤風澹蕩雨綢繆但見紅鱗翻掌上誰知活賣死貓頭咦一樣金沙灘上艸年年綠暗芳州何似綸竿罷卻休魚行肉市賣風流若箇行家識貨酬高價縱饒馬氏著香魂還惹幾生愁欲鉤頭幻百千嬌聚沫何人識電枵金鎖骨徒橫楖栗海門日捲碧天潮石崖倒挂觀音立準王連州請赴感殷勤為解縣春風斜倚幾經年似攫魚龍鵬劈海如分景炤月臨川縣崖攃手忘偏正入市垂鉤任倒顛休因相異生諸見耳色眼聲在處圜舍利塔觀音大士觀身實相太虛同圜舍利何來空果纍然大士貯存愍我攀緣敬禮無所用福多千文殊大士敬禮文殊大智士說法無畏善師吼入塵入剎布身雲佛佛會中揚法化福城寧指善財參列聖菩提由刱發根熟閻浮處處逢如地掘泉泉沸冽當知含生智亦爾隨順無明覆諸有無明不順即智光皎潔圜明無欠剩大士本以智為身我智文殊智體同智同何處覓文殊大智文殊亦彊名血書曼殊大士非心非色謾疑猜權號文殊玅辨才襯足紅蓮隨地涌印空寶座自天開狻猊聲吼千魔怖智劍光芒萬聖摧透體紫霞光飲日儼從金色界中來普賢大士萬行分披願海重象王行處疾驅風身雲彌布難思界毛孔中含一太空智似文殊稍共轍慧如普眼謾舒瞳百城參見吾師後春盡落華滿地紅普賢洗象圖塵塵剎網行交羅象步崩騰許孰過透體明豪還洗刷吹毛用了急須磨寒山拾得玩月圖一輪秋月印晴川闔國同看此夜圓最是心光長皎潔塵勞終古掩人天寒山子實堪憐欲言言不得無物可為詮同人共指高空上星稀河澹露娟娟笑落清霜滿大千十八應真大士髡士膚敏覺王翊贊力超生死河平陟涅槃岸蜉蝣天地曾無一法之當情旦莫古今寧有諸緣之在盰遊佛國而如閒步大千其若誕為福人天入鬧藍不圖流作丹青看杜鵑聲裏急回韁那顧天涯去路長金鐙敲殘千嶂月馬蹄蹋破萬谿霜還鄉曲唱無生調離夢人登解脫床一副骨頭華十八至今擲作玉鏗鏘風燈脆命泡沫虛骸勞生顧念百計安排疇放身心山邊水涯況能唾棄知為禍階靡愛而親孰憎而乖天龍供獻猛獸崖柴泯然自盡一種平懷我贊大士真法模楷三羅漢贊一尊者指端見塔傍二尊者坐而觀之三界長辭永不干大千贏得掌中觀如雲似鶴翔天外閒坐松陰蘚石盤黃金塔涌指端玩弄神通也太難為問海山無事客靈山拈出底顢頇臨機請下一語看菩提達磨大士辛苦萬千來大漠唐言不會卻徒勞戇詞易對黃金闕空腹難遊君子皋落賺魏邦贏有履平欺梁國適無豪度迷好意聊相問若箇臨喪哭馬槽迢迢十萬西來遠一物無將兩袖空三拜許他人得髓由來齒缺不關風鳳凰臺上遭攙出少室嵒前受毒深行道不辭獰惡世為人徹底祖師心面皮鐵作石為肝九載憨憨著壁觀究竟心原無可覓何曾有法為人安折蘆渡江南熏奏罷下龍樓浦口蘆華正點秋黏天浪打石頭謾誇一葉等輕舟按雲解接梁天子萬里長江應倒流月籠丹桂天階遠霜老碧蘆玉浪平五葉芳聯棲洛後雲臺何似釣臺嶸燕子磯頭暗折蘆蕭公明放老臊胡長江把斷如天塹入地有謀落半途大江東去如飛箭萬頃洪濤一葦航何事迅流能截斷不將一語契君王不須涉險去儦儦囓鏃機誰過老蕭寄語折蘆江上客野狐久已混金毛一語參差別鳳城君王不顧肯循人蘆華愁對西風語尤惜當年去魏塵面壁達磨大士坐斷千尋崖壁立洪音落落似雷宣雪庭徒覓安心訣肋下無人築老拳何賺誤錯流傳九年漏洩春光盡剛被人呼壁觀禪千歲寶掌跨出虛空得自由人間有願住千秋竺乾汗漫如雲度震旦蹁躚似鶴遊大士傳心逢少室南天建剎樂佳丘至今明覺山前過弔古因師起暮愁濟顛羅漢布袋定光之亞侶寒山拾得之同流翩翩雲外孤鶴汎汎海中埜鷗嬾修八定兮秦封不管猒處四禪兮漢地難收祇贏得布衫零鶻臭扇子破犀牛浪跡湖山南北寺倒騎驢子上揚州黃梅五祖忍大師钁頭拋下得幾春亟亟圖將舊願伸似你不知爺姓氏青松曾見兩生人天童開山義興禪師摩騰始漢達磨未東不有神道孰警聵聾六環飛舉帝座冥通矧開終古般若禪叢千燈炤夜百蟄驚蒙飲師之澤與山無窮趙州八十行腳圖拋卻雲山千古寺艸鞋不住走諸方上門上戶咬人急倒嶽傾湫探水忙語似寒泉甘亦苦機如劈箭利還彊叢林在處遭塗毒何日孤笻倚艸堂天童宏智正覺禪師禪將魁千五百儔剎竿低厭建炎秋玄爐血鮮烹群象古岸星排下玉鉤試巧天孫繅帝錦觸機三峽倒洪流川勤父子猶推讓震旦何人出一頭雲棲蓮池宏大士餖飣百氏醞釀諸宗即禪為淨六義三從有聲其默有儼其容金相玉式德鳳仁龍甘露法雨旃檀香風披之拂之以翼以通孔門迦葉釋氏儒童炤明末年光於大雄紫柏達觀可大師秉慧劍操智橦金剛燄般若鋒開覺路復禪叢流藏典惠顓蒙精貫日氣吞虹佛幢震魔膽㤝道大難容堪忍世千秋法社想英風憨山清大師千經萬論若帝網之羅胸諸子百家彷天河之注腹思抽蠶繭兮錦繡盈筐筆灑鮫人兮珠璣滿斛所以才大動公卿名高招謗讟冠巾說法兮不殊大慧之謫貶梅陽垂老還初兮有類寂音之流離瘴曲然而玉骨曾埋雪窖堅踰金剛那伽坐斷谿聲閒然空谷故能生當憂患雖刀鋸在前恬不干懷死留色身即幾經泉壤曹谿仍復夫豈欲聯鑣盧老冀垂百世之餘芳蓋庶幾乘願而來殆將顯化嶺南無佛性之髡族乎幻也佛慧老人髻抹秦山之黛衣飄鏡水之澂登華頂而一笑披襟聲傳松谷入皇都而心華朗耀燄續寶燈胸富千章錦繡門堆三尺寒冰清風作伴明月為朋九十春光趺坐裏高蹤有數大明僧壽昌無明經禪師仍西竺而再來後雄峰而繼躅徹底流通大好山雲根斸斷巨鼇足師王奮迅兮高揭精進之幢金翅崩騰兮深攫魚龍之族木馬雲中贈鐵鞭石人腦後抽金鏃玄音唱絕兮先鳴慧炬光微兮徑續此所以風高韻逸法社景仰先刑道大德全人天戴為眼目者也雲門湛然澄禪師發自幽潛有類曹谿之奮跡奭然光顯實同投子之鷹揚愍玄學日以怠弛也則為之二嚴俱競悵蹄涔群而溺陷也則為之宗說並張教海誰云多所淹貫機絲元不挂乎梭腸夫是以甄陶凡聖折節侯王廓禪關于己圮起大法于將亡人天譽之而不加勸佛祖非之而不仆僵豈僅曰廣無心之哆哆啝啝端師子之踽踽涼涼而師固踵其躅襲其芳哉博山無異來禪師寶鏡當天靈鋒炤雪伐諸知見稠林盡彼盤根錯節恣入理以深譚極門庭之施設道大而光人尊而傑走彌天雲水鶩集川趨傾四海鴻儒誠投嫚折皓月時臨天界來沛然莫禦江河決噫化龍門能巀嵲點下錦鱗百億梢教渠頭角自擎揭天童密老人雲門湛和尚同幀子穀居士侍旁牙如劍樹口如盆並化閻浮只二尊洞示真元高太白聊通一線大雲門忘懷論道思先哲飲水分河惜後昆獨有毗邪泯四相等心擁護奉朝昏密老人語風信雪竇雲洎山僧同幀禪者繪而乞題義興法窟吾師振二覺洪規我弟還法鼓不鳴今霆蟄千秋大業孰與攀語風不事叢林事浩浩清風扇宇寰衲被蒙頭都不會嗟余何德動宸顏山一曲水一彎班荊坐對意閒閒鼻孔大都頭向下鶴長鳧短幾多般迦葉富釋迦慳父有重牙子無齒捏沙終是不成團雲門雪嶠信老人示生三佛地寄跡梵王家二字古雲門豁開雙眼一株無景樹燦發心華不打禾山鼓不擎祕魔叉口驅雷公電母手握寶鏡靈蛇無泉大道之怪神偏饒風韻有皓布褌之瀟散更富煙霞舉頭天外獨汎玄槎何人兮夸父敢託兮後車咦風卷閒雲歸洞口水和明月去天涯不禪而定不思而玄不推敲而詞霏玉屑不臨摹而墨玅雲煙衣飄飄以霞舉首矯矯而鶴仚其隨也性其動也天更有高蹤難步武邈將生死等郵傳紙上山河曾厭殺翻將海底見青天等閒跳上虛空背罵雨訶風只是顛天馬駒玉麒麟平超師子步蹢躅象王行風蹄一蹴瑤階碎雲葉紛紛落有聲攬轡誰堪共遠征咦不可見面只可聞名受業開先若昧和尚雲扃一自鎖黃巖百尺猶看手植杉休論道聲喧海嶽叢林戶說昧楞嚴雪浪堆中騰躍出生獰頭角邁同儔戒香親向蓮池沐玄岸時從紫柏遊法會人天將百座稟承記莂亦千籌屋頭更有長飛瀑界破青山正漫流淨名抱樸蓮禪師子潛阬中縣崖攃手夌霄峰頂豁地開眸親陟五雲深處曾探萬仞龍湫羅張教義之天則參橫而斗轉操縱要玄之句則海立而空浮六月繁霜降三冬華木稠一默淨名喧海嶽高峰千古韻悠悠真寂聞谷大師覷破虛空開口處帝缾終不認葫蘆三生戒體優曇馥九夏禪心海月孤蓮社將頹憑力振宗風欲起賴陰扶錫飛到處忻魚鳥豈只清光映楚吳鼓山永覺賢禪師明教稱華贍為人乏舉揚巖頭機警敏著述匪所長師固福建子卻乃訝郎當風雷生舌筆二比擅其場輝煌天岸麟熠耀丹山鷟羽翰呈文章周旋中禮樂元字腳不存胸富天人學精義如貫華說禪乾爆爆十年閫絕履床坐接君公高繼汾陽躅挽回趙老風石門句險巇鳥道徑何穹遠矣斯人也卓哉真象龍佛日石雨方禪師剛被定光誤賺卻來震旦躲跟石傘峰平空一擲鷂兒嶺撲地高騫雲生膚寸石雨浴萬華原洗清佛日再糳龍門雪舟蘆灣櫂煙靄香霧歕夜簾寂寂垂明月金殿巍巍顯至尊顯聖三宜盂禪師眉裏西山煙雨舌生瀚海青飆義幢揭而樞精褫魄玄挺奮而師子折腰離離奇奇獦獦獠獠顛酒愛喫曹山恣情放曠清波喜弄船子任意逍遙蹋雪過西泠狎鷗汎六橋縱有吳道子顧虎頭也則難畫也則難描瑪瑙寺請竹林林皋豫禪師有美崑山壁發揚石磬光淳風扇一世厚德載無疆居戎馬騷繹之衝巍然一剎當風火交煎之日話別升堂吾知師如此耳他何暇舉其長大江東去潮回亟可歎伊人水一方南澗箬菴問禪師祖師直指心為宗悟心赫日曉昇空萬法昭宣六宇融苟其茅塞滯罔通必也曖昧迷雲封末世人根何淺潗語俚思生機且澀文字尤矜祖不立胡然一口西江吸設施能令鬼神泣磬山門下僅有師霆走詞鋒光陸離儼如春色在華枝小根魔子知不知此是吾家真白眉雪竇石奇雲禪師濯濯青蕖敷沼亭亭幽谷開蘭雋味清煩結真風扇宇寰把斷乾坤敬嚴天童法道埽除兵燹重興應夢名山嘉招羨大溈三請辭而不赴蕞爾嗟南廣首丘正而思還卜得來朝迪吉依期撒手閒閒此豈與月犯少微吳中高士求死不得席虛雙徑多方力援權貴冀長驅而入關者可同劫而語哉咦玉骨何人剛似鐵許伊高躅少追攀珍重聖禪者切忌等閒看油雲膚寸起婁江化雨滂流遠有洸光燭簡堂星再景聲齊明覺瀑飛長無生法坐鋒刀說釋梵宮從瓦礫煌如林道行難枚舉欲寫須教硯作滄天童林野奇禪師擔德山之疏鈔探馬祖之宗風生緣西蜀道契天童網子漫天布江海盡魚龍愁斷西江歸去路一龕深鎖碧玲瓏陽山松際授禪師禹門經宿客石磬老頭陀七筆勾消往劫債畫眉聲轉古陽和論道語無碑記赴機舌有干戈雲蒸五臺飯月入太湖波問渠端的事如何松際濤翻潮汐上向陽山子背陰多光相高原普禪師力據向上關單提第一義棒打石人頭嚗嚗論實事胸悃愊而無華語帶悲而重遲耐似蒲牢堅如贔屭名落聯芳十二人瞎驢那受然燈記報國茂林律主以佛口為胎藏以波羅提木叉為大師歷歷六環金錫寥寥三事衲衣霜清雪肅山峻淵夷除饉有渠何所似須彌南畔吠琉璃蓮居新伊真法師生知夙稟玅慧天成融教觀于一心匪空匪假羅義天于三目不縱不橫故能襲紹覺而嗣芳尤窺基之于玄奘踵雲棲以後起儼龍樹之于馬鳴若乃處躬以約接物唯誠鄧林入以擇木天網布而張麟開來繼往為法求人桃李分栽續同宗之絕世漏聲再響復蓮社于圮傾曾浮山之不異何善導之多爭於乎般若身宣非口說雨華應共石床平
