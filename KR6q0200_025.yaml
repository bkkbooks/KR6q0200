body:
  text: 住明州天童寺匡廬黃巖沙門道忞著祭文告以直禪師文一千五百草八字於乎哀哉兄竟蒙賊難而死乎初兄在天童聞楚寇虞黃檗老人之塔不寧也歸護之弟臨岐握手勉兄以再兄曰道人家風一刀兩段固心知非兆而不虞如此也去冬弟歸省獲晤令兄玄澤於廣陵時淮楚交警而訊兄無耗弟時遂忡忡若負重憂於躬者因約明春迎兄來東隱亦慮兄或有不虞如此也逮抵章江果聞有七月之變於時霜飛草死凍雲欲雪弟且冥冥若處大夜中不辨昏曉矣亟命篙師發南昌遂不克設位告兄而去今春三月再渡章江以兄後事之故趨問玄澤玄澤告弟曰去歲光黃無寇寇且不至黃檗七月之事直公殆隱乎其權以辭禒也弟則心語曰若所云者亦否亦然蓋兄固語弟我無福於躬無德於朝廷特以國家天潢之故坐享百里侯封之奉如生民膏血何今吾既出家而屢辭屢受余罪也夫此固玄澤之所以有此説也然弟實知兄死矣則又不設位告兄而行者何也亦於百分千分億千萬分中存此莫須有之一念而稍寬假焉耳頃四月十日濟生來言兄被難事甚悉則兄竟死矣不可贖矣縱弟百其身亦無可奈何矣處今之計祇有設兄之位告兄之靈而已於乎哀哉乃至欲如向者之猶猶耳望幸於一日一時斯須半刻且不可得又安望兄貿貿然來語於斯笑於斯陳古訓以規誨弟於斯邪故自聞兄訃以來迄於今動止靡寧蓋不啻日腸回九矣真如千車之挽我思焉斗血之哽我咽焉不及今引紙長書臨文大號將必有鬱結之疾膈中痞滿之症況兄去弟而死又將百二十有餘日今縱不能登穴呼些以招徠兄魂又不能吐一詞焉位以告之此在泛泛者義不敢出矧弟與兄曠世之交哉故由前以論則神思芒昧不告可也由後以論則憿幸圖存或幾希於萬一不遂告焉亦可也不幸而至於今既思窮望絶之如彼又情無所將義無可逭之如此則斷斷乎其宜告矣而猶然不告者何也將謂弟不知兄邪而他人無弟之知兄者謂弟不能言兄邪而他人無弟之能言兄者蓋能言則必知知故能言也夫弟之知兄非今日始矣蓋自辛酉交臂於黃檗兄時以王孫之重幽身叢席方遂剃染則群言交煽彼碩大如某某者猶畏讋不前弟獨以眇眇之躬死生荷負卒成兄志抑弟豈為分榮帝子俾兄有德於我哉蓋知兄法器不謬為空王弟子耳因與兄著槽廠者且三年後弟參天童兄亦再參天童雖吳山楚水不無屢間星霜而彼此皎然寸絲靡隔故凡兄存之于心發之于言見之于行事以至威儀動靜之微瞚目揚眉之故使弟為兄寫照操狀識以臨兄端如優孟之于孫叔敖衣冠扺掌無不宛肖祇有人疑其生而不疑其死者非夸兄以譽己也蓋習兄之深實有如此知兄者也然則今又何其宜告而不告也於乎哀哉弟于此極難矣較兄之終焉無可奈何者尤無可奈何矣抑此無可奈何之故豈易言哉將舉世有莫知其故者亦惟兄上下左右之靈鑒之臨之默而知其故焉耳夫兄既知其故矣則弟不言其故可也然兄知而世不知將謂弟于兄遂如此爾爾也則又不得不言其故言其故弟知兄大不説也夫告者必有詞無詞以告焉不可也抑弟豈無詞哉有詞於此必求當于兄之心求當于兄之心則有詞而無詞矣何也使今弟徒以交情繾綣含悲忍楚哽於喑咽于兄之前非但兄不屑聽弟亦斷不出此矣則必舉兄生平行業從事乎師友者若何深造乎大道者又若何以至誠以遇物恭以處己濯人以德飲人以和木偶聲色之場蟬蛻利名之域大間不踰小德尤敦乃今發最後之光明經旬暑而貌顏如生歷三刀而瘢痕無血變渠魁之色傷同道之心庶幾師子之風鄴都之轍哉抑所謂求全象于既隱得馬體于一豪者不云無之然弟知兄亦不受也蓋兄道光用晦德厚用藏一于聖人遁世不見知故證矣以為無所得博矣以為蹄涔之莫窺識達矣而恫恫焉若顓愚之無知言可法行可則矣而惴惴焉若無一節之足録乎人湘之南潭之北顒顒焉向風矣而甘自陊于鄙野固陋豢養童禿之倫俾無得以名貌焉兄宜何如為心弟乃舉向所謂塵垢秕粳者陳芹設藻胡跽合掌唔唔焉對位而讀則何異韶而鳴缶鈞天而於於夏而裘冬而葛圜而逗以方者也抑兄掩耳返走之不暇其誰為聽之哉更若援莊生之説釋部之談死生夢幻祈解勉夫兄則又所謂藞苴為虛空安耳穴者矣故弟至今窮思竭慮卒求一詞焉以報兄無有也是以告焉不得不告焉又不得真于無可奈何中又無可奈何焉者然則弟將奈何哉亦終于無可奈何已矣於乎哀哉告寂音尊者文康熙癸卯年月日天童晚學道忞謹以潦水溪毛之供致祭于圓明寶覺洪公禪師之靈而言曰維師生知夙稟慧性天成書經目而終身不忘思無停而萬言立就早參明宿悟真淨之高禪晚閲傳燈契汾陽之妙旨頂王證真三昧文字得大總持蓋自有禪宗以來博通經論學富天人雖代不乏賢然未有如師之出秦入漢左蘇右黃風雷駐其舌錦繡纏其腸者也所以著為文字之禪林間之録僧寶智證之傳言言顯佛祖真詮字字開古人生面使天下後世之緇流凡有志于斯道者莫不大賢識其大者以發明心地小賢識其小者以資益見聞此師之時時教育我儕而為百世之師我儕亦朝夕承師提命而為終身模範者也然由宋至今五百年未有自謂因師悟入而附師門牆者有之自靈嵒繼起始夫繼起之師為漢月藏公實出先師悟和尚之門先師以其馳騁知解恐流為荷澤神會之宗間常移書規誨之而藏公遂謂印心于師庶幾叛去先師不妨于天童可以忤言相抵耳前秋辛丑繼起住金粟金粟蓋先師道場也竟公然毀侮先師糊抹先師名號謂曾昭告吾師業苾芬孝祀倚師為得法之祖以故不惟先師并應菴以下之諸祖莫不輕訶妄詆為不知禪果爾則師生平瀝肝雕腎發揮經論所謂光輔祖宗者非以利後昆實為逋逃藪矣是豈吾師心哉抑忞聞之師曰古塔主去雲門之世無慮百年而稱其嗣青華嚴未始識太陽特以浮山遠公之語故嗣之不疑二老皆以傳言行之自若其于己甚重于法甚輕古之人于法重者永嘉黃檗是也永嘉因閲維摩悟佛心宗而往見六祖曰吾欲定宗旨也黃檗悟馬祖之意而嗣百丈故百丈歎以為不及也夫古塔主去雲門之世視師為甚近青華嚴復有浮山為之證據師且非之矧乎杳茫之世胸臆之談何所據而援師是謂自誣而誣人其為識亦卑且陋矣奚悟師言之與有古今悟入之途亦紛而非一釋迦睹明星而悟明星可為釋迦之師乎靈雲見碧桃香嚴擊湘竹角鳴雉堞雞上闌干不因柳毅傳書信一聲江上侍郎來與盤山之省發屠家張無盡之觸翻溺器昔人曾不以數者廢師承彼假悟師言乃祖宗夫師則是溺器夫師矣屠儈夫師矣輿儓夫師矣卑田夫師矣雞角竹桃夫師矣其于己未必重而于法不尤輕也邪昔者季氏旅泰山尼丘則曰曾謂泰山不如林放乎今靈嵒毀祖而媚師豈師顧不如泰山哉蓋師傑出叢林為祖園翹楚一朝罹患難著逢掖出九死而僅生垂二十年重削髮夷險無二致故山谷極贊以為不肯低頭拾卿相又能落筆生雲煙況今歸復常寂光土肯因粢盛豐潔反冒昧從人而甘受非類之禋祀乎哉知師斷不其然然幽明暌隔縱師吐棄曷由證驗而表白師衷盍亦薄言震之俾莫不震疊焉庶幾少塞覬覦而杜彼僥幸者之心否則怏怏之徒稍有不得乎師其誰不可恩歸往哲而慢易前人如是則徒可以叛師子可以叛父臣可以叛君三五之倫將遂澌滅奚有于佛祖之道哉杞憂是懷惟師其陟降而鑒臨之尚饗見聞雜記憨山清大師遣戍嶺南因得修葺曹溪晚年恩旨放還業建逸老堂于匡山五乳峰下適韶人再請還入嶺遂示寂曹溪蕭相國為卜兆厝其全身時五乳徒屬更迎師龕至匡廬以青烏家言各人人殊屢葬屢遷莫適從會師俗弟子作牧豫章復舁歸曹溪將窆矣而總戎宋公必欲易置含殮及啓龕則爪髮已長貌顏不改如生由是即肉身奉供曹溪焉先師卒未久即託生桐鄉為顏氏子三歲不語一日忽呼其父名父訝之師曰你蓋我前身弟子也後其父登兩榜司李五羊師又叱其名曰吾不喜你占高魁喜你官嶺南吾因得至曹溪耳俄染疾公署復謂其父曰你為我召督學使者魏公仲雪來父難之師曰云我有命渠必赴也魏公至與之酬醋歡若平生徐語公曰我不起矣煩子筆銘我骨而藏諸曹溪之原乎遂卒於乎隔陰不迷已度越四果聲聞矣復以往還久窆之身起視人天非夙承大願力而以死生作大佛事者烏能然哉天台無盡燈法師晚年説經幽溪時魏璫方羅織公卿緹騎紛紛四出朝野莫不寒心座下聽衆間有竊議其事者師訶之曰棄俗為僧當遵佛制彼朝政得失豈我輩所宜言者且逆璫擅作威福不日戍皇陵將作投環鬼矣議彼奚為逮先帝登極師已歸寂踰年而魏璫之死一如師語不忒豈師有夙通邪抑如蟲禦木也邪我聞定慧堅持淨光自發師其以是也夫無念禪師住黃檗日山寺岑寂無外檀歲食力不贍監寺融公有高行善尊養置為恆産用以裕衆方慶賴之師獨議訶曰多藏必厚亡他日禍吾叢林必爾屬也後師與融公相繼化去未幾秦淮寇作聞山寺饒粟長驅就食遂殘破焉於乎若師者可謂有遠識矣博山來禪師敬嚴法道座下嘗五百衆有誾首座者依之最久一衆視誾如黃梅秀應得師衣鉢者默叩師師曰渠不得吾真血脈曰舉衆無如誾師雖無意誾獨不虞壽昌法道邪師曰便絶何妨遂無所屬纍焉後師圓逝誾亦出世信之嬴山然終不振而沒雖不可謂師前識觀師不肯妄有付授蓋與大陽同意而世無浮山可歎焉然味師真血脈之一言抑歎諸方之愚陋可笑也朋從黨附在往哲所極斥以為庸妄者今皆俾之策名祖牒以為非是則門庭不浩大支葉不繁茂其如呂秦牛晉早以絶根敗蒂何然則諸方雖存實倍屣于師之絶師雖絶實千萬於諸方之存然則諸方固不存而師又何絶哉若謂其等絶耳與其絶于庸妄也孰與師天童悟和尚因淑之賢臥病鄮山命僧餽諸藥餌僧曰心病還將心藥醫賢公以不蒙師記莂憂鬱成疾耳參苓豈應病與藥者師正色喻之曰前人付授謂其道眼精明足以開鑿人天也若名位得喪日嬰于懷則生死心正未破道眼安在哉竟無所付授未幾賢亦病卒海岸端伯黃公以虎林司李赴召入京時公已望先師不肯可而師于壽昌博山間置微喙愈嫌隙屬舟中無事簡先師語録漫加雌黃且塗抹焉忽聞空中有厲聲而譴告者曰天童悟和尚肉身大士也你何為者而慢易其語言罪將及你矣公由是驚悸失心徑返匡廬剃髮舟過維揚親為豫言如此吁君子有三畏畏天命畏大人畏聖人之言公非不知畏也特掩于一時生滅心耳後弘光朝復返初服起為儀曹郎清師入石頭不屈而死天下卒以是多公焉淮僧定水蜀僧白鷗越僧蕭山撫州僧鐵牛皆叢林所知見為六群輩者鐵牛依淑之賢最久蕭山與白鷗曾參先師悟和尚一親金粟一近天童而定水則出入天童雲門二老之間咸謂于諸師有得往往以禪道詫謠俗謠俗卒韙之莫辨故定水且受天衣為雲門信燒香矣俄越州亂清兵掩捕至山遂剚刃并燬其寺焉白鷗為虎所傷蕭山磔于寇鐵牛亦支解王兵之手於乎使數僧不即死死而得正斃焉其混真淆俗未具論而樹大櫱生又孰能為吾宗諒者佛法有靈于茲驗矣明末闖賊寇中原攻城破邑殺人如芥淮蔡有男子憂不自全日禱關聖祠求庇焉關聖見夢告之曰定業難逃非我不你庇也厥後二百日你冤對至矣你與王姓以九行者已六生相賊戕此生合渠殺你或哀求彼有悔心則可免你審記之寤而回皇不去心先是其女兄之夫有浮家外郡者忽得病且殆趍書督護姊甥扶櫬歸里重以母命行弗樂也及至彼而病者適愈亟回韁而賊至矣因棄所乘隱叢薄間全隊已過餘一騎耳顧見得之即欲剚刃乃疾呼其姓名泣而丐哀渠魁訝之具述關聖夢告之言渠魁驚曰若使殺人有報復則吾百生酬償不了奈何更添你邪扶掖就乘揮之使去騎驚而撲倒者三渠魁倒戟卓之曰是焉得此沒用處漢哉歸而傷發于背而死焉復有男子避賊臥于僵尸之下夜有官屬從騎甚盛按簿閲諸殺傷者至其名則曰斯人合有棺不應死此而男子則以有官自負也既脫難矣家族淪亡無所歸有姪吏京畿往依焉且語之故姪曰俾而登科擢第我實不能若異路功名如拾芥耳乃為之納粟例得縣佐俄而病死僅一棺耳噫世儒固言死生有命富貴在天抑知自作自受報由業因彼天與命亦安能主張乎人哉有一士人夢衣褐而黧黯者求救甚切次日入市見縛巨黿適就刀俎贖而放之俄而其幼子肄業鄉孰弄水沒于溪晚而尋求得諸水濱艤舟救之有物馱負蓋所放之黿也因得不死焉復有徽商附舟至一處見犬繫于檣問其故則曰索負而償者慮其逸將入宰屠之肆矣徽商惻然出金以贖露重資焉舟人利其有夜半縛置布囊投諸淵犬亦赴水盡力銜負得傍蘆灘天明復銜耕者之衣牽至其處解而得救犬與黿固義俠哉而放生得生果因元不爽也彼甘心逞志于一身一口而致冤招永世者抑獨何與北麻周承甫者吳江縣學生也因修河舫貰用平望張某桐油近十金以張死規負不還其子從索反相訐告而張氏固孱弱無如何也未幾周亦病死先一夕張氏夢周衣絹領青綈袍匍伏其家宇下天明犬生三子有白項者在焉呼犬故不應以承甫名呼之輒便翻跳躍而至或遇親鄰舊識則避匿不出咄嗟勞生不畏後世方其三寸氣息尤存陵人逮如不勝豈顧謾心昧己哉及乎報盡一朝身毛已出未免搖尾弭耳屈伏前人況復三途一入永劫難回再復人身其何日之有業之化人得不寒心也邪戊子越中變亂民間子女為官兵所掠者以萬計有小民妻亦在掠中其夫愛不忍割蹤迹得于某部之卒議金以贖卒曰須三十兩乃可及如約而往則又欲五十兩妻曰爾窮漢何從措辦以滿奴腹邪我將死以謝爾矣遂自經卒大怒為剖腹抉腸復抴其尸以懼諸掠者乃投之廁登時雷擊其卒死跪廁前快哉當視天夢夢之時而靈爽如此泰誓曰天視自我民視天聽自我民聽有以也夫己丑諸暨大疫有一老者持十金詣市買棺且以直與賣者之家懇舁以歸及門久候寂無聲響排闥入視則僵尸八口闔戶死矣而簣中有老者蓋買棺翁也愍而殮之夜復見夢致謝曰蒙子收骸恩莫大焉但我家人尚暴露奈何我有七十金在某牆中子破而出之可作棺費而灶下復有三十金足以酬子矣子其為我善為之覺而起金一如其數又豫家先伯早逝十餘年伯姊將及笄矣適有目疾忽見身存慰為診脈且灼灸焉遺艾一包金三兩與伯姊藥石視艾則蘄艾金則皆十成白鏹也復咄嗟語伯姊你母不曉事女有疾恬不求醫診視命渠速請醫某來伯母稍遲違則怒而擊破家釀一巨罈審所擊物蓋後槽石也聞乳母有絮言復怒曰我為愛女辛苦來我豈間神野鬼者語無狀當斥念乳我者姑忍之又謂伯姊你母不操切焉持家雞逸鄰巷為人掩捕矣驗之果然如是者經月日始別伯姊我試期在即今暫去你審自愛遂無聲迹焉於乎幽明一致孰謂死而無知哉婁東海寧寺有鐵樹一株于萬曆十六年三月初八日忽靈枝生幹異葩煥發牆壁瓦礫觸之咸作金色又于崇禎四年寺僧修塑羅漢已裝十七位矣而因竭陀尊者未有檀施歲朝從其指端流光數道達于門衢不日而莊嚴畢備焉九年四月八日州人在寺興修佛寺復感佛面舒光傾動一時順治戊子六月十四日經藏又于中夜放光衝宵達旦夫何州無寺何寺無經像而海寧獨擅靈異者以豫觀婁人于三寶特信敬尤復留神空宗厥祥蓋有由然哉明末寇起關中杜韜武為豫言吾鄉民張氏素驍勇有山莊傍河塘李御史愛其林泉可樂倩人求為別業張弗許李嗾有司逮以不法事張懼禍偕所知十八人竄身緑林時歲大飢人咸思亂一哨而蜂叢蟻聚孰知其遂亡天下乎山翁氏曰昔之亡也非其君昏則其政弊亂有由然矣明興三百年無失道之君特以官邪敗之安危固不有數哉獨恨彼虎而冠者腰金衣紫貴為天子命吏亦己父母蒸黎矣奈何肆其貪殘剝民之膏吸民之髓遂俾天怒于上人怨于下一朝谷遷陵變身之存者要亦無幾然則彼虎而冠者亦何樂而亡人之家國哉甲申三月十九闖賊犯闕入據神京宣諭大小臣工俱于二十一日廷見投名牒者職如故是日百官畢集朝堂始聞先帝龍去煤山矣一象故越常儀獨仰視大內若飲恨然者象奴以鐵鉤牽制唯俯首搶地淚如泉注而已四夷館復有回回使者六人亦召入不拜賊怒欲置重辟使者曰我受命聘中華吾君知有大明天子不知有易姓之禍也歸告吾君以貢獻來朝則舞蹈何辭今無君命故不敢耳賊終莫能屈焉二事蓋海陵魯生者目所親睹為豫言如此傳曰夷狄之有君信夫然象真不愧唐之舞馬哉吳興王元振者潘大中丞僕也幼鬻昭度家既長贖為府吏郡守起義元振與焉昭度子國瓚亦在其中事敗同執縛將就戮矣元振固爭國瓚無辜其家器械悉我儕所藏蓋徵餉國瓚實也國瓚父子六人由是得免其弟冀脫兄危復自首為元振真身亦怡然受刑焉夫以死代兄弟誠賢矣彼元振何人乃能身維故主之子況故主乎今之受國洪恩而不知有故主對元振有愧容尚何以視息于天下哉孝子張命長山東安丘人也壯為縣吏任俠睹諸吏受賕多不法知吏不可為則棄刀筆歸耕隴畝家有産甚薄計俯仰不足以周事畜然性至孝深畏瓶滋罍恥一唯竭力是將擬所食恆倍中農叵豫也適母患眼甚苦醫且百方莫效其一尤痛不可忍因默自禱天儻母夙業報當毀眼願抉一目贖母愆毋使母長嬰痛苦也俄而母患果痊欣然白母抉目母力阻不允自審違命非孝假令昧己欺天或母痛轉劇奈何乃躬就城隍稟明夙誓抉一目焉或曰張命長非孝也孝子之道身體髮膚受之父母不敢毀傷今毀目憂親理固不可抑命長自揣天不可欺不知父母者人之天也母天不允亦可以謝彼蒼矣必強欲抉之是謂執中無權此不學之過也豫曰子則學焉而不精未逮乎中其在張命長之下乎詩云投我以木桃報之以瓊瑤子知身體髮膚受之父母不知還為父母酬以身體髮膚則是報也匪傷也又傳曰舜其大孝也與德為聖人使舜而亦昧己欺天焉且不可以為人烏可以言聖命長唯不敢昧己欺天斯真完而素葆目之曰孝子張命長奚愧焉甲申之變三吳士大夫有慷慨激烈攀先帝龍髯而死者有因財致禍受李闖酷刑而死者復有屈節辱身徼幸不死而卒不免于死者詞林某某蓋舍義而求生者也乙酉夏五清兵渡楊子還挾重資避地江南自慶出萬死入一生矣于門生故吏之家日飲酒高會而閭閻早有聲言為先皇討不義之臣者一鼓群從遂縛以投諸江而死焉夫死一耳語云死有重于泰山有輕于鴻毛者言死貴得其所也使某詞林知有今日之死則將死于先皇上賓之日而名且與天壤同流矣奚為受制群兒而以醃醦至死哉豫尤悲夫今之學者本為生死事大乃返依違姑惜不能抵死忘生與之一決然日遷而月化亦逮于死亡而終無救焉為可歎也夫小童阿戎臨海鄉民子也受直為能仁牧豎一日牧牛山澗適虎逸出牛旁戎急高聲誦佛號不去復稱大悲菩薩名久之乃去歸言知事知事曰虎凶獸見當趨避奈何慢易邪戎曰我即避大牛或無恙其如小者何至哉仁人之言乎道衰民散受人國家與夫荷擔佛法而為容民畜衆之君子安得忘身為物悉心阿戎之心庶道法家國其有瘳哉
