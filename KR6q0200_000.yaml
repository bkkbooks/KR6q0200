body:
  text: 布水臺集序天童山翁禪師忞公以密雲嫡子坐大道場無舌説法有聲如雷施藥樹味擊塗毒鼓有寂子小釋迦之目賈其餘勇作為詩文如涌身雲如灌頂水文人學子用世間智測度咸以為杼山晝石門範之流亞余頃讀其全集為之心開意解久之沈吟低回欷歔煩醒而不能舍然也大慧杲禪師有言豫雖學佛者然愛君憂國之心與忠義士大夫等所謂忠義士大夫者魏國張公德遠橫浦張公子韶輩也當是時賊檜挾滔天之勢把持和議忘北轅之仇甘左衽之辱妙喜以壞衣髹髮之人敢於左袒子韶抗權姦之議而觸冒其鋒刃故魏國銘之曰嗟師何為拳拳忠孝欲迪群迷俾趨正教唯其忠誠惻怛之至根抵種性槎牙肺腑雖至於砍臂斬頭亦將怡然順受如斷蕅根如解膠革於毀衣焚牒乎何有於乎薦嚴之疏龍髯馬角之深悲也新蒲之録玉衣石馬之遐思也春葵玉樹之什空坑崖海之餘恨也徵諸妙喜以言乎其道則相符以言乎其志則相協以言乎其時世則宋世所謂忠義士大夫迢然不可再見獨有一禪者孤撑單出流連涕泗於陸沈滄海之餘斯尤難矣於乎軍國荊弓也宗社鄭璧也吾君吾父秦燕楚凡也天穹廬地松漠今之人何其廣大而禪者如是之隘也東家食西家宿今之人何其圓通而禪者如是之固也山河葶藶世界陶輪有漏微塵十方銷殞今之人何其大覺大悟而禪者如是之取著也豈惟禪者哉琉璃之誅釋種也世尊樹下拒諫而阿難愁悶慟哭開寶之師東山蘄春肉身為故國而泣血天寶之亂荷澤編管殘衲興檀度以濟師是又何今之人廣大而佛祖之隘今之人圓通而佛祖之固今之人大覺大悟而佛祖之取著也妙喜之言曰好善惡邪之志與生俱生永嘉謂縱使鐵輪頂上旋定慧圓明終不失敢直下自信不疑吾忞公其幾矣乎三世諸佛是三世中有血性男子不忠不義之人埋沒此一點血性謂之焚燒善根斷滅佛性披毛戴角刀途血路相習以為固然是可以為人乎如是而為文巧言綺語談玄説妙如刻人糞作栴檀形是可以為文乎公同體大悲惻然憐愍以為今世之所崇尚者士大夫也故現忠義士大夫身而為説法士大夫之所崇尚者文字也故又現聲名文句身而為説法有人於一言半句汗下毛豎留得此一點血性在人世間即是不斷佛種斯即公出世為人全提正令之綱宗也於乎公欲廣度河沙衆生盡皆作佛而汲汲然磨牙礪齒先教之以所以為人夫焉有不能為人而能為佛者乎海印弟子虞山錢謙益槃談謹書布水臺集序布水臺集者山翁和尚之禪之餘之所為集也禪者之言曰行於心為禪然則禪有餘乎荷大法者無執懷勝業者不滯繇山翁和尚之禪而深之莫非餘也暢之以一詣包之以兼弘繇山翁和尚之餘而大之莫非禪也或者曰儒之學依於實禪之教説乎虛實故自形其不足而虛則嘗見其有餘儻所謂大道是邪非邪豫智不足以知山翁和尚之禪知其餘者甚矣山翁和尚之禪之似吾儒也今夫先王之所秩聖人之所訓其要歸於正君臣定父子不離明倫察物者近是是故父子者人之始也君臣者人治之大者也吾嘗覽乎山翁和尚之集矣祝聖人而悼天子一篇之中三致意焉壽有疏薦有文如歌如泣君臣之義也諸如靖揚雅推之也義僕傳廣之也其為翼孝説養母文篤於親也進而之於師有父道焉稱道勿絶所謂孝也繇師而上之百世之師身焉象焉譜焉經焉堂焉塔焉不忘祖禰之意也為死者言狀自文林公傳自廣陵先生而下為生者言牘自復古南詩自送以直而下悟發感寄婉而有歸無諍之篇有懷之什兄弟朋友之誼也甚矣山翁和尚之禪之似吾儒也或又曰天下之道儒者實之然而多實則多纍是故亂之以生死撓之以得喪及其敝也至於悖聖人之言廢先王之服蔑君親之恩棄昆朋之族禪者即不然死生則一之得喪則齊之泊然無所起於心而淡然無所繫於世虛之謂也是以纍盡而理存天屬雖離而孝不違世典已謝而敬不失故曰守儒之説實天下之虛可以處治世通禪之學虛天下之實可以處亂世嗟夫此又有為言之也豫智不足以知山翁和尚之禪而謂山翁和尚之禪之似吾儒者固其餘也四明流寓雲間包爾庚題布水臺集總目序一序二卷第一風雅詩卷第二詩卷第三詩卷第四詩卷第五詩卷第六序卷第七序卷第八序卷第九序卷第十碑銘卷第十一記卷第十二傳卷第十三塔銘卷第十四塔銘卷第十五塔銘卷第十六行狀卷第十七表奏疏文疏啓銘提詞卷第十八贊卷第十九贊卷第二十贊卷第二十一贊卷第二十二書卷第二十三跋卷第二十四説引卷第二十五祭文見聞雜記卷第二十六警語規約卷第二十七尺牘卷第二十八尺牘卷第二十九尺牘卷第三十尺牘卷第三十一尺牘卷第三十二尺牘布水臺集總目終
