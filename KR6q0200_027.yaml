body:
  text: 住明州天童寺匡廬黃巖沙門道忞著尺牘復古南牧和尚昨在西興旅次得讀兄手教教弟之誼不覺百感中來涕淚無從以赫赫天童先和尚道法廣被之區一旦梁木傾頽為之後者竟晏然便耎暖曾不肯一出手整理誠以隱痛填膺故不知所以裁畣耳乃今奇兄與山中諸昆季過聽兄言必欲弟繼席老人夫弟固罷駑瞪若兄之後塵然間關馳驅閩越之交近十餘年未嘗不追隨步武不可謂兄不知弟之深者兄但細揣世有愚戇拙直不合時宜如弟而能儼臨人天否況當盛德大業之後哉抑弟三四年來放懷林麓山麋之習幾與性成若反其飲啄之嘗束之以名位繩之以禮法將恐有性命之憂則不第兄不為弟愛天童且不為先和尚愛弟矣本弟入山原不敢與聞山中事體以不自揣量不知不覺打入八斗米曹故今弟亦未敢揚袂即行惟日伏首龕前俟明春二月四方雲集聽諸兄指揮公舉何人弟惟合掌隨喜贊善而已臨書震悸不知所云又殘臘既去玉曆新頒起居多福駸駸與歲月斯長者他不具論如雪竇苦催科天童謀不及夕獨兄棲真于恬廚盈香積戶絶勾追一味坐法空之床行不言之化其所得較仲孰豐而孰嗇邪奇兄未審何如弟比來齒復落一而搖者且三四矣聞兄脾有泄病亦宜為法珍調以其黃中居土如大地所以承載者也茶食二簋聊申鄙念惟慈納不罪又承兄推挽濫主天童兢兢業業日夜以幾寧惟上虞顛蹶以負先師亦下恐知人之鑒有纍吾兄耳去歲孟秋念霜露之屢降嗟梧檟以中凋在川之感既殷歸與之思遂決因白郡謝事幸獲從心然細簡四夏一往以來敢謂纖纇悉捐要之無甚大過者則皆慈光加被之力也聞結冬梅溪禪床俱折弟在欽風之下不勝為吾道崢嶸矣即日孟春猶寒更冀為衆珍攝又新正有短章奉候未審達否弟僻處靈峰地既幽深遊人罕到所睹往而復來者惟白雲麋鹿而已故一往動履雖聞弗詳嗟見時流性不恆常又乏眼腦如兄輩所謂當代大有道尊宿也特以手段辛辣尚多怯朒不前如弟道周杕杜奚論哉極欲攜笻過訪少傾鄙懷而山寺瀕海警告連朝故不敢遽爾輕出特遣允源代訊尚圖後晤筆不盡述又山川悠遠道阻且長忽專使辱臨己如逃虛空者聞足音跫然而喜矧翰況寵頒邪夏間聞將過棲梧不勝芒笻欲動就寫中心蘊結乃法幢復東指而西行奈何廣潤處山海之衝羅青錯壤草木繇條賴福庇頗有桑者之閒閒幸無催科之擾擾第安愚拙則有餘以之浩歸湖海則不足然師門作人之盛有吾兄輩則弟亦可弛于負擔矣時寒惟為法為人保護道躬不宣又去秋出廣潤風聞法駕將應化江淮一冬能仁俱無實耗春仲抵吳興聞已過南徐赴鶴林矣既而聞復過蘇秀興福與古南與緣厥蹤莫定坐此候問靡從中常怏怏勿適也專使來詳起居方始去心道峰泉石清曠宜舟宜車真不負五山十剎之名然老屋敗椽廢已不堪復承之以寡昧之弟焉或賴藉靈光寵被得遂鷦鷯一枝則叨餮多矣平江堯峰恐亦分身不暇也辱聞問愧感弗既弗宣又南徐為荊吳要地禪林山水富甲群嶽數年間雖住持者不乏人而丕振宗風尚或有待今得法幢高豎其間寧僅俾東南學者知所景仰而一洗其凡鄙之習即久護荒藍之米顛亦得藉以揚眉吐氣乎但聞鶴林滄桑屢變殿宇僧房恐非昔日規模而安衆興修得無稍費神思邪特遣知客問訊多福所有佐函不腆幸莞存之弗備又客秋踐堯峰之約暫過姑胥聞法幢將返檇李停橈須待者數日竟爾盼絶來旌始芒芒歸就道山不虞以往歲弘法海州之故挂名白簡由是奔走虎林遂不克杭一葦晤兄梅溪之上今春為直指使者勾追質獄東甌庭決大杖波迸二千里辛苦歸來形如槁木心若死灰自以身罹憲網辱及同人尚且永歎愧良朋況復孔懷集兄弟邪乃兄獨慰以唁言溫如挾纊曾不以廢罪是棄鶺鴒在原兄弟急難何期于兄復見古人之心哉待罪臬司未能遠出尚圖面謝不備又一竹之微託根丙舍其不摧于樵薪朽于林薄者幾希一旦入兄之手憑藉管城君為之溯其淵源明其利用居然卓出萬峰孤頂矣秋杪因兄攜過天童將見雷轟電掣換人天之皮骨死佛祖之偷心安知腳下不出般漢踏殺天下有如馬駒其人者是則弟輩賴伊提挈不少寧第兄蕢其實弟收其華歸藏名山大川與兄時見于雞鳴風雨之候哉敬銘厚誼兼謝種種弗備又別兄溪上舟至吳門聞風鶴警騰洋子因過婁東遂為吳太史王奉常諸君子暫留海印度歲不審法駕何時進院竊念天童乃先師光隆法道之所復以先師靈塔在茲凡為先師後者所當悉力經營者也不意數年以來名實俱喪非兄此番振起將有堂崩搆折之虞矣弟輩理當左右吾兄翊張頽弊但既頑怠復更衰殘不堪驅策奈何輶儀不腆聊表寸心非敢言賀也統惟慈照弗既又徹子率爾粗疏拜瞻慈顏以不賜罪責為荷乃蒙破格相款何以祇受也衰殘望七久荒筆硯所呈教皆一時勉應求索者讀兄清新妙麗之詞益如閩廣打鄉談真不成話說矣虞山與弟素未謀面亦以半紙腐文遂辱千里神交去歲仰體江上與兄夙念敬遣皙首座以先師銘再徵椽筆會伊抱痾又方在憂戚都不見客及接弟書欣然出相勞苦詰弟行藏竟日坐談不憊也諾以浴佛就稿仍期皙子先往頃己在虞虞山雖健妄想不能忘諸此矣又休菴諸姪來詢知道體綏和起居輕利皆由兄遵養時晦善為調攝之所致耳若弟則開歲以來既修鼎湖懺摩復會巢枸葬事為人祈援溺而發瀋陽萬里之書則半夜歸舟僕僕牛馬日罷業緣如此較兄泮渙優悠不幾仙凡之隔哉天童佳城為兄心謀者七年雖獲吉壤未敢定其土色何如今古雲姪來言結聚之妙而後喜乃可知所謂天生一人地生一穴一本吾兄宿福使然弟亦何能外造物而施設其間唯是先師法脈志願悠長兄之後裔即弟宗藩所望本支百世繼繼承承使太白家風千秋不墜則弟區區微念耳龍池公案決意謝辭第不審法駕何日返轅俾弟再得傾倒古南一回也草復弗莊弗備與雪竇奇和尚一夏絶無音耗不審道體比來鮮健何如弟一病四十日幾不起矣今稍能瞑目燕坐然臨案則不可也大約費神費思費氣過甚耳每念涼德菲躬出頭荒亂之世叢林鮮老成學者趨安怠久合引退即不敢望景星高蹈庶幾牧兄謝事古南放浪村居足矣但先師心喪未終制奈何天步艱難民生日蹙今維揚受困屢月故交舊知曾無一字相聞如昭陽在江淮間想亦不較多也并問又寰中雪竇應夢名山幾成荊棘狐狸之場賴道力驅剪不起于座而千秋之故物斯還視弟身居摩竭而屢遭辛螫者何啻霄壤縣殊邪昔妙喜有言安著禪和子不過錢穀而已大田多稼多黍多稌然則錢穀既充足復何憂哉而石屋又一說僧因産業致催科官府勾追恥辱多我有山田三畝半盡情回付與檀那目今並歲科征官追似火則石屋近有一得之長其奈口衆食寡天不雨粟如弟之謀不及夕何玉燭轉青陽應多受福社敬遣侍僧叩拜即日恭惟起居萬安幸慈攝弗備又投老空山本期蟬蛻人間世所以一坐百二十日幾于苔蘚封階而弟方慶自此遠矣不虞教況忽頒旋復料理則楮生穎伯咸已挂冠失其故套裁謝不莊尚難逭罪躬候之言重何以喫也況寶坊肇闢冀在力整穨綱餘事嬰寧匪弟敢望又渴欲班荊話舊為日久矣況寒木向榮黃鳥出谷乳峰忝十分秀色瀑水增數倍新聲履茲風日和融值兄起居輕利相與尋芳擷翠抴杖逍遙隨手圖畫天開縱步千山羅列豈不生平一最快意事邪乃緣薄祜日惴惴焉災祟臶臻坐未遑席而從者復有莫興之憂故弗從心奈何因化士歸人事始見北方梨棗不敢輒嘗敬遣侍僧齊上或試茗嵒石請即以此邀布水一雅賞之而應夢名山又安知弟不可以神陪哉寸衷耿耿心與書馳惟慈照弗備又雪竇古名藍倚兄再造故審機度宜未免時費經畫若弟五磊則旅泊而已不為隔宿謀然每每絶處逢生似有天幸豈襲成之鳩固應得巧緣以庇其拙生與聞夏多蹇屯劫濁世中常多缺陷無足為兄道者但佛滅又第四五百歲正法垂危唯加意作人為道珍調是望偶閲淮海集得前住雪竇圜通禪師狀謹命小師書上以便志乘參考與龍池萬和尚龍池為吾宗祖山自先和尚拂衣之後法鼓不鳴草深庭際者天運且半周矣今幸山川效靈得兄移幢坐鎮非但三門之幸即弟輩與有寵光焉極欲附人天之末三請座前轉大法輪奈節屆安居諸未周至特遣侍僧代訊兼申賀祝想在慈光有以照察也聞山中勤舊同心在城諸檀共德以兄道力斡旋其間當如五味均調所冀敦持大體為法為人至于瑣末纖悉一付諸司寬嚴得宜自然渠成水到芻蕘之言伏惟采納不盡又佛法下衰甚于申酉之變祖途殆將充塞豈特道路艱行哉然究其厲階則兄一言蔽之矣不念從上付屬之重未免出生無量異端耳大哉斯語主導一方者所當勒為針銘不謂兄先得弟心之所同然也老子云富貴者送人以財仁人者送人以言兄以仁言逮弟已受賜渥矣矧辱惠嘉貺謹對專使拜領謝非筆墨所申又道峰阻龍池僅一太湖水叨庇承乏方慶奉塵有辰詎謂忽慢不思竟遭吏議流離遠道瑣尾公庭所不屈辱同門者數莖骨一寸心耳然世多成敗論人獨兄以孚窒見原賜何如之矧重以資斧邪謹對專使拜嘉餘容報謝弗備與竹林晦夫和尚於金粟稠人中一瞻矩度使弟心容俱肅自此以往如何閦佛國一見更不再見矣庚辰夏五寓邗溝去南徐一衣帶水耳又方放浪形骸圖廢退終不敢效他青蘿夤緣千尺之松然淳風扇物之化行江南北湖東西則所至之處未嘗不歷歷對慈顏也去歲不幸先師棄諸孤而弟又不幸之不幸謬為檀護同門挽主天童鮮才寡德之夫一旦同升諸公其不為當世腹誹而目攝者幾希乃仁兄獨愛屋及烏齊惠重疊施溢存沒念何以當之久欲裁謝會聞遠人慕德法幢己指嶺外復傳說在秋冬之交故遷延至今慢惰之愆統惟慈恕弗備又南徐山水之觀甲天下然四通而八闢時丁用武則登臨之適志不償鋒鏑之摧心況申酉為乾坤何等時即生性自喜占聱頭尚入山恐不深乃法兄獨烹金琢玉其間無少遜雖毛吞海粟包坤為至人能事之秕康而魔外罔或睥睨焉抑何道致之也方今學者日就澆漓賴法兄真淘朴汰耳使皆如晚近波流則祖道殆將斬弟固工優而未肖夫孫乎亦庶幾其千百而十一者乃多得詬厲而終瞪若乎兄之風行而草偃豈弟之揣摹未工與抑兄性成而上不可以聲音笑貌為與幸卒有以教弟焉孟春猶寒即日恭惟起居多福臨楮可任拜手贊揚之至與金粟費和尚太白名藍申海邦而丙年乎中州又以先師道德所被聲光蓋與天壤同流矣詎涼德如弟者而卒濫膺之誠以先歲為諸兄所推遜抑弟心喪之志未酬也今鑽燧改火期而更周者且四子曰臧武仲其竊位者與知柳下惠之賢而不與立也況開堂為國陰翊皇家而究竟無裨宗廟百六之災弟實有愧焉輒于七月十三日撾鼓退院力言郡侯舉兄自代幸幡然與闔邑之士紳詞均而慶一矣尤恐吝慈復隨四衆之末同申勸請惟左右曲徇而俯受之輶儀佐函願無摽卻弗備復南澗箬菴和尚恭惟座下中和善誘得之往來誦說者多矣方以不獲見提唱語為憾忽教況下頒并惠新録一披展再讀青山白雲開遮自在真古老所謂弄大旗鼓手者非邪敬為禹山欣慶曷量某譾劣無庸詎堪齒録乃兩奉手示過于獎藉豈非慈悲太殺無所不用其循循者與敬領厚愛拜手以謝餘希恕悉弗備又前歲山兄始趨寂客冬晦老復真歸賢人相繼隱淪天地豈真遂閉乎淮楚素輕僄復奪乃良導弟知其從冥入冥也必矣聞兄悲愍移座竹林庶幾慧照復縣不審然乎否邪本欲親詣寶坊躬申弔問奈東作方興會有百畝不易之憂特遣侍僧代慰所有俚言薄尊乞為弟陳挂靈堂聊表寸心而已臨書無任涕零之至復天童浮和尚弟自先皇癸末中春濫主天童而拂衣于清師入越之日衷葛幾四更矣無能俾益禪叢為歉所不負玲瓏嵒石者徒唯法鼓時鳴而已乃若風雨飄搖艱虞百出者今回想尤自神忪也聞法體初有倦色及視篆長庚反精思日加健爽又復山門鎮靜百事如宜則兄因緣合在此間自應聿旗高豎長為三佛導師似不煩過于靖退而遜推不肖抑弟生年甲子雖則差小于兄而老眼昏華虺頽實甚得無以巨靈重負卸肩恇怯之夫哉然揣兄盛意已決覃思先業攸存不當違命自將坐觀成敗但昭陽邗水公案重疊卒難一時了辦瓜期之代有願再夏為期一載流慈弟敢為句甸之人轉更申請想大哀曠濟必輾然首肯也臨書可任傾注之至又律應金商炎涼始貿柳凋梧落道體何如今夏承兄高誼合同檀護命弟再住天童輒對使謹辭不啻至三而浪古二公苦勸不已遂自吳門相隨過邗以必諾乃返所以有開歲之復者此耳然深自惟忖天童非復盛時矣業浩主多廢頽必甚奈何以福輕尤羽之人負茲艱巨其覆敗可知況顛毛如雪之絲絲者乎此弟之不堪應命者一也生平厲于作始多不逮終從拂衣太白抵今十春已六遷其處矣縱弟竭力為兄代庖向去瓜期誰則為弟釋擔勢必枚卜諸方旁求族姓得無白將官路私作人情而誚我者衆與此弟之不堪應命者二也當年繼席先師時祇有雲水躋蹌曾無吏胥擾擾者以先師所穫在道德不以産業是圖耳今因産開戶而里役且加二矣生性惡聞催科如虎叢至官府勾追隸人呼喚其何以堪抑自壬辰謝事道峰于今五稔吳興道俗勸請還山訖無虛歲不寧為弟營搜裘今且為弟卜塋兆焉語云天時不如地利地利不如人和人心攸同違之獲戾此弟之不堪應命者既三而且四也痛先德語言散失後學將遂無聞每欲竊比古尊宿之例廣搜宋元以下諸録刪繁就簡彙輯成書藏諸名山以俟來者此心懷之二十年矣逮今夙夜惟圖尤恨桑榆已晚若一行住持此事終廢此弟之不堪應命者五也區區鄙私敢布肝膈唯高明恕悉不罪是禱與通玄林和尚法駕來山適弟百冗交集之侯其失于周旋者固不待言方冀少為亭驂得舒情素不意撩起便行使我心痗至今未已自兄返旆後以費神過度旋即臥床席不能起者半月餘如兄舟車勞頓正未知更復何似特遣侍者走候外先和尚比量衣裁二奉上為說法時披之蓋依金粟舊案諸兄一例同然正不必過為退遜所謂吾從衆者是也彼此荷擔先人千二百斤擔子不知何日息肩念之殊覺神愴惟冀仁兄珍重為法自愛又春間曾修小簡問候左右會兄出隊嘉禾一夏以來音問寥寥屬今黃華破惢白露橫江既當雞鳴念切之秋又驚海屋籌忝之候然見彈思炙不無太早計而自秋徂冬則亦翹企可待也特遣侍者行心代弟揚言拜手所望龍猛為期趙州共算造我小子壽彼將來俾滹沱有方至之流庶太白無騫崩之患不腆侑函敬呈別幅又夏五之交始聞道體違和正緣風鶴騰疑未遑訊問況今普天帶甲徒以菲躬眇眇馬齒更長之日乃遠勞專使重辱厚遺邪為卻不恭負慚以謝又寰海名藍群宗法社曩因主者馭失其道遂至諍訟紛紜諸方幾視為畏途不有吾兄毅然擔荷將見瓊樓玉宇幾被一莖草蓋卻矣揖別靈峰倏爾睽違數載待入院時擬趨迎萬松關左一寫往懷以初始還山未便輕易舉動然促膝新新堂中當有日也院門新蒞不無煩劇費神思所冀一持以鎮靜被以惠風淑德則內外自無不咸宜者端知高明之宇應有妙裁而野人獻芹蓋自忘其固陋耳遠辱專使承厚貺謹拜手以謝不盡又四安樂行品以不得親近國王大臣為說法者誡當知親近國王大臣者必不安樂者也但弟拙直無營之人偶為憲臣所知耳非弟有以親近之也乃亦橫遭吏議此則宿業所召語曰作福不如還債弟實深慶從此往愆昔尤又得清楚一樁矣不意遠辱存問重貽吾兄之憂也公案結絶須待來春專報草率勒謝統希恕悉復翠嵒古雪和尚不慧執侍先師凡一十四秋所閲鳳毛麟角象踏龍騰之輩無慮數百千獨于後起之英心愛伊菴與足下為權奇可羡故每每逢人說項謂他日支吾道之衰者必足下也雖今十數年來君吳我越而果熟之香未嘗不日望其悠揚一世蓋歔枯然燼非有志者莫與共相著力耳昨披來翰讀新録喜宗風再起南州抑亦知人之鑒竊有私慶焉辱命定刪愧非麟筆姑鏡先德之成規而參校之諒不以為專也又自慚怠廢無益方來復以業風鼓吹精日銷鑠所謂臣之壯也尤不如人況其老乎先師頂相寧直趙丹青傳寫弗的即我輩及門之士求其行言磊落宛爾克肖早已指不多屈矣何幸清關湓涌漲起西江讀尊録而後深慶先師之靈骨尤在也豈僅紙上之照容如生哉玉浪慶公遠走青齊索語辨首珠林標礫知為不可然又不敢峻拒來誠草率應命統希照諒不宣又音疏問闊八閲暑寒嗟我懷人徒勤夢想唯從禪者持來尊録得知杖錫南飛廣化閩粵莊誦法言真如塗毒一擊聞者俱喪豈更有聾聵不醒之夫哉太白一燈因兄手剔可謂光增十倍矣弟才非佛照道愧南陽特以虛名博譽致聳宸聽一期對揚紫閣不甚取辱宗圖者賴先帝聖德海含耳弟何力之能為奏請語録入藏一皆先師道德所感弟非洪造且置身法社無從況復演宣大內知恩報恩庶幾如兄殫躬行道萬酬其一無奈年將望七百事廢弛去秋業以天童院務委之門人㒥子少得縱情山水樂其餘生第恨無因縮地一聆教言接塵快談徒有待之三生石上已耳專使忽從天降得悉起居為快種種惠頒肅此具謝又去春遠承遺問愧恧之餘緬懷故人不我遐棄又復深以為慶也專人別後旋即就養佛日清峰碧澗頗遂閒身僅一夏秋耳而業風鼓吹繼有金粟曹溪之命後先敦逼推託無容因念金粟實先師起家之地門庭高啓戶牖別開況乘之非人安忍聽其引類呼朋相與日顛倒我衣裳也乃強起經理不覺三百斤鐵枷又入項領奈何海內知交頻年凋喪先師門下惟兄與弟寥寥五七輩春初雪竇復長往矣弟雖殘息尚存然晨星曉月餘光幾何今叢林所仰止者獨兄一人方登知命之年典刑未艾足當泰山梁木為可嘉可賀耳未定縣弧何日因亟欲聞問特命侍僧走候有願道對彌嶸覺華愈茂壽考康寧保我後生不惟湖海有歸抑俾宗藩倚重多矣別呈不腆聊獻芹私統希鑒納可任躍懼復雲門徹崖禪師彼此叢林際茲凶歲想桂辛茶苦知不較多也先法叔千秋慧命實于座下攸寄所俾長生久視而眉壽無有疆者亦惟座下吐故納新充其營衛壯其元神已耳乃欲退守丘園僅灑供而掃奉焉恐非人天所以仰望座下之心至于不慧罹橫逆不自苟免者蓋嘗學古而知先德于一闡提輩苟凡可以下金剛種子則為其入泥水運冥權乃至觸諱犯嫉身蹈白刃而如飴因稍師其意而自廣云爾敢云險夷一致同風太上哉承惠謹謝
