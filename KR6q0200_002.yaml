body:
  text: 住明州天童寺匡廬黃巖沙門道忞著詩二次金華宋學士靈峰留題詩梵宮別啟一禪天龍象知奔代幾千繞洞春來秦社裏起霖雲宿屋頭邊明心謾詫香嚴竹說義仍多百丈田物外精藍誰共匹藏修好把祖風肩靈峰即景十八絕五磊山五峰岌岌繞青冥佛首天冠差足並人在上方杳靄中誰知盡蹋毗盧頂象王峰儼趨帝釋騰金脅彷駕日輪降碧霄立處難將涯際測見河誰道卻能漂師子峰勢欲翻身天上輥髿直探萬峰頭金毛忽變西風裏五嶽蒼黃四海秋石城岡金墉千雉疊崔嵬𨁝跳谿山盡勒回飛渡只堪峰頂月中宵曾上女來九曲嶺通霄路接水雲趨只恐方來落半途留得轉身吐氣處為人直殺卻成紆峻水嵒高原更激數千盤險設天關豈固闌貴欲清聲喧海嶽等閒不把眾流看濯錦谿錦江春色羨華陽誰浣清谿曳許長想是天孫誇妙手冀同埜逸賽文章清玉澗不因秋色忝寒翠豈為春山炤影明澂靘自來光璱璱衝撞還聽珮琤琤羅漢潭澂印須眉宛若鐫名標聖者更何緣大都海眼光通透應供諸龍得自便白龍潭靈湫共說玉龍蟠月老風高誰下綸長見銀光生碧落為霖知是挾雲還洗缽池平如鏡面湛如藍飯罷臨池日有三是我是渠親勘破方知安柄趙州憨象眼泉無熱池南象口通紺泉眼復迸靈峰青天漫自誇澂湛爍破還他一鑑中砥柱石滔滔萬壑下西峰力砥中流氣岸雄只欲狂瀾趨正道不知立老幾春風鷹窠石幽棲高託千尋石眼界橫將宇宙空肯搆不仍凡羽族門庭別是一家風眠牛石頑皮似鐵骨如剛鼻孔渾侖管帶忘祇為祖翁田地好從教臥月更眠霜望海亭四壁排空山浪浮夜觀星漢曉蜃樓十洲自出重簷下豈是山僧闊兩眸三石門崇閎壁削鐵關峨顧佇纔生點額多剛跨門來三喫險家風端的險如何梅華徑瞻風似入眾香國顧影還疑度雪山廿里谿窮仙苑出卻驚羽化蛻人間次畣同參見壽詩二首十年風雨晦明州白髮如君較一籌已濯冷光分桂馥敢因黃落等茭方隅迷久知東北世路驚多識咎休山澤何勞迻後夜行藏今已付虛舟䮚䮴從驅苦不緣已將身世等郵傳臥龍應霈甘霖雨老馬常嘶薄暮煙慚遜綠楊舒化日冀同黃菊玩涼天切思況幸叨三益寡過寧煩又數年有以出家寒命題者次韻和之詎于落魄運吾丁道本孤危合自行見說拘鄰方命去竟忘乳鵲就衣生玄微亦盡無錐卓冰檗屢嘗有骨清千聖己靈曾不重萬緣何慮得嬰情又和茅屋雪茅齋斗大雪平鋪彷彿擔簦又五湖自笑風陵如葉脫何勞粉飾著珍塗薶身有半思嵩少洞腑無遮想佛圖最快禪餘諷後夜披帷便把昔賢呼和勝因靜拄杖歌共有穿雲度水杖山形怪甚吾家樣十洲無地問生緣挈老人天神愈壯明如日黑似漆孤標動越今時格並肩佛祖較難齊超步迷途寧著力峭巍巍活卓卓敲風打雨休驚愕乾坤吞卻化龍時大地潛蹤何處摸論權實分炤用掠得些兒恣播弄等閒機變盡渠來拶著青天須叫痛似雷吼絕謂情敲彈拍拍總無生玄關謾自誇金鎖一擊管教㘞地聲牚圜蓋拄厚坤擬犯鋒芒早滅門香海攪將成雜毒大用從來軌不存靈峰山歌靈峰山超方外出沒煙雲常自在親到方知立處高頭頭趯著虛空背側橫看饒景況天然非覆亦非仰靈苗無種石田生枯木糝華雪裏放盡群巒俱撲落風前雨後更明廓岧嶢自出天外頭持載寧煩巨鼇腳山中人活計寬耕雲種月恰相便攜將鍬子隨方掘放下鉏頭當枕眠慵話禪嬾論道剎竿免為他人倒長思迦葉好門風安似而今生捏造負非人勝非己紅白支支春色裏等平一道浩然均片念橫分生死始最現成誰忌諱動著鋒芒全不是伎倆徒勞費若干胸襟流出較些子松濤響谷口音韻致難將語脈尋流水高山樵牧唱汝邊密在意何深驀相應同本得萬象光吞日月黑法法由來顯自家金毛奮迅何疑惑貪程客錯路多班荊且聽靈峰歌一句了然超百億百億千般奈汝何和石頭回艸菴歌艸菴問我何年止虛空未兆艸菴起地無陰陽樹無根叫不應兮山并水籠古絡今只等閒旋嵐偃嶽常如是來不禁造者陡相諧何人得共偶芻狗哮哮吠天明木雞夜夜震清吼酬萬象寧煩口平懷一味家常有堪歎兔烏兩彈丸磨盤終古遶菴走纖塵不立非攢聚佛國天宮那足喻直饒松竹可憐生日引清風幾百度吹毛銛利絕疑憂細切嶺雲恣刃遊大地撮來如粟粒四溟歸卷一豪頭靡涉喧豈拘幽曉夜堂堂六不收月圜當戶猶虧炤雪覆孤峰尚出頭尊貴自來曾不陊乾坤那慮缺金甌艸菴歌歌誰酬豐干須是拾寒儔曠大劫來無變異箇中何地著春秋又普賢床榻晴空止文殊境界千波起了事道人家如何軒窗四面臨山水山水頭頭露本真動靜閒忙無不是昧己徒我山陡空弄機關若木偶瓢笠誰惺挂樹梢吟風大作師子吼齧鏃機噇空口敢訶佛亦不知有葫蘆棚上弔冬瓜撈月笊籬緣壁走眾角謾勞山積聚一麟自足師絃喻啾啾耳畔亂蠅聲何似松風天外度柴床疊足百無憂時蹋白雲深處遊樹密中心田地穩界行孰敢錯絲頭狐蹤絕鹿群幽趁將佛祖一欄收別甑香炊鐵酸餡無底籃盛死貓頭雙眸炯炯澂如海大千世界等輕甌曲無腔若為酬幸有山童調古儔枯木龍吟霜夜後撲空香霧滴清秋用前韻索諸禪賡和頭陀論劫艸菴止不數華開世界起都盧圜裏盡十虛朝宗那計山與水門外非無宿人多究竟承恩只者是到元平陟還陡千差坐斷信難偶指㨁乾坤頭倒卓揮斤艸木盡吟吼祖佛流祇一口雲霄目視更何有蚍蜉把住大風輪海底泥牛銜月走嚼碎虛空還捏聚超情之見誰能喻神通卻訝少林僧雪浪崩濤一葦度悲生懊惱為君憂棄宅拋家向外遊不信從來成現事幾多頭上更安頭歸來好出潛幽干戈不動陣雲收風景故園常似昔覓得終非是木頭琳琅謾數闌干竹叮噹且聽語風甌我歌畢俟君酬千斤大法貴同儔把手登堂相顧藉護持直到未央秋和靈澂禪師山居詩十一律因僧問我西來意我話山居不記年松韻數來清素耳寒威幾度厭窮肩三冬自足爐頭火一道常飛砌下泉受用天然無盡藏為誰干慮蹋峰前因僧問我西來意我話山居不記年寒透梅香曾撲鼻煖回衲謝幾鬆肩有腔詠出風敲竹無簡招來月到泉寂寂柴門春半掩鳥銜華落碧嵒前因僧問我西來意我話山居不記年嬾弄白拈輕巧手頻揩生鐵鑄成肩和雲共住郎當屋雜麂分嘗古澗泉理亂關誰秦且漢支頤常自地爐前因僧問我西來意我話山居不記年瓢笠自藏丹嶂腹青黃幾換碧嵒肩冷灰豆爆煨蹲鴟瓦缶雷鳴煮瀑泉萬仞孤峰頭壁立雲霄目視孰賓前因僧問我西來意我話山居不記年未肯上流同濯足詎容孤嶼共攀肩幕天席地三椽屋酌古準今一掬泉兩眼盡驚空佛祖誰憐霜雪飽風前因僧問我西來意我話山居不記年雲面多看垂雨腳煙眉少見隱霞肩有文品字生䆑火無漏銅壺響汐泉晝夜熾然譚萬象何妨白醭口堆前因僧問我西來意我話山居不記年竹補前秋遮澗足松忝今歲護岑肩息心祇用三條篾漱齒曾饕萬斛泉慚媿金鱗撈碧嶂星河落落眾峰前因僧問我西來意我話山居不記年薪續繩床曾折腳笻支仄厂近垂肩梧緣鳳託留朱實澗為龍蟠蓄漫泉三尺寒松隨手植夜濤今已響庭前因僧問我西來意我話山居不記年帶雨耕春泥沒脛穿林歸洞筱支肩鉏荒剔出陰涼樹斫筧流通濯溉泉風起千山林葉響一聲石虎嘯嵒前因僧問我西來意我話山居不記年鬥海泥牛泯浪跡抽條石筍老紈肩每當芋熟思嬾瓚常自雲眠想谷泉百鳥不來人不見天書那得賁嵒前因僧問我西來意我話山居不記年詎以棲高空四目卻緣蕩盡亢雙肩壞成剎海榮枯樹消息人間瀱汋泉曠大劫收彈指內誰岐後後更前前哭竹林晦夫和尚狂波正倚障回瀾砩響忍聞一夜殘淮海潮鳴千社泣金山浪打六群歡盲龜尚自艱浮木桂櫂誰同接險湍堪歎衢昏良導隱無能為勸少停鑾懷師子尊者謾言牙爪眾超群誰解橫身劍下分從賦淵明歸去操勁弦千載羨師筋懷天童開山義興禪師插莖茆見寶雲甍端信神功過五丁世遠不知師道大叢林千古說長庚月犯士夫倍自憐況勞薪水下瑤天閒名謝作青山累太白峰高豈浪傳詠史二有序唐末天下大亂巢賊入餘杭上雙徑眾風雨散時住持法濟禪師獨危坐不起賊怒力揮三劍床毀而師無損賊惶懼施金帛懺謝而去三劍撝來盡落空黃巢謾自逞英雄偷心肯向機前死管取青天血濺紅視我如卿劍亦然空華那索淨眸前三刀自落渠魁魄神用何關別有玄二月十九為寶慶南禪師五旬賦此壽之華髮誰云此日髟大悲聊示受生朝功勷法社終難老道振林泉應不彫洞雪雅宜方越徹摩雲未見亞杭標區區甲子何須論芳躅會看百世昭山家十事春耕呼雨雲鳩喿上林山家早動曉疇心古黃金待親耕出泥水寧嫌此際深采茶春衣不惜罥香荊為撥煙霞叩玉英百艸頭邊如薦得等閒入手總芳馨割麥何意滿車復滿篝稽勛不在麥黃秋翻思多少荒唐者徒佃空言冀有收插秧靈苗翻茂貴重栽捏聚何妨復裂開步步消歸還就己青陰不禁潑天來夏耘熏風乍扇綠盈郊秀發寧緣在蔉穮要見吾家真種艸直須豪忽不相饒理蔬冬種波蔆夏種瓜莫言生計太周遮園蔬一飽曾千足方信酥酡未並他灌園本分生涯在己躬何緣長自冒天功桔槔不事身心械幾度擔泉夜月中刈薪靈燄誰將續莫朝參天棫樸恃長鉊逢人若話其中事報道山莊亦欲燒打稻抖擻早已落通身只為從前力用臻那貴紫羅珠遍攃普天敢保沒饑人牧牛大地耕翻總賴渠功成不宰樂何如金鞭擲卻山童後惟有高空月炤阹插田漫賦宗說年來已猒商開畬且種及時秧圜伊疾下三三點鴈字俄分密密行會看千岐成子粒詎爭九穗發殊祥生涯況喜便愚拙桃李從君競奏芳哭雲門雪大師時大師欲開戒期廣孝具德以蔬果致兵期生謂世方荒亂母得集眾啟張禁于寺師遂封鐘版曰當此世界更欲何丁亥八月十九日師示微疾次日封鐘版親書一紙示眾云小兒曹生死路上須逍遙皎月冰霜曉喫桮茶坐脫去了至二十六日酉時果索茶飲口唱雪華飛之句奄然坐逝賸有清商又罷絃徽音寂寂黲人天汎同身世呱兒戲輕等死生逆旅傳雪曲一聲歸去後遺言半偈話來先獨憐皎月冰霜曉景倒閻浮炤尚偏風流雅足厭當時氣岸孤騫老不衰只有罵人三寸舌曾無諂佛兩行眉山川澹蕩緣清嘯艸木蕤葟為解頤七眾同瞻波利樹凋零何止五天悲葛藤樁子遍閻浮金井梧偏墜早秋轕忍看狐兔塞翱翔空憶鳳麟遊若邪瑟瑟聲如怨秦望蕭蕭色自愁業海無能還逝水清波返乞櫂慈舟贈董山人有序廣潤擅山川之勝美蓋二方乎象溈之間而難為仲季者也乃越在荒陬闇汶不章予甚惑焉己丑夏言如董君為釐革山門居然宅中圖大矣賦以贈之以見董君之道足以輔相陰陽有如此者車輪卜得法王居師表叢林天下模溈水源長合肉山香嚴寂子豹斕斒瑞雲遠接天台脈迢遞崇岡三五百峻極霄然忽洞開橫峰側嶺爭翔迴石城包絡輪圍小纖悉其餘難紀考有云嵩少真相似又道曹谿差足儗千載胡為閱世多淑靈不發如之何南來有客須眉古五嶽煙雲隨步武趼足相山不憚賒造門告我勿咨嗟金鍼一撥山河轉大地頓彰真本面司馬頭陀術固僊眼光君爍四洲天送濟書記緣化三吳常州濟禪者風流實瀟灑趯蹋破芒鞋往來貫保社培塿小諸方下視篾如也去歲造靈峰謁我古蘭若衝突駕頭來箭後還兼瓦活將死雀兒喝起雲間打相隨入天台徙倚石城下古壁切青冥曠懷觀大埜驚濤日夜流疊巘如奔馬因思山海倫高深非聊且誓茲息浪遊萬緣俱放舍此行胡為哉山門日以赭一木不虞艱牚拄欲支廈鐘磬久聲沈冀鑿銅山冶玅相剝苔斑黃金思重瀉西告鄭三哥東投王大姐驢腳尚未伸佛手先已閜大智會有人知音寧患寡不間富千金豈嫌貧一把佛殿倒騎歸廚庫傾還疋鈯斧待他年一斫青天苴遭世亂離時艱目擊濡豪賦感以勛諸禪虺蜴哀時化百凶難具論千家無靜郭七戶少完村旁水愁攖攫循山畏噬吞何依佛蔭者不念大慈恩悼亡僧負笈趨東下星霜歷幾時道芽悲不衍靈肄苦先萎有業會須償無生安可期悠悠三界獄咄咄好長辭壽玉齊耿兵憲先中秋一日為公初度之辰桂輪不放景同圜玉骨夌霜肯自憐道覺斯民知任鉅文傒後死應天全大千掌拓虞金粟三峽詞傾擬謫僊普見門中聊示一人天曷以問生緣弘深悲願夙來承雖現宰官卻似僧海印妙持王令甲禪心高寄碧崚嶒眼同曉漢秋初霽襟共瀟湘雪後澄常把釋迦黃葉示菩提誰夢記然燈隱富光黃昔有譚耿宗世顯逮君三書香無窖開黃甲玄悟有根發玅曇攬轡澄清來漠北隨車霖雨到江南三詞幸勿嫌封祝仁者如君壽豈慚輓介子黃居士有序江陰黃介子明之聞人也久參天童先師于禪學洞有所窺申酉之變兩都失守帝后賓在遐天麥秀黍離子實傷之因陰圖為恢復之舉事敗見執證獄石頭城時匍伏栫棘尤為要門禪者題予肖像凡一百二十言其詞曰憶自黃嵒嗣席天童踞先覺堂卓卓孤峰楔以楔出毒以毒攻蛇吞鱉鼻虎咬大蟲正令全提孰敢嬰鋒出語成詠百折不窮佛果衙官大慧附庸糠秕之導往來愚衷國難以來蹤跡西東兄遊天外我戲圜中世出世間皆大英雄不負先師舊衲蒙茸眉毛結共鼻孔氣通曹谿正脈臨濟真宗是木上座亦號山翁粵三日將決矣復作絕命之章曰劍樹刀山掉臂過長申兩腳自為摩三千善逝原非佛百萬波旬豈是魔潦倒不妨天亦醉掀翻一任水生波夜來夢作修羅手其奈雙丸忽跳何以一破箑書寄興福牧雲禪師然後坐脫圜中於乎禪師洎予皆出先師之門子當死生顛沛超然無累固以奇矣復于同門之眾獨予二人若眷顧不能忘予哀子孤忠且慶子學佛之有靈因次韻十章哭之詞不一而足也聞禪師章先有八則又先得我心之所同然者矣同學禪流生按過毗陵爭說老維摩全輕三藏果頭佛稍重靈山大集魔推倒須彌寧有礙吸乾香海已無波閻羅縱布巡官手天外橫身奈若何誰之神宇得君過雲日雅宜自蕩摩互換機能欺佛祖倒行令足懾天魔騎鯨幻入蟭螟眼捉月光搖碧漢波功絕凌煙誠可歎名標青史意如何交臂天童事以過南來新鴈揣還摩拈華早笑迦文佛伺意寧容障蔽魔只欲魚龍知性命還將折箸攪滄波君臣義重千秋紀不審人間定案何虞夏寧傷忽已過首陽風範若為摩金塵在眼人迷佛白日當天我辨魔但信蜀魂原不死肯憐楚魄已隨波驅車欲上西州路肝膽為君痛裂何深惜陽光晦蝕過炎精直把血心摩自矜有口能吞佛且喜無心得障魔櫂入蘆華收晚釣文生霞綺動秋波溯洄幾結從君思不禁水天一色何力盡孤城百戰過千將猶自手搓摩精忠貫日消燐火正氣彌天伏怨魔馬祖休言心即佛永明謾說水猶波滿船載月空歸去萬古光昭奈汝何掉臂玄關直透過何勞關吏勘還摩毛輪吹落燈明佛夜杌平除黑暗魔劍刃鋒頭閒作戲紅爐燄裏碧生波炎岡孰謂能焚玉奈有丹心不朽何幾家薤露輓聲過拊臆為君長痛摩九夏心空曾選佛一朝劫盡不降魔為留日月光天德因輓江河濯世波壯志未酬先蹉跌百身我願彼蒼何指冠無髮可衝過搔首青天頫又摩義重不知生共死身輕那顧佛兼魔撥雲直揭中天日鼓腹橫吞業海波堪歎末流真五濁激揚無計輓君何三際輕彈一指過漚生剎網詎堪摩覺中蕩蕩元無佛夢裏昭昭屬有魔一任青鋒橫割水不妨陽燄細翻波雙丸幸有天公管珍重無勞問若何淨權相居士為孀母七旬乞言賦此以壽萊衣舞看幾迴翔峻節嚴持七十霜曾事空王為弟子久依佛日注歸航心緣寶號聲聲徹口吐青蓮瓣瓣香壽擅靈椿隨世相真常體實逾金剛壽金剛菴主人五十凡聖難期普化儔倒翻筋斗入閻浮莖茅插處瓊樓見香餌拋時錦串收玉偈滔滔騰舌上深機密密展梭頭無生韻出清霄外那論霜華點鬢稠
