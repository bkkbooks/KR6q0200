body:
  text: 住明州天童寺匡廬黃巖沙門道忞著序一戒闍黎示見録序一真法性迷以執之則識海波搖而衆生是見覺而霽之則慧天朗耀而佛日攸興豎以為十世古今橫以為無邊剎海剎海也古今也衆生也皆所謂無盡無盡而無盡者也然則佛豈有盡乎佛無有盡而盡之寂智用三身焉所謂佛佛而體同者也寂者何即吾人之性所謂清淨法身也智者何即吾人之慧所謂圓滿報身也用者何即吾人之行所謂千百億化身也故非智無以起行非行無以圓智而滿性寂之量智圓寂滿而佛於是乎出見矣文殊表智普賢表行此二菩薩所以為佛佛創始之師而與吾人常自偶諧者也惟衆生日用而不知而菩薩乃隱而不見雖隱而不見然未嘗不與衆生群然雜處於闤闠之中或當其機緣純熟時或當其業苦殷繁時則為其示見而破其滯名著相之情此其大較也宋南渡時台之兜率院有戒闍黎者放浪於淳熙紹聖間其事奇其迹詭其舉止多涉神異怪誕司時復有處女周七娘者與之賡唱迭和故為徉狂垢汙之事而人益莫測其誰何也然其語言則皆曲終奏雅與佛祖修多羅了義教相發明至今台人尤能道其遺言逸事而蚩蚩之氓因之而遷善改過者衆矣固知二人為文殊普賢正不必俟其命終陰有付屬而後定之也或曰菩薩是矣一見於唐則為天台之寒山拾得再見於宋則為臨海之善戒周婆菩薩於台若是般乎曰非也夫衆生之業殺為大漁於水獵於山一舉而衆殺備焉台蓋山海之衡而漁獵之藪也業殷苦繁菩薩安之與然則曷不為寒拾之風雅典馴而齗齗乎其言之也曰由衆生之機感而然也譬之水與月焉菩薩月也衆生水也衆生心水澄渟則如月在寒潭清光燁如也反是則昏冥無見矣是故感之以混濁則菩薩月見於四生六道之中作種種形與其同事開方便道度諸輪轉而菩薩非劣感之以澄渟則菩薩月見於華藏世界金色世界勝蓮華世界念念轉清淨微妙法輪於剎那頃成熟法界海微塵數諸大開士而菩薩非勝蓋水有清濁而月無二也於乎衆生居一塵中而不知塵塵皆毗盧遮那無盡剎海普賢示一毛孔而不知一一毛孔含衆生三昧色身然則衆生日用頭頭常在普賢毛孔中作息毗盧遮那光明內死生慈氏樓閣中出沒文殊劍刃上往來念念中與諸佛同出世證菩提轉法輪入涅槃乃昧而不覺焉此則菩薩所大哀而必欲曠濟者也戒闍黎示見云乎哉故兜率院在郡城巾子山久廢為民業今周君霞漪復舍以歸之菩薩請僧靈文主之靈文以菩薩示見録字畫漫滅將不可讀欲謀新剞劂氏而問序於豫因次述其事以授靈文焉宗門寂徵録序結繩以往無論已自有書契以來三墳五典八索九丘乃至百王之誥誓諸子之鴻傳概未有談性命以語及生死者雖明睿如洙泗調適上遂如莊周博大真人如關尹老聃發軫或有之其於歸途則未也由是人迷四忍家纏五蓋一奮其私智巧能以求得所欲焉耳大則龍爭虎鬥小則弱肉強食夷考春秋二百二十四年之間蓋弒君三十六亡國五十二諸侯奔走不得保其社稷者不可勝數況其他乎豈非輪回六趣而莫知沒溺三途而罔覺者邪向使知有生死過患而殃纍永劫如此將有先祖生而著鞭者沽一世之安媒千生之孽非其癡狂誰則甘之大哉大雄氏之道所以拯溺救焚以躋吾人於大安之域者至矣然自漢明至東晉安帝時大教東被踰四百年而此土學者尚未知有泥洹常住之説也遠遠公王廬山乃著法性論以明至極無變之理則又標神於佛故矢志同人僉心西境有由然矣又一百三十年達磨氏來而教外別傳之道始顯東土其道也以無相為體無念為宗無住為本其歸約也以絶待妙心為統貫其契之者不假雕鐫頓證真常其超生越死也由本不生故今非滅所以達磨氏之宗迥出百千法門之上又六傳至曹溪則得道者且如林故其廣宣流布亦莫之與京也厥後五宗諸師間出則唱和愈高機用愈密撥塵見佛畏漁父之棲巢擲劍揮空懼金塵之眯目死殆欲其速朽喪殆欲其速貧於是遂有舍利流輝之杜多受譏歐阜坐脫立亡之首座見誚九峰莊生曰死生亦大矣而不得與之變張天覺亦曰出家人本為生死事大若生死到來不知下落即不如三家村裏省事漠以是知喪之欲速貧為敬叔言之也死之欲速朽為桓司馬言之也世無有若之似夫子直以為夫子之言矣此祁仲子年超宗門寂徵録之所由出也不然左史記事右史記言言以載道事以考行道與行略之矣而詳其寂也何居仲子若曰道與行之難詳也久矣以蔡雍之直筆止於有道一人為無愧則有愧者衆矣道與行之難詳吾何自以徵之徵之以寂焉耳夫法久弊生物極斯反羽嘉生應龍應龍生鳳凰鳳凰生凡鳥亦其勢之必然者由達磨至於今千有餘歲吾宗雜糅殆將不可別識天壤間自有茲録非僅丕顯西東烈祖之徽猷聿章教外別傳之迥別而今以後庶俾增上慢人知有法焉足以超生脫死如此乃不深操實履而束手待斃焉為可恥也則其福吾人又豈淺鮮哉禪燈世譜序吾祖之道之傳於諸夏也始於梁盛於唐而光顯於宋其間往往多高文博達之士故先德之出處與其言行之大端皆有傳記可考非直譜牒已也自元而降傳燈不修遂使一代宗匠與夫抗迹西山者同一湮沒無聞良可悲夫忞出家染指法味時即慨然有稗官野史之志第碑殘簡缺無可捃拾思按宗圖纂為世譜以代其志適草創未舉會天童老人有黃檗之請因執侍入閩乃得吳君所纂與忞先心不謀而合但惜其中多錯漏附會未免無徵不信之失遂發大藏考驗禪燈諸録取其師承有據者載之不敢以景響參合疑誤後人間有説法當世嗣代未詳者但附於其宗之末俟其詳者補之於是較勘既的徵以往言庶幾取信將來亦循名得實之一助云爾後之君子其有繼傳燈而作者或考徵斯譜未可知也金剛般若波羅密經頌序星輝午夜夢破靈山於是愾焉寤歎一切衆生皆悉具有如來智慧德相但以妄想執著而不自證得耳富哉言乎一代時教之淵源蓋淵源乎此矣由其如此此諸佛所以出世祖師所以西來金剛般若所以破相除執三復丁寧詞不一而足者也按是經來自白馬東馱以後代閲一十七朝語經六譯名僧達士箋而釋之者亡慮數千餘家求其反常合道即俗明真不支詞不蔓義如道川禪師之頌者蓋未之見焉師本崑山狄氏子初為縣之弓級聞東齊謙首座為道俗演法往從之習坐不倦一日因不職遭笞忽於杖下大悟遂辭職依謙謙為改名道川且曰汝舊呼狄三今名道川川即三耳汝能豎起脊梁了辦箇事其道如川之增若放倒則依舊狄三也師銘於心建炎初圓頂遊方至天封機契蹣菴成公卒受記莂歸憩東齋道俗愈敬有以是經請問者師為頌之凡一百八首段分無割裂之嫌珠聯有貫穿之妙言超象外意約寰中曾不異羲文之演易天仰觀地俯察身諸乎近取物之乎遠譬放出東村白額咬殺南山大蟲鸚鵡洲和岸躍翻黃鶴樓驀頭拳倒拔舜若多身之刺金鏃抽自含沙出爍迦羅眼之塵華針消於蒗蕩直令明明天子識從鬧市場中堂堂老僧薦諸百草頭上儻逢得意忘言之士況有遺情達本之夫一句染神永為道種則可謂獲輪王髻中之寶不假功勛受親友衣內之珠無煩探索者矣敬為拈出以共同人準提增益法門定本序玉齊耿公之示海州也甫浹旬即以生平素驗之準提行法梓惠人間且以余禪者為知佛屬一言以序之余惟公秉憲而籓蔽南服者也民可與樂成而不可與慮始經生曲學昧通變而拘故常當山海之沸搖未聞公有問而創是焉得無讀孝經以弭亂演般若而消兵疑公於蕭若向乎哉因得詳以序之夫公家學淵源異才天授崇禎間上方薄藝文而重經濟之儒公時為天子徵召旋以邊功僉憲遵陽矣會夏臺鼎遷有殷革命於斯時也使公不以推納自任則風鼓虺蛇惴惴生民將有載胥及溺之憂為之安集而保厥首領者誰耶況今南北一家縱有洛邑頑民以公臨之直發蒙振落耳然公為此而不為彼者正以有天下者不讎匹夫匹夫有欲而不遂故求求而不得故爭爭而禍亂相尋則死亡繼之吾將以其所欲得者舉而與之彼猒其心則亦已矣夫計神州之廣大億兆之衆多統而稽之求智慧長壽者或寡至若男女若功名若財貨蓋有不顧喪元而希夫必得者矣曾是口而誦心而唯翹爾勤注爾想乃感通之簡易如斯也舍感應道交之至易而從蹈危履險之極難夫豈情理也哉使凡率土之民咸釋所難而圖夫至易則太平可以坐致萬世且享蘿圖而攘奪之禍又孰自而起之説者曰求之有道得之有命雖聖賢無如何乃若所為求若所欲而如響斯應非豫云昧抑舉世通惑焉而未解也余曰單醪投河三軍告醉虞虎持滿金石為穿是遵何道哉亦惟心靈所致耳況託佛菩薩殊勝力耶是故經中佛説心力最大行般若波羅密故散此大地以為微塵蓋地有色香味觸重故自無所作水少香故動作勝地火少香味勢勝於水風少色香味故動作勝火心無四事故所為力大然則至人者納須彌於芥子擲大千於方外以四大海水入一毛孔未竟心力之一芒於隨意得果乎何有而驚詫乎哉曰此蓋釋部之談孔孟之書無聞也公儒者而嗜此乎余曰道有發致雖殊潛相影響人有出處誠異終期則同者經不云乎佛有自然神妙之法化物以權廣隨所入或為靈仙轉輪聖帝或為卿相國師道士若此之倫在所變現諸王君子莫知為誰是則山僧非釋公亦非儒非儒非釋當義何名欲知就裏根源且待虛空落地歷傳祖圖贊序先師之鼎新天童也雖無事不周猶於説法此山者為惓惓歲在閼逢閹茂殿宇方成即闢函丈之東營室曰先覺者儼設其位號而祠奉之復手自制文勒𤦹玫以昭此堂所以建立之意其防微杜漸靡不刳心焉越十年余繼典茲席每朔朝望旦尊先師遺訓必具威儀炷香展敬由是仰視榱桷俯察几筵未嘗不竦然思憮然歎蓋同泰之宮既化於烽燧永寧之塔亦遷於谷王遠而溈扈雪嶠近而五山十剎處處蟻蜂是穴誰免狐兔為丘求其人天奔走四海來同有不嵩少夫玲瓏曹溪夫雙鏡者乎夫地靈則人傑人傑故地靈木有根水有源故余益廣先師之意繪從上祖宗首自釋迦文佛至先師密雲悟和尚凡六十有七世遇歲時節臘必張挂法堂陳時食而薦奉焉示後昆無忘先德之思或曰天童自義興開山世有哲匠而禪門由咸啓來諸家互為住持略他人之宗祖詳自己之根源可乎余曰然老蘇不云乎譜自我作故也況由先師泝洄以上至應菴華祖則天目禮諸家之宗祖在是矣由應菴泝洄以上至石霜圓祖則清遂諸家之宗祖在是矣由石霜泝洄以上至南嶽讓祖則寶堅諸家之宗祖在是矣由南嶽泝洄以上至達磨西祖則咸啓諸家之宗祖在是矣由達磨泝洄以上至釋迦文佛則義興法璿諸家之宗祖在是矣提綱挈領本末歸宗安在其略人詳己邪圖成禪者請贊因不揣固陋次述於左以就正大方焉鳴鼓録序趙括之談兵也傾其父奢奢不能難長平之距趙入秦間使括代廉頗藺相如曰王以名使括若膠柱而鼓瑟括徒能讀父書傳不知合變也括竟挫敗喪師四十五萬身滅矣而邯鄲幾不脫嶽鵬舉初以部伍隸宗澤澤大奇之曰爾智勇力藝古良將不能過然好野戰非萬全計因授以陳圖嶽曰陳以後戰兵法故嘗抑運用之妙存乎一心又曰兵何嘗顧用之何如耳旨哉靡古名將雖我宗門亦然昔洞山價不嘗以寶鏡三昧密授曹山哉乃五世以還寥寥無聞焉何也克符道者不嘗成禠臨濟建立黃檗宗旨哉一時料揀照用玄要主賓在所親承而頌述者乃不三葉而中衰其故又何也傳之不得其人與用之不得其妙均失耳昔人謂真淨和尚拈提今古不在雪竇之下而末流傳習卻成惡口小家皆此類也故用之而妙即小豔情詞綿州巴歌皆足使學者銷意中之積滯出眼內之金塵如其失宜縱佛祖言教擲地作金聲其如一句合頭語萬劫繫驢橛何所以先德有言若作實法繫綴他人土亦消不得又曰有祖以來時人錯會相承至今以佛祖言句為人師範若或如此卻成狂人無智人去信知從上來事在人不在法不見道正人説邪法邪法亦成正邪人説正法正法亦成邪何謂邪人無身奉塵剎報佛恩心徒沽名弔詭以徇一己之私者皆邪也傳不云乎索隱行怪後世有述焉吾弗為之矣矧味道餐風親飫法乳一朝懷挾胸臆創發難端至沒齒矣猶亂是飾非攘羊是誣計其厝意宅心非魔非魔所使又誰肯破滅從上壞人信根有如此者此銓上座擊忍僧之説之所由作也然則録稱鳴鼓者何也從余命也於乎陳恆弒君邵庶人之賊父千載之下尚一二見者若踞人師位入室而操戈蓋亙億萬古春秋僅遘之忍焉沐浴請討猶之後矣鳴鼓云乎哉金粟反正録序春秋之法尊王以削僭攘外以與內然淮徐之國外矣而動循禮義則亦與焉不以其外而外之也鄭衛之邦內矣而事悖倫常則必奪焉不以其內而內之也凡所以嚴上下辨親疏定天綱立民紀以植人心於不死者寧獨尼山家法為然舉世出世間苟違斯道未有不干名犯分而淪為小人之無忌憚者也先師密老人六坐道場而金粟居一焉記莂同門十二人而三峰居一焉立三峰之徒子主金粟之道場名其誰曰不正言其誰曰不順哉名正矣言順矣必撥而反之正也奚為繇其出乎正而入乎不正者也入不正奈何裂祖堂湮祖號泯祖德媟祖稱親而髦為疏下而陵其上天綱民紀相次崩亡不正之罪孰大於是是以天猒其衷人離其德獨夫去嘉運來金粟之道場始復為先師之道場焉反之時義不綦大矣哉夫既反之可以忘言矣而録之出也又奚為子與氏不云乎春秋作而亂臣賊子懼吾將假是以懼夫蔑祖欺宗之賊亂之人者鏡麟録序聽訟吾猶人也必也使無訟乎孔子發為是言其在作春秋之後乎何以明之尼山冠帝佩王法天因地使有大位焉得行其道則巍煥之功無為之治直土苴耳逮至獲麟則家居既老知道之終不可有行也乃由定哀以溯隱桓取魯史之舊文而筆削之善之可以為法者則褒之以示勸惡之可以為戒者則貶之以示懲微顯闡幽發姦摘伏凜乎若皋陶之聽訟無復有遁情者書成筆絶矣終傷夫道之不行不能措生民于默化之中並時物于行生之內故深以為慨也或曰吾師舌奔雷電筆掃雲天爰自開法天童以來謗書充棟絶不寓目一時無情之輩卒莫得而盡其辭繼而道大光顯于時向之造為謗讟者莫不愧畏生心焉乃今桑榆景迫反改前之所為于金粟也則有反正之録于禹門也復有聲罪勘愚之説無辨而翻為有辨何也曰反正之録為瀆祖也聲罪勘愚之説為訕師也皆同室之戈而非鄉鄰之鬥也曰舟愚楫罪則吾既得聞命矣彼玄素與蕃光外也非內也何譏嫌亦不少貸也曰為其有傷雅道而付授濫觴也曰然則孔聞之朝東魯暮西秦為聲利以壟登視師門若傳舍返若為之解冤而釋結則又何也曰吾為親者諱也惡古帆介為之以是諜諜也豫又從而和之則所傷者大矣故豫之所申説而諱貸者一取鏡夫麟經之法而懲創夫不法者也
