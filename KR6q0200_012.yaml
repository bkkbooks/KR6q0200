body:
  text: 住明州天童寺匡廬黃巖沙門道忞著傳龍池禹門幻有傳和尚傳師名正傳號幻有生應天溧陽呂氏幼豐碩穎異不羈丱歲體忽尪弱自以為壽不得長因感香山小說思出家焉年二十二依荊谿沙門樂菴剃落尋詣六庭法師習講學木叉戒法俄舍去叩菴菴為開導師感奮自誓一夕聞燈華爆有省白菴菴可之菴沒師心喪三年然後治任抵神京初謁笑巖寶公公高峰十世孫海舟慈其又大父也契悟廣大楚黃無念禪師遊方時擬叩公流輩咸為不可蓋禪門方死繩墨公乃逸格提將來者無所緣泊故畏忌之公見師至便問上座何來師云南方公曰來此擬需何事師云乞印證心地工夫公曰認得心地便休何更有工夫印證邪師云不得不舉似過公曰參堂去師珍重晚入室方具述所以公驀趯出一隻鞋曰向這裏道一句著師芒然中夜旁皇公晨起見師猶立簷楹間驀喚師師回顧公翹足作修羅障日月勢師遂有省而機不發一日有僧辭公公問何往僧云禮遍融師去公曰曾與伊會過麼僧云若論會則遍界無避處公睥睨曰汝在廬山會過矣僧畣無公笑而不語師頓見公用處久之辭去公署正宗付焉且以一笠戴師曰以此覆之無露圭角師受旨徑往五臺棲息祕魔嵒景不出山者一十三載會太常鶴徵唐公問道臺山見師如夙契懇師南還師以菴未塔聽之至荊谿公則以龍池延師焉龍池故一源禪師道場也嘉隆以來先德物故東南法社例如灰冷師至愴然念百丈大智之風有徒數輩一如萬指臨之於是擔簦負笈之人聞其風而有在於是者咸集焉槌拂之下多穎脫而去者而天童悟報恩修稱寂閒二大士矣住六年謝事復遊燕都居普炤寺時縉紳輩留神空宗日夕從師質證嘗一日舉扇展示諸大夫曰當時孔子還知有者箇麼皆曰不知師曰以我為隱乎吾無隱乎爾聻眾躍然其揭示多此類法師月川與師同參寶公左袒清涼以非肇公物不遷論當世莫能抗其說師乃反覆剖析累萬言或者竊議以為曷不自疆理乃踰畔而耕邪師曰吾誠不與比憂然後世將遂謂法門無人耳川卒毀版以謝居無何有為妖書詆上者詔捕弗獲當事者藉口桑門時紫柏可公逮繫矣一時名德引去馳師師笑曰學道期了生死生死了顧反畏禍邪高臥如故事寢乃赴唐公再住龍池之命師前後京師二十餘年當是時兩宮奉我田服之徒方藉以有為師獨無所事生平如饑如渴一以道為己任故終師之世陞堂入室無虛日好以門前冷落車馬稀老大嫁作商人婦話問士大夫般若無知靡所不知話問學者尟有契其機者嘗謂眾曰今時人多有說得儘是者恰像箇膾子手何也任他佛頭來魔頭來獅子頭來象頭來牛頭馬頭人頭狗頭羊魚鵝鴨頭到汝案上一一儘汝破除打發一邊去只恐把箇死貓兒頭來便不能破除得打發不開去於此打發得開去纔是好膾子手時有僧進云將死貓兒頭來著師笑曰果然不識師風度簡夷而神觀凝肅嘗燕坐中堂如在定者累日雖左右近侍有事不敢輒啟至其規誨提將則慈意藹然有所訓敕時或質以經論援以百氏之言如日蒞天臨有目者咸睹至其機用玅密迥出情謂之表則壑澤夜迻昧者不覺師於神宗萬曆四十二年甲寅示寂先一日有僧自臺山來師欣然與劇譚山中宿昔抵暮索浴浴出而示微疾眾環擁知師猒世因請遺訓師舉所著帽者三眾無對師乃拍膝奄然而化蓋三月十二日子夜也師生世宗嘉靖己酉世壽六十有六坐四十四夏門弟子依法闍維收靈骨建塔本山之右天寧幻也慧禪師傳師名佛慧字幻也別號嬾石會稽人南宋史相之後也母戴氏夢天台僧抵舍孕師及娠鄰人共驚異相見紅光蓋室如火六歲入童子學授經知大意十四慕空宗走天台見松谷法師於華頂之勝峰寺求度不允乃泛海求潮音僧度復不允因之發憤葬身魚腹中且死得救免舟人愍之為剪䰂詣谷始納為僧命今名留習台教五載一日晨課中間豁然不覺心吻俱開告谷谷奮挺逐之不得住聞嘉禾有濟法舟者走見之會濟方屬纊於是一缽煙村孤笻天外南詢北訪遍見大有道者而卒機契圜通為笑嵒入室之子出住天寧之優曇苑疾當世學者走聲便軟煖一澂之以枯澹數十年門無宿客嘗示眾曰一翻相見一翻新好看缽盂添柄幾處行來幾處險猶奇艇內藏輪海不顧山頭月白一任浮沈空無奈雨腳風清大家和會參方衲子講席高流居士宰官天仙魔梵有情無情生一乾坤死一乾坤聖一法界凡一法界何曾謾得諸人若也謾得諸人那討說箇是非好惡賢善才能尊卑異類焯然些子謾不得欠不得你道是什麼境界會麼滿目塵埃千聖眼半身落魄五宗心晚迻多寶菴足不越閫者復十餘載老且耄矣忽思天台舊隱即日抴杖還南嘉禾緇素遮止天寧俄示微疾簡曆示小師曰後二日可小師涕泣固留師笑諾為更留三日仍涕泣固留不可俗弟子聞之趣置龕室師以是日午跏趺榻上而工適報竣遂趨寂焉僧臘七十八世壽九十一師生嘉靖丁酉方其化揚神廟時重譯來琛山饒海富加以國家尊崇象教一時禪林講肆蔚然雲蒸都下逮衲衣空閒之輩尟不藉賴中貴人以自贍師獨斥去弗受也闃然一室嗒然一我往往絕粒則闔關危坐有餽之者粟逾斗錢盈環以上亦斥去弗受也時聞嘯聲如老鶻吟聲若清泉而已然不動真際萬行常興凡齋施茶藥利益事皆為之萬曆間奉詔為慈聖皇太后飯僧千朝事竣闔關如故故王公豪執希得見其面即非所欲方寸之閂澀不可通即通而昵極清光方若露立霜月中亦芒寒足桌士大夫從之遊者惟曹駕部安祖陳司業雪灘最久侍者一能明執侍終身而已明嘗有句見嬾石卮言中云春水仰看人面綠名華低喚鳥聲紅則明蓋長於聲律者師語音如鐘足有輪紋龜畫番番黃髮齒落更生皆其異相之著者至若五臺睹文殊真境司爨感天台聖僧事涉怪誕茲不具述云聖壽印乾法師傳印乾法師者廣陵人也法名海印俗姓韓父早喪母孫氏守志拊師見師黠慧異諸兒乃弛慈母之愛更張嚴父之威過庭必訓訓師嚴且倍常仍命師遠學金沙蓋日以亢宗望師矣然師志在出塵殊無經世意母微知之適師歸里就試促師畢姻師畏罥塵網因哀乞鄰東之老僧體菴能公者方便為剃落於是得墮三寶數一日公謂師曰千歲之椿必生廣莫之埜凌霄之鶴詎棲枳棘之林師默識公意即日禮辭去遍遊講肆凡性相二宗碩大之家若巢松若一雨若昧法師輩光昭吳會間者莫不造請微言諸師降以大龍之雨師一當以巨壑之投升堂入室無所關隘而京口悟心融公尤為駿賞因輓師分座講說長河既決千里沛然英聲遂籍籍起東南東南學士日望師開法受徒得挾策一聆玄義為快然師自念長水從瑯琊開法太原孚因禪衲悟明德山宣鑒躬擔青龍疏鈔出蜀擬埽南方魔子而卒自焚於紙燈吹滅之後宗門豈無長哉我未達耳若夫數他矜寶說彼譁音直先聖所訶者崇禎己巳春博山來禪師赴天界之請入留都師蹶然起僅造籌室而山還江右師悵恨久之會友人山茨者從磬山來稱修和尚宗眼圜活能鍼灼耆艾師慨然與之偕往修一見深相器重即以本來面目話詰師師如癡如醉若不知人者十有九日而省入室呈偈修示以本色鉗鎚師迎刃即解如轉圜石於峻阪之巔修曰未也豪氂有差天地縣隔師聲喏而退叢林故事臘八陞座師出問釋迦老子道奇哉一切眾生皆有如來智慧德相但以妄想執著而不證得如何是妄想修曰成佛作祖如何是智慧修曰入死出生恁麼則無明實性即佛性幻化空身即法身又云不證得不證得箇甚麼修便打師拜起而曰若非今日親承指示幾乎話作兩橛修曰一面底道將來師云道得也是臘月蓮華修益器重之既而聞天童法化之盛復走見密老人於太白山中親炙踰年會修遷湖州報恩復往省覲俄而修寂即欲抗跡西山高蹈方外而山茨禪師初住東明簡師曰東明旵祖道場也老屋敗椽雖聊蔽風雨奈塔山未復祖塋尚薶寒煙衰艸中孤掌難鳴兄豈靳隻手哉師毅然走嘉湖杭白三郡之護法及當事者卒韙師之議而東明繇此復業然師不自謂德復去山後之數舍縛屋而居師為人外瘁中剛寡緣飾與物無違諍而義在必往不吝情去留而師友恆切居東明時未三祀長興男子復搆室烏瞻深處延師師欣然樂就將為終身不出計矣歸京口省融公公復以老病留遂力卻烏瞻而棲城南之八公洞焉方是時師去講座幾十年雖同學相過從難師經論重宣然嗛嗛之志未猒也會廣陵蔣氏元長董氏問曦二孝廉迎師入城供養且叩楞嚴玅旨因而四眾聞之遂延講興嚴及散席歸京口公果猒世遺言命師繼席聖壽非所好也而義不可辭起敝支傾甫一年而病作就醫東隱問疾者往來如織師恆接譚不倦有甯生楚儒者以事遊吳門來謁別師曰子去幾時歸吾不能待子矣把臂送之低回不已越數日忽索浴更衣命迻龕入室據坐跏趺令人扶其首久之熟視左右舉手曰吾行矣主人暹法師戲謂師曰今日天雨縱去不遠師曰吾有艸鞋在主人曰艸鞋𩌍斷時如何師遂閟目不語俄撼之已逝矣停龕數日顏面不改如生京口緇俗聞之遂各備華旛奉迎龕室歸葬全身於八公洞之左師生萬曆乙未入滅於崇禎癸未五月之七日蓋世壽四十有九僧臘則三十又一焉曇常集三禪人傳曇禪者字曇生黃州蘄春人出家廬山開先寺視予為猶父行幼從予遊方動止有法奉予歷百城春秋十餘祀雖荒村埜寺風雨晦冥之候未嘗見其有惰容尤刳心己事於三不是語發明從此信入先師悟和尚蓋器重之繼予歸隱匡廬為予分衛千里還執爨負舂如故迨先師沒予奔赴天童乃留黃巖始分岐不克從焉既而喪亂洊臻山寺罄遭焚掠殆居不遑夙夜矣而旋營旋葺初無介意以違予久將省予廣潤夏止邗之東隱菴一日無疾忽索浴更衣安詳敷座跏趺然後從容以趨寂之故告其徒徒驚愕悲戀跪乞遺言曰你自去廣潤禮覲和尚吾行忙不及見也言訖而終常禪者字法藏長沙益陽劉氏子幼出家志參湖海以母老無依託乃負之遊方復以利養同僧為母罪所至割食食母日食殘滓棄瀋而已母死則荷骨以往於先師無恙時趨叩天童久而知歸逮予繼席天童即居請客侍者寮復典客靈峰廣潤故從予亦最久為人質直好義觸事穎發於友恆面折其非於師亦橫機無所讓至於荷法事眾則身命以之後遊龍池為龍池綱維一眾一眾服其公俄疾作預知時至命侍人安排果燭鋪設香几於是索筆書偈揖別堂頭竟爾坐脫集頭陀字聖阜會稽郭子式也自為儒生以德言重於越於越之子弟從之師其孝友則雍穆於家師其文章則輝煌於國故通國之人莫不欲尸祝子式社稷子式而子式固深渺自藏也魯藩監國日立以崇官起之為一陛見即告歸用團練法保持里閈日有遊騎騷繹則自破產為之供億不俾一卒入下戶之門舉平原平水若邪谿濱凡賴子式以全者千有餘家清兵渡江遂從予雲門落䰂為僧自茲闔戶山菴繭足不履市城矣己丑冬予領越州大能仁寺不得已一踐都門歸而得疾疾且革召諸親友從容話別作偈辭世復取自肖象題之乃泊然長逝贊曰善夫圭峰有言曰作有義事是惺悟心作無義事是散亂心散亂隨情轉臨終被業牽惺悟不繇情臨終能轉業彼姝三士所謂轉業是邪非邪夫紛紛荷橐走叢林其誰不曰我為生死哉而臨行灑然寥寥無有何也由信之不深行之不篤故耳況復狼心蠆尾所作殆有甚於屠沽負販者予故於三人獨表而出之嘉往所以勸來豈曰臨川歎逝而悲從我者之皆不及門與四明孝直錢先生傳先生名敬忠字孝直上世以官為姓蓋陸終之後也中葉祖從父官寧國為宛人又九世遷鄞代有異材故江東之錢氏日顯高祖奐參政廣西以單騎平藍賊功陞布政使曾祖瓚亦任廣西副使時人比大小鄭云父颺虞公名若中隆慶朝進士授儀曹性戇與時左出為臨江太守以亟白故御史劉臺冤忤權貴由是誣公酷禁殺多人疏動神廟致坐福堂者四十年先生適生浹歲從父獄中受書慧異具至性日嗚咽吁欷不出父不自有生遂矢志力學版床銳減于時臨江拘禁日長母田憂悴成癆瘵歸侍則心挂吳天趨省則腸迴浙水雖以父命受室歲時伏臘重自悲傷未嘗與家人一接醴為歡也先生慮患既深摻心益危思致益登峰造極而文章憎命達凡五入浙闈不第益自感憤卒連登四十七年春榜占麟經第一魁多士方圖奏請忍不待時或勸先生宜萬全出父奈何嬰鱗蹈禍淵不得已置廷策不對復泣血長安道上三年至憙宗改曆伏闕且請死頌父冤矣會當事者多疑沮不覺憤懣之極歐血盈斗竟自囚服待罪金馬門乃得旨原釋奉父生還計先生自少至壯涕泣告哀風雨奔命三十年無寸晷少弛救父之心故自臨江脫獄之後則如丹成黃冠道證高僧前後際斷人間世無復餘想矣所以角巾埜服放意湖山恆與名緇宿衲相遊泳兼通法乘諸書多所譔述能安徹骨之貧不熱亙天之燄當涿州秉衡日由攀附躋顯要者不可悉數先生為門賢首出顧自浪跡東瀛超然物外其高潔為何如哉崇禎初召為刑部郎以母病告養歸授生徒穫館糈以奉甘旨者又十年母卒服闋復起為郎益清貞自樹黨人惡其異己出為寧國太守鉏強植弱立法賑饑存活者數萬終以道不諧時免官去任旅食金陵甲申之變撫臣馬士英迎立福王于南畿以定策居台鼎導主色荒不問經國大猷先生患之乃極陳討賊復讎之義勸上親征冀乾綱獨奮有以振厲朝埜其明目張膽皆諸葛武侯出師表所未經籌策者書三上不省先生知必敗即日出疆依長公光繡隱于海隅復援麟經私定甲申罪臣四等之案其維持世教人心皆此類尋以國事日非憂憤成疾明年新都覆疾遂革乃更號豈塵自題其旌曰崇禎遺老然後瞑目而逝蓋慕元處士林外之為人亦以雖死不忘先帝云贊曰余讀有明成祖文皇帝所編孝順錄上溯黃虞下終昭代自天子至於庶人凡散見于史傳者靡不搜采僅獲二百七人其間雖有處極人倫之變皆可盡子職而為之豈若先生父嬰宸怒同朝莫解子欲出而之生所謂天雨粟馬生角也故為先生謀與其自為謀亦安所施夫回天之力庶幾得一第或可萬一陳情耳則先生之朝黃卷暮青燈也宜矣獨是父幽母瘵天各一方東顧西瞻愁腸萬結苟非窮神極慮竭智盡能曷繇奮揚高翮哀鳴九天哉夫陸終之後至颺虞公益蕃今其子若孫鳳翥鸞翔振振未艾彼臨江之非酷吏天實監之矣使公無先生終閟幽圄不出是以聖君殺賢守天下後世其謂神祖何然則先生之移孝作忠奚俟出身加民而後見之於乎先生之曰忠曰孝其斯以為忠孝與夷考二百七人中舍五十而慕之虞舜誰與匹休哉廣陵三我先生傳先生姓蔣諱應參號三我邗之董子里人也幼孤家貧攻苦寡強親戚歲以館穫有秋食孀母日甘毳以奉者數十年當是時先生自足握青紫如券而救敗扶傷蹀躞不能前然先生弗恤也晝夜摩厲諸生故先生鑄人之風以是日聞而先生車馬亦頓矣然先生方以得糈為將母大慶逾弗恤也迨喪母則又鼠思泣血不蘄有生故先生終弗恤曰噫負吾也夫然吾不人子負而天以吾子負則吾真負也夫先生恭不泄邇孝不忘遠居恆時有祭月有祀雖賓燕不廢也凡祭必齋必夙明河在天則先生皇皇起眎曰旦矣非采蘩風人交鬼神之道也不敬奈何然廢徹而光昭如故轉己祠墓禮俗歲一二展先生則嘉辰令節皆往雖豆無豐碩而烹葵燒芋獻酬交醋若藹然膝下者夕末為先人分歲朝初復為賀旦皆生人禮也故鄉農望而慫若慎爾芻牧毋干先生隴恐先生傷胥邵也春秋獻文廟先生不與從則陳詩書闕里志於庭炷香束帛拜階除首九頓歔欷顧子孫曰先師衣被我德厚焉可忘若欽念詩書訓邪忝先師不可先生豐頤後耳美須髯童子光外射而頎然面目嚴冷類刺削神人自其勝冠時燕居必冠冠不釋元者近六十載門弟子遇諸途十步外必虛左俟端拱唯謹閻子含卿有軼才駘蕩無所忌居恆咄咄掀髯風搖四座殆隅先生則終日恂如不能言者今上頒朔先生旄矣然左書箴右書銘兢兢如也故生平無過誤聞人過誤輒同廢病恐終不得活諸生也大則讓小則規子孫則畢讓無巨細孫某過中陳見屣焉蹴之偏先生讓曰齒君路馬何如蹴父履讀詩書大家子不識禮固當終朝不懌當食猶歎嗟孫某懼叩首自責無所容乃已先生見子姓類師生臨家人若臣主自妻媳以下終身未嘗窺戶庭焉一孫一子子善舉於鄉為今孝廉君孝廉於先生最為式穀然先生廉隅見矣故先生終以德王子孝廉又以文雄孝廉恆多為縉紳先生操觚家所誦說先生則人人樂道以為三我先生真古狷潔士哉雖然先生清刻矜己諾猶古東楚風若其動符禮法得不教焉殆鄒魯彬彬君子未遑也猶喜古皇先生教少欲知足固一白衣杜多白社有外務則先生禦操不平慷慨然固飲酒食肉新學近事男多竊笑先生然諸近事男聞經行道崇勝業皆自遜不若先生然察之則不若先生遠甚識者多謂先生用儒治身用佛治心則先生笑不言也然先生疾革猶命佛者擊磬誦修多羅先生則傾耳聽使聲琅琅不絕然後右脅吉祥乃逝則皆古皇先生教也當彌留時子婦梁割肱雜糜以飲先生幾起卒以衰憊殞此哲人惜哉贊曰史闕文馬借人二事皆末孔子稱之何也傷周道澆漓日甚也往余客句章見秦縣王子式姚州管生聖者其人皆布衣有王公之重矯節砥行以生人之死當世之人因之而寡過者蓋千十百家先生亦然無大位整齊當世而危言危行當世亦憚之語曰猛虎在山藜藿不采先生有焉之三人者皆人倫羽儀也今一歲間相繼化去余甚懼之然於越多君子廣陵多廣商大賈故余亟采先生行事論次為傳付孝廉君俾號於人曰先生出矣自古有死先生蓋未之死也悲夫義僕傳吾家有老蒼頭忘其族姓里居小名進寶子無更錫嘉名遂名進寶子幼鬻吾家仕吾先王伯伯父伯兄伯兄之子子之又子五世矣為人質愿寡言笑經旬未嘗見其啟齒惟渠渠力作無休時始吾王伯少有蒼頭方學推襏幾廢股日糞其主之田以佐佑之故吾先王伯捐賓客之日鼠壤有餘蔬後歲大不穰伯父早喪伯兄又不事事所糞之田日折而入於逋主之家蒼頭則為之佃既食其入復收其贏餘以供歲時伏臘暇則理蔬圃治水薪凡伯兄之家待蒼頭舉火者三世伯兄蕃嗣姓困於貨不能為蒼頭置室遂終身亡偶然不聞其有外遇與夫不足之色以予少長見蒼頭大都若此近復聞其采藥山中得奇藥以之飲病者病輒愈方且以僊真品目之予謂事出偶然未可異獨其生平奉主義至高有類古之良大臣者今之大臣有能彷彿於吾蒼頭之一節其肯以疆場之患社稷之艱憂吾君哉義士也夫純臣也夫
