body:
  text: 住明州天童寺匡廬黃巖沙門道忞著尺牘與同菴蔣孝廉數載阻胡隔越久乖魚鴈頃接玉如弟書始知偕寶眷歸自江上闔門俱慶福履如宜欣慰欣慰念自帝京版蕩來郡縣之覆亡者十而九抑不似揚之掃土盡也民至掃土盡豈非樂深而哀甚者邪于最甚之中無豐德厚福而獲安全焉有是理哉則謂非天之眷居士不可獨公車頓于癸未之役猶恨甘泉淑靈之氣未發越居士耳然貧道邇來親睹宰明屬以癸未起家者數矣非其名捐則其身敗者有之甚而身名俱敗者亦有之則又安知非天之與居士後而實與居士先邪所冀懋昭明德以終迓天之庥已耳天步尚艱惟冀順時珍愛又淮揚稱天下金穴素封之家奚啻千門萬戶如居士之淡薄明志有何慢藏乃家貧而亦遭劫邪盜而無良至是其緑林之最下者乎雖然今之所謂良臣古之所謂民賊然則今之所謂民賊古將無名而命之矣應知世愈趨而愈下則人亦安往而不下哉經云佛心所緣緣苦衆生彼劫掠賢人之罪當如七遮議條罪大苦深則亦何由解脫唯是既因地倒還從地起所望居士以地天為量慈氏為師生大哀愍發深悲願翻彼劫奪之想興我喜捨之心願令此輩過茲以往處處富有資財身身得大自在精嚴不與取戒盡形盡壽而堅持潔清尤巢許受用等諸天斯乃至聖大人成己成物之懷也想高明志有同然或不以為笑其以我言為服乎與安丘三如源思馬二孝廉長諱長春次諱澄昨過貴邑猥承加意接待或居士引誘多人為善則可在山僧覺難消受耳別來蒙福庇一路康安奈為泰雨徹公苦留五蓮度夏然淮甸之催符旋至秋初當即策杖南邁矣雖彼此出作入息共一夙興夜寐而齊楚異方未知會晤更復何時所冀精勤在道期于覺岸同登斯善焉辱命撰準提菴記意思生澀勉為搦管殊愧不文謹書上取裁度餘弗備及與搴玉孫陽江諱自修春回大地山光明媚而白駒忽來天外偶語小立坐對嵒前雖半日千載也門下自是血性漢不作廉纖態度然既欲留心此事當向千聖萬靈分疏不下錐劄不入處透頂透底始得所以古有縣崖攃手絶後再穌之喻夫云攃手絶後則放舍身命如大死人雖有耳目實無聞見而來偈云舊云明云三生皆違無生之旨不揣愚蒙并前長歌一例奉和幸惟照諒無嫌續貂又前夏聞出山後北騎已渡江閩浙潰師沿途劫掠深為相遭憂幸京邑不大蹂躪想闔門清吉邇來起居佳勝育生歸竟不面別殊失申候中間謝事顛末必為居士言之詳矣每念俊骨天生澄襟似滌肯拼選官不如選佛則丹霞老子直拜下風豈特跨拘鄰上哉貧道固望之久而般若六喻可謂屢見經年有識復不當自裁邪退休山寺頗愜幽情乃為走聲者纍雖耕而反餒抑未免告困高門耳故某禪特為衆胸石頭謹此訊問多福尚冀有以導引之與介子黃居士不孝忞于門下雖未識荊然耳熟大名三十年蓋胸中有江上二黃之日久矣況彼此得預天童籌室業為法社連支則又何啻君子千里同風已哉乃者不幸天喪哲人先和尚奄就後世閔豫小子儼然憂戚之中日惴惴先人行業放失無以昭布來茲適吾幢兄移檄山中徵不孝所述年譜且雅稱門下高誼肯以筆鐵頭點出先和尚末後光明雖則門下于先師有無縫塔樣不欲蓋覆將來然俾不孝輩榮施多矣敬當匍匐江上俯泣涕興以請于下執事然有幢兄懇告在前則不孝輩惟據歲譜依實供通而已忝辱同仁知必有以照諒也又開先明法師忞受業先子也當其無恙時道法廣被荊揚蓋與一雨潤蘊璞愚中分震旦焉乃沒且一十三載未有碣上之詞頃拮据先和尚銘事不覺百感中來泚達于面俯仰先子所交天下名公卿皆相繼化去無存間存矣而言之不文言文矣而擇法眼無與焉求其海內兼而有之足以行遠惟法兄一人先子固未奉塵乎或哀弟之誠為一開生面庶幾後世學佛之輩尚有聞風而踔厲者敬以為請又違範幾何時滄桑之變不意屢見頻年聞洛邑頑民獨推江上則其蹂蹸也將必甚如是為吾道兄憂不去心者纍月然周身之防無論綽能包孔而昌文既沒天豈忍當吾世而中斬乎逮新秋訪真耗而後喜乃可知弟亦以忝主天童有愧陰翊之言因謝事今已退耕慈之靈峰精舍矣先年為受業先子圖不朽冀一言以傳幸蒙賜俞乃久不擲下豈先子地卑邪或弟駑不足進邪抑略而忘之邪今因申候輒復奏請者庶幾必不吝慈焉臨楮不勝神興之至復爾寧楊居士兀菴來具道門下高才俊骨令人不禁神往左右及披翰簡乃知汜分江上益知淵源之有自也黃澄江貞忠徑節根於至性故其託之豪素見為詞章者非獨嚴冠履秩君父之彝倫固己胸羅今古學貫天人矣山僧偶獲此槁於畸人之手深藏祕笥日惟壁梭化變有所遄逸是懼何幸儼然賜教重以壽梓之舉此蓋天不欲泯其芳躅而暴揚於門下耳敬授兀菴齎上辨首即請如椽發攄文而行遠不倍屣於質野固陋之言乎翹想光儀草勒弗備與荊二哥去夏聞尊翁大故不勝為居士凄其以居士方謹周身之防又不敢為尊翁即位而哭蘊結之懷徒付之浩歎而已居士主退尊翁主進畢竟進者不如退者之高然當爐不避火使尊翁得如居士固九動而十全抑天下後世其謂尊翁何無論馬革裹尸自合英雄本色與其公案狼狽于今曷若大事了辦于昔則尊翁之進又未見其少遜于居士之退也故鄉丹陽已安堵矣聞復棲遲檇李何邪因風候問尚冀以時自愛復爾保程居士鏡水秦山淨如菱華新照不謂別來無時翻成鋒鏑危亡之地保障生民恨無睦州巨履有大神變其如法幢徒建何客秋以賤恙欲就醫江外所謂出隊云者亦因行掉臂之說耳乃居士責以厲滯磨昏求人作士急救宗門縣絲為務顧山僧非其人者然明諭則皆忠言讜議也若云暑往寒自來冬藏春自發釋迦老子何日不放光動地溪雲泉石無時不說法如雷如旁友所昌言正是時人窠臼何居士亦雷同近日遽印可作佛門宗子哉呵呵若在廣潤門下換骨洗腸重整頓通身是眼更須參請即以是意訊之旁友何如復仲英楊居士遠辱魚箋褒嘉過甚蓋居士徒向山僧虛名耳使見山僧實面將恐醜拙難看未有不廢然而返者也如來教所述種種亦即是未見得楊純粹如果覿面一見則生死一著不可得變難艱苦不可得以至夙稟愚鈍汩沒塵緣底悉皆不可得矣不見龐居士于一口吸盡西江水語下豁然大悟便道有男不須婚有女不須嫁大家團圞頭共說無生話豈不是親見目前無可得使有可得又安能湘水沈金而以摝籬自賣哉雖然千里馳香法音求示豈可徒然山僧記得古德問僧向甚麼處去曰西山住菴去古德云我向東山頭喚你你便來得麼曰不然古德曰你住菴未得在請居士向者裏通箇信與山僧然後山僧開示居士未遲也復次牧馮居士伏讀來教自笑饒舌無端然再四惟忖不得不更饒舌一上也先子輿有言君子所為衆人不識諸方如是則可門下亞聖大賢心眼迥殊豈亦惑夫悠悠之說邪夫蒙舉止非敢曰君子但以法門為公正不敢認作一家一己事所以今夏有唯一山幢高原立僧之舉輒以己衣分授先師者衣之俾說法舉揚貴夫宗風不墜耳昔妙喜謫梅陽時有傳瞎堂遠公偈頌提唱以往者妙喜駭曰老師莫年有子如是邪因寓書通誠并寄贈圜悟所付己衣然則在古明眼尊宿有行之者矣而蒙亦只如蟲禦木不意後先一揆合他古聖若符節然良以此心苟公未有不合者乃諸方反見非謫甚至比例父亡兄為代父生子於乎噫嘻何從得此傷倫滅理之談則又不止令人胡盧絶倒矣夫代父生子所謂昔無而今有者也若夫三人者皆十年二十年親炙先師又先師屢言之蒙者故今夏之舉諸方當簡其提唱之是與不是不必論蒙授衣之當與不當也何也苟其提唱無據雖坐脫立亡九峰拊背不肯奈何果若合乎先師意旨則真父所生子矣安可以父沒一旦未與卜其家室而遂棄其孤哉世有喪心之兄焉如此而諸方亦肯之乎否邪以此固知古人重道不重衣重道故心公心公故眼明眼明故不與其子彌光輩而與其居恆未一睹面之同門者是也今人重衣不重道不重道所以識暗識暗故心私心私故惟貴遞相傳受之子徒雖有同門超卓如遠公者概不齒録也然蒙聞之其人存則其政舉其人亡則其政息彼衣者政也虛器也行解者人也真道也故行解相應即門下所謂苕帚柄亦可當柱杖如其不然諸方縱曰親相付授不亦臨濟送直裰竇八脫布衫之多事中更多事哉請以質之門下更請以質之諸方何如與開陽李居士子瞻作圜澤傳具載三生石詩今一讀之猶然酸鼻乃者公燕之會與居士別蓋二十餘年矣僅一餉而分岐身前邪身後邪芒芒大有因緣蓋有不可問者雖然君子千里同風安用𥕏𥕏抴毗邪與占波鬥額而春寒秋熱鼻孔自時時相挂況三生亦世諦有耳于第一義諦則無何也世諦以有念為念故一念涌千波至人以無念為念故一念包三世三世既爾十虛類然十虛既然則可謂野色更無山隔斷天光直與水相通故吾與居士亦遊于至人之天而已當年蒙示戒殺文祇嘗寶鼎一臠邇來筆陳想追屈宋而上之然文亦道之華也黃檗老人唱道于光黃之日久矣子輿氏曰由孔子至于今百有餘歲去聖人之世若此其未遠也近聖人之居若此其甚也孰與生同井里有如居士者然則茹其英而吐其華又安可遜彼私淑而曰無有乎爾哉臨風惜舊可勝縈懷復天中沈居士敬披來教用心至切入處甚深說理極透子細簡點將來不出仰山道底昔雪峰目臨濟為白拈賊雪竇則道夫善竊者鬼神莫測臨濟既為雪峰知道未稱好手況山僧痿痿羸羸且恁過時卻遭居士無端扭捏一上令人太是不甘雖然山僧內中更有喫緊一則因甚居士偏拈不著邪與虞尊高居士尊翁丁季宦楚皓首方歸生入玉門之慶又不當與足下斑衣載舞之歡合作傳奇一部邪流聞道路正復淒清不淺況叨知愛者因足下之誼竊傷尊翁為國忘家數十年廉如孫叔敖而功不獲食守如田即墨而烈無從飲思作天問乃星辰則己易位矣兩曜且復東行矣彼蒼告余以無如何可奈何於尊翁未識荊不敢通箋奏惟左右道達之託鴻訊問不盡攸懷復長卿姚居士貧道以菲躬眇德儼然錫卓靈山得不觸忌波旬乃纍大檀弘護卒俾傾而復峙隍而復平然揣魔軍嫉妒尚未銷歇幾欲搏風高翥非敢逍遙物外庶免矰繳之憂而無如金湯德厚未忍恝然孤負也慚愧教言褒嘉過甚不覺回惶稽于裁畣統惟慈光照諒縣父母一片護持苦心聞尚僦居城中謹奏箋致謝幸轉達之餘俟面傾弗備復奕遠祁居士往歲在雲門側聞倜儻不羈之風飫矣方寵光未承為恨至若令先君以翩翩佳公子當佛滅又後五百歲非內交于緇侶非要譽于鄉黨朋友乃不吝割捐巨資頓復千秋已廢之名藍誰在見聞之下不生隨喜之心況儼然重以典席之命屬厥眇躬然則匍匐捐糜以趨效焉未酬知遇也抑何敢優游怠忽致方明詔所愧摧殘樗朽利生乏珍而廣潤復有未了之緣儻大檀宥其顓愚而寬假之不以官守是責俾閒身得轉徙于緱江鏡水之湄庶奉教有辰矣如不弛其鞭箠則廣潤傾頽亦檀護之憂也恭傒後命謹還趙壁鄉老先生書亦祈道達愚意復萬韜宗居士伏讀來教知一往嗜道之懷不以人廢言耳若謂寰區衲子學識盡羅胸中非惟山僧不敢承當抑不試故藝尼丘蓋賤之矧山僧忝為臨濟兒孫哉重辱勝法見招海鳥畏享大牢雖其天性固宜而廣潤屬有未了之緣正難拈一放一以卒妨大命奈何遴選無私更推有德惟高裁其折衷之弗備復彥遠胡居士每聞河渚之間有偃騫風塵若楚士悲魯儒泣其人者其向詣則未知何如也既而稍悉其行藏于子山與然之口益向往久之不自謂今春西子湖頭遂獲劇談傾倒邪但恨一見不再見惆悵實深耳前惠手教無便鴻抑譽太不虞莫知云答非怠也費蘊老熱腸冷眼真可謂素心人其于道峰外護亦已畢殫其力矣韓子遽錢允武潘天行呂半隱數君子承枉顧亦可人餘則教顏尚未奉祇挹清光耳謹復弗備復鄴嗣李居士江橋分手寒暑倏更貧道固東西南北之人也兼之業風飄蕩頃復自能仁而之吳興之道場山矣道阻且長鴻魚益窅未審比來佳況何如承屬梵君傳後之書人事紛拏久虛報命今夏屬山中靜簡無為方始就槁因觀生感未免有過激之詞然東坡夢作祭春牛文或以為太殺傷時或以為喚醒無妨隨色摩尼亦就他人看去不揣鄴嗣高明更復以為何如也侍者乞明州特遣馳上兵凶繼見風雨不常萬惟珍攝弗備又周生脫白辱翰先容美厥成人孰大于是然空山惟寂歷六戶絶喧囂加以殿草未芟槽廠先著固非說紛慕華者之所服又豈持梁躍駿者之能嘗乎但既承嘉命法無拒人鱗翔羽泳聽其自化而已謹復復幃燈凌居士貧道謬託人師德實涼儉所以循山傍澗散髮采薇之志蓋自滄更桑變以來己矢死靡他矣不謂業風鼓蕩爰自甬徂台自台徂越木偶翻為土偶所笑竟莫知稅駕之鄉邪今春之仲又以吳興諸大君子挽茲道峰樹高風王益切顛殞之虞所快門無俗駕座有鴻儒以為此生遭逢幸雖以居士之美如英美如玉未即奉塵而談而令先君之精忠峻節早知大德者之必有後何意假令姊之善緣辱德音之下逮清風披拂如挹光儀第愧聞時富貴見後貧窮不副來教之注存耳所諭一如命安排謹復不盡與荊溪諸護法書山僧年登望七百念俱灰前冬有金粟之赴者以先業為獍梟剝啄萬不得已強起一撥而反諸正耳乃去秋復蒙大檀再過武原苦以龍池見挽無論峻阪鹽車力非罷駑所堪抑天道好虛地道流謙今寰海名山東南望剎不幸諸子往往有尸而祝之者矣山僧又于祖父三席總一肩承紹縱瑤田協夢一粥皆緣其若犯天地盈滿之戒招人神嫉妒之愆何然終諾大檀上荊溪者以萬兄諸子方在鬩牆不得不暫過而調劑之及造龍池復如命議安兩序者以此間群情欲散金粟又嗷嗷待餔山僧不能曠日持久以候立住持故耳今此來雖為海印道場亦為繼席之人伏望大檀早推賢者德愛山僧則成我之恩等於生我之厚將殞身而效命尚銜結以何辭否則惟有掉臂長往而已恐大衆一朝星散禹門依舊鱷藏先此披瀝丹衷統惟高明照察是禱復獻吉沈居士貧道徒有空名而無適用方負非達而聞之愧不謂樂道敦仁如居士固亦謬聽人言而尤措意于區區者乎前擬就梓檇李蓋有成說既而深思征帆未北馬首欲東戀堀之蚖何以解嘲于當世也邪即日過婁東統承慈照則已有為孺子而下榻者矣深銘雅愛敬謝嘉招弗備復香城姚居士法城賴有牆塹自先棲真開社鴛湖早已神交左右矣不意金地之招遙及無似江陵點首敢自沈吟第才脫夏天衫又穿冬月襖得無令人不堪惆悵只堪憐者邪豈不夙夜畏行多露想在高明必能原之諒之謹謝弗敏弗備復尊素王居士浪跡湖江閲人如海非無淵才博雅之士至若門下之胸藏山澤氣薄雲天則寥寥罕見矣祇挹清光恨以為晚乃塞鴻越燕各有天涯遂不能長茲白社共闡大猷愾歎如何山僧衰頽易老豈堪北地風霜青淄之轍旋即言歸所望了諸未了亦駕出天都二十四橋風月尚有待于玄賞之人也復默全張居士客冬承以仙丸見惠藥我孔多自審衰暮之年似難少此然安得移家東海長就倉公之市邪春杪將赴青州去平江且三千里矣廣川飲片愈難索求度惟頤神嗇思節飲時餐或能保有殘息再與居士軒眉一笑乎希勤道業長此永懷復明卿劉居士途間忽爾沾恙匆匆別來心日搖搖如縣旌不置也本空至知即康安殊可欣慰山僧道德輕微無能闡化大東小東徒費居士心力周旋貽纍實深北兵暫駐淮揚今已渡江多日而廣陵專使復日催上道北海之轍覺似難回馬首或憑仗道力以提挈新長老者福庇山門則受賜多矣流光似箭人亦幾何惟勤證無生庶相見有期耳幸加意弗備復天石施居士承乏天童四載滄桑遞變饑饉臶臻而食堂萬指人無菜色之憂念賢喬梓弘護樂施之高誼蓋未嘗一日忘心也乃者浮兄急流謝事復慮叢席虛曠特于寰海宗工之內遴選山僧卒惠教臨之雖門下為千秋法社計長久而山僧蒙茲寵召不亦榮施多與既辱知遇之隆遄思先業之大抑焉敢徘徊顧惜其間但無奈老眼昏華龍鍾已甚且業與昭易衆檀期修華嚴大懺往有成約或仗庇威光了茲勝緣而殘喘猶存得以祇奉塵談其在來歲朱明之候乎趨命期期統希恕悉復包兄元孺林居士自甲午春因含芳弟郵致魚箋于伯兄不通音問又復五見青黃矣喜客歲雪槱來得讀手示知伯兄鮮健合十加額者再至若生世亂離家園破壞此堪忍界之所以為苦娑婆也經云隨其心淨則佛土淨今土之不淨如此豈天殃人禍之為與皆由我輩往昔縱貪瞋癡恣無明焰不自淨其心之過耳居今之世苟能改往修來自可轉禍為福業旋消故殃不造新將見天宮佛國不難隨願受生亦安往而不得其樂郊哉雖然世界等空華諸佛同幻夢自弟觀之佛國天宮且如海上蜃樓假有非實而況其凡乎古之至人在樂不荒處憂不困明斯道也願伯兄與諸眷屬亦以此道牧心自忘薺之甘荼之苦矣弟慚道德荒蕪恆為業風鼓吹昔自吳興之淮而之青齊今復由淮之道峰且更再住天童北遷南迄無寧歲未卜何年一筆勾下尚得以衰暮之餘從兄于盤湖之沚掬水瀹茗一暢其生平哉尚冀聿修明德以迓後祉焉復族弟含芳居士聞過南徐即泄下不止蓋此身虛妄積劫以來衆苦蘊崇所患非一日矣然知苦斷集慕滅修真從上佛祖鮮不因之而了辦己躬大事者是故經言病乃衆生良藥豈不信哉如今不用苓芡白朮理氣壯元但自內觀病從身生身從業生業從心生心何所生如此鞭策如此起疑如此考究忽然洞徹根元則千生萬劫所有苦本莫不霍然病已馬首垂東弗及遣候旅次客途尚冀善為調攝不宣復妹八姑晃道人去春雪槱來讀八姑手信知令伯母與你殷勤事佛專精向道之心此心即是道心亦即成佛作祖之正因也若云福緣淺薄思先母而不見及欲聞山僧法信又不知更在何日者此則著于世俗情見情見若著斯塵緣之所以征逐佛道之所以背馳世界之所以崢嶸死生之所以往復也今承專懇無別開示只要你與令伯母當下勦絶諸凡情見情見若盡方知春寒秋熱老僧之法信不次傳來夜寐夙興先母之真儀不謀覿面矣如此寧惟通晝夜而知且無今古之間然既無今古之間然豈有東西之睽隔東西不隔無去無來又何生而何死哉你與令伯母其尚勉之
