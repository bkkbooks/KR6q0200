body:
  text: 住明州天童寺匡廬黃巖沙門道忞著塔銘二南澗箬菴問禪師塔銘順治十三年乙未之歲箬菴問禪師解夏磬山預告逝期至年秋二十七日蛻化于吳江之應天寺世壽五十二坐二十九夏十月孟冬諸弟子迎龕歸南澗依法闍維越明年丙申二月十九日奉靈骨入師所營之壽藏中又明年丁酉其門人曉菴輩來天童丐銘住山僧道忞謹撮其徒絶流策公之狀而為之銘曰只取二句四句協韻其一句三句有不拘平仄者乃用以記之龍驤邁種式産靈窪優曇瑞應豈雜葦麻一矧師乘願來為法艖松陵望族陽羡名家二父字安期俞宗騮驊號極淵博著書滿車三晚憂無子憯用懲嗟乃供大會百日無遮四師曰我來宵戶流赮厥聲載路其泣呱呱五年方弱冠遊神道涯偶閲楞嚴思益超遐六孰牖我明燦發心葩長跽磬山乞敲鎖枷七山為徵詰疑情愈加矢入重關大啓城闍八有翩者鳳將遂求鸞神警而寤鴆振飛翰九皈投法雨落䰂理安光陰痛惜策我血汗十首造金粟才申問端火蛇燒面骨毛俱寒十一忘眠廢食智落情刊經茲淬礪孤危絶攀十二磬山仍陟文殊復參豁爾開覺風聲指南十三言前薦得腦後抽簪箭鋒屢試編逼再三十四從茲穎脫如龍起潭機用自在綱要底探十五濟河待漲天目開嵐磬山縣屬大法宜擔十六旋命師攝報恩名藍師辭力矣豈曰不堪十七狻猊在窟睡虎方憨心期自許實遠且談十八報恩委順南澗化遷武林檀護競飛奏箋十九曳杖來歸一住十年家風嚴冷條令森然二十同居衲子戒抑短偏貴真操履實行為賢二十一尋常怒罵稍忤撲鞭影響聞風望崖縮竣二十二身衣不勝英發進泉居無惰容見者惕乾二十三院宇日整螺月明鮮藏典伊蒲信施委填二十四檀金客盜虎警以悛劫掠踵門雷雨震蹎二十五甲申之變賊彌郊埏山房鎮靜賴師卒全二十六慨念禪宗近系失銓續燈手輯有光祖筵二十七龍鬚天目遠造敻巔高中兩峰蟬蛻在焉二十八來瞻來禮式敬式虔乃知師意重本所先二十九同門晦夫圜逝竹林遺命繼席師為一臨三十抿龕入塔語集餘琛佛事既周歸闔澗潯三十一專人三復乃鑒其諶安居結夏來莫可禁三十二金山龍遊元勤覺場僉議揚化非師莫當三十三牘齎公府塔放寶光我龍受之奔走若狂三十四大陳法會升座舉揚乃為磬山恩酬瓣香三十五說張無畏舌吐廣長魚龍出聽萬指躋蹌三十六山有廟祀夏禴秋嘗毛炮胾羹籩豆大房三十七請以麵代割爾犧將非師道大孰感蘄王三十八爰有大士南海載歸滲金沈渚咸各請祈三十九神以夢告宜師式依與師何德師慈世希四十大江楊子風波險巘往往覆舟師實憫之四十一乃造輕舠乃徵篙師援危拯溺無忝大悲四十二荊溪復挽磬席久虛義正首丘往敢躊躇四十三躬親香火灑掃庭除先規罔替來學與與四十四嘉禾漏澤兵燹之餘殿堂俱燼鐵佛留軀四十五佛亦何心血淚盈裾感動群情援師拮据四十六師焉至止滌荒搆廬半載落成悲智所孚四十七食時分衛靡間屠沽相勸遏劉廣惠貧孤四十八結社放生樂及禽魚秀人從化卿宰延譽四十九淮撫恭順自遠欽風繇妻悍妒手刃諸僮五十侍婢索命為祟為訌迎師說法師音如鐘五十一情緣爍破幻趣頓空玉人自去淮水仍東五十二順侯聆悟留止文通踐登道場執禮愈恭五十三齊筵重疊嚫施彌隆師一顧之罄散巖叢五十四淮陰漂母祠墓草封賦詩悲弔舟已解㢥五十五瞻言百里道俗追從佇立以泣德感何鴻五十六歸辭漏澤高臥磬山手封馬鬣南澗之灣五十七盡揮昔居免涉人寰世緣永謝畢遂投閒五十八日月無幾莢數開蓂忽語近侍你策須聽五十九我今住世有若晨星往矣金車託彼祖庭六十檜楫松舟蕩漾蘆汀將從船子撇此幻形六十一詰朝解衆飄然一輪蘧廬大化浮漚乾坤六十二風林月渚間復留行爰發櫂歌旅泊自名六十三南澗既委報恩復晤乃往潯溪別我檀護六十四檀護別矣湖山道舊周爰咨詢告我不復六十五舟艤應天范蠡所遊師曰吉哉泊然歸休六十六那伽不動出沒自在雲流天空去來何礙六十七寶幢澗復闍維金棺火後莖茅鐵蛇莫鑽六十八薪窮不盡嗣燈有人一缸長焰豫則奚顰六十九嗟師英特磬山白眉嗟師典刑天下風規七十師道曰超師德曰乂師貌曰臞師心曰戴七十一眼兮碧落襟兮瀟湘濯兮江漢暴兮秋陽七十二月寫于身風宣萬偈機匹玄沙語方大慧七十三師今往矣吾宗式微紅輪收照桂魄潛輝七十四曷昭來許厥猷奕奕山翁作頌其詩孔碩七十五其風肆好師固推雄我若有福往先道峰七十六師蓋知我我敢負師雲漢昭回勒此豐碑七十七鬼神呵殿天龍拱衛休有烈光千秋萬歲七十八四明空林遠禪師塔銘尼父徹環天下子輿陳說齊梁溈山七載單居思他山而遠去汾陽一言聳聽起白馬而遂行蓋開士志利生聖賢樂兼善固未嘗以硜硜小節靖退自高也明矣乃末學唯干祿吾徒亦慕羶苟名利之可求雖辱身而不顧于是有竭私智運巧能擁篲權門以希恩幸糞金檀護規攫名坊者往往而是彼獨行之君子欲回一世之狂瀾誰能執熱逝不以濯哉矧今日之朝市山林尤更驚聞而怵見則四明遠禪師之高尚真足鐫世厲頑俗奈何復散佚其行藏不一法今傳後微顯闡幽之謂何豫滋懼焉按師族姓本青浦朱氏占籍鹿城依出世法名智遠字空林晚寓遁世之思又自號泯岩道人幼孤貧從其季父脫白於城之景德寺寺故應院僧徒不專白業師雖少恆猒薄其所為多與宿儒遊學為詩琢句出人意表同社爭譽之感中峰甘為浮詞又陸沉之語復棄去之苕親依聞谷印大師為授具易今名當是時師志益高超心期益遠大慨時流無達識益猒薄其遊處逮之武原參密雲悟和尚于金粟雖痛棒屢遭未明厥旨而締交唯一潤公乃喜嚶鳴有胥和由是結伴裝包之江右參無異來和尚於博山山以枯坐提話策諸徒慈接雖殷師無留意復擬上敷棧原由江達楚參無念有和尚于黃檗抵匡廬臥疾五乳山寺瀕死而研幾益力無楚痛聲重潤公日走數十里為求藥餌不忍詒其勞苦乃相與買舟東下再參金粟始得疑情頓釋礙物膺消一時角立禪社之士方以拈頌淵妙相高尚探師機辨河縣沛然若決則莫不欿然自失浩然歸重然師堅矢不出人前心慕雙徑雪老人住山之風卜鄰石壁塢雲埋雪灑一坐數秋逃秦之客不知有漢況復晉魏師蓋有焉崇禎辛未悟和尚遷天童英賢畢集同參寶慶融公排闥數之曰楊岐得力慈明圓輔圓終其世子發明不自悟和尚乎今悟且住浙東望剎興衰起廢需人火急以子之德之才必能為叢林理棼息諍乃不一出效賢勞索居奚為師幡然起謝即日渡江入天童凡竭智盡能一以荷衆為心者九載掌記典客歷領維那再充化士皆要職也不擇地而安之若固其他僧園物務事無洪纖情無上下靡不周悉悟和尚亟稱為老成人一衆無間言非至誠動物何以獲上信友之若此哉悟晚葉憂天童住持難其人枚卜諸賢師名三豫則悟和尚之記莂師也徵矣特師過為創時矯世退藏於密耳善夫姚江邵子得魯之言師曰自五燈闃寂學者苦志無過閉門作活於從上師承啐啄覿面當機之用失之已久天童起而重整宗風人始聞之駭既而疑終焉傳信遍中外盛矣然所為授受衣拂者以徵信非以誨貪而起諍浸淫至今不復知師承所由重逐名位如市販幾於策馬以赴不求聞達之科世諦所為比周設財朋黨宗彊恣欲自快極機械之巧者我法中曲盡其變懷寶遁世君子之恭於空師僅見之蓋知師之深者崇禎壬午悟和尚拂衣入天台師既精力衰頓不能從未幾悟亦圓逝乃重理住山舊斧焉姚江求如沈子者久參天童以理學孝行為時宗尚與師最為方外知交故姚江人士嚮師如求如沈子而師亦愛姚江人士礪名行敦節義納交姚江人士亦如求如沈子師之不忍舍姚江人士尤姚江人士之不忍去師也因其營宣家塔阿蘭若為居止復愛其在四明深處故師無謙讓之言直受而已居無何天關震於北地軸坼於南中原板蕩山海交訌而四明又當其衝環堵皆戈甲師與二三徒侶日披簑荷钁朝耕寒隴暮斫青峰未始以鋒鏑在前生豪毛規避想也方師住徑山時夜坐心怖故啓扉山行數里怖事即滅以是知師于生死利害之關早已等之吹光割水居恆之所守操履之真純不于茲具見邪順治丁亥潤公告寂師赴弔錢唐為主後事校讎其遺稿壽諸梓而後返習習谷風維風及雨師至是亦無意人間世矣由是徜徉山水或吳或越居無定跡然一往清風逸韻流響人閒時欲俎豆而尸祝師者幣相望于道故崑山有水居冰菴之請皋亭有山居黃龍之請苕溪有村居石敦之請師重違輿情一如雁影臨江不以峻辭拒不為三秋淹應之云爾特以衛真亦師故友之室潤公之房皆在武林溪畔昔常至止不能忘情所以寤寐松筠託詠滄浪倚杖而歌曰石作牆兮竹作窗天高庭戶勝銀缸覓心不得知何處折斷蘆華秋滿江傷谷陵之易改對澤國以興嗟痛師友之淪亡臨葛川而隕涕四月維夏六月徂暑師六月示寂師蓋有隱于中故不為瞿塘三峽之遊而卒奄脫于拈華院者豈漫無為而然哉師目微眇有遠神至性仁恕表順裏方敬以修己誠以接物與人言若慈嫗而造次不忘禮法規為措置動合機宜不乘人之不能掩以自取生平無矯搴過舉之行苟非其道雖拱璧以先立卻矣季布之然諾有莘之取與畫如也在崑楊子仲英拓洋湖別業擬謝遣舊住者而後館師師曰豈以安我故使人不安哉即日引歸於越早歲肆力工詩詞翰連章瀉水注而不竭參詢後不事繩削有自然風水淪漣之致猒末學不本道真味著語言文字住山後舉生平詩頌悉焚棄無存尚有記其風幡頌曰不是風動不是幡動鐵鞭打著泥牛背痛阿呵呵見也麼一犁春雨動耕鉏大隋劫火洞然頌舌是剛刀眼似錐生殺臨機用較奇劫火洞然無著處大千爭似一豪釐則師之所蘊可知矣豫交師在潤公後而師之知豫在潤公前當匡山一晤時即語公曰忞兄終成大器惜未有師耳繼豫參先師機緣不契將發去師特為豫下清素之藥勸還金粟嗣後共事天童師職豫職互為提挈事咸有濟及豫掩關邗上仍念晦堂之室不可無死心之徒移書廣陵督豫歸侍雖太白非朝堂其如入者之見嫉何一朝貝錦文成即智如潤公莫辨萋菲之口獨師始終別白之至豫繼席天童矣且為豫直任三白羯磨之事成褫豫于此而後已於乎師恩之盡友誼之周世孰有如師者乎幸師披緇而為我法祥麟耳即不幸而為士林君子亦人倫威鳳杭之標越之徹霅之晝固不足以擬之矣師卒數月其徒行巍等奉全身歸四明舊山塔以藏之禮也靈章蘊公實主後事屬豫銘豫請公狀稿就而公亦沒矣僅登五十而云亡師生萬曆甲午至今順治丁酉蓋方六十有四而化去豫少師公復少豫數年之內哭師未已又哭公焉人命脆危身非金石豫亦秋林葉耳萬有一脫而辭柯則銘之未就無以表師又何以謝公哉謹抆淚濡豪而著詞曰靈山大法千載流東雷音一震百蟄開矇弘道利生至人之事於爍先猷唯師克蒔何以蒔之悟入維泓機泉始達詞峽方傾昔在金粟頌說嘵嘵廣長師吐群言止囂瞚息閬風胡縣爾輻恥彼爭食羞同雞鶩一犁春雨偃松挂瓢風鼓虺蛇我耕我樵嗟師衣毛奚為不豎割水寧傷吹光豈窳日居月諸下土是冒師恩友義爰盡其道隨順世緣不礙不留寒江雁影碧落霞遊生同幻寄死復電枵湖山委蛻暢我逍遙四明作冢烏膽為碑師有嘉行我無諛詞高邁杭標秀凌霅晝越徹洞冰師居其右世出世間祥麟威鳳清風峻節千秋可誦揚州福國院大桑門德宗道公舍利塔銘於乎恚慢貪癡習結含生肌髓苟可以逞其心志則無機不鑱無毒不肆而不知植因如是果必隨來假使百千劫所作業不忘因緣苟遇雖至聖如佛能空一切相成萬法智而不能即滅定業也矧往來三界之人哉第比丘與世異者法應觀身如幻不以恩怨居懷耳豈遂謂夙業不今酬乎故吾於德宗道公事殊有深慨焉公諱明道字德宗族姓余江西臨江府人出家燕之萬安寺于天啓七年至廣陵初寓闕口冬夏施茶湯備極苦行衣穿肘露推衣以衣人噉棄飼餘推食以食衆時已有肉身菩薩之號出于齊民之口矣繼遷福國院僅數椽湫溢不堪風雨公居而後施者川趨雲委四方至止指日盈千乃旋廓乎基陛增崇乎像設樓閣殿堂巍峨璀璨傾動一時然公自視欿然日接納往來撫療貧病無虛晷曾無倦容逮申酉之際揚民由生而入死者十之九東南子女從阿保而出為羈俘者七之三矣然一登福國之門莫不施以無畏底于安全其有主贖而乏金二十三十者為之稱貸而益之或老弱而無歸者給以衣食或家在白雲欲往而鎩羽者周以資斧計公所存活無慮數萬口而江淮之民闔邑奉公亦不翅如僧伽大士焉公既弘慈大願利物為心時亦舉用有神發言屢中故廩益傾盧至之囊戶益滿顯人之履而障蔽耽耽遂有以伺公也不知人蓋有因權假隙侵公損公惡求多求於公者而公之於人則無美不成無瑕不掩忘身以急人之危輸己以望人之腹固未嘗懷私以造勢黷貨以干公者也於乎公未抵邗時有亡名老宿密告善士汝小泉者記之當有肉身菩薩于茲建叢林揚化導且以三百金屬之曰以此為先唱後公住福國而汝氏歸金則公符夙讖矣餉舶有婦積歲為狐所魅狐忽殷勤語婦欲依公修行婦將之來及門反走曰金甲神逐我奈何于是公命之進則進焉狐如數百歲老翁往往僧行有見諸藏閣者屠家有牛見夢于其婦曰我欲就福國院修行汝當救我次日其夫牽牛詣市牛疾奔入院婦聞之具以夢告因備香俾牛見公公曰著槽廠去牛乃點首則公德孚異類矣高興平因先帝之變頓兵淮右虎視江東雖史公道鄰以閣部之尊重以天王之命親來視師殊不為禮于公則率諸將領朝夕膜拜之豫國大王之長驅入淮也明師失守縱兵屠戮三日周餘黎民靡有孑遺焉特先日見公為公下令三軍不得入公院混公則公之慈可以化忍仁可以戢暴矣若乃孀居造像入圓通之夢以揮金貧戶修壇感大士之靈以倒橐片言而息河神之忿諍偶說而新韋天之服裳則又公之道行足以通幽及明有若此矣乃以無罪從雉于羅顧反不獲叨三方解網之仁卒以是斃圜土焉儻不以定業難逃通諸佛說則吉夫誨迪凶夫從逆者徒視天夢夢耳彼聖賢垂世之訓不幾浪談哉公世壽五十九僧臘三十有八公嘗一日命小師簡本草抄夾棒二方且曰我後時當用此不數日而難作豈公真前知與公沒之日哭聲載道道俗千餘人舁歸茶毗五色舍利見焉由是爭相淘取由灰及土以至頂禮龕室求而得者不可悉數頂骨厚寸餘彩豪奪目牙齒堅潤如玉諸骼亦咸發異香衆感殊緣歎未曾有共議合諸不壞者建塔于其院之後圃丐豫銘而藏之於乎含生恣縱恚慢貪癡日消鑠其靈光彼三寸氣息猶存非不踐藉當時傲睨千古及乎魂離㲉漏識去革囊已不終朝而形腐不終年而骨朽矣求其堅貞不壞舍利留靈何異山而使之奔海而使之立也邪然則公生平慈悲喜捨著為懿德淑行固筆難盡書第人口有碑久已豎之青徐揚豫者不于茲焉益驗哉況當怨對相尋之日乎銘以志之使六群輩與一闡提人知所創而興焉宜也銘曰罽賓刃鄴都傷佛之聖來金槍因不滅果斯彰印文俱形影相有大士顯揚土福緣興集風雨駕慈舟櫂忍櫓貧者餔病者煦哀我民直申酉膏原野十而九視與元喘與口其一存咸所壽狼折項虎戢牙幽明格異類家以何因魔遂譁呰金類指玉瑕宇旦旦宙茫茫知往業今報償恬以受慨以慷你霆擊我安詳天既定人乃革設利羅晶五色金可騫焦可泐此堅貞窮千億淨明院思修惟公塔銘惟石含玉盡天下之山皆石也而玉恆出乎崑岡惟蚌孕珠盡天下之澤皆蚌也而珠必産乎合浦豈非出者鍾天下山水之至靈而從所出者亦莫不皆靈乎有明隆萬間心燈尚微于世其以說通無礙職使如來者在三學之輩不乏其人至若稱法社特起之雄則無踰杭之雲棲宏燕之達觀可東吳之雪浪恩西吳之憨山清為尤著然諸師或過于高遠一于超放未免後昆有不可企及之歎求其下學而上達庸德而中行禪淨俱修三根普被則雲棲老人其庶幾焉故當時出其門下士如土橋如鶩湖如真寂固已如威鳳如祥麟矣即等而下之亦不失為天外鴻鳴皋鶴乃知先德所謂東土持戒沙門不如西天六群之衆良有以也夫以躍冶之金為如此況親投刀尺而受其裁成者乎則思修惟公之可傳誦于世也固宜公生武林嚴氏丱歲知出塵以母寡弟幼不忍割僅以白衣預雲棲之社至脫白雲棲受具大慈年且不惑矣又以雲棲共住規約之嚴約諸徒子不得住乃即教場山之陽就樹縛茅以居晝禪夜誦終歲不休一日忽自念曰吾墮僧數有年矣株守此不能廣求法藥以自利利他奈何奮然將遂棄去都人士聞公去則遮道留留且百方公不聽則以淨明廢院恢復挽公淨明者處天龍龍華之間道通閩吳甌越要會也然僧無郵亭旅泊而已故或循嶺而至或渡江而來者莫不煙水凄迷有同失路公慨然曰是不可行吾志乎入搆其中乞食食衆衆至如歸浣垢藥疾弗替也更慰勞之如是者十有餘年住成大院至甲申冬南北分家天下大亂公乃告寂焉惜哉以公淵沖之資淳一之性不得聯鑣乎土橋真寂輩也然化被都人恩沾雲水亦庶幾乎預十科而無忝者矣是宜銘而告來者銘曰倬彼錢唐古稱佛國道達江湖玄賓載陟憧憧往來匪越則閩淨明扼要尤號通津昔廢未修水冷雲寒厥路之艱嗟行惟難今焉來思化城幻出既宿且信夢魂俱逸胡自天移曷從地涌有大沙門德為世重化草為丹化空為碧處我雲堂食我香積今其歸矣塔鎖靈龕天龍拱衛密布香曇慈光雖掩典刑則存勒此貞玫以保後昆
