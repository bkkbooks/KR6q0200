body:
  text: 住明州天童寺匡廬黃巖沙門道忞著詩三贈緣幻法主有序法主蜀人精練三學尤嚴律部卯齋鍊臂三十年無虛日矣吳興道山纍葉祖庭也替於明而義學者始得俎豆其間自師嗣席乃不惑游議毅然復古謀諸檀越遂挽予於越之大能仁院度予既肯可即日攜杖笠過別峰予所見知法主者如此賦以贈之高其行誼為可風也凡落今時盡底刊衲衣強半逐雲殘食才接得玄沙氣臂日常然淨藏檀護戒真如鵝護雪虞名直侶鶴虞彈宅心更有難企及法道為公起祖壇莖齏菴詠為聖月錢居士賦不傍高丘不傍谿隨宜斗室卓村西聖賢勘破渾如夢身世嘗多澹似齏瓮裏沈酣悲小蠁山頭清餓笑商齊一莖我自千般足春至華香鳥又唬過吳江宿艸菴留題壁間數椽小小搆孤村蔆芡交加水到門四壁天垂宜晚望可中落日大如盆雜詠秦宮灰燼漢蒿藜隆準王孫歎莫之夢想不懷兜率好衲僧誰道失便宜盆子無功又禍民興朝只應漢真人燐膏添得滿原火報主何如一死榮瀛國為僧全后尼大元於宋豈偏私興亡自古有天命斬艾徒多曷爾為負固迻師伐不臣情原迫挾況蒸民元元總在君王宥何辜累囚婦子嬰浹旬九日苦霖蒸一日贏來半日晴蹋步谿橋休更問聽頻葉落也心驚辛卯九月予與靈嵒儲姪禪師俱以弘法嬰難至明年春仲質獄東甌谿山險遠辛苦歸來即事賦感漫成三十韻其然甘露門稱二雅合楊岐調一腔失路不分天近遠衡陽飛去鴈雙雙聰明深察口雌黃近死或吾莫汝傷壑桂塗蘭同蹸折擬騷幾待問蒼蒼不羨名高共斗齊牽犁抴耙笑同畦翻憐一海分東北黃髮番番隔望夷靈山佛法付王臣弘護寧知非善因白簡卻遭閒論議禍從天降豈由人天然茅廣住山翁吏事誰閒遠錄公風靜碧潭雲去後秋空那倩水磨礱非無籌策恿規圖冒昧貪生不丈夫借爾紅爐千尺燄黃金煆就玉珊瑚千盤未動征車輻百曲先撐入漢槎運會生當凶有百風波險惡不須嗟壯者肩囊少者隨師生八九日登逵山陽僕尚傳千古風割馬頭賸有思為緣一字入公門喫盡波查不用論桃放出莊明十里無因歸主亦銷魂山城無處不兵騷埜坫荒涼半沒蒿日落孤亭悲旅況還傷春燕樹泥巢官橋墅柳短長亭去國饑民倍旅萍差喜眼前生計復寒煙隴上麥青青雲昏白晝儘愁添那更官催程限嚴鴈蕩好山看不諦籃與驀過老僧嵒一宿永嘉待質偵喧傳士女早傾城金槍何事仍懼難活佛由來浪得名公庭羅織燄如山誰道人心只等閒一自頑皮經烈火丹砂信有九回還阿旁那得性從容無猒庭觀鬼亦忪卻笑停囚偏長智三關歸去設黃龍骨堆平地起何來五百生前薀業胎報得兩籌青竹篦懷春石女產麟孩似還未是定淆訛屈棒有人早喫何我自不偏渠不黨蒿枝長想拂滹沱鈇辱袞榮總是虛泣麟譏鳳待何如惜來鸞翼甌傷去侃論曾聞李拙予李公諱惟越溫人也仕明官至掌科帝座何緣犯客星鼾呼御榻睡嚴陵乾坤老我千山走回首富春百念興法社危如漢祚傾興朝每憶禹諸丞揚舲擊盡中流楫誰羨煙波釣子陵錢塘歸櫂始停綄還向臬司禮問官囚執可憐三界獄無生幾箇話團圞絲縣命若為傳衣古聖當之亦暗欷危嶮路還千里外龐眉驚作錦榮歸杜鵑風雨亂枝頭行盡江南麥未秋譚笑對清往昔債百城還怪一生遊往業今酬莫浪箋投身鄴縣豈徒然任公不遠拋香餌爭引魚龍出坎淵勞生待砭痛加鍼結得冤讎海樣深縣首尚銜師子恨弄潮人定死潮心九年壁觀苦生涯積怨誰知是禍階毒藥到頭甘自飲累人千載又皮鞋投閣區區墜子雲膏明自著燼來焚短檠果克光長炤敢惜如今世所云忘身為物語呶呶垂手何人肯棄拋驚死華亭歸去客蹋翻船子打翻橈支解忍僊幸自甘大千身命舍瞿曇薀空端的誰為我手刃春風也太憨大千朽故宅方燎乾艸誰擔入不燒得失未忘情見在渾鋼打就額頭焦畏洩春光口欲緘語梁無那燕喃喃盡情說似人難解珍重休將空夢函次畣樓霞浪禪師附來韻常憶此宗百怨門橫身為物錯其根六遭服毒曾無我千古皮鞋空斷魂賺殺不妨頭角異明來卻喪我兒孫如今奇有驢三腳弄景偏令海嶽渾揭地風翻白下門參天劍故列牙根直將身命扶宗教那顧人天喪膽魂似我難方曇晦杲如君真箇仲謀孫龍泉謾說雙薶獄光射斗杓漢亦渾壬辰夏五賦壽聞聞上人六十甲子巡周三百六龐眉豈是乏同儔塵勞桎梏人如蝟一衲奇君百慮休延促時因情念別念情消處古今空寥寥天地餘雙眼似火榴看萬井紅三歲觀河六十均塵沙劫豈異今身年年五月蕅華漾時有香風散白蘋贈光福妙高臺法師臺占妙高迥更幽蘿龕鎖斷太湖秋青松難並春華賣頑石空教亂點頭贈賓化禪人何緣化外盡來賓主作塵中蓋有因無米能炊香國飯平教大地沒饑人九日過婁其章胡給諫以詩見訪次韻復之六宇同昏颯颯秋堯天尚憶奉宸遊批鱗直遂檻曾折擊楫歌長響若收且混樵漁尋埜客幸迻門徑近滄洲最憐此日茱堪看無奈黃華嬾上頭蕭蕭落木競隨秋獨泛玄槎象外遊信意冥鴻唯我適瀰天沆瀣許誰收飲酣陶令心非酒樹挂壺公春滿洲牆塹固然勤白社更勞一擊破關頭楓入吳江處處秋輕舠快挾傍僊遊橫揮麈落三無漏縱布詞傾六不收捩轉夷亭通汐浦鑠乾婁水見瀛洲箭鋒莫怪能相拄布袋盛錐合出頭癸巳三月十九之作蒼梧望斷翠與塵愁聽子規十度頻艸木爭承新雨露園陵誰弔故君臣曾因血詔傳三月每蹋芳郊怯又春欲得悠懷消息盡東風休遣到平津漢移魏易晉羈俘殉國吾皇曠代無靈爽飫聞誅賊子陟降時說警神都昭昭日月宣明德閃閃風雷下使符獨恨聖神嬰巨禍哭將滄海淚為枯聖主焦勞十七秋誰憐君國共分憂補天莫展女媧手營堀偏工狡兔謀舊壘僅存空社燕新魂無暇問湘流河山破碎何人過地老天荒恨未休閻浮天子電中觀今古興亡半局殘會見銅駝埋晉代早驚玉闕燬長安金甌欲破群毛泣泰嶽將崩一柱難稽首大行皇帝舄不須誤國罪千官若干大澤歎龍亡豈只吾君賦恨長畢命臺城梁武帝隕身忉利頂生王乾城乍涌浮幢界蝸國相爭古戰場萬歲山呼忞忭拜奉攀玉輅上慈航題畫喬林簇擁裏群山門掩清陰白晝閒應有逃空人打睡惜無排闥一開關題入山圖千曲清谿路百洄孤笻直上此嵒隈好思船子臨岐話莫入西山更不回題千仞岡姪水月居屈曲溝原數版橋臨門水接大江潮名山何處堪招隱玉在秋林艸自夭次答麗祖方居士古今見謝時三世同帷幄達法本唯心境緣何好惡如彼運斤人鼻端恣揮霍良由物我捐豈曰心眼廓黃海有奇士澄襟江漢濯千聖思汰剛今時盡裒落無乃心慍煩聊解不為藥癸巳年冬死心堂建叔則李寶應以詩見贈次韻復之布金煩長者論道媿瞿曇幸傍香嚴室無勞虎護龕出誰能不戶北概認為南歇處聊相指分燈恐未堪又欲識孃生面須空鏡裏天緬懷神共王超步力還綿依真多礙俗在欲孰行禪邈哉林下士猗與渭濱賢別唐人韋蟾贈商山隱僧詩二十五絕附原韻商嶺東西路欲分兩間茅屋一谿雲師言耳重知師意人是人非不欲聞歲月頻將落葉分亂峰不禁鳥辭雲耳根喝斷馬師後未信人間別有聞山林無意市朝分十步谿來五步雲一自千峰歸臥後木雞夜夜曉窗聞天南地北一區分為雨為晴幾片雲拽得虛空雙耳脫難陀絕聽卻能聞山泉筧到小廚分飯罷經行復聽雲老大惺惺能矍鑠聲由觀察不由聞日掩柴門過未分乍開薄暮為歸雲根塵似雪消春水只用心聞不耳聞四序窅忘至與分生涯一钁日鉏雲了知撲落非他物不猒啼鵑帶血聞險韻無朋久不分拋來詩思冷秋雲光通淨極如何也砌下螘聲鬥虎聞爐篆煙消夜欲分一聲鶴唳動寒雲空山響畣元無我過誤誰云是蓄聞鐵頭茅屋一間分半屬山僧半屬雲今古寥寥空四壁不知何法得留聞等將三世剎那分出沒還如松際雲萬里神光圜頂後不由聲響豈由聞電拂群宗泯別分空雙白眼視流雲千差坐斷三更月攪海風號亦可聞劫外今時總不分孤笻一畫斷天雲髑髏識未全銷盡枯木龍吟豈易聞深谿杓子玅難分不舀清風便舀雲色後聲前忘借借眼根還作耳根聞春冰泮後澗流分好鳥山山喚煖雲頂戴春光無厚薄好音分得大家聞藤華落盡綠筠分閃閃人間偪火雲山茨何煩嘲熱客從無剝啄到扉聞炎涼世態暮朝分山舍悠悠只白雲黃狖自啼霜自落今秋不易去秋聞千峰葉落岫難分塞鴈尤迷楚澤雲將謂山家消息斷清香別有一枝聞事事山家有寸分澗留明月樹留雲興來不發蘇門嘯逸響恐驚天上聞清風明月兩無分邀到山家共伴雲風卻多情翻夜籟月窗幾度送清聞隔岸家山到莫分幾多谷口鳥迷雲等閒蹋著來時路依舊谿聲不斷聞無心待把祖燈分浪走禪流駛若雲競向海門遙悵望何如一見越千聞爻象未彰兆已分祖機唱出更和雲心華不審誰開燦鼓打南天北地聞宮商調合作家分瞥爾情生萬里雲魯祖經年長面壁青霄韻出幾人聞谿橋蹋斷祖源分一笑風前起白雲火發新羅唐土熱從來濟道出常聞金沙混處燄爐分噫氣衝開南嶽雲一曲無生連韻唱總教大地入圜聞除夜慧光知浴六十詩以壽之臘盡人間甲子終晨光來日更融融淨華折得春無數定水長年洗太空乙未春孟值止水明侍者四十初度念其相從最久賦而志喜亦志感也青鬢相依古越州霜豪又見一莖抽八還古教心心炤九載巾缾事事周般若海同今日泳金剛種已百生收風規自著休方我老大徒傷鶴髮稠大威上人六十詩以壽之戒耨身田定水盈叢叢忍艸競頭生春光六十人間度知著伽黎是幾身住老菴居歲月深階前道樹半雲侵抽條結綠年年事還喜歲寒不改心壽吳爾世母貞淑胡孺人撫就遺孤祀克承短檠幾對夜深燈瓊芳不共閒華老三壽何勞頌作朋螓首孀居白髮稠丈夫心見事難秋鬚眉堪笑風塵客一姓從人不到頭玅體金剛喻莫方那從甲子記春王古今一念銷鎔盡未羨蓬壺日月長丙申秋日壽經國王居士五十海籌添得十洲春穰穰豐年萬室均封祝謾勞三獻頌普天同此慶佳辰休驚百歲半消磨三際由來一剎那去日還同今日日昔人何事驗觀河浮瓜沈李日長悠詩酒賓朋樂事稠放卻楊州騎去鶴人間且住五千秋何年海上遇安期傳得僊方善自頤五十貌如三二十卻疑王遠是君師壽德輝何君六十爭奇晚翠賦瑤華君鬢蒼蒼我歎嗟孝可作忠唯護母才堪謀國僅施家綸收渭水辰方早日挽長戈景已斜漢自需人馮自老白雲蒼狗類如麻晦中明上座曾親炙先師密老人于天童復為山僧監廣潤道峰二山院事今住台州未久頓興法輪古寺于埜田蔓艸之間嘉其有道行詩以贈之叢林戶說老耆年小試天彭結有緣不蹈西山高隱躅肯隨保社拍盲禪油油嬾向時流道莫莫還為智者宣佛手未申驢腳展法輪早見佛燈然伏枕吟八月有事武林歸度錢塘病大作舟過山陰依止故人六度菴中偃臥焉恐其將至于漸因求木直裰子不覺漫吟遂成九絕鶴骨病來瘦可憐自知身半入黃泉四方衫子爭免得佳話何人解共圓熱發如登萬仞山一回著腳一辛酸幾多喫盡羊腸苦依舊將身試險巒五度經來況抱痾雅情轉覺故人多堪憐彼此染霜葉只恐相將欲去柯晃晃青燈挂戶楹幾回冷眼覷還明大梅何事貪聞鼠拋卻常光認物聲中秋十載客途看此夜懷深出戶難獨喜清光曾不減萬千人尚倚闌干一息懨懨絕所思隱几塔若坐忘時有人卻問生和死點首與他自合知老僧病到骨稜嶒從者病來亦莫興攢簇果然俱不得何常爾病我肩承轀涼車子雜鮑魚愁斷祖龍去國殂我已無家天外客何山不可窆寒顱垂竿幾待錦鱗來便欲將身入水薶我有三三金鳳子散為霖雨樂何涯贈天石施居士神鍾河嶽器難評屬受靈山願獨宏衛植金隄匡我法文滋豹霧變群英才高眼自空當世意廣心宜小渤瀛何日臥龍潭起蟄沛將霖雨惠蒼生丁酉眾為山僧卜壽藏于玲瓏嵒下作西嵒隱詩三十絕謝事天童十一秋重來晚暮更何求攜將朽骼依先子返本或當正首丘師子原開在水西南山敢望北山齊胡家曲共丁年唱尤喜臘鈞六二時綢繆未雨得從容誰逼生蛇便化龍我亦乾城如蜃結玉礱金鎖待關空非心非佛難名邈魄邪魂兮莫浪猜華落華開誰是主謾勞鬼伯苦相催何邦歸去待何年卻把閻浮九土穿撐起空王空界月從教任運落前川盡空法界一方墳身後身前孰與論可歎投湘人去後大招不起遠遊魂牛頭沒了馬頭回滑似泥鰍上舞臺不信遼東華表鶴去家千載始歸來誰搬雜劇不收場燭燼中宵好主張休俟臺空人散去牛山徒有淚千行億須彌積多生骨窖掘浮幢未足埋憑仗涅槃山色好大家歸築臥雲齋揣空出骨鑿空藏此地無金十二兩堪笑人生恆倒置幾多剜肉作成瘡暢他紅爛好平窺風日幾經炙又吹特地開窀圖掩卻水晶瓮裏著波斯雞峰未死先趨滅熊耳埋藏後脫空我本不來今不去且栽松竹引清風休嗤死了仍全活欲活先須死一場多少生前無活路隧泉擬見本生孃特石何須費裹包閒名深媿未全勦他年只恐成狼藉普請諸人力下鍬明是百年需用物南陽畫虎卻成貍何如太白親拈出窣堵高高八尺奇一二三文起話端屍骸遍地露疏山天童著意為收拾匠作依工取次還本來纖芥物全無平地何須起骨都只為巧遮人世眼假銀城卻賣單于紫雲如蓋覆金幢無盡真燈照一缸枯骨謾云空點綴法身元是一枯樁山藏力負壑能趨唯有賴頑是者驢一道神光同皎月枝枝撐著玉珊瑚麓眠雲子千山曉松入風聲萬壑哀謾道來時無口說須知淵默卻如雷雲攢白晝暮煙迷無縫誰言號難提充國黃金都蕩盡還他密室爛如泥帶質兼文式樣高煙霞星月足相招臨池摹得同真本傳到諸方亦古標重峰仰對臥龍蒼古記喧傳在上方論劫山靈長護惜底因蒙昧發天藏玲瓏高倚卓嵒根竅穴分明正眼存怪道當年吾祖傑等閒呼作破砂盆深藏玄豹淺來麙萬本修篁百尺杉天設鸞谿為玉塹城包太白更嵒嵒左谿名凰下以鳳凰曾下此谿也我師南院祖東山咫尺禪宮僊梵寒心賞不多天子至龍臍隨葬耳隨安東山密菴傑祖塔也南院密雲悟和尚塔也皆在望中清谿流碧界煙嵐錯雜松篁覆一龕幸是高嵒人共矚不勞碑版揭朝簪鬱蔥佳氣布香曇洞壑平如古泐潭慚媿兒孫成隊出令人轉憶大莊嚴吉祥殊勝口難評陰亥偏宜丙合程術果形家真不謬一燈終古應長明攪海狂風吹不入谿華流出洞中春方來欲識西嵒隱好向南天看北辰壽法起嵩乳和尚七十望重諸方臘日高飲人以德倍醇醪植扶宗教東山謝培養真元五柳陶漁浦萬家焚業網赤梢千尾奮金鼇欲知化雨沾群彙頌說長河沸似濤寧宇居士與淮北嵩乳和尚同庚七十因隱書記為其乞言詩以壽之法起嵯峨東海東生緣甲子喜君同泗州大聖空為量著意香華歲歲供一日諳機早百齡春秋況復閱多庚劫空前事如相委須信當生即不生
