body:
  text: 住明州天童寺匡廬黃巖沙門道忞著記重修城南海會寺記都城之南有寺曰海會者創于嘉靖乙未之歲世穆二廟咸命僧代度於此至萬曆元年慈聖國太后復發帑金命內臣周宣范江攃其圮壞而增修之江陵張相國為文紀其事詳且悉矣緬惟神宗顯皇帝臨御天下四十有八載厥聲匪赫赫也厥靈匪濯濯也然而歲稔時和民安物阜家邦以靖壽考以寧是遵何德哉推本而言實由聖母垂範宮壼凡百施為無非慈祥豈弟之仁福國祐民之事神廟惟能孝思無斁故陰受其庇廕而不知耳乃後世弗循也誤聽訛言悉舉纍葉所崇之象設萬夫牽挽出諸禁門燬為通錢焉及當陽九之厄也報亦如之語云君以是始亦以是終可不戒與今上受天眷命撫有萬方其于致福未索索然也特於我法不忘佛屬維時順治丙申歲久寺頽都人士謀欲鼎新乃削牘命本寺僧走江淮請今憨璞聰公住持是剎禪衆川趨宗風大振丁酉上幸寺延見聰復召入禁庭問佛法大意奏對稱旨乃命結冬萬善殿賜明覺師號日昨上謂忞曰朕初雖尊崇象教而未知有宗門耆舊知有宗門耆舊則自憨璞始憨璞固有造于祖庭者也由是觀之聰公非明道蓄德之有素何以導利人主人主顧久而景慕且殷殷不解于懷哉公住海會凡五載殿宇廊廡與夫鐘樓鼓閣之屬率煥然一新多三韓耿公樂助而檀越羅一清實破産隳家力襄是舉者今秋庚子功用告成一清念因緣之不偶締造之維艱也丐豫言記之將以昭示後人使永為十方常住不墜風規焉庶檀膏信脂為不唐棄云於乎劫火洞然大千俱壞須彌巨海磨滅無餘矧一四天下中有閻浮提閻浮提中有大清國大清國中有海會寺創之自世宗修之自神廟以及今之重修皆未百年也興廢圮成曾不旋踵如此欲以豫言永之不亦迂且昧乎然則如何而可傳曰人能弘道非道弘人是在聰公與後聰公而起者之品望去存則海會之隆替可十矣聰公望天童悟老人為四世孫蓋視豫為猶祖也古齊安丘縣準提菴記安丘多高門巨姓而忠孝節義之家首推馬氏馬氏一宗四世祖孫父子兄弟五登科甲甲第之穹崇閨門之雍穆麟角鳳毛之相似固矣乃奉佛逃禪則又咸有一德何也自非善根同植悲願夙承曷以臻是故是菴之建雖由勉初廣文與其室人孫氏為子孝廉諱長春者廣嗣胤而崇信淵源則自大中丞定宇先生創發也先生廉仁徹骨簡在帝心生子北溟見素二公同登神廟壬辰進士北溟歷官至祠部郎中早卒勉初蓋其冢嫡云見素尤深禪學歷官至刑科給事中以母老終養在籍二十年溫凊如一日甲申之變避地句容未幾掩息遺言葬骨於此以江南一抔土猶為大明地也後順治三年出會平度州賈總憲思塞先生于勞山笑談終日勞山道士與公相識者亦往往見之謂公非心宗有契而能若是乎矧我剃染者流顧耽著乎死生哉故居是菴者當觀我由四大以假合菴由磚瓦木石而禠成皆空如乾城如幻士而無實體者也誰為能住之人所住之菴人菴不見則上絶攀緣下絶己躬然後回光返照冥搜力索而親達乎本地風光焉則豈啻神遊山海將見化現無方通身手眼可改禾莖為粟柄可易短壽作長年可決砌下龍淵沛滂法雨可拈印臺文石剖示全經即我之神通為準提之妙用奚有豪髮之間然苟或受施生心因菴起著昧井藤之危脆忘白鼠之交侵一朝報盡正恐樹耳酬餐得不貽長者之多纍哉是居者有損有益建者復有利有害矣菴距城東南一里前有高岡隆然特起周方而四正者印臺也印臺之陰地最低窪故城西諸水咸赴於此匯為龍淵古老相傳深莫可測而涸於萬曆年中然秋潦未退亦方舟可泛崇禎十三年始建菴其上今榆柳繁陰蔽虧雲日青齊絶少山水此實佳精藍也泰興靈雲禪院記寶祚乏千年之國金貂鮮百葉之家世間無常國土危脆皇皇佛語詎不亶其然哉然世固有高人達士舍宅為寺如晉之王右軍許玄度輩剎竿巍然至今無恙者則本其人之願力堅強故不為有力者負而趨耳泰興靈雲禪院者距城西六里緑野平疇市聲不到橋流水止塵壤靡侵足稱阿蘭若法菩提場矣初名圓通菴由戴氏思敏孝廉君始君于萬曆丁酉歲舍地三十畝創宇延僧為焚修計逮經申酉之變則孝廉已即世子載甫又舉義沒于軍當是時煢煢厥家且為風雨飄搖奚僧廬佛屋之與有乃其媳廣道人慨然發丈夫之志興繼述之思更置田三十畝僧寮若干楹就金山敦請箬菴禪師駐錫其中易以水月之顏而叢社規模始駸駸有垂成之勢矣嗣後則有千仞岡公別峰秀公辛舌某公相繼住持鯨音不斷法鼓常鳴雲水來者衆漸多居漸廓制漸備而道人矢志熏修行彌劭願彌堅心彌大復舍莊居一所為中田之廬又感天心年茂才與邑中樂善之家共舍田百餘畝相與助揚激勸以成殊勝功德嘻懋哉皆可謂甚難希有者矣計菴之始自前丁酉暨今甲辰歷年六十有八載額題凡三易住持凡五易廣殿明樓安僧可數百瑤田香界食指可三千莖草化為寶坊給孤過于祇樹豈不創者難成者猶不易與於乎託孤寄命臨大節不可奪先賢且不謾為許可特揭而歸諸君子之徒矧道人僅孱孱一弱媳乃能強宗不與謀悍僕不得問直繼人之志述人之事于家國搶攘之秋使生而鬚眉當六尺有託百里有寄肯自謀身而為方命負孤之事哉非願力堅強大節靡回曷以臻此今道人復不遠千里走使鹽官問記于豫者得無將來闡提之啖啄可虞思借言以垂永久與夫善人君子尼宣有莫見之悲當吾世得見慷慨磊烈如道人者是亦君子徒矣聞其風有不興廉起懦仍鄙薄以居懷且不可立天地號為人況覬覦三寶生破滅心其若韋天之寶杵何勉矣道人願力堅強即韋天寶杵當有默而呵殿之者謹合掌贊美以為之記重修石霜慈明圜祖塔記吾宗自達磨西來六傳至曹溪則得道者如林八傳至馬祖則普天遭踏殺十一傳而至臨濟則陰垂大樹遍界清涼自此英靈蝟出本支百世奕葉芳聯此玉音所謂慧雨普施于一切宗風常勝于五燈緣衍法之獨隆斯傳衣之最衆大哉王言可為吾宗定衡矣慈明圜祖者望臨濟七世是為汾陽嫡子捩轉黃龍之鼻故肆譏訶摧殲諲老之鋒平空脫賺劍橫室內則戈戟叢生榜揭僧堂則波濤沸起每每一時法喜的的從上爪牙百丈得大機黃檗得大用師其據虎頭收虎尾電卷而天旋者與前後四坐道場真歸興化塔建石霜歷宋元明以迄今上六百載鳳毛麟角繼繼承承復二十有七葉揆諸二五參之千七百則慧雨宗風未有如師之光明盛大者也第石霜交荊吳僻壤年深人遠興廢不常歲在丙戌爾瞻尊公始循四衆之請住持斯山于時香臺寶所亦越榛莽況靈塔之毀于侵伐而往迹莫稽者乎故星霜歷重六幾經鉏搜钁討乃得于寺西之原由是罄竭衣資鳩良工礱佳石又二年而舊觀始復則公智亦盡能亦索心亦苦矣是故叢林頌公德者不曰兄弟重添十字則曰同心更著一儀山僧直謂髑髏眼裏春風再動應知從前五葉之華遍界吹開則公之福我宗圖不綦大乎雖然無影樹下黃金充國徒向南北潭湘根尋源問何如正法眼藏滅卻瞎驢之為愈哉既從地倒還從地起三聖瞎驢舍公奚問哉公為誰祖磬山禰緑蘿望圜祖蓋二十六世孫云重修笑巖祖塔記靈山正法眼藏首付摩訶迦葉六十五傳以至我祖笑巖寶禪師寶出幻有傳祖再世而分為二派一曰天童悟一曰磬山修天童出大溈學三峰藏東塔明徑山容金粟乘寶華忍龍池微雪竇雲鶴林門庉村賢通玄奇與忞忝繼席天童為一十二人磬山出陽山授竹林豫報恩琇山茨際南澗問又五人故今寰海宗工凡弘濟上者皆師後裔師唱滅萬曆辛巳葬燕城小西門外汝芳羅大參實銘其塔矣李闖犯闕國變塔幾毀賴漢萍傑公保持之厥後䒢溪森慧樞地增土垣而塔免芻牧之虞今順治十七年玄水杲與憨璞聰共捐資重廓地若干畝礱石為牆中闢三門內修房舍可寢可興規制遂為大備聰容孫杲微孫森與地琇之子而傑則久參天童稱角立者也皇清啓運今上問道崆洞徵車四出一時報恩琇憨璞聰首膺大覺明覺師號䒢溪森慧樞地留供御園玄水杲亦屢蒙顧問説法禁庭不數世且名聞京國道契宸衷焉抑知昔在中葉宗圖九鼎係吾祖一縷之身乎夫世運法運均有盛衰當其盛時能憂虞而密挽之可使不衰當其衰時能堅志而力持之可俾復盛今滋盛矣吾恐其衰也是在後之密挽而堅持者平江靈鷲寺十方僧田記小釋迦之識臨濟曰一人指南令行吳越而應之者蓋風穴也然自風穴後今七百載而天下之憧憧求法者咸於吳越乎是來豈大仰之讖有以肇之與在明中葉祖道式微光喜朝湛然澄師與先師悟和尚始號令吳越間遂風聲稍稍起自先師移主天童則學者奔走逮如水赴壑衆幾三萬指多有來自三韓交廣外者概稱説平江之靈鷲主者接待有方情至順治丙戌豫亦謝事天童矣又五遷至吳興之道場山而守靜祥公乃來言于豫曰姑胥城東北隅有靈鷲寺者應院也崇禎十三年檀越某寺衆某延祥居之即大殿及僧房五六間為十方院會雲水麇至則合謀聚資復今禪堂客舍諸寮尤苦饘粥有不繼時則又因唯一潤師之唱募置僧田若干畝今願雖未充事頗有緒乞師為祥記之歸且劖之石更以施者之名載之碑陰庶有力者不得負而趨焉豫為正告之曰僧奚以田哉僧也者淡然無所營于世泊然無所介于中衣以雜碎焉而鮮華非所衣矣食以分衛焉而煙爨非所食矣居止以樹下冢間焉而棟宇榱桷非所居止矣蓋彼方視四大為毒蛇五蘊為怨賊六入為空聚故其于三界也則火宅之于身世也則夢幻之于形骸也則土木之時或尋求師友而決擇身心也則茹冰飲檗靡所辭立雪斷臂靡所吝時或志證真常而思息苦輪也則傷白鼠之推遷念井藤之危脆寢以之廢餐以之忘時或垂手入廛而悲心拯物也則開妙莊嚴路閉三惡道門天堂地獄而皆往虎穴魔宮而必赴是以僧之為道尊僧之為德備而天人龍鬼阿須倫之族于僧有禮敬供養者莫不祐臻此日世度他生一如大象藏龍鬥之香設若燒時則興大光雲降香水雨身衣宮殿其有觸者悉皆金色此僧所以為世植福之田而世無與僧為田者顧僧何以有田哉有之自興崇三寶之佛心天子菩薩宰官與廣行檀度之長者居士耳其始也代分衛一精修其終也啓晏安資攘奪俾僧與俗卒陷泥犁之苦者實田為之厲階也田曷以記為祥公曰大哉言乎自今僧俗聞之將必有以大警矣是則天下精藍之有僧田者得斯言而與有永賴焉詎曰祥之不朽也哉豫遂無辭以拒公因筆以為之記吳興竹溪禪智寺長生田記吳興為東南水鄉之國居民富而樂施故僧廬佛屋與民居錯置井閭間殆猶星分棋布然者然而密邇市里恆為富室豪家并吞者半而富室豪家又以破滅三寶之故卒破滅其家族者亦半獨郡治之南四十里為竹溪鄉中有寺曰禪智者自唐至今幾千百年雖式廓虧矣而殿堂樓閣尚兀然于菰蒲墟里之中豈天龍呵護之力與抑竹溪多仁人君子踰于他里與寺無恆産順治丙戌秋懶牧泓上人領寺事始節衣縮食合諸檀施之半置田若干畝用贍十方往來且取其生生不息之義故以長生名之而問記于豫然後歸劖之碣以示後之住此者俾無失墜亦杜塞夫若并之原其為十方計長遠也悉矣雖然豫聞諸佛説末法比丘行十六惡律儀則我法將滅十六惡律儀者所謂經營産業畜養牛羊之類是也猶慮我儕比丘著于四大復有日中一食樹下一宿之誡凡以為此諄諄教敕者誠欲吾輩除貪去著遺身忘世務使生滅滅已而後寂滅乃始現前耳今上人口實是營皆生滅之法大非釋尊寂滅現前之道奈何上人則曰佛以法住法以僧住僧以食住無食是無僧也無僧則無佛法無佛法則人天眼滅眼滅人天則從冥入冥未有不墮於險惡大坑者也是故經言閻浮提中若無三寶住於世間一切衆生求輕地獄且不可得況復人天師取其中者正者以弘教法我儕小人師其纖者末者以福人天不亦可乎豫由是益大上人之言謹序次以為之記九奇遊記往豫二十三年前始擔簦造匡廬聞有癖山水愛九奇松石譎怪狂叫其下三月鄰人不能忍相與諍而鬨不已者豫時心薄之以為比丘雲鶴者流奚以樊若籠哉越二年豫散步開先松陰邂逅一臞山衣澤舄從西嶺來蹁躚過豫屬天空雲淨矯首望諸嶠昺然金闕前開豫時不覺劃然長嘯而山臞徑前揖豫刺刺詫九奇拉豫遊至再因共小立問從來始晃然耳昔名而識所謂愛九奇匡公者後豫因事登山為一過九奇公時遘豫若平生歡汲澗瀹茗三四甌即導豫緣磴循崖造絶㠔指石若戶若臺峰若扇松而蜿蜒若虯輪菌若蓋若蒲茵者敦杖而四顧徜徉德甚豫時為一破顏非所嗜也自此十餘年豫多方外既無從至九奇考石問水況又初不經心故今匡公日夜所摩挲玩索遊目所一見咨嗟以為冠世絶境者豫皆瞥然陳迹矣但記山島竦峙上干青雲下屬江河有如匹練抴而東趨者大禹疏鑿之江也復有如天城寶堞屹立空際而湛然安住者高廟龍興所敕建之塔若寺亭若碣也過此而往則青冥寥歷委蛇蹙縮若起若伏若滅若沒皆渺瀰不可測識況記之哉辛巳仲夏豫自錢唐歸隱匡廬山居無事因為汗漫之遊于是復過九奇則谷之涉而入者愈深徑之由而造者愈窈窕石之怪而刻削者愈崢嶸壁之蘿封而蘚食者愈斑剝木之春而葩秋而實者愈芳烈而旖旎居而洞房嵒突坐而淨館明軒莫不視前有加焉是日也節序溫和從者皆能詩豫遂因匡公大發其天藏而博觀之凡計一壑之中左右陟降無慮十數回薄然而東之西繞脈理井然登者不再登臨者不再臨惟覺岑嵒參差頃刻異狀而藤林磴道又皆淨瑩可鑒故益奇也俄沙彌報茶熟遂還憩舀雲軒則楚水吳山錯如繡競交舞夌亂推排入座豫方怪其唐突亭杯欲問適有片雲冉冉從水口來斜揮倒抹瞚息瀰漫豫既欲問忘言遂失江山所在乃笑謂匡公曰君之九奇何如哉公擬置答豫即呼杖揖別涉園月室記舟過峴山之西約二里許為夾山漾漾中天水相摩如鏡環漾皆山山光歷亂山影參差舟行五六里皆漾至老樹塢始漾窮而溪盡焉於是舍舟而塗塗行三二里陵回阜曲山益巃嵷翠潑松篁眉端欲滴隱隱有亭榭樓臺見於林薄者蓋潘氏天行子之園俗所謂桃華塢也塢踞鹿山之前簫篁嶺之右疊嶂圍空層巒繞碧無幽溪而有清流激湍映帶左右無怪石而有虎踞師蹲之培塿學學而堯堯無千戶侯富饒之資而有千樹桃千竿竹含風而引露是皆造物者與天行子互相裁成而補苴其不足者也故來遊者莫不歎其奇勝樂而忘歸天行子曰未也乃開關延客揖客而坐于昏幽之宇窅窅冥冥客將反走天行子曰姑待之少焉微明生於匕寶室白焉寥寥如東方之欲曙既而漸明漸曙皎如清秋之月出于雲衢之上華支弄景四壁垂陰悉而數之山川草樹雲物化變寫倣無方客且以為神遊蓬壺之境身入輞川之圖似真似幻則又莫不嗟訝天行子月室之有巧術也山翁老人乃為之解曰非巧也由子之精神與室之孔竅塞至而通鬱極而暢者也子不聞乎其次致曲曲能有誠誠則形形則著著則明矣今坐子明軒之下淨牖之前天光非不下屬也萬象非不森羅也然而形弗著著弗明何也光散而不收神揚而不斂耳然則妙道也者豈曰萬象森羅之昭著云乎哉心靈也者又豈曰天光下屬之分明云乎哉乃喪時費日入作無從又何也則不憤不悱之故也於乎由天行子月室而通之天下之妙道其庶幾乎五蓮紀勝書稱海岱惟青州然差足以當之者東武也東武之山如障日馬耳九仙五蓮皆層巒疊嶂聳翠拖藍有從來人迹未至者而九仙為勝五蓮雖源溯九仙九仙猶含章在醅五蓮則發泄盡矣故五蓮為尤勝從東武來遊者路自榆林溪口至寺約十里而近初稍平至一里則緣幽澗入深林林木既蓊蔚益以蘿纏蔦結愈鬱密當春芳載吐則奇葩異卉莫可名識唯辨杜鵑如血紅映遊人而已澗石大小磊磊然有如几可坐者如榻可眠者如室可興居者如屏若障而可題可跋者有寬平如掌足容數十人者又有碣立如老僧三五輩下而來迎者行五六里越十八盤始明廓復折而之北則一峰卓立百許丈上凌霄漢下有老屋數間隱隱依嵒根則古之雲堂寺也陟磴升高數百武而後光明寺乃見焉到門卻立則群峰峭峙衆壑攢流左聳望海右擎天柱間以燈臺玉燭羅列森秀踞中鉢盂一峰尤倣若日出連山月圜當戶者寺後為大悲嵒嵒之高丈不盈百登巔而俯瞰其背則獨拔千尋無著攀攬處下為大小馬椿峰為師子窠為磨劍石為硯池石面東為蓮華峰為龜峰為石樓石船石門石塹石之磊傀而崢嶸者殆如林斯立矣由大悲嵒東岡而上登望海樓峰則汪洋巨浸一抹浮青諦視琅玡靈山諸臺島直如鳧鸂鷘浩蕩波間彼萬斛艨艟之蠕蠕欲動者又不足言之也由大悲嵒西距天柱峰之北垂可一箭道寺僧斫石為垣高二三丈延斜十餘丈上有亭臺閣道極其壯麗旁開一門從門納階由階下塹復西折而南乃天柱可登然非側身猿臂互相汲引莫能造也既造其巔矣則復極平曠千人可坐甲申之變賊入東武哨兵至山鄉民與寺僧咸竄是中相守彌日環視無由上竟去內有石小池圜如鏡面湛爾一泓荇藻絲絲浮動覺有魚行其間者因憶往遊八閩道出江郎石下人言曾有錦鱗數尺從巔飛墮驗茲益信西下天柱復登望月樓峰則僅隔九仙一岸彼蒼此倩爭出靈奇競相結秀下有仙人碑又下有千層塔皆岧嶢數十丈極其穹崇高出焉從望月樓南行一二里至前岡則延連一岫兆分其五仰視則青天一線俯窺則下臨無地自此至東綿亙數里一如大悲嵒背千尋蘿壁萬木琳琅時有鷹隼翔鳴嵒半諸餘猿鳥之屬窅然絶迹矣山本舊名五垛神宗顯皇帝敕改今名賜今寺額為奉安御藏之所也天井灣遊記諸城日照之間有山曰九仙者周方百里而廣潮河出焉河源發自天井灣天井龍淵也歲旱官民恆禱雨於此禱則輒應古老相傳有投物是中者往往獲諸海堧及鐵溝河內皆相去百有餘里則已通潮汐矣乙未豫度夏五蓮同山中人往遊焉五六里外即深溝斷岸蹩躠難前復迷道翳林莽中乃攀蘿捫葛上一高山循岡造極則潭反在下嵒更蔽虧其半殊寓目無從還步高岡南下深澗跣足順流而西冷風吹面草木皆腥轉一巨灣則兩嵒夾連如巷計九仙山脊之水無慮數十隴咸匯於此時方盛夏亢旱尤尚滔滔汩汩當雷雨崩騰之候又不知其湓涌何如也巷窮瀑落去潭仍百尺蹲嵒俯視正環顧無策忽聞嘯聲傳響從者已有徑造其庭者矣則人人勇往爭先亟趨故道從岡北下如前逆流而西僅及外潭三方皆峭壁下深無際唯南岸稍能容足相與側身扶壁行百餘步始達中潭則嵒愈逼潭益邃視前如巷者益狹然深僅及肩乃厲涉而過復從石溜中匍匐升高而後天井灣者始造焉四壁凌空高嵒切漢飛流濺落天半散作微雨霏霏撲溼晴嵐潭周可畝許瑩若古鏡新磨雖片葉纖埃靡留此中者蓋深固莫測而寒光淡日瀣氣陰森令人立不能久豫行廬嶽天台閩之黃檗觀潭衆矣其以是為最乎神龍式宅厥有由哉
