body:
  text: 住明州天童寺匡廬黃巖沙門道忞著詩四戊戌暮春十九之作融和最喜艷陽天無那春歸泣杜鵑芳草天涯生欲遍愁心畏向玉階前繞梁燕子語呢喃何事東君去不還草木光生春老大空留雨露在人間功成靈武上皇歸興慶宮前事卻違十二龍斿天路杳吾皇神慮自通微華冠久卸萬年床玉漏聲沈古殿涼徒有九州神禹迹蔀葑何自戴恩光優曇無曆計春秋吹盡天香不斷頭尚冀母忘悲願力還從兜率下閻浮春杪送隱書記歸山陽省嵩乳和尚緑甸春畦正好商因師抱恙促歸韁鬱洲愁斷雲千里豈憚吳山越水長杜宇催歸日未斜計程半月可還家春風此去猶無恙看遍江南江北華壽林谷禪師六十碓觜曾開臘月華階前道樹幾抽芽鑑湖水渺空心眼秦望峰高漱齒牙不打諸方間鼓笛詎爭盧老破袈裟人間甲子渾忘卻一任西窗日又斜中夏瀛侍者歸雲間慶母七十因其乞言書此以壽甲子重添又十霜緑因春老漸垂楊芳菲謾謂今將歇雨蓋荷擎日正長華鈿雨洗春妝淨火吐榴瓶照睫新有相身中無相相不同劫石共為磷三遷教子繼儒傳有子誰俱聽出纏俾續法王真慧命陳母較似孟母賢永嘉以燮王山人過天童為衆禪寫豫照三月因其東歸賦餞以詞家住雁湖緊比鄰由來山水得情真長書大士消餘習間寫名緇託隱淪想逸當年無道子思玄此日失波臣從君繪就玲瓏石減盡巫峰十二神送楚源禪人還粵為流大法到炎方萬里征途曉夕忙來冒南薰歸冒雪此心端共楚天長贈南海實行上人劉漢曾參知聖禪昔王何似二南賢芒鞋日上黃金殿談落天華積檻前贈嶺南月千上人三犯重溟到五羊寶林開遍覺華香從來大法流東粵高頡還宜智者頑哭循州若乾寧禪師鴈斷衡陽十五秋驚聞此日動離憂山藏誰謂能移壑白露橫江失舟太白堂前草衆刪嘉君意氣獨間間多年賦就還鄉曲卻怪今朝唱大還從無佛處解成佛已見炎方佛一尊遮莫剛強難化度還為唱滅勵頑昏火宅先君出瘴濆歸鄉化俗愧遲君蘭舟復住中流楫瘴海誰開接地雲太沖黎居士行年八十而集德存誠如衛之武公敬壽以詞用志企仰之思也命濁奇逢壽大椿尤欣五趣見天人操觚欲頌生平迹厥美難將十百陳差可龐公車並軌未容有道步同塵微君福德持衰世敢保閻浮總化磷赴召上京不及應曹溪之命寄復嶺南二王諸宰輔金地遙招已點頭天書旋忽降龍樓神光幸是同今古日日與君對碧眸贈靜香周觀察諱荃鮮烹大國藝通神小技詩文畫可人休怪毗耶能慧巧大千手擲若陶輪過淮河弔金龍四大王丹心只擬挽天河洗淨乾坤穢濁多靈爽千秋殊未化肯憑險惡作風波見聖謠三章曾聞護國頌仁王何幸勉勉見我皇論道至忘天子貴乎拈公案細商量嚴陵加足不稱臣光武包荒為故人喝下疏僧承顧笑千秋法社詠皇仁豁達雅方漢祖雄御人以禮法堯躬鉤章擬欲歌明德浩浩如天歎莫窮上賜御畫山水圖有序己亥閏三月上傳敕天童召忞赴京命即萬善殿安禪結制上不時出宮就見忘其位貌待若賓朋間於論道之餘扺掌而談天下之事則靡不周知曲盡一日出數軸示忞曰此朕數年前遣病時作也遂以山水一葡桃一賜忞焉墨光淡蕩筆意蕭疏殆騷人韻士揣摩半生而未臻其閫者上獨優為之昔班固作漢書稱昭帝十四能知上官桀之詐今上十四總攬乾綱肅清海甸不假霍光之輔一皆出自宸斷尚以萬機餘暇博綜帝典王謨旁及百世家言既承精一之傳復探西來大意至若詩文小技筆墨餘長猶善且美若此竊謂中古帝王未有聰明睿智如今上者也忞草莽餘生得奉天顏已屬厚幸乃皇皇手澤輒以見遺他日持歸藏之太白名山顧不成禪叢千秋佳話哉敬拜手揚言為識其歲月云爾一幅吳綾御墨鮮半含秋水半春煙崩騰瀑布疑匡阜淡遠村墟似輞川寵賚固非龍惱鉢手遺全勝始豐田名山歸奉天龍護佳話應知百祀傳上語及先師每廑生不同時之歎因出處士曾鯨所繪道影喜動龍顏遂命供奉王國彩臨摹二幅備極莊嚴賜藏天童其原本留中供養異世奚殷聖主虔道兮師大德師全空生寫就趺嵒石瑞相摹成下二天倣聽雷音宣寶座儼驚法雨灑當前通身兩處分朝野不盡真燈耀帝乾上命供奉王國彩重摹幻質留供闕庭駕臨方丈御覽一過為添數筆遂覺生肖宛然馘黃項稿貌支離任是僧繇巧聚眉底費九重親手澤為留七衆好風規三毛幸已仍加頰四面何勞更顯奇堪笑古錐成骨董萬年凌閣永傳持上詢先師語録因偕直説進呈御覽徹宵豁然神契即日依忞疏請賜同大藏流通微言師亦遠睿智獨明真既發終宵歎旋教曠典新琅函光吐月玉軸曉生春大義昭星日昏衢息夜磷上詰天童何義為述其由兼請寺額上下弘法圓照真覺法慶諸顏俾忞自定乃遵首二字焉名山希寵錫聖主尚勞謙兩字從高揭諸顏聽自拈瑤章侵玉漢天樂動危簷太白標弘法名同實共兼上問祖山初見何人云天童先老和尚上忽動容因問有何機緣云以工夫不切實為叩蒙賜痛棒云有什麼不切實上曰適生晚暮恨不及見此老耳忞曰四海五湖皇化裏先師亦安能出得陛下大威光也上曰得三五年有箇會處當自見渠忞曰誠如天言皇封彌浩浩函蓋廣于天當寧來何暮先師往豈前瞥爾親薦得一會自儼然今古無畦岸天言信不愆上所居孚齋門書生死事大壁書莫道老來方學道孤墳盡是少年人之句為語忞曰每對此輒萬緣寢削因進曰少年讀李卓吾才等待便千萬億劫了也即日出家上曰亦請老和尚大書用以自警君王方鼎盛怛化切斯須緣以大人覺益之良士瞿情封千界落心月一輪孤不住無生地蓬瀛詎所圖贈慶雲李欽差三朝歷事股肱臣鴛鷺班常近紫宸夙福信由多劫種報來麟趾更振振贈範宇張欽差少壯從龍佐闢疆忠勤事事得君王法門護念尤無倦屬受靈山信不忘贈春雨雷欽差殷憂王事知忠愛清白傳家驗後昌桂馥蘭馨方楚楚三槐應早植君堂為成茂成幹李大君少君製字孟祥仲謀賦贈人言將相都無種我愛孟祥有父風飛鳥固然今已盡良弓留待射天熊鳳生鸑鷟虎生彪生子如君一仲謀記取他年麟閣上絳侯題後亞夫侯上庶兄敬一主人于朝罷時間從問道終日無倦容短章以贈嘉其好善忘勢敏而嗜學有賢士之風無貴人之習焉帝子寵來必肆奢翩翩誰得似君嘉菲躬動若同寒素超俗思將類島霞學富淮南匪假託藝方松雪自名家幾回臨漪亭邊過忘卻西窗日又斜贈普濟上人當年博施病陶唐普濟何緣衆口揚久隱西山稱逸士今開藥室號醫王補虛只用參苓散導滯還加蔻朴湯起死應知有活法一回汗出自清涼題別山普應禪師所畫白菜何意呈身在玉堂凌秋幾度傲冰霜自憐碧藻堪同潔未肯時饈遠遜香淡泊能明君子志粗疏不入貴人腸平懷一種天然趣細嚼方知道味長上于庚子孟春爰下罪己之言一切修禳諸事敕俱停止特於四月八日嚴修水陸道場九晝夜以忞生遐陬未之或見也慚受天恩渥驚聞佛事開在資心意廣不惜大官財仙梵凌空際天真降九垓為僧今半百恍誤踏瑤臺上于四月二十七日命遊南苑觀新建德壽寺敕近臣就玄靈官寢殿設齋管待極其隆渥南苑策遊騎駿奔走侍臣宮庭排盛燕山海列名珍飽德誠無盡酬章愧莫陳願歌天保詠回祝向丹宸上念忞將別去後會難期自簡宣紙數十幅命作大小行楷留宮上亦劈窠書敬佛四大字賜忞謂彼此展視有同面晤云惜別君王重多愁會晤難何由能縮地長此共盤桓託意存千古留思寄墨翰正虞風雨夕未易等間看上于乾清宮所祀關壯繆親示良工雕刻黃金鎧甲寶玉爛然蓋經三年而始就者因余歸太白賜作山門護法帝重關夫子肖形百寶裝海山憐去轍歸護敕維匡漢室猶堪託髡徒豈足襄名藍標太白千載倚金湯上亟稱內臣張斐然與供奉虞世瓔一學顏歐一學鍾王皆妙得其家風因拈案頭敕書展視曰此張斐然筆也遂命天岸升子朗誦其文至忞法名上曰不當犯諱但為國體所屈忞曰君臣之分無所逃也上曰心殊不安幻質同殊劣虛名等聖凡馬牛呼不惜君國體何巉盛世尊耆德天王式草嵒山林叨履戴寧越蓋與函上再擇夏五既望聽忞徂征尤不忍遽離如是促席晤談于風晨雨夕者旬有餘日無倦怠之意焉征帆驚遂挂離思浩無涯風雨晨兼夕乘輿遣復排寧云忘勢位直己外形骸我后誠高朗微躬若措懷上問忞幾時再來晤朕忞云待皇上三十或狗馬未填溝壑當來敬致封祝上云老和尚定與趙州齊年忞云審如慈旨尚得恭慶我皇八十也時曹學士在側進曰皇上固然萬壽無疆我師亦合寶掌千齡忞曰果爾則忞當百度來京矣上為大笑逝水嗟難復朝宗詎所艱趙州如可匹寶掌不須攀六度登黃閣千回覲聖顏坐添長壽考金口自宣頒奉旨還山留別別山普應禪師有序禪師之遇主于巷也會上出狩冀北登景忠山之石室時禪師在焉因命陛見愛其住山枯稿嘉歎之久後上改萬善為禪室特自景忠起師至即抗疏還山上益嘉歎與假一月旋命內臣竇從芳齎詔召師住萬善禪室當是時上於學佛之徒甚生敬信而學佛者日開奔競之端上由是猒之獨師晏坐萬善八載至再錫師名顧無所覬覦其間上始知學佛之徒有高世獨立者歲在己亥涼秋九月豫奉詔來京住萬善方丈八閲月于禪師行藏至悉也今庚子夏五得請還山念世無知禪師者為製七言二律聊述其概兼志留別之意焉再四陛辭俞復留吐殘榴火上官舟不堪回首君恩重難割永懷道誼綢歸意盛長方似夏離情黲黮早如秋願言保愛珍明德日對堯眉踰趙州越鳥翩翩向故山歸飛獨恨睽宸顏固慚八載葵傾日尚羡嚴城晝掩關多嗜利名叢物議誰膺寵錫等雲間回天不藉揮戈力法社殷憂未可刪次韻留別春平吳上谷附原韻曉望承明捧表歸青門悵別柳依依雅知兩足稱黃面不羡重瞳賜紫衣道大津梁隨地涌身輕杖鉢領雲飛入山更定南宗後又報丹書下翠微祖印高縣世共知曾將因果決狐疑濟源骨肉中興後燕市魚龍雜奏時清淨身為尊宿報廣長舌作帝王師灞橋祖帳群公在戲把終南隱士嗤菩提未許是真歸極目寥寥盻絶依天女并驅摩詰室雲山秖蓄了元衣吸將鄱水連江盡走使磨盤掠漢飛何日相逢煙靄裏佳談更不涉離微著手胸頭便了知前身金粟更何疑心空膴士休官日智決烏臺選佛時勞侶不妨俾給侍尼乾且喚是吾師風流乞遍歌姬院下士從教謗復嗤無家客欲擬何歸為有林泉得便依山采蕨炊纓絡粥池栽荷補水田衣頑心友石秋同冷野杖聯雲曉共飛篆縷消來清晝永更驅萬象話玄微鬼神莫覷詎容知詔下丹楓也自疑尚想青猿來暮日還思黃獨正香時巍巍破額風難繼濯濯芙蓉志可師千載嶺存司馬悔悔來那得怪相嗤上于十五日凌晨單騎御萬善門敕忞乘馬並轡而行親送百餘步已回輦矣復馳至北苑門握手而別草莽臣何德皇情眷若琛分攜重握手回策復言心愁豈關山遠悲因愧感深生平珠玉淚一瀉百壺斟登舟南邁有感而作從別九閽後傷心已百端憫茲弱者肉猒彼虎而冠聖主憂民切黔黎見德難為詢金紫客因孰國委官舟至臨清十月不雨矣水涸塗見長年束手無策時護送天使欲遂棄舟余示以九重德意關帝威靈果爾河水驟滿抵東昌大雨由是獲濟大川稱利涉水涸棹為亭卒地潮生浦俄然漢起霆雨沾天子澤威顯帝君靈萬國通輸運皇心亦載寧過分水龍王廟讀永樂朝開河宋尚書禮公碑碣大禹功成後嘉君著令猷力排南旺水分接萬川流裕國非當世福民歷萬秋往來簫鼓客請一問祠頭由京國抵吳越水程四千有奇官舟所過瞻敬皈依者傾市井遠涉關河道驚聞聳百城聚觀如堵立稽首若潮砰由上尊崇意發渠向慕情乃知君子德風動小夫傾和天封佛慈祥蜜蜂頌凡六十首瞥過寒嵒異草時春光溢目載途歸芳菲不盡隨高步彩鳳長疑焰裏飛憧憧雲水共生涯浩浩紅塵不入衙踏得自來田地穩隨緣到處可為家頓悟華情立搆時根元不涉況支離香飄反惹尋香客蜜在汝邊更覓脾四天爍破眼飛光豈為尋枝摘葉忙入到芳叢無剩句白拈雖巧不相當相隨唱拍合絲桐向上何曾有句通直就春光前見諦得來不在樹頭紅千家籬壁透穿時一一行從鳥道歸俏措有誰堪得似無毛鐵鷂刺天飛競落槐都天一涯人甘同夢已開衙進幢高豎摩天幟要與荒夫作法家東風撮得指彈時調變何勞論坎離霹靂手還操化母屋愚只見蜜生脾相須摩厲候晨光波劫長因口衆忙家業掙來忘管帶兒孫輩輩足支當寧資飲露託高桐手眼圓明觸處通一抹華林芳欲竭歸來勝唱滿江紅直從天外得來時泥水罕曾一涉歸擎到衆香回上院出爐金彈驀頭飛阿閻深沉罕測涯幾多遊漾欲窺衙旃檀不雜伊蘭種一拶魂消似喪家酸回梅子遜甜時香積持來話亦離何似春光搏在手清涼一味爽人脾風流雅自布聲光劍俠羞為刺客忙暗地傷人無毒口神鋒怯見勇夫當黃見秋桑碧見桐高超迹絶水雲通問渠妙旨從誰得萬緑叢中一點紅按下雲頭落草時去華就實務真歸爐錘控得綿還密奼女能驚撲地飛不入青峰便海涯詎爭法會啓官衙相隨萬指皆英特久擅門風壁立家變金攪酪亦需時春色誰烹總化離怪得鶯梭勤織作錦章只富詩人脾無復空華礙眼光肯同碌碌世流忙掀翻海嶽從來事縱遇風波自抵當列剎何關戲剪桐化儀傳得古今通一般法令霜嚴甚爐韝轟轟不斷紅端如郢手運斤時不動芳心得俊歸眼底若非空意馬神馳華徑鶻難飛行藏多在碧天涯投刺誰干宰輔衙唯有中山能醉客尋常貨入五侯家密意深深一掐時群芳入手影離離風流醞藉瀟疏甚道味天然解腐脾發機真若電飛光箭括來時猱捷忙好鍊銅頭生鐵額娘生袋子倩誰當春蘭秋菊夏荷桐異卉投來成大通自信色香元不損那驚風雨亂殘紅金谷園開袖拂時綃襟倣帶御香歸天生邁種非輕薄怪逐山雲得競飛山谷搜窮掠水涯征車獵獵日投衙間身只為勞生苦成了家兮又散家不説鹽梅鼎和時雪山膩草總拋離如何妙勝天甘露清味難醫濁世脾虛名滿世競秋光槐策黃時有底忙偏是婆心能為物自詒辛苦自甘當身世付將爨後桐瑤臺有路碧霄通步虛一曲仙階轉吹落梅華五月紅聲色堆頭驀過時華阡拾得錦叢歸腳底自來空索索琉璃衝破壁梭飛不隨尊貴墮邊涯華柳場中戲作衙贏得清香聞上界別無濁富可傳家香魂追到護歸時霞蔚雲蒸色轉離何用魏丸誇大藥文園雖渴潤生脾雪消春谷媚陽光步馬蘭皋逐隊忙菌桂申椒同紉結信芳誰道只吾當謾誇瑞應遠來桐德合黃裳吉自通九里未言河潤廣千家彩賽萬枝紅錯過當機正是時空山長自怨春歸群芳收得先鳴鳺鴈帶秋聲任晚飛由來立地迥超涯滯貨尤嫌燕處衙塵內可居嵒可託危闌長厭萬人家杳絶音書鴈足時得來佳信自南離春光萬國供庖膳羡甚空王俸猒脾畏懷鳩毒負流光春到華阡曉夕忙誰惜寸陰能自奮揮戈返曰鋭斯當血盡啼鵑緑散桐剋期九夏證圓通蠟人坐看如冰結信有蓮華透雪紅幾人浪暖碧桃時躍馬天衢得意歸一見華枝春入袖風雲騰踏怪高飛活計從前未有涯何勞膏脂潤私衙自從識得東風面信手拈來便起家幸然采掇盡今時詎意烹微更出離總為人天存正命不將雜毒壞伊脾豈為門頭逐影光長因垂手入廛忙沾嘗一滴焦枯潤接待誰資蓄種當葉飄金井不驚桐為有先天化理通華草縱埋幽徑裏林園又見一枝紅不似夭桃一見時高枝趠得稱心歸堵觀百萬徒仰羡腳踏青雲已遄飛皇風自信絶疆涯幾度華封競搆衙行道迹同春遍入雲山那怪盡為家圓通令證舌根時蜜果先將苦換離甜透中邊陳口角不知若箇快心脾天涯到處有風光占斷華前自不忙大地撮來還似粟靈山拈出未廝當幾艷春桃幾隕桐目前萬象一光通家常只麼隨牽補誰貴天葩曜日紅皇華簡命賦將時遠募招搖入貢歸豈比鑿空張博望遼天只説泛槎飛七金千子布天涯井井官司各有衙祇奉一人敷密化山河一統大唐家君臣道合慶同時彼稷何須歎黍離堪笑首陽清餓客采薇擬欲療荒脾宅中圖大古稱光吁咈嵒廊燮理忙化就黃金充一國華胥未易黑甜當分官非放故居桐帝化須教萬國通最喜御園春色密嵒臺處處匝千紅丹心不審賦何時死義相看等若歸遮莫靈均忠未化芳魂散作九天飛化外乾坤別一涯蘭臺分攝百司衙金甌數即逢陽九粟散常稱帝者家適當君國播遷時中露難堪見瑣離若教三春能寫怨蜀魂啼血更傷脾東風吹律轉崇光按部傳餐不是忙細柳營邊時一過還聽玉佩響丁當魚躍鳶飛異子桐王來土德世亨通百華謾謂多開落歲歲常看二月紅山海經子桐山下有魚鳥翼而能飛出入有光見則天下大旱送宗符華知藏歸嶺報己亥曹溪之命法昌倚遇漳州權去就全無機獨便邵武英敏親折挫涪翁矍鑠氣為朘才賢不易生天地二妙同鄉豈偶然各挺孤標稱傑特靈鍾淑氣定山川華禪策杖來漳浦落落清風飲儕伍不羡千間起五羊因緣輻輳嘉能吐揚帆直破五湖煙撥棹歌長路四千淺水灘頭不浪泊百城吳地盡還憐一登太白軒眉宇四顧天光開畫譜巨壑蒼茫浸麓跟丘陵黑子何須數幽深轉步入玲瓏閟密重玄萬竅通咄咄仰瞻難取足芒鞋從此猒飄蓬斯行曷遽理歸航苦海茫茫惜瘴鄉為接清關橋下水灑教熱惱頓清涼漳州子思何長法流佇看沐炎方他年理取石頭斧一斫南天開大荒莫令權公與遇公英聲浩浩獨自擅清漳
