body:
  text: 住明州天童寺匡廬黃巖沙門道忞著表建海印道場啓佛表伏以真源湛寂迥絶名相之端慧鑒澄圓本無能所之迹忽因明而起照生分別之見知俄植境以為心結攀緣之識想元常汩其至性耽染入自迷流雲布情封哀覺天之難旦星排疑網傷意地之恆昏三界一往無還九居長淪莫出枉受多生苦報總因業樹之崢嶸空遺永劫餘殃一本罪華之糾結非仗法流水洗曷由滌垢除愆恭惟華嚴至教遍照慈尊報圓十身統十虛以為體富有萬德極萬行而彌綸澄澄智海波光皎皎秋空月滿坐微塵之剎土主伴同宣轉根本之法輪聖凡共證經自龍宮誦出不殊天鼓之騰音懺從雞足傳來儼若趺光之燭照契旨而真常立復披誠而積垢全消信含生所敬之天允菩薩真慈之父切念某生當末運忝作人師繼往才疏道有慚于先德開來智短學無補于後昆五篇七聚多違無德而檀膏濫受四攝二嚴素缺寡修而信敬謬膺知聵聵而日朘老冉冉其卒至徒寸衷之鬱結每中夜以旁皇方思九土悠悠正入猖狂之路更念勞生擾擾茫無解脫之期墮三塗則支分腦裂生五趣亦樂少苦多或飢疫而災逢況刀兵而厄遇肝塗野草長為怨雨愁雲骨亂黃沙盡作征魂殢魄由是涓今月日僧延十衆高流期剋五旬晝夜六時行道如法精修運虛空廣大之殊心遍周法界陳難説難思之供養出過諸天誦禮華藏玄文依持普賢行願為此竭誠皈命肅淨壇儀炳智燭以煒煌爇心香而靉靆恭迎十方常住三寶奉請塵毛八部龍天降現道場證明佛事伏願衆聖遙臨同樹王之始坐千靈普會等正覺之初成重重剎網全彰落落圓音溢聽仍回象王之步再奮師子之威燒香散華猶彼啓明東廟智即滿于初心低頭合掌方之寄位南求因早圓于此日菩薩透龍門以直上聲聞預嘉會而逍遙群真之解脫玄門普天共獲慈氏之南中樓閣率土同登業盡有情無復衆生名字地窮空界總為菩提覺場微願如斯必垂加被奏疏應詔陳情疏浙江寧波府鄞縣太白山天童寺臣僧道忞謹奏為恭逢盛典魏闕心縣愧值龍鍾葵丹勢阻勉遵法旨力疾趨程謹攄愚忱伏乞聖慈洞照事恭惟皇上陛下誕登覺位示現金輪蕩蕩慈風扇二儀而布亭毒煌煌睿德御六氣而子蒼生既振尼山之傳緯樂經禮復弘竺乾之教達本明宗茲蓋愍法運替淩之際亟揮佛日金戈將出黔黎昏墊之危特示迷津覺岸是以紫泥遙降蒲輪下逮于草萊覺苑弘開蘭臺重修于漢室蓋振古以來于斯為盛而水土餘生何幸而遭逢者邪維茲六月初九恭承天使到山齎奉璽書開宣慈旨將以衰朽僧忞躬詣神京濫充顧問夫踐土茹毛尊親有日車軌書文敢後朝宗矧正法垂秋佛祖慧命不翅絲縣陛下夙記靈山乘願建極于治國齊家偃武修文外唯孜孜以斯道為己任此蓋歷來開創聖主所不謀而合之盛典綸音雷動八表均榮固不獨僧忞私承寵眷感慶交集者矣唯是僧忞薄祜眇躬濫芋禪席穴處嵒棲洊經霜露犬馬殘年不覺六十有四矣頭白齒豁步履艱難兼山糜野鶴之性禮數罕修使奉命陛見威儀失序挂御史臺之白筆忞罪尤輕政恐眼目昏重顧答矛盾冒觸威嚴忞罪豈容擢髮夫皇仁浩蕩天寶尤遂懶殘之高帝量包荒大觀亦釋道楷之固忞道微德薄不及二僧固不敢矯飾高節致方宸命但竊思昌隆盛世英賢間出抱道潛修之彥可以翊贊皇猷丕揚盛化尚不乏人顧以衰殘無似之僧忞濫污鳳簡聞命之日所以中夜旁皇愧汗交集莫知所措者也緣奉敕旨敦嚴分難故違以取罪譴謹遵旨即日就道詣闕矣至僧委係老病支離不堪長奉龍顏尤乞聖慈矜憫使犬馬殘生早賜終老泉石歌詠聖德銜頂無窮矣為此據實上奏不勝翹禱屏營之至進天童密雲悟禪師語録奏章浙江寧波府鄞縣天童禪寺臣僧道忞謹奏為恭懇天恩賜將先師語録入藏以光祖道以茂皇猷事皇上統承精一道契真宗性命之學尤深致意至於古聖語言有關世道人心者尤必廣布頒行使若見若聞各達本性方愜御衷真覺皇之慈心振古希有者矣道忞幸逢盛化身叨寵遇又每承天眷追念先師賜邈頂相復刻遺編感恩已渥復敢何求唯是緬念天童先師圓悟生當末運興振禪宗六坐名山忘軀荷法一時提唱機語皆開鑿人天單明直指日雖刻布人間但未經入藏恐漸湮沒道忞伏見宋景德年中僧道原所著傳燈録三十卷頒降入藏元祐間明教禪師契嵩所著輔教編三卷及傳法正宗記一十二卷亦賜入藏乾道七年僧蘊聞所進大慧禪師宗杲語録三十卷亦賜入藏元元統二年僧善達密的理所進其師普應國師明本語録三十卷皆賜入藏此四者人雖異代咸遇清時道法耿光于今維烈況忞生值昌期之運躬逢佛心天子重法之秋誠千載一時奇遇謹扳前件事例將先師圓悟語録一十二卷與忞所編年譜六十二帙先經繕寫進呈外伏乞俯鑒微忱下頒鈞旨賜收入大藏永使流通則正法眼千古長新而願力恩普天均戴者矣為此冒昧具奏懇賜下部施行忞不勝翹禱待命之至文疏烈皇帝天壽聖節疏象著龍文式覘聖人之首出籌添海屋爰昭化日之舒長體乾健以居貞梅萼先春早放歔陽和而布德妖氛帶雪消融草木盡勾萌山河齊點首某雲中野逸化外編民袒服犀顱無與拜揚之典茹毛踐土敢忘庇育之恩是用大集龍象妙轉經王耀帝網重重無盡之義天恭資睿算涌華藏種種難思之界海克壯丕圖欽願帝執其中皇建有極動也時服也士邁帝嚳之神靈就如日望如雲等放勳之巍煥垂衣裳而朝萬國在在歌詠春風舞于羽以格有苗人人躋登壽域金甌永固寶曆嘗新烈皇帝薦嚴疏甲申仲夏龍去荊山曾動軒臣之哭天崩杞國每懷㑋士之憂況千邦喪統馭之尊萬姓失大明之照雖籲天以無路庶叩佛而有靈恭悼某位皇帝身居黃屋心眷蔀葑寅畏一十七年渠渠民瘼飢寒千百億國惴惴厥衷破格求人寧忘垂磻釣叟轉環從善不罪折檻朱雲後宮無抴地之裳儉率之風令可月著尚衣有未明之詔足臨之德可日書方冀蠻夷貊狄之邦咸歸至化詎難草木昆蟲之類盡沐恩波乃天地不仁黔黎寡福一旦潢池盜弄九廟業矣震驚俄爾堂奧虎生百神居然罔主夜臺幽邃胡薤露之易晞玄路迢遙忽雲車其既遠鳳闕崩頽於暴雨悲深麥秀之歌瓊支逆折乎飄風怨切黍離之歎月明故國羇人回首何堪緑黯芳郊野老傷心倍甚僧某道遊方外迹寄寰中仰五嶽拔地之雄光華猶昔緬長松擎霄之勢忠節自慚敬仗佛光嚴資仙馭伏願夢破大槐國裏眉豁彌勒樓前剎海壞成視等秋林之落葉世緣聚散悟同過眼之流雲千聖不攜己靈曷重處處為人作主頭頭本地風光告伽藍疏穴復靈鰻審骨身之具在江浮瑞像知蓮社之將興明珠再至常聞故鼎反來非一況濯濯厥靈有赫皇皇陰翊無私祖令當行敢託風雲之會聖慈易格願昭草莽之誠惟茲廣潤道場向有巨鏞千石聲傳空谷疏疏清梵夕聯響徹九幽落落蟄閽晨啓盡謂藏山之必固詎同瓦缶輕捐誰知有力而夜移幾隨凶鋒銷鑠幸山靈之有在致魔焰之徒張赤海無故波騰洪音自茲淵默乘潮泛汐婆娑海客時逢舞浪翻風出沒漁舟競見無亦三閭之戀楚殆將宗國難忘故非伍子以沈江寧有忠魂不化恭惟神聰親承智者密挈冥權入夢丹宸早看地轉天回佛日尚縣金鏡裏揚靈海甸何吝神輸鬼運鯨音還畣月樓中繇是敬獻蘋蘩仰咨天聽伏願不辭弘力速起沈淪再扇雄風傳金聲于覺苑重挑慧炬震師吼於石城見聞增希有之思圜通遍周法界竦甬起瑞雲之色廣潤普及含生地獄停酸三塗息苦募楞嚴方册藏經疏黛抹千山者春也道如春而瀰漫宇宙潛行大地者水也道如水而觸處逢源黃華盡顯真如奚翅五天之祕誥燕子深談實相況乎三藏之玄文所以圜覺經也豁圭峰之慧目十明論也洞邵武之見元安公之句破楞嚴良有以矣無盡之病回摩詰豈徒然哉太白名山天童寺者寰中巨剎冠世寶坊負海而消萬派之聲臨台而止千峰之勢風來水面池波動朱藻之文月到天心嵒腹剖玲瓏之竅繞戶駢螺排闥敷宣則群象發揮啓檻碧漢當軒燕坐則諸天寂聽顧鷲峰其未沫方畢鉢以何殊旃檀林長旃檀伊蘭絶帶師子衆隨師子野犴潛蹤緑疏青瑣樓臺棋布星分殿閣乃南宮之琅函半蠹北闕之玉軸未頒與其遠莫致夫帝閽貝多重復曷若近易為于檇李方册裝潢披展几窗明淨之前一任鑽穿故紙了殘星月交光之下不妨看透牛皮壯我雲壑之觀起茲煙巒之色功德輸於智者山川有待其人靈峰修造疏見瓊樓於一莖茅上非功力之能加撮大地於纖粒粟中貴當人之自信布髮果吉祥有地插標豈大智無人句章五磊名山海上靈峰古寺丹嵒戛漢碧嶂夌雲象王舒回顧之容橫開寶剎師子踞盤空之勢力扞精藍百畝春田邁種靈苗獨秀萬株行樹衝霄逸翮常棲石城岡千尋壯雉堞之雄攪海狂風吹不入梅華徑草里延妙嚴之路衆香佛國步無差徘徊峻水巖前倣佛天河之下降徙倚白龍潭上依稀玉甲之開明嶄顏削出崇閎既門牆而岸岸密護周遭袤郭亦關鎖其重重展矣小有之天允也應真之堀但昔本袈裟院子蜂房蟻室寧曰一攃以維新適今改龍象禪叢容與超遙庶幾更張而文舊打開毗邪離庫藏全憑木上座神通平鋪給孤獨黃金只在須達翁揮霍空中樓閣會看紙上飛來物外乾坤有冀筆鑯點出道場山募建法堂疏妙善法堂説詼塵剎普光明殿含受十虛團圞四角六張一畝三蛇九鼠是以色身三昧紅鱗偕翠羽齊彰根本法輪水鳥合樹林共轉然覺地如如不動昧者恆多道場起倒相隨時人罔測苟不當機擊扣誰堪直下知歸所貴玉宇瓊樓不被莖茅蓋卻百萬億莊嚴還他兜率宮中本有庶幾華幢寶座儼然特地斬新須彌盧高廣無俟燈王國裏移來鳴鼉鼓響鯨鐘南山雲下北山雨會看紅爐飛彩鳳輥木毬橫雪刃牛頭沒去馬面回直教鐵鋸舞三臺欲祈此話大行更冀知音賡和茅竹園菴募僧田疏風霜野坫出家兒況味蕭蕭煙水百城禪和子行蹤落落大地上孤征而弔景唯有古路之橫開夕陽中獨偶以誰諧無奈前村之不搆逢人青眼少莫定晨煙問路白雲多難期夜火化城如可廢寶所孰與歸東出緱江菴名茅竹者門當孔道路透長安既四通八達之途亦九峰三台之徑以故參玄上士雲擁而來絶學高人川趨以赴雖僧空不猒旅泊乃佛土亦有郵亭單安一宿之寮人人大歇鉢貯千家之飯箇箇飽餐庶楖栗橫擔透青山而直入俾軍持攜去傾白月以歸池長者發大心且喜布金有地檀那出隻手何怕獻珠無門百劫種良因莫當面錯過一朝圜福果直舒臂搴將矣募建東山翼善禪寺大雄寶殿疏遄征來布塞孫綝勸景帝以停驂張晏在東山玄石為蒼生而起臥亂落一天華雨傳寶志之弘談開經幾度薔薇記青蓮之再至龍蟠虎踞地既盡極南天鳳翥鸞翔人亦高齊北斗所以英標代稱俊彥清梵世擅名緇考園林則東晉實崇稽宮館則六朝最著金繩開覺路淨名偕翼善同芳寶筏度迷川慈祖共瑄翁迭駕溯當年之壯麗奎煥天章問此日之傾頽災傷舞馬然乘除相禪物有盛而必衰消長循環運無往而不復充國黃金塔現讖符正法當興合同船子歌還驗在機緣適輳欽承祖德仗庇佛光莖草拈來會有賢于之出手藏金傾布寧無須達之興心重增禪社徽聲再起山川瑞色庶東吳勝事咫尺非遙將江左風流幾希不遠矣于時天童八葉孫道忞因大咸咸子之發祥感能悟一公之高舉忝在見聞隨喜之下益生歡喜贊歎之心乃為之重復殷勤合十指爪而説偈言偈曰何年翼善燬琳宮遽爾興心問祝融願大因之忘費浩思深益自增悲恫化城幻出尋常事寶所追還蓋代功佇看神輸兼鬼運九天移下玉樓崇梁皇寺募修佛殿疏法菩提場含靈共託寶莊嚴剎衆福攸基所貴起蔽更維新始免七零而八落橫一梁承一柱靈利底不妨點著知歸錐頭利鑿頭方慧心人斯解看孔著楔果眼親兼手辦將玉轉自珠回鈯斧揮時散櫟朽樗皆大用泥牛吼處鈍磚頑石悉翻身然廣廈非獨木所支淨業須群緣共結布地黃金剛始諾本一念以承當六天宮殿欻然成恣千生而受用冥報捷於響應智者宜善知時欲廣見聞重宣短偈偈曰曾聞一笠蓋金身報得梁皇信有因風雨活埋前代寺還將功德報同人寶慶院募緣疏縛三條篾住山時因道泰傾萬斛廩惠施義出豐年苟能施難施之財頓教黃金滿世果若住無住之處何妨我國晏然寶慶南公者緇田嘉穗法網逸鱗早侍諸方曾染五味禪指晚趨太白飽喫三頓獰拳顯老之典客十秋囊錐始露會翁之監司再稔香袖時飄聿來金地之招爰點江陵之首肉山傾置淨瓶不謾踏翻胡亂由他鹽醬隨時打發金彈換渠泥彈子尚乏百丈之田飯桶空呈漆桶邊若作金牛之舞薄𠜱嶺雲片片猶然千古意分明細切春雨絲絲終覺一堂風冷淡欲索廬陵米價乞開盧至慳囊臨海新興法輪寺募緣疏佛日將頽法輪竟埋於荒草梵宮再闢福田廣植乎檀林明堂瓦雖插簷香積塵仍封甑口朝天囊挂壁罄縣無底鉢盂虛以往實以歸空走百城雲水冷灶勝於熱著緩急攸分飢食易為飽餐懷仰自切但能割寡涓滴匯成巨流況復裒多修羅飲皆滿腹閻浮王有天下無憂之受報何崇供養初由掬沙童子之往因不遠君其善聽我匪謾言施茶疏趁焰之鹿每喻歎於有道聖人喘午之牛恆見問於至仁君子況肩摩轂擊之會當流金爍石之秋蒸氣則成雲揮汗且成雨望梅止渴談院之機智徒聞借手行拳趙老之風規具在從鼻入從口入總與八字打開有神通沒神通切忌當面錯過果見微甘回齒頰七碗詎云多直得毛孔散生平通身方慶快覺來襲兩腋須知下載有清風拈出本尋常誰道南方無者箇攪長河為酥酪盡在山僧杓柄頭變大地作黃金還他長者阿堵裏大家各出手共結利生緣啓復平若陳侍御啓諱朝輔談不二之宗雖資曼殊敲唱移燈王之座還他摩詰神通道不虛行法寧孤起恭惟門下儒門師匠白社金湯示見宰官之身本受靈山之屬念先師有未了公案俾不孝更斬新例條爰惠德音式頒佳貺但某罷駑下駟粥飯嘗行坐斷太白峰頭終慚先德劃開玲瓏嵒面且付當人肅候來旌恭還趙壁壽寶慶南禪師五十啓伏審歲添五分臘更二毛孔生亶知命於當年蘧子亦寡非于此日秋晚之桂薑益烈性自生然歲寒之松柏後凋質惟天賦恭以某師明珠象荷寶鑑親持願海宏深乘大悲而示見慧光高燭騰金日以流輝襟同鏡水俱澄方越徹而兩強不下意並長天共遠匹杭標而二妙難分衣挂千頃之雲㲯毿固以久落頭挨大梅之雪真實為之再芟南陽之蛇虎無瞋嶽頂之松妖不作卻仙書于夢裏寵辱何驚迷華鳥于嵒前玄微亦蕩然口有碑而衆豎叢林戶説勞勛堂不開而道尊保社人仰山斗允惟法壇之傑誕作緇侶之雄某忠告早叨曾沾濡于河潤劻勷繼受況分照於鄰光加以愾念同人正復悲傷晚莫盼庭柯之殞落深自凄其瞻喬木之鬱蔥倍生踊躍老成欣其尚在矩矱諗所攸存敬獻巴章既式歌而且舞載陳封祝盍拜手以揚言請天目法師作羯磨啓瞻風日久幸託鄰光慶承接塵之歡敢冒屈尊之辱但君子唯成人之美上賢亦荷法為心是故金粟如來恆預迦文之會妙光大士敬白摩竭之椎況叢林凄其如風法社危若纍卵者哉惟茲孟夏將屆安居有事般若真宗必審尸羅淨學五部推波離為師首人天盼精祕以鶴翹伏願按下千尺雲頭敷我一潭華雨儼然靈山再見庶幾帛社重興所有微幣敬呈別幅銘默齋銘有序毗陵雙白王居士遊方之外遍參海內諸尊宿其有道之士乎然而肝腸雪皎意氣虹高往往路見不平未免拔劍相救當濟洞之有煩言也居士則日掉三寸舌為之和會盡心調變精力亦幾頓矣事竣乃得訪豫邗上相從兩月豫智識暗短于世出世間無所置喙所不能鏟地掃除者唯日用飲食而已居士于是廢然自返坐忘視聽內心無喘忽恍然有造于離四句絶百非之域焉因自號默齋且請銘故為之製詞曰齋固有本非功莊嚴備萬德充泯表裏絶邊中虛無倚包太空六窗啓九類同群相得恣融融四字密佛祖瞢靡因以辨來風心畫竭意技窮智莫測識罔通所以黠毗邪翁唯一默墮群宗慎獨居銘有序汪君中符孝義敦仁果毅以信殆幾希乎古俠而不侵為然諾者也今行年且五十矣自以少方乘氣壯復豪矜行多忤于物理深痛前非知胡不夙尤虞後過寡而未能乃揭慎獨而為居庶法湯新以自警抑將顯維謨承維烈繼序思不忘耳于是為之銘曰於穆道真維人之轂離道眯真人車斯覆靈轡失御意馬奔蹴惟情是征與物為逐暗室可誅明庭有鞫昧欺人己安所顧復維彼哲人學非干祿克己存誠慎爾幽獨指嚴十手視虞十目葆合中和還真返朴天地迥高萬有殊族德化滂流以位以育乃知道真不行而速展布彌綸如春滿谷矧伊象賢教之式穀如臨深淵如集于木猗嗟汪君爾居不黷善甚至哉介爾景福大鍋銘西江口吸五熱身膺智愚仰給凡聖恭承絶滲絶漏日升月恆出無盡食飽五湖僧雲版銘殿閣風微雁堂寂寂三令既申水雲普集金牛起舞甘贄下食眴目揚眉令儀令色法社千秋欽承遺則硯銘方嶽貢玉帛徵陪黃卷伴青燈賢與處聖與朋爾作則永為程兮褱大璞吐華英居斯正浥斯清爾棄兮聖賢隱伏爾出也天下文明夫是之謂山翁老石交而奕世稱同盟也枕青山漱流泉出輔世育才賢文而質靜而專宜爾壽萬斯年右丞硯銘為子和堅禪人作磨不磷涅不淄天寶玩出明時王摩詰老幻師咸珍蓄濬妙思爾子和復有之於乎神物兮不詭隨自今伊始兮永受持提詞宗門崇行録提詞有序宗門崇行録者為祁仲子季超所集仲子生華膴有曠識其於功名富貴猶掇之也當神廟臨御萬方時四夷百蠻罔不賓從乃聞樂審音即知南風不競於是溯邪溪之上流樂平原之膴膴爰搆山舍而居雜石偕麛餐霞味道因得廣讀諸禪典見其言其行足以發藥當世者彙成是書業問序於先老人矣後復釐為十門謬余於老人之門為有若之似遂以提詞見屬顧余內照生平自審缺然鏡臨嫫母顏若之何余不敢請辭焉去秋復移書再督辭不獲免乃展卷從事叩其定行輒綴於每門之右門五章章四句直心佛法源海語心為宗心月孤圜萬法光通由心虛偽四生流轉況復祖關深固幽遠雲失鳥巢月迷津渡神有所昏智有所瞀皇皇先達胡征遂克揆厥所由惟心質直以質直故慧沼漪漣是故道人之心其直如弦密保孔規時習湯警日新淑人君子懷憂終身吹毛利矣用了須磨於皇烈祖訓也如何洞明空劫盡卻今時適未勝習胡不古師乃作乃輟或存或亡豁達致禍莽蕩招殃隳成山於增簧嗟及衣而反裳厲操造道惟勤近仁以毅凡百有成伊誰自既傳衣迦葉苦行頭陀法航終古載其恩波如何我人便安是規夫豈無説聖諦不為恐落階級聊以徜徉水漲船高在理何妨行解相應超然曰祖豫何言哉請觀前古晦養尺蠖之屈申不跬越蒼松耐雪千齡斯拔其拔維何濯濯靈柯上干雲日下覆青蘿器大成晚早用匪福道亦猶然寧惟物獨欲隱彌露欲蓋彌章非厚於天果熟自香幸而獲售終喧物論所以至人遁世無悶高風靈山佛法付屬王臣彼交匪紓繄惟道徇既徇吾道式降厥尊奭然光護法以永存歔嗟末年亦孔之羞引首低眉罄折公侯胡甘而辱爰喪所守冒利沽名德不增舊麟遊靈畤鳳翔天外我之懷矣於焉有在清節四大苦本貪欲為因沙門釋子自古稱貧日中一食樹下一宿鶴樹終談云胡致告世情麗都道味翛然務道于華掘地覓天在昔尼丘魯中之叟飯蔬飲水樂亦忘憂雲霄目視佛祖飛埃毀形守志豫何人哉雅量仲父之功匡王定霸器小來譏神有所詫刻雕衆形澤及萬世豫之他矣何仁何義乃涉境風得喪交嬰顏徵于色詞發乎聲寧乖法禮亦啓紛拏勿謂小疵已是大瑕地覆天翻我亦只寧何以致之行庭無人厚德提婆推山歌利割截左割右塗等心而挈衆人不請友而安之於乎佛乎何悲而慈比丘師佛當師佛心況忍報復怨害相尋修己小嫌忘佛大悲剃髮染衣抑復何為爰有至人海函山育表此用針波旬之族慎微破頭往矣華鳥迸迹供來諸天洞山是斥功猶不綴過何可嬰內省無惡君子維行尸居淵默雷聲龍見微乎忽乎矚我如電黃金之黃白玉之白貴其貞顏恆無變易一微涉境勢就頽山小德出入終踰大間無我乘別大小飲水分河宗岐南北入室操戈調御善調難調我執盧醫拱手膏肓病入我病入矣宇曖微霄識且不達見何能超須彌之高大地之廣視彼虛空終焉悵惘以空無象萬象光吞善甚至哉空獨為尊蘭譜題辭為瑞先居士作茂叔愛蓮淵明嗜菊我敬蘭卿獨生幽谷風雪餐多煙霞味足吐而為芳聞者神穆葉挺太阿華擎玉燭安得君王式卿嘉穀燭照民巖劍誅佞族皇路清夷受天百祿
