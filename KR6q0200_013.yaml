body:
  text: 住明州天童寺匡廬黃巖沙門道忞著塔銘一佛日石雨方禪師塔銘鷲嶺別傳之道以不傳而傳少林直指之宗以無受而受冷灰爆豆枯木糝華師子兒吼時祖父母皆喪此豈可以心思口議之與然其間顯晦在人興衰有數盛之所以之衰也周昭實濫幽厲之觴微之所以適顯也光武獨振炎劉之祚國運且然況法運而有不然者乎是故大風止而大仰來郢陽微而淮月照濤翻禹浪蓋由涌水滔天櫂轉慈舟則自鑑湖一槳道未墜地識大以賢然則祖述曹洞憲章雲門舍佛日禪師何適哉豫與禪師竊嘗共侍基隆其嗣好木材以遠門柱公之狀來謁銘又以師同門愚菴盂翁與豫交好誼不敢辭因得論次而擇其身證利生之大者為序序曰師諱明方字石雨檇李武塘陳氏子父文錦母徐氏以艱嗣息故聞虎林法相寺長耳定光佛靈應著遐邇往禱焉遂於萬曆癸巳正月之晦日生師寶月懷吞金環手握所以靈根夙種慧業生知方就外孰早已卓異諸童矣年二十二偶遊雙塔見寺僧行道威儀有感昔緣有在天誘其衷遂辭親棄家室還投法相寺從西築宗公剃落首丘之義不忘本也故師歸受業衆請說法有曰古定光今法相驀地相逢難度量短十尺長一丈橫看成嶺側成峰幾希惱殺丹青匠無底鉢盂一箇斷鼻芒鞋一緉海角天涯走一回兩耳依然在肩上雲流天空務開生面益知師為不可測人也是歲甲寅秋即與老宿靜安者結社修淨業一日擊木魚高聲誦佛號忽擲椎曰不惟西方東土亦可生靜曰且莫草草南泉三不是話子作麼生師芒無所置畣日礙於中膺為之痛次春雲門澄和尚說法嘉禾敬往參請告以所苦澄從容開導工夫自此綿密坐立稠人廣衆闃爾之子于征有聞無聲矣見儕輩往往商量公案弄齒頰則歎曰禪若是我也會得或曰你試道看師出衆作女人拜儕輩愕然迦陵在㲉響遏群音衆由是憚之後閲楞嚴至我真文殊無是文殊若有是者則二文殊不覺身心世界打成一片然冷地拶著未免吐吞不下復走見澄澄示以本色鉗鎚仍命一人半人所在直須親到冥鴻志天外一聞澄誨刻意拼茲生一鉢千家孤身萬里去徑裝包走江西湖南參憨山清無異來二師于匡博之阜往還叩擊快說無生甚洽也惟來以師造語未玄勉教死下工夫自能入作無別證還走越納戒雲門師自甲寅剃染至癸亥凡十載于中登黃海造衡廬入天目饑寒毗佛洞風雨西方菴灰心泯志如大死人卻恨死了活不得復下西峰過雲門時澄爐韝洪開江湖畢集如市師挾袱入堂要韋天約矢不語刻期七日徹證沈舟破釜示必死無還心一日聞澄上堂曰放下著頓覺通身慶快即呈偈曰平空一擲絶躊躇轉眼風波徹太虛會得竿頭舒卷意放生原是釣來魚澄痛加訶斥麾之而出適于經行次聞僧舉大慧語禮侍者淨剝荔枝話遽豁然軒渠一笑首座搊住曰道道師曰恰值某甲持不語戒座奇之山門送亡僧有問澄亡僧遷化向甚麼處去身甚戰掉澄曰問話且置把者戰掉底去了著師曰和尚何得以四威儀見人澄擬答師卻作戰掉勢澄曰賊師曰賊賊料虎頭編虎尾通身環手眼而虎卒莫肆其爪牙解制入室澄問如何是一口道不盡底句師曰晨昏禮拜和尚也是尋常事澄曰趙州道無意作麼生師曰和尚好下棋某甲粗知澄曰他道有又作麼生師矢口頌曰家家有幅遮羞布放下便能當雨露獨怪當年老趙州擲卻頭巾頂卻褲珠之景隨谷之響畣又何過焉澄遂印以偈曰分明識得趙州狗拾得鼻孔失卻口莫于萬仞峰頭立且向叢林陸沈走并授斷拂一枝故師又自號斷拂子聞楚黃無念有禪師手段辛辣過諸方諸方雅號絶學道人往謁基隆與徵論大為賞契去隱黃安鷂子山神光一道萬境俱閒恬然草衣木食蓋不知夏之日冬之夜也俄澄圓逝奔赴雲門復入天台活埋香柏白馬之臥堅矣然大法屬肩承則已有排闥而入者不得已起象田應蘭芎再應天華梅破香包月生海嶠一時四遠趨風來至莫可遏於是王大冢宰祁大中丞等復請主雲門顯聖寺門庭日闢道望愈隆杭司李黃公海岸大中丞集生居士親詣座激揚亟稱服焉住凡三年至丙子嚴印持聞子將諸公又請主古杭寶壽院誅荒滌薉之次得前住石田熏卵塔五百年沒荊榛而師出之咸謂前石田後石雨師殆石田再來云既而風扇閩川福唐王光祿響師之切合諸紳士削牘來迎戊寅請主長慶己卯延入雪峰辛巳應古汀緇素之請結夏靈山秋開戒師峰冬孝廉王蘇門朱聯嶽等請主普明時虔州嵯峨漳州三平俱以住持相延師力卻之壬午居考亭靈峰夏五為浙中諸檀護請還寶壽是冬再過天華癸未屺瞻葛太常請興龍門師以棟宇湫隘為改易基陛一撒新之甲申嘉禾曹侍御請主東塔乙酉歸龍門夏循覺浪盛禪師與武林護法之議率同門諸法裔送澄和尚神位入雙徑祖堂衆請垂示更為升座秋卻皋亭佛日之命是歲龍蛇起陸所在招提遭劫掠將及龍門一衆回皇恿師暫避師曰無庸也內心無喘外復何憂凶徒至為雲霧所迷果人剎不見而去丙戌佛日勤舊及當山檀護三復敦請至是應之開法弘戒萬指圍繞丁亥八閩部使者同闔郡紳僚遣官致幣請興雪峰芝山兩剎師堅辭不就時四方兵凶繼見忽語衆曰世界如此不若歸去好衆莫之覺也每歲元正小盡師以是日生冬即以是日解至戊子初三即撾鼓上堂曰人人藤斗笠箇箇水雲包出門踏著草途路更迢遙到者裏不倒斷得一回直饒說箇回途得妙就路還家便是千里萬里又云只因你不能向異類中行且道異類又如何行乃握指云一雞二犬三豬四羊五牛六馬為甚麼七不道參首座驚問其故師曰我來日要上龍門座曰和尚幾時回師曰初八九便來初六至寶壽初七上龍門晚示微疾次早命湯沐浴屬託後事已端坐不語諸門人問和尚還有分付也無師曰更有甚麼分付值法師寄浮者偕諸山問候師一見微笑而寂越九日封龕顏貌如生奉安丈室一日山兵麇至欲燬龍門見師龕儼然不忍與寺俱燼舁而出之百夫震虓力莫能舉由是群相驚異寺賴以存己丑中春依法闍維牙齒數珠不壞頂骨糝五色舍利門人收餘骼及諸不壞者建塔前山瘞於金龜嵒下世壽五十有六僧臘三十有五師初主龍門時葛太常慮師受別請師曰山僧儻別赴終當歸根此地今示寂本山前語果不爽也師儀相清臞面長有尺秉心淵塞律己霜嚴珠回玉轉其用世圜也風卷雲流其去住輕也海湛天光其襟懷之澄廣也堂之高簾之遠其悟入之深而玄也宗廟之美百官之富其語言三昧之絢爛有光乎祖域也猶復謙光導物慈忍居懷所以一時賢士大夫樂與之遊煙霞湖海之賓願就刀尺即屠沽販負市儈輿儓之輩莫不瞻顏而說志聞教而悛心者也至於翰墨之工得一字而𤦹玫是託詞章之妙落一言而什襲為珍固不足為師道矣若夫橫抽寶劍妙協弘通則更有意不在言來機亦赴者如一日上堂有問七九六十三且置父母未生前還許學人會也無師曰問即不得如是則不弄啼鶯舌解吟無字碑師曰易拾爐中雪難分海底燈肯諾不全蒙師指不犯師顏請借賓師曰好炊無米飯供養莫將來祇如將來又作麼生師曰恐喪我兒孫僧作女人拜云恁麼則借他香燭稱他壽也師曰新荔枝新荔枝雙鎖金針暗穿玉線洞簾高卷風起雒叢宜其然矣不有銘而志之曷以懲頑儒而大鷲嶺不傳而傳之統哉銘曰靈山密印少室真乘分張二五化變鯤鵬不傳而傳無受而受唯證相應寧容聲口二祖不往達磨不來華糝枯木豆爆冷灰師子吼時父母皆喪超宗異目從來過量葉綴華聯敗乃祖胄靈根密固異苗翻茂全因淮月得照郢春道無今古弘之在人矯矯散木浪躍中流煙簑一槳櫂撥慈舟須彌橫空日月輔轉倬彼宸苔豈合車輾式生異人承願而出水繪魚蹤空鐫鳥跡真雖不幻幻以顯真紅爐翥鳳石女産麟不昧正因徹見源底平空一擲雲開萬里楊飛九月焰結寒冰九轉丹還百煉金精龍以蟄神豹以霧變雪送梅春霜敷蘭艷壁梭騰化囊錐穎脫嵒虎奮威草蛇驚活川趨鶩集湖海賢英誠投慢折名公巨卿天華散彩佛日揚光為霖為雨乃梯乃航風回洞上光闢雲門今時盡卻空劫不存吟針枯骨唱妙非舌泥牛海吼木馬火躠清波不犯梭腸不控文彩縱橫竿頭變弄湖蘸星辰線穿海嶽玉象倒騎紅鱗掌躍驪珠擊碎夢戶推開勤修供養更不將來皋亭葉落歸根龍門去留何吝往有成言回途得妙就路還家漁歌唱晚櫂入蘆華松虛夜籟鶴空月巢風嚴霜重五天寂寥舍利光流金龜嵒下薪盡火傳千秋照夜竹林林皋豫禪師塔銘歲在丙戌林皋和尚入滅豫聞之傷哭之以詩曰狂波正倚障回瀾砩響忍聞一夜殘淮海潮鳴千社泣金山浪打六群歡盲龜尚自艱浮木桂櫂誰同接險湍堪歎衢昏良導隱無能為勸一停鑾蓋慟之深惜之至也今又八年其徒某持師狀來徵豫塔上之銘夫師豐功在泉石至教溢湖江彼窣堵巍然必有天龍密而拱衛之者靡豫銘而淪沒哉雖然山有時而騫石有時而泐陵有時而下谷有時而高文無渝焉銘之宜也豫則何敢辭按師名本豫號林皋晚稱晦夫崑山陳氏子幼不茹葷喜燕坐十九出家剃染蘇之堯峰寺因誦金剛經有省奮志詢方瓢笠自隨首參雲門博山次參金粟密和尚一橫機無所讓最後參天隱和尚於磬山機緣契合乃依止焉一日隱謂師曰豫上座我疑你不會廓侍者與華嚴相見因緣師云非但和尚盡大地人疑殺在隱曰盡大地人疑你則可莫使老僧疑你師云恁麼則某甲罪過隱曰祇如興化與旻德賓主四喝化云旻德會一喝不作一喝用且那裏是他會處師云放某甲過別通消息隱曰不要下語師遂呈頌云賓主相逢縱奪作家喝下雲從見活蛇棒頭突出通無犯豈作親承解撒沙隱然之適金陵緇白請隱和尚住中山石湫寺隱特命師往主其席且授以偈曰中山深處可安居就裏藏鋒得自如門戶打開來宿衲鉗鎚妙握勘承虛宗乘了了曾淘汰己分明明任卷舒不是尋常流輩客莫將心意更躊躇師赴焉未幾出主武林寶嚴復因姑蘇申大司馬范方伯之請歸主堯峰聲光日著道大顯揚至崇禎戊寅潤州陳銓部笪使君以竹林荒廢已甚非師莫能起由是遣幣敦迎師欣然就之至則基陛之上別有僧居乃即山之半披榛鑿石創為新寺不數稔而輪奐郁然照耀江淮矣居恆普請必赴不容學者規避逮住竹林則日雜傭作躬勞衆務然汾陽之夜參不廢華祖入室之牌旦旦而縣故參玄之侶莫不惕其法令周章畏尤嚴父旋復感其為人誠切則又愛如慈母焉尤更留心老疾凡見方外龍鍾衰暮負挈瓢囊而至者必從容勸住與之盤桓朝夕有若舊識然者或時有病則親簡藥石手自煎煮不幸物故一概津送以禮富貧不計也礱石為普同以掩亡僧之骼師為軿手軝足勞極至腫知事請師少間師曰此輩皆為老僧而來安忍視其暴露而不亟為厝置邪自以身既匡徒必苦樂均之五坐道場未嘗間操匕箸背衆而食有典座自取常住麵作𩚼飥供師師廉問知其故立命賠償庫司且擯逐之所寓隨緣住持不發化主不通刺檀越不倚權勢以規免意外之禍住竹林日有僧乞羅文學書求郡牧程公為外護師知之追書責擯後文學以前事語郡牧牧甚多師乃親執弟子禮入山問道復於北固之下建菴曰生生者以奉師焉生平慈腸悲腹柔如脂韋而浩氣剛中又復確如金石崇禎十三年歲大饑江淮之間飛蝗蔽野民道殣相望師食不遑處罄以衣資賑諸饑者始參雲門師為維那今徑山費禪師亦居座下有閩僧犯堂規師欲舉罰費關說焉師厲聲曰老兄得恁麼鄉情太重他日若為號令人天後費開法金粟每每舉此誡諸學者出住石湫寺側有廟神叵靈里人常以葷祀師為神說戒誡神齊素神即見夢於里之一方曰我受林和尚戒矣勿以葷祀我也里人至今素祀卒以為常乙酉夏五清師渡江入南徐官民潰散被甲執殳之士環寺門交錯也師臨衆一如平時無少沮焉住竹林凡九載殿堂像設山門寮舍以至庖湢器用之屬莫不事事完美故閣閣橐橐登登馮馮之聲未嘗一日停音也至丙戌冬十一月旬有二日示微疾命止工息作十七日說法辭衆十九日沐浴更衣定以明旦寅時去適呂山主者有事廣陵其子泣請父至為期越午呂至師屬託後事已乃端坐說偈而逝世齡五十五僧臘三十六門弟子建塔窆全身于山門之左方乃刻茲石銘師之蹟以志于丘竁以告于來茲焉銘曰少室燈非世焰方毗嵐風刮愈寒芒二五分張六葉餘光于千界月輝煌明終無盡曷由爾似而續者類僧王年遠普通漸式微綿綿濟北獨延長師繼磬山稱後起鉤深索隱揭其光誠切為人無假借起尸之德何允詳會老華亭去不回竹林千載冷秋霜師一顧之寒焰發家聲門祚頓然張憧憧來者滇與蜀秦鳳魯麟冀驌驦江淮坐斷敢誰越一劍當門大啓疆愛日嚴暘人共戴真慈至育師有常漁歌唱徹歸晚浦蹁躚雲外鶴空翔師德允宜昭百祀銘詩我作壽無央天童林野奇禪師塔銘李白之送友入蜀也則曰山從人面起雲傍馬頭生其早發夔城也則曰朝辭白帝彩雲間千里江陵一日還蓋蜀地山川險阻自古記之矣惟山峻水湍故其人類性剛而果決堅忍耐苦勞以之向道則勇往易于入作殆亦風土使然不然或踏殺天下人之馬駒間世而一出焉斯有之何以緇雄代作半起蠶叢之國無論法眼雲門從金剛大士劈華嶽以分流即臨濟兒孫光明炟赫統系相承以來十傳則有東山演十一傳則有昭覺勤十五傳則有臥龍先十六傳則有徑山範二十四傳則有海舟慈沿流至先師悟和尚閲世且三十矣復有今林野禪師豈五丁鑿道天固為法社開象龍之路與師名通奇林野其字也合州長樂人本姓蔡氏生而澄靜不類孺子不喜肉食時年十歲父母度其志向非塵網中人因命依金鐘寺叔父道然為童行十七歲剃落性樂禪寂猒讀誦至年十九恥州縣僧庸碌不足尚即慨然動他山之念由是出峽南遊猒飫江南講肆十有餘載業息肩當湖方期掩室千朝翻閲如來一代時教俄患痢瀕死乃知經論之學非究竟法也時先師悟和尚正王化金粟渴欲就參為緇素留不果往適有傳粟示衆參禪偈師聞之懷疑不已極力冥搜芒無所入會粟過當湖則加額曰天賜我也亟遣僧請益粟曰教伊關中莫妄想益溟涬莫測所謂心智為竭殆如土木偶人者經歲時忽一日失足墜樓恍然而覺遂成偈曰一念未生前六戶絶消息瞥爾揚雙眉大似眼無力聞粟在吳門即日破關走金閶不以寒暄起居玉帛見粟直奪角衝關左屬囊鞬右執鞭弭與粟相周旋粟固奇之逮明年粟赴鄮山師亦隨往偶檀護入山設茶粟舉洞山與泰首座喫果子因緣命衆下語諦當方許安排師時在衆即曰食到口邊被伊奪卻粟為首肯叢林以此知名又粟因佛誕示衆世尊才出母胎便解指天指地你等諸人尤向山僧擬討甚碗抴拄杖下座一時打散師于此全身脫落透頂透底無復纖機留礙凡侍粟十年逢場對壘兵交刀接每每倒捋虎鬚未或當仁少讓既受屬纍尤居天童座下踰年始應禹航廣化之命至壬午秋悟和尚示寂師奔赴通玄衆議住持枚卜同門三卜而得師名不容推遜乃繼席焉提策方來直據本有雲薶雪擁五見冰霜群峰讓其高寒禪侶慕其慈嫗雖極枯淡寂寥學者恆輻輳如歸以出隊嘉禾為暗齊黃憲副堅留勉住東塔未幾移主棲真既而天童席虛明州當道士紳公議歸師復遷居太白前後蒞衆十年夙興夜寐寅畏小心雖在安常處順之中每懷臨深履薄之懼然屈申以道持正不阿苟道在必申不以利害權勢稍為貶損方師初赴天童山門以夙釁搆訟在郡郡司李欲一瞻顏色左右亦謂乘間得以相浼師堅志不往及司李專人請齊為一赴然竟席未嘗片詞于訟事其持正皆此類所以四坐名坊非有子貢之先一出輿情共舉視彼巧力而謀與夫詭遇而獲者顧不可風範一世也邪師應機接物出語渾朴不為趙昌之華葉公之龍徒事藻繪以炫耀見聞至其一二見狀中者則所謂想酢生液雖未澆腸沃胃要且使人慶快住二年感微疾衆請辭世偈師瞋目曰要去便去害甚熱大時有赤冶禪人求更名師援筆書行果二字乃曰行果圓成遂擲筆端坐而逝世壽五十八僧臘四十一塔瘞全身于寺前新菴之左豫蓋有語封其戶矣其門人古唐聞姪又以月山泉首座之狀來乞豫銘其塔豫愧不文無以行遠然辱在同門知師最悉念非豫恐師行業久而遂湮抑後有景行之賢將無由考鏡而仰止夫師則豫責也乃論次其大端序而銘之銘曰達磨一宗丕顯曹溪南嶽衍長曰讖于西馬駒是育血染霜蹄𨇯一踏四海平夷臨濟振興光賁五燈有嚴孫子碩大無朋世更太白六五親承雲蒸霞蔚鳳翥龍騰十二人中師其後出藞苴川僧性實難匹撒手危樓翻身楖栗機警用圓風雨暴疾起坐通玄衆山為低騰空漢迥華頂雲迷蘭滋芳甸蕙紉春畦聲馳湖海著意攀躋櫂歌東塔灣弄棲真漫天布網萬里垂綸鼇山連釣丹穴齊緡鼓須彌浪揚渤海塵晚據天童奠安太白風漾文波池涵素魄逸翮摩蒼神魚縱澤合浦珠還風規猶昔馭衆圓合律己端方逢強不弱遇柔寧剛孤風卓卓燁燁謙光下無輿儓上無侯王行果圜成出世功終破沙盆碎正法眼空一錐無縫八面玲瓏嗣燈有人光照無窮靈隱嵩居如公塔銘虎嘯則風生鶴鳴而子和夫物有自然之感通矣矧躬師模而冶鑄乎人倫者世道衰于晚葉葉縣汾陽之風不再響豫猶及見楚黃無念禪師門庭嚴謐肅殺如秋蓋一于霜摧雪絶不以溫和姁嫗之者然其規為先德痛斥今時不離使人超情越見者近是常言我人生死根株深徹金剛輪際苟非全喪無始時來心豈易卒拔彼依違四大偃仰塵勞之輩直三途櫱種耳焉可俾之入我法中而破壞我邪故極其排斥詬厲讎視方來如蝎而方來卒無敢登其門者計同時偕豫親依僅三五僧而嵩居如公實在其列如公髫年嚮道丱歲披緇乘戒俱急而尤鋭志禪宗故義學之家朗達如雪浪恩高卓如雲棲宏古心澄芳稱毗尼最著之師天童顯聖號禪社特尊之彥公皆奮臂長呼與之箭鋒相直獨伎倆枯竭禪師無餘由是伏膺禪師而動止規模之寢削萬緣罄空諸有甘畢生作無意智人矣眷靈隱祇園之勝貰賃以居三十年古寺閒房飯蔬飲水人無知者而公亦不使之知逮晚年為故人觀如法師請居上竺之蒙堂益遂閒心宴坐經行殊矍鑠無老意居恆不覆頭嚴寒沍凍雪頂蒼然畫就須菩提有與公久住者不見其拈弄紙墨忽一日索筆書偈曰今年七十五木人空裏走雨打溼虛空燈籠笑破口擲筆長逝公亦異矣哉然禪師之道實有以啓公也是宜銘以志之公楚人武昌秦氏子法名常如禪師所命也銘曰生死根非淺智拔一生辦在情枯竭銘詩我作聲金鐵書之擘窠劖之碣雨洗風磨光不滅
