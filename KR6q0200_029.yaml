body:
  text: 住明州天童寺匡廬黃巖沙門道忞著尺牘與空林遠禪師士燮憂生蒙莊樂死雖拘曠不同至于均忘其羊則臧之讀尚未見其多于穀之遊也況惑志于喪得咎休哉乃今之若爾亡羊者又不專在橫目而在吾黨之碩大者矣山空水涸萬木凋殘獨兄一人徹本無生去華存實惟能齊物我一禨祥蜉蝣人間世出世等舉無足以嬰寧又何二于夭壽而云慶且贊邪雖然麟鳳之為祥也珠玉之為貴也不自貴祥而不能必世之不貴與祥也稱觴九頓三祝華封所謂我用我法兄第任之已耳俚言微幣具存別幅惟冀慈納弗備又手教所訓諸方事非愛弟深至不爾然愚衷竊計外寧必有內憂幸諸方藥石弟則弟生矣辨云乎哉茲者山中勤舊勖弟臘八開戒屬先制不可擅廢而天童動止向為諸方繩準非大方名德如某師為二師亦無以光昭先烈弟為戚然曰如我空兄者所謂佛祖不為以瑣末干之可乎況某何如人者屈無上之尊罪莫大焉請更計宜者則又進曰首開滹沱之席者顛普化也而兄視運公恆白鷲嶺之椎者妙吉祥也而師兼七佛彼空師養志就閒以荷法耳豈真傲倪萬物不空我相哉且方丈與彼所謂相視而笑莫逆于心者苟藩垣未破曷稱焉弟卒無詞以應謹遣侍僧告白惟辱命之又靖退之節雖知足之分生而素植然自友朋之教益多矣而兄之教弟尤甚故今獲放懷于青松白石之下豪毛兄賜也客秋屢欲過訪但未卜雲蹤攸寄及鹿宕來知在姚之山南北間則弟患泄瀕死雖今草鞋稍健聞方受供城中恐過而勞煩主人則又大不便也特遣侍僧走候區區豪素不盡欲言復白雲鹿門西禪師六十不造屋七十不造衣此方內常談耳若夫出格而遊方之外如趙州八十猶行腳寶掌千歲走支那則兄與弟輩不過出幼孩稚而已六十二而造殿矗雲霄正是其時彼五十稱壽而勞人遠祝不亦笑殺二闍黎哉忙不及走候恕不過督又承諭四明法道全仗天童雪竇五磊三老牚持走天下衲子造福一方此在我費石二兄良然若弟者本録録無所能人頃以風波屢閲憂畏嬰心彌益虺虺徒彰殘朽而已況毀求全而日至過欲寡而未能進退方維谷敢曰不采無窮高自矜伐哉白雲古香火幾燼賴法力復然耳然山在有力之家終必負之而趨何幸掇而聽贖此殆天誘其衷語云鄰有喪舂不相況兄以稱貸命但環視周身除楖栗敗天公外無長焉盡底掀翻得綢一匹布一端附上聊充交關酒水之需云爾統惟海含死罪死罪又法駕踰錢唐半載矣每念白雲出岫朝莫斯還豈長令碧嶂丹嵒寂而無侶邪道者來知返錫郡城不能出山敘闊奈何辱諭郡侯韋君須弟同入天童為二家取和之說使弟聞之不覺仰天長笑且俯而深悲也夫費兄不知何如若弟自顧竊為佛法中人業唱道二山矣職在開鑿人天俾薦本有而超然塵勞之外者乃不意自有怨結致煩塵勞中人為我輩取和昔阿難晨朝乞乳為世尊身小有疾維摩詰責言默住阿難勿謗如來莫使異人聞此粗言於乎身為知識須人和會是非如斯粗言又堪使異人聞邪韋君幸無維摩詰護惜佛法心使有此心將以我輩為彼恥又肯親出此粗言邪兄得無近韋君而謬聽乎請更詳之又正想光儀忽辱手教倣佛如同面晤第恨經年以來異見異聞之事不獲焚膏繼晷為一長談耳兄為韋君留城數月卒就空王寶殿而弟自先大師告寂至今將百日中間奔走雲門退五磊虛廣潤勞而無功如此徒以後事襄大師博道路之言然則弟之虛名又何如兄實效也大師蒙厚賻而餘波復及不肖何邪謹此復謝無任神馳又歷考古今弘法嬰難自師子尊者以下無慮數十輩類皆瑰偉權奇生知博達之士豈大川利涉必需善水舟師而艱險危虞天固不以等流嘗試與夫弟本碌碌常行乃膺天私篤亦得隨墮其中顧何福要天而幸躡昔賢芳躅哉今兄獨為弟拊膺致歎者得毋以弟尤存世俗知見即以世俗所應唁傷者而唁傷弟乎深荷厚遺更銘雅愛不盡不盡與臺山梅菴宜禪師廣陵一別不覺四見青黃仁兄雖善藏六其如豐干早已饒舌故弟稔知松門寒石之間有所謂伊人久矣然彼此薶身千丈嵒前無因擔簦造謁日惟引領遙望赤城一片霞而已去歲之秋忽接老人訃音奔走涕洟方殷泰山傾頽之感而私心自計竊有之子我覯之歡乃舟抵曹娥又以靈輿歸四明不果願然猶冀事竣言旋尚得從兄一步石梁之梯詎意夙業深重陊茲彌戾車中雖今天台咫尺雲連太白之峰而俗務羈人無由擺撲加之神勞病作跬步難前故特遣侍僧走候春深霧重萬惟珍重四大為法為人自愛弗備與雙林山幢禪師前渡江邀金栗時于虎林得接手詔慨然見黃居士不泯先和尚德業與兄存沒無二之心即欲具箋裁畣以年譜雖已脫稿業鋟刻未完是以遲遲至今前書所以有援雲菴之說者蓋山中兄弟正惡有以私意具述如來教云云故耳今幸屬居士直筆吾兄相與討論則先和尚末後光明自應與歲月不能老矣彼此同為佛祖兒孫以筆舌不相饒至今雌黃無已時弟心為之恫然日久況同一師學奈何其抑人揚己狀中千祈勿以片字加人庶泯末世諍競之風則法門幸甚惟兄與居士斟酌之年譜率略恐無以表章和尚冀裁正為感弗備又阻江越邑烽火連年去歲稍通魚鴈聞法駕復出隊江淮邇來想已還山矣雙徑兵抄盜掠無寧日而上剎在臨餘之交不審鼓鐘魚磬尚鏜然水畣山酬罔或差敘否匏繫一方動止有礙既乏夌雲之錫又無縮地之謀何時對談一傾倒邪特遣小師走訊乞惠德音以慰饑渴又黃介老履道存誠期紹千秋絶學乃父子遭異變豈禍生有自邪抑無妄之災與若無妄之災則楚書曰楚國無以為寶惟善以為寶我善矣而彼不自以為寶于我何若禍生有自則無論學道人不得為君親報復律有明條抑天時人事何如而甘自冥冥決事哉可哀亦可悵也兄從江上來或知其故幸以語弟弟思白衣操三寸管能表章吾道庶幾斯人焉復淨遠禪師湖山明媚風日和融造託幽玄扣關問故飲最上之高流飫稱心之雅論開窗對古碧移榻就青陰弟于茲時蓋忘今夕是何夕矣乃塵纓未脫仙苑難留徘徊松徑話別溪橋則又何啻下嵩山兮多所思攜佳人兮步遲遲而已哉次日即趨神道路訪靈兄于皋亭之西塢承翰簡遂不能以時裁畣愧惋如何武林溪口弟已處處志之矣未審他日再來還識桃源路否與隆慶唯一禪師語風老人開法從心之餘可謂八十翁翁入場屋矣但其真率不事事過慈明其于紀綱叢林弟竊有杞人之憂近聞在嘉禾得兄為第一座此真所謂魚之有水法社之隆弟將計日俟之但今叢林師法大壞而學者知見如惡叉聚弟每思得南公舉止演祖手眼之宗師而又挾先師之位望者數十布滿天下則法門痼疾庶可救療然上之化下捷如影響況語風法匠耆年又有兄之俊拔者為之激揚鏗鏘乎所冀放出南山鱉鼻長沙大蟲或入室或垂示必深錐痛劄去其膏肓必死之疾則吾人幸甚後昆幸甚與寶慶南源禪師還山四十日中間開戒結冬分身支應不遞有失候問然每詢之往來禪者知山門鎮靜道體如宜想今元正啓祚萬物咸新即日恭惟起居多福必有征而無已也梅惠連以纍代簪纓一朝落魄旅寓江東殊可惻愴前僦屋延壽王界蓋去天童十里而遙以地方寡偶不果居客歲白雲兄及黃蠡老與弟商量惟側近上剎處最幽深得山舍數間安其妻孥彼既樂嘉遁則鴻鴈有中澤之集復朝日夕月乎兄當自忘其遷之憂矣瑞草生庭不無多兄一事但念其家世奉先黃檗老人虞卿慕義彼何為者況流先德之慈哉乞尊裁示下何如復寶壽遠門禪師去秋之暮遽以弘法嬰非常之禍由是奔走東甌往來郡會者凡十閲餘月即龍唐新住皆不能遣一介行李致訊左右愧歉愧歉令先師石兄和尚一代宗匠豈人微言輕如蒙輩者所能暴揚一二且又經浪師如椽愈難碔砆並玉矣然既辱明命兼承好木材公遠來不敢以鄙陋固諉謹按令師生平得序文二千五百言銘詞四百言附柬塵覽不審堪上石否幸賜教餘惟珍育不既復東隱玉如法師天上揚州一旦鞠為茂草獨東隱賴道力巍然于破戶頽垣之側董氏持來書知興居與法眷勝常喜躍可言退耕山寺盎乏升斗之儲而口門饒有數丈闊加以纍歲禾麥無秋民間道殣相望苾芻與檀林俱斃奈何孟擬燈後以分衛來兼省諸道友乃為大衆堅不聽前故某禪特分丐維揚所望鼎言吹歔如同晤對為感乾師傳侍者失簡收已逸前狀煩再書來當有以報命也與石盂慈築法師別來數載道躬何如若弟則髮白面皺居然衰頽老翁矣返思三十年前休夏寶山散步黃蘆苦竹間一誦功臣政橋上山萬重橋下水千里之句則寒清入骨至今牛澗嶺下路猶或夢寐踐之乃匏繫有衆之纍不獲重理舊楫一探往跡奈何渴想高誼無緣對面短函候問不盡鬱思復全一禪師一月靈峰竊聆緒論心神俱爽卻為業風飄蕩更墮羅剎鬼國昨帝城來詢知道躬多福清白之家風愈舊赤窮之活業轉新獨弟不解作何罪垢桎梏天童雖今能一筆勾下超步靈峰其如四方喪亂分衛無門未免多卻法如一番波吒也相時而動動罔不臧兄必為弟肯可矣蘭若固清幽終是瀕海之鄉密移一步似更深穩已語靈峰知事代弟掃榻恭俟惟冀不吝慈悲是禱又蒙兄成褫得遂肥遁之思青松蔽日碧澗長流可謂安其所樂終産矣奈負乘致寇虺蜴為災幾欲奮翥長征遠翔天外復虞孤兄三載周旋所以措置靈峰之意然陟險蹈危未免以日為年諸般廢閣候問差沱正復臨風悵望不虞手示下頒又審道躬嘉勝殊為快慊但論月留雲之致日就荒唐尋梅問水之蹊已成茅塞非但曉猿夜鶴共佇清塵而屋角新篁尚有待于披拂也敬迓玄旌速期命駕與本愚禪師倏違道範三見青黃然高明之宇冰雪之懷未嘗不在羹牆寤寐中擬以道路稍坦夷非過訪則邀迎庶幾風雨雞鳴相見匪遐乃本僼來聞已沒婁江涌石頭城豈不益令人瞻日月而思悠悠邪茲因侍者胸建康想虎座猶在三山二水間敬遣問興居南山南北山北雲蹤所憩定以語我俾他時得鷦鷯寄一枝也若弟之謝事天童知聞飫矣故不贅復鑒吾禪師客冬有短章奉候兼奏謝事退耕之說想已達之慈座矣昭陽賴道力不惟無首領之虞而雞犬桑麻猶然化日光天邇來聞益歸命三尊從此天人將熾盛庶幾修羅亦衰殺恚瞋獨弟四載天童豪無寸補逮今投老空山復受有衆之纍支繁幹折得不閔傷然叨在月愛三昧中或幸而免耳茲因化士胸淮揚豈曰九里借河潤正以春風改律即日恭惟起居多福特申訊問可任葵傾又翰教諄諄極承雅愛然至人化物不有己躬所以地藏恆居地獄迦文亦降跡娑婆夫地獄陋矣即娑婆亦異方賢聖見聞隨喜多生下劣心者則何利何名而迦文顧樂生此土誠以佛心所緣緣苦衆生蓋思有以拯拔之耳彼青齊僻在海堧禪道佛法不聞可知因客冬大覺之請自鄙愚蒙敢云吾道其東亦或為之兆乎且歲直奇荒抑弟不佞又不能卻夫慕羶之徒人貧智短計惟暫應山東少弛祥光負擔不謂其不可遂有如來教所云也語有之見可而進知難而退當此紛拏之世弟亦將三思而後行若夫冒利沽名辱乃宗黨吾知免夫冀寬高明之慮幸無憂勞是請與同參友人違教多日時一往動履蓋得之唯兄者甚詳頃歲來非但側身西望即積翠亦邈如山河矣豐草之野兔正喧高崖之蒼鷹未放豈道不與時強邪抑老漢無意後昆邪然今世道方交喪學者例乏行腳正因而一等為人師復大張聲利而綏之來如二豎子既據中堅矣彼庸醫復歡譊其側雖俞跗奈何則兄之引退蓋宜而未可訿議者然孟軻氏又曰兆足以行何也亦盍為之兆乎因風候問尚冀順時保愛弗備又范蠡為越謀吳卒滅吳俾越以霸矣復逃越泛江湖自號鴟夷子皮凡三而舍去皆致産千金何經綸之宜于國家若此聞足下亦然募湖山不食之田而樹藝之地力自盡故凡所以飫四來者皆不檀而辦雖足下三十年諸方豈以钁頭邊事與圃農自老者較賤良然在坑滿坑在谷盈谷道之施設亦無往不妙有如此邪或疑足下有道是矣不大行而小試俾媟吾者為前聲奈何豫謂此正足下之有得于道者也今之城隍聚落三三五五豈乏拈椎而豎拂者使足下不為此而為彼則人之媟之也將愈甚廢而中權足下有焉亦以我為知言乎否邪又兵戈繹騷連年纍月而寶坊適當孔道非法力則蠨蛸將在戶矣鐘磬誰偕金鼓齊鳴哉矧珠米桂薪之日食堂鶩去雲來猶覘悲願之深者獨某前後太白靈峰豪無佐佑而兩地禪者日往來行李踵接于庭雖滄溟無不翕受而沾濡莫已得不太無猒生邪近況何如敬此訊問與秀崑道舊奉違教言倏已五更裘葛多傳六環金錫或夌邪水或挂八公不定在水一方故每每徒向蒹葭結想耳上剎旁城隅兵火之後可保滿架薔薇沿隄榆柳青青依舊否某邇來謝事天童退耕山寺不異出岫雲夌霄鶴庶幾今春散步蕪城定與高座再酌廣陵濤上方水潦倒尊前有日矣又以大衆留夙懷莫展可如何因鴻便敬此候問興居時寒更冀為道珍愛與聖阜上人往歲秦山過煩神用調燮又以卞急之故深負雲門諸公呵呵所不負者惟大師一人而已上人棄儒從釋固知不為刊落情封然既墮身三寶則天殆假上人以入道之緣也無常生死摩竭大魚凡在有識誰免噬吞所以遠公有言生由化有化以情感乃至靈轡失御生途日開方隨貪愛于長流豈一受而已哉如此則雖爾我極生猒離尚恐錮習難痊況寒而增之沍焰而益之薪乎所願上人捐國棄俗膏智車秣明馬涉江浮海庶幾送者皆自崖而返則上人自此遠矣若復徘徊眷顧甘與世緣俱盡正恐禍將彌運為之奈何剎那變易會面難期肝膈之語統惟神照與澄霽上人別來嘗想高懷幽韻第恨無從促膝快談耳大隱菴庭前梅當益蒼軒後竹當愈翠以至敲風而吟邀月而嘯在二君必倍有佳致而無如我輩年運往矣鶴髮龍鍾生意落穆無復昔年態度何然足下方富有春秋及時有為正其宜者因風訊問曷勝神來復南山塔主先師墓銘上石承諭出資相助夫為人後者以丕承先烈為孝況不孝非僅傳太白之燈且又忝繼先師法席豈于身餘敢懷鄙吝正以有忌不孝名襲先師餘芬欲多方而排擠者若如命祇承將謂于足下有所關通故沉吟至今耳然不孝聞昔古德有入西山者有菴大梅者有眯其雙瞳如歸宗常者有終身不道其姓族鄉邑如三祖燦者初未嘗不願其閒名立謝而流芳遺烈至今未沫豈非逃名而名我隨避名而名我就者與借非其人縱鐫泰華之山勒龍門之碣將見人同勢滅骨逐塵消又烏識其誰氏之子哉故不孝嘗詠龍山有曰碑版尚空專甲字江湖偏譒隱山名堪嗟無限方墳客春草年年帶雨生蓋此意也則不孝之從違可知矣伏乞足下即如媢嫉者之心抑恆順衆生不孝將從事先佛之訓焉聊助不豐深以為愧與徑山古囊監院進以禮退以義得之不得曰有命此孔氏家法也況我輩出家兒漚觀剎海電拂聖賢者哉且人生一飲一啄莫非前定使山僧依報合在寶山遲速要當有日設若不爾雖奉敕住持而雲居一粥之緣早預讖于瑤田莊之土地神矣聞費和尚目下已入院足下自是高明恐稍存意見則傷山僧法體非小故特遣圓鑑以鄙意來疏通幸足下即以提挈山僧者擁戴費和尚則銘刻正復不淺矣短章如面有冀注存復月章瑜侍者聚散風雲浮漚起滅從何而得山僧之壽誕而足下與衆檀必欲行世諦禮并白將泰山邪水之官路當作人情哉一行作住持即苦多樂少寧有承乏他方院子便憂天下之憂而憂荷擔越州之大能仁寺顧反樂天下之樂而樂乎山僧年登耳順百事灰心即今還轍廣陵不過圖完向歲之殘局至于興建法幢非但無福亦無此心力也結箇鐵頭茅屋于長林豐草之下饑來喫飯困來打眠庶幾畢此餘生斯為厚幸矣不審有此大因緣否鄉紳諸大檀護處乞為我致謝不敏餘不備及與泰雨徹上人客冬過我匆匆別去殊為媟嫚日者歸與念動竊欲取道琅琊則九仙五朵之空翠浮天悉縣馬首緬懷昔人遵海遊觀不勝憑弔往跡之思矧辱金地主人遙從海上招手也邪第參隨既衆未免取擾上方為可愧嫌焉耳相見伊邇統惟垂照弗備又一夏之中叨蒙雅愛得放懷林麓日披襟以當無價之松風天上即不可知人間清福已受用極矣眷茲青山白雲顧欲別而難離但揚州專使再來越國簡書旋至人既勞于奔命覺高臥殊為不安秋後三日將俶裝就途念星月天同河山地異從茲會面未卜何期猛擬造城言別又恐炎蒸酷暑應接為勞謹託管城君專申致意人事紛拏惟冀善為珍嗇金玉自愛臨楮可勝縈懷之至
