body:
  text: 住明州天童寺匡廬黃巖沙門道忞著碑銘敕建南苑德壽寺碑奉敕撰文諸佛以一大事因緣故出現於世所以設教利生無非開覺群迷俾明自性而已自性明則塵勞息塵勞息則法界純真法界純真則超然無寄故初祖之對武帝曰淨智妙圓體自空寂如是功德不以世求然迷途未復覺路方遙苟不導修福嚴則沒在諸苦曷繇自振此覺帝之揚靈火宅凡以利樂夫人天者至悉也乃後世過舉匱國窮民專求祜祐於靈祠象設福之修且不勝其怨之叢自蕭梁差跌以來為世儒口實不知幾千萬喙矣天祚有清我皇應運爰以幼沖之年總攬乾綱削平四海幅員之廣奄有華戎其於敬天法祖之規致治勤民之本遠則希蹤大禹近實取譬漢文語其敏求則經生未逮推其問察則草野可師所以諸凡帝典王謨詩書六藝朝堂之得失相業之醇瑕靡不洞若觀火別若素緇尤復契慕空宗留神祖道萬幾餘暇不廢咨參自非靈山大士悲願夙承示作帝王何以臻此然君臨天下十有七年唯是日求敉寧與民休息概未嘗勞人動衆經營臺榭少侈遊觀特於順治十五年八月日指授臣工考卜南苑中相厥爽塏之地創茲靈宇一區中建普光明殿奉安釋迦文佛侍以韋李二天配以十八應真前為護世四神王殿再前為三門司啓閟也後闢方丈以安主法之僧尊法教也左右為廚庫僧堂安清衆也殿之左翼供觀音文殊普賢右翼供地藏藥王藥上皆十方世界名稱普聞之大士所以昭往行也復設東西二樓縣置鼓鐘於上所以號令晨昏也然後繚以周垣樹以塞門罔不緑疏青瑣金煌碧輝用是集福儲庥上報聖母皇太后劬勞之德教育之恩是則我皇孝思永長百王足法其與專求祜祐以庇一人者不亦大相徑庭與歲在庚子實臣僧道忞奉詔來京之明年也于時告厥成功中外莫知皇帝以忞學佛之徒於佛事門中為能曉暢其故命忞撰文紀事鎞諸豐碑將以布告臣民焉忞愚不敏重違慈旨謹拜手揚言而獻詞曰世雄設教開鑿蒙昧如抉金鎞上智悟明識心達本覺即菩提小機羊鹿詔修福慧孩幼是攜聖帝明王靈山所屬我法塹城徒知崇奉匱民斂怨國是用領豈佛詿誤執事迷理世實聽熒大清啓運雲開佛日首出我皇聖智生知爰在幼沖總握乾綱神武不殺懷綏以德揉此萬方勤儉斯躬勉勉大禹翼翼漢文金玉為度克明克類克長克君古訓是師亦經亦史亦典亦墳靈源一發糟粕詩書覃求祖意萬幾餘暇日就月將咨參不置乃知我皇統御金輪誕從佛位十有七載蔀屋乾乾遊觀廢罷猗與南苑誰輸梵宮四天來下檐阿華采像設崔嵬金輝玉射於皇聖母宸躬是鞠帝德式楷皇心孔念昊天罔極厚地無涯德厚恩高何以報之有覺如來乃命臣工匪疚匪棘精廬是飾以祈黃耇以介景福以引以翼允矣我皇永言孝思孝思維則帝嘉忞學禪證有辭文宜朕詮忞拜稽首對揚休命風雅典鮮視於臣民明昭有清天子萬年南海普陀山梵音菴釋迦文佛真身舍利碑明州古稱三佛地其最著者曰鄮山蓋周厲王時東天竺國無憂王所藏釋迦文佛真身舍利處也去明州薄海五百里外復有山曰補怛洛迦者則普門大士化跡所顯以佛菩薩慈因緣故故自晉之太康唐之大中以及今上千齡歲奔走赤縣神州之民至有梯山萬里踰溟渤犯驚濤扶老攜幼而至者不衰山處大海中為支那四山之冠鼓涵風日摩蕩雲煙其最高巘絶處為菩薩頂菩薩頂之下為梵音精舍當日月晴霽則千山排闥而隱隱隆隆於青螺翠黛之中者鄮山也熹宗天啓丙寅有梵僧至自波羅奈國見其洞壑平坦以為八吉祥六殊勝地莫是過乃出所懷舍利建塔其上繇是慈網交羅海山互映矣塔高如來身量內奉旃檀香塔一肘量黃金寶鉢為承上以金鐘彌覆之而舍利實藏是焉初梵僧募塔平江人莫之信舍利愍之乃顯神變為之助發於是有見三者一者見黑白紅色間錯者或唯見佛身相好者或始不見而終見如徑寸大者遂一時傾施填委塔以成其莊嚴妙麗類鄮山而安奉之法則舍利從黃金鉢網楞眼中投以入及禮覲則出以視如是者再三出之則增長數倍不可取視焉今上皇帝丁丑春仲余自太白來觀山中耆宿咸為余言且請記之余曰舍利聖人之骨身也聖人神變不止是愍世狹劣示其小者夫何足以觀聖人哉當觀聖人韜光掩寂而舍利留靈福天上人間亙百代歷金石水火而逾靈逾固者抑豈無自而然哉蓋聖人體道乎其身達形神而一之臻夫大妙故能聖變無窮其自書契以還薄海內外苟非聖人非聖人達道弟子罕不葬骨五泉遺塵九土豈其道與聖人異抑身夫其道者或日用而不知焉或半生半滅半不生滅焉是以見有虛棄依正相隨又烏怪其然邪故佛與羅漢皆有舍利唯佛最堅不可壞而先德嘗稱真淨舍利大如菽五色晶瑩而又堅剛嘗置鐵砧舉鎚擊之砧鎚俱陷而舍利無損謂其平昔踐履明白見道超詣所致諗余舊聞豈不以其道之故哉是以先德說法往往提唱身心一如身外無餘之旨而近世皆諱言之余恐聖人之道將隱而不章故書此而告夫吾輩之為聖人之徒者復系之以詞詞曰有大導師哀世昏濁示生五天四十九載身教廣被以逮多千乃愍末學碎此金軀布為飛煙從煙飄墮珠糝玉粒舍利式傳生人之理髮毛爪齒以日以遷矧其散壞下飼螻蟻上食鶩鳶誰閲千齡探之水火不可濡然咨爾佛子爾見有棄聖無所捐以無捐故如春在華光色明鮮亦如甜蜜即蜜而甜無有中邊遠矣南國誰負導師於海之堧廣顙隆準萬里懷來建此層巔嗟曰未建衆罔克知緝緝翩翩小大攸示出沒隱顯衆翕以跧咨爾佛子爾觀舍利勿以意甄導師非二即爾觀時覿體見前舉心分別舍利隱矣滿目空阡況復厝疑狹劣其思而不敬虔稽首大士天龍之屬與其鬼仙式臨我詞我詞非紿以昭萬年四明雪竇山資聖禪寺中興碑粵維震旦心燈岷源嵩少四傳至破頭雖橫出一枝佛法尤隱躍於時又二傳而至曹溪則得道者如林一時散居巖竇由是天下名山三百支山三千半為釋梵龍天之宮矣而叢林之盛獨擅江西湖南者以有南嶽青原馬祖石頭碩大之師爰居於此也自一人指南令行吳越之讖縣諸大仰而後東西二浙大法潢流致茲名坊顯位蔚為五山十剎其間唯雙徑天童雪竇最稱法窟者蓋雪竇以顯天童以覺雙徑以杲故也天童盛時殿宇崇高百六十尺其他食賦之莊碁布三州八縣旁及海堧島嶼之區當此貪殘剝啄風火彌綸宏規莫問之秋尤能感先師一掃劫灰而歔之燼則山川祕圖之雄可想而知其概矣雪竇則宗四明而祖華頂踞群峰之上遊其高出雲天其羅青錯黛不知幾千萬疊中乃霄然洞開梵宇原隰每每雙溪流碧異境靈觀勝焉茲絶且也虹飛雪瀑天設巖臺雲壑幽奇珠林蒼倩所以發明王之夢煥奎璧之章歷宋諸宗爰下敕書四十一道疊賜御製御書御袍御香御茶金寶碑師號命服免徭役禁樵采歲度僧一員守香火而宸眷不衰焉寺創於晉初名瀑布院後改瀑布觀音院至宋咸平間敕賜今額為資聖寺其成十方院以禪宗住持者則自常通禪師始也其浸昌浸熾宗風丕振增其式廓輪奐益新者則自明智二覺禪師宣而著盛而大也後雖興廢靡常然承纍世之餘烈則時有紹興之燬如湛修之至元之災善來復之皆不旋踵而嗣興逮入明年則常通法鼓久已停音子院師蟲幾成檮杌天龍告哀鬼神西去乃有崇禎十六年之變兵燹之餘蜂房蟻室卒同紺殿琳宮雨風消歇此大人利見之機剝極復旋之兆具章於此矣於是有司議除議革龜莫告猷一時甬越人士聞而慨歎豈可當吾世忍令四明勝區頓埋荒草哉致有道之師坐鎮之舊觀可復也今景星巖不有石奇禪師孤風無忝二靈高道可方兩覺者乎且天童嫡胤是嘗佐密翁中興太白于起乳峰也何有共走仙居告所以挽師之意師為咨嗟賦感而來說法茅堂儼臨萬衆門風險峻壁立千尋蓋師既傷雪竇運會之式微尤痛法門人師之混濫一意撒其蔀葑別開靈牖凡有來者一一與之刮皮及髓洞根見元飲之以冰檗飽之以雪霜刀尺爐錘之下固罔非鐵額銅頭而走聲之輩莫不自崖而返洋洋然去矣師不顧也居凡一十五秋殿堂樓閣與夫象設諸天煥然一新莊嚴畢備厥功懋矣可以配古而舉事維艱萬難於昔蓋昔之燬於咸通也有士張昱者葺之矣其崇於景福也有刺史黃晟者施田千三百畝而佐之矣繼撒新於周之廣順盛備於宋之淳化乾興也上有佛心天子下有樂善高門抑無事不咄嗟可辦矣今則四方版蕩荒亂荐臻而幽草芃狐轉為魔孽且有假法産充兵餉媚茲驕軍悍將冀滿其溝壑者矣然豈無秉護世熱鐵之輪韋天降魔之杵如心朴羅觀察之俊顧奉侯其人者而十年之內山海交訌朝往非象弭之夫夕來即魚服之士師蓋與諸禪日在鋒刀頭而非坐即臥者也乃能即此坐臥之中不動聲色需材則百圍之木不難塹堙山谷而轉輸需石則千仞之岡可使奮迅龍蹖而開宕雲水趨於父事庶民說而子來非師悲願夙承慈風廣被曷由致之於乎追還既湮之寶所幻出方蹶之瑤天雲老山香再起千峰寒色嵒崩石落重高雪瀑飛聲此豈尋常興建之事哉是宜文以志之詩以詠之用昭此山與師功德俱不磨焉於是盥沐敬虔而獻詞曰四明肇域三佛留蹤天台比峻禹穴推雄回翔百里盤結千峰星螺掩玉蝶翠排空寶坊碁布乳竇宅中儼開圖畫巧設天工嵒臺插漢雪瀑飛虹蜿潭光怪珠樹玲瓏山鳴晉代宇創咸通五宗迭主四海趨風堂堂二覺法中大龍沛滂法雨式廓禪叢夢感宸遊昭格帝衷奎章煥發恩賚疊降晉元代閲千稔其穜豈無興廢曰替斯隆孰如今者法鼓塵蒙既侵魔孽返食師蟲景星將耀天假祝融一烈兵燹祓除晦霳乃瞻啓明皎皎在東昏宵不昧六宇光泛何求為我以奏膚功民亦勞止歲迄荒戎罄是用憂師曰無庸在嚴法道光啓吾宗一十五年坐臥兵鋒我攝我化不懙不忪龍戰于野谷堙為同飛砢挽木作此梵宮梵宮既作萬福來同豐年穰穰禾麥菶菶功德之大與山俱崇勒銘昭萬祀頌說何終窮西徑山雙林寺中興碑閻浮提中拔地數萬里而高出者為大雪山由雪山東行萬踰繕那岐分三幹而底于海堧者為東震旦國北氣渾雄多沙漠中氣淵夷多土田南氣清和淑麗多奇峰怪石故仙釋之家大啓南荒極於浙地蓋浙東有天台雁宕之奇浙西有天目兩山之勝由天目南行至高地斷而復起綿亙數十里而盤踞其上者為西徑山山開平壤而緑疏青鎖間見層出于蒼松翠竹之間者為雙林寺由是五峰環抱則有天掌峙其北驪珠獻其南右擎雲筆左抹蛾眉莫不奔青擁翠以來宛似蓮敷海日焉至若池開浣雲匯諸流東合溠水然後倒嶽傾湫而下又不啻玉瀉天河矣由寺陟前岡坐迎暉亭則西眺臨安東瞰錢唐南望江潮俯視集賢鄉龍飛鳳舞之山盡翔其下寺建于唐天成間有禪師景文者遙瞻瑞氣光騰雲漢因謀結廬其上開基得銅佛三尊未久成寶坊初名寶林宋治平中敕改今額餘諸往蹟雖莫可考然無準雪嵒天真諸老遺象巍然俎豆其間豈非先佛之所留蹤祖燈之所駢耀者與嘉隆以來寺老僧殘始更十方為甲乙相傳至萬曆間復燬于火崇禎末僧愈式微里人惜焉乃以山莊安其餘衆力挽今山幢禪師居之住未有幾殿堂廊廡廚庫山門禪誦與寢興有制明軒與淨館交暉含風之閣吐月之樓煥然一新至于象設之莊嚴階陛之整飾疑寶林無恙時不是過也然而一椽一瓦罔不越崇岡踰峻嶺飛挽而上矧乎百圍之木不翼何翔千石之砢無脛安至來者驚為神輸鬼運而不知壯者施力巧者施能富多財者施金粟師固挂壁一瓢隨身兩膝于市城無跬步之前于檀信無寸函之問即邑中令宰挈一榼攜一觴且力卻之去爭之卒欲憑高遠眺不可得況復濫同世流曲求旺化專事競奔搖鈴擺鐸之不足繼之以請託于求焉請託干求之不足繼之以夤緣要結焉夤緣要結之不足繼之以茶蔬珍玩焉度可以邀貴人一盻之榮傾顯者斯須之蓋慮無不效其奴顏婢膝而折腰擁篲者滔滔天下久矣乞墦之入我桑門登壟之冒我祖胤也雖然師固非因之子而矯節為斯人而厲行直性成之剛天與之骨是以十載天童親為入室之子不詐現知識身相不指稱太白師承可覘而定其素矣竊嘗論之百丈大智以前無住持事諸凡有志于道者一衲雲水萬里求人及乎草鞋跟斷得意歸來則石室茅齊笆籬槿戶大忘人世而已所以價密二公之訪龍山也望寒煙而進步嵒頭雪峰之道過新吳也睹黃蔬流出而興嗟彼四公者豈健羡夫名坊大剎思投託以圖安乎故住持之高踞叢林非古也大智以後則禮周樂備或廣居而蓄衆或設象以標尊于是有興修之舉然揮金布地一聽長者之自求多福耳初未嘗事干募啓攀緣故為干募攀援日征逐于城隍聚落之閒以塵坌其緇服者猶非古也效古德而居山秉古規以建置于師僅見之固不當表顯其人歌揚其事而風回一世哉歌曰迢迢天目脈流長大徑凌霄小入蒼天掌申來自日旁撩空一劈青蓮張彤雲冉冉氣何祥寶地三災不可戕內閟慈容滿月光景文天使發嘉藏一朝布地檀金黃八部仍瞻覺帝坊俎豆前修穆且莊祖燈千載覘輝煌胡然白社頓頽涼末世堪嗟魔力強假我衣兮倒我裳走趨聲利若奔狼運回百六法宜昌吹燼還師玉骨剛入戶聽雲繞蘚床八風徒爾肆飛揚非師有作起仆僵道重人天自贊襄法象崔巍碧玉堂精藍再見五峰翔興衰起廢師豪芒塵坌袈裟世獨倀德喪崇階道失場千間謾詫百回廊永寧塔蚤沒青陽同泰宮傳柏作梁當日高華轉眼荒滿原禾黍歎秋霜師同雲筆驪珠皇我作銘詩寫玉鏘珍重山靈勤護將留與濁世障瀾狂青州大覺院達法訣禪師道行碑順治壬辰之秋季青州達法禪師歸真大覺相國張東萊已擷綜其大者為詞銘諸塔矣其徒以師行業跡涉神異事多逸于散忘苟捃拾夫銘之所未逮者而折衷焉無洪纖皆可振厲末俗盍曲紀之則以其狀請論次于當世有聞之士然後授之豐碑而昭示來茲先業其不泯乎遂以其事屬之夫豫豫惟齊壤錯海山山川淑靈之氣必有鍾而發越之者是以蔚為萃拔人倫神游象外之夫故東莞之有竺法汰也則道重王公矣北海之有支曇蘭也則德服鬼神矣沂山天作緇水洋洋顧何代無哲人獨是象法垂秋聖賢隱伏自青州百問之音響絶南陽乃邈如曉漢疏若晨星焉於乎求崑璧於炎岡雖寸瑤莫問矧功利之俗尚方堅誇詐之習湛日甚一齊未傅衆楚交咻乃卓然不隨世波卒能以道自見若師之可傳又何議焉按師名通訣字達法益都李氏子幼負出塵志九齡以二親俱喪猒世相乃投玉田菴出家十五得度本名慧田字見龍天童密和尚為易今名云玉田應院也師淹留積歲局若圜土至年二十四徑走東萊從璽文慧明諸師廣習經論之學一日覃思首楞嚴雖得多聞不成聖果之語復悵然自失始有問津祖道之思矣於是矢志詢方遵海而南至琅琊因明空大德指參淨光老宿于石河依之四載一日光問僧思無邪有思是無思是僧方擬答適師叉手立旁光曰見龍下語了也你尤自葛藤作麼師聆之微有省發益感奮立矢不語三年杜多行以終身期明己事報佛恩德故所至翛然一衲披寒暑食才接氣而已至於忘軀事衆則由也兼人有輕勞無重務焉聞天童道風遠播叢林之盛雲水湖海之躋蹌不勝高山仰之景行行之遂由河北造甬東徒步三千里躬就刀尺之下一聞示誨如飲醍醐由是日有智證雖服勤衆務陸沈下版之中而函丈中人固已別具隻眼以待之矣因疾出山還益都繼而求登菩薩戒品復再上天童親炙踰年乃以歸建叢林揚化父母之邦為請天童韙之且致重誡焉歸即潛住平山單己嵒居草衣木食卉無甘苦一嘗之殆遍有訪者曰境僻人荒如此得無蛇虎戒心與師曰你欲見否回視即一虎在旁其人怖懼則揮之令去住凡五稔僧俗四遠欽風親依唯恐後師知可以有行也乃自陳夙願由是天人協贊一舉而成大寶坊寺距郡城一里當西北之偏青峰翠岫緑瓦朱楹時或旭日初升夕陽斜照則山光樓閣互相蔽虧規制差小天童而壯麗實過之東萊張相國尤深敬信復別創禪院居師故師為青之大覺萊之福慶兩寺住持惓惓以本分者著子提撕學者概未嘗登猊座操鎚拂為人舉揚衆請之師師曰莫𧬊速俟法堂方丈就吾則為老黃龍和尚當自有南禪師為你輩說法也故叢林方在天開草昧之初即事事準以大智清規是以規皇矩疊禮周樂備不赴外請不事交結老有養壯有學少有模至今遂為大河以北法社之冠焉尤嚴一日不作一日不食之戒聞鼓普請未嘗不身先率衆暇則詢老疾課童行利導諸司以為常初夜必跏趺危坐中夜經行後夜禮佛或時漫步朗吟達旦蓋脅不至席者終身焉間嘗有病病雖至殆不藥餌不困眠即病之一字曾不一語道及生平視身如幻嗜道若饑利衆如渴當流離之候收養遺孤喪亂之餘掩藏暴骼此其一斑也所以至行感人真慈格物化惡則一言從善履反則一動為平夫豈偶然者崇禎十三年歲饑民大疫死者相枕籍城鬼號焉宵啼不止居人求師薦拔師以一紙宣示使貼其處則當夜無聲寺基王産也化王衡國不允是夜王感異夢即親定封疆舍歸三寶適搆禪叢值時大旱三月不雨有闡提者嗾諸當事議撤燬矣夜則雷電晦冥河水湓涌平淹子城數尺嗾者悔禍議遂不行鳩工締造得大木焉工師曰棟梁材也丁丁伐之斷而不仆增數百人牽挽莫如何也中宵居民忽聞甲胄有聲嘽嘽燉燉宛若三軍赴敵而來者驚起視之則大木傾矣殿之千椽萬梠皆信人唐鐸所募鐸故郡豪吏聞師一言示誨則棄吏為鬻香長者日走山鄉化諸椽梠有人為鬼攝至深林使投環焉鐸過之鬼驚曰唐某來迅逸而去人故念鐸不置而不知鐸為何如人也一日有遇鐸于途而呼唐某者人聞之則涕泣拜跪于前具述所以活命之恩審之月日良然後鐸死其夜數百處空中高叫咸聞鐸催送椽木聲故殿工易就而師之感人有如此者師詢方問道受益天童既深依之亦最久故凡建置規模山門格則以至立身行己之大綱與人接物之細目雖道有汙隆風有南北大都取法乎其大者為多法其海納山容之量則豐儉隨緣方來翕受法其巍巍堂堂之偉度則靜若山峙動若龍跜法其壁立萬仞之孤風則聲利不能移威武不能屈不為王侯罄折不以負販倨侮則天童之一目簪紱輿儓也杜甲乙相傳之漸竭盡衣資置石橋伯牙兩莊場以安插其徒子則天童之金酬服從不以一廑小師有也居恆有達官長者入寺隨喜其迎送款接之禮一概委諸知事即東萊從受皈戒于師自稱門下弟子而師亦無疏䁥其間逮庚寅冬東萊入朝造師言別獨惓惓餞勉有加則師猒世之意蓋見于此矣壬辰九月望後四日忽示微疾至二十一日中夜與僧孕靈問答竟乃泊然而逝訃告鄰封耆舊及護法檀越之家或相距二百里或相距三百里東萊遠在都門則又相距千里之外咸言是夜夢師來訣之狀留供三日端坐如生依法闍維收靈骨建塔于寺之西原歸窆焉世壽五十三僧夏四十五前後說戒一十七壇從得具戒者千餘人剃度弟子七十餘員僧俗皈依者不可殫紀异哉宗門玄唱絶于玄枵者彌運師以孑然一躬起末世越等流不憚煙水百城之勞虎穴魔宮之險汲汲焉皇皇焉苦志劘筋以求道利生為事卒能道重天人德欽神鬼立之斯立道之斯行頓然平白地上幻出龍天釋梵之宮惜無語言述作以光昭佛祖爾然東至于海西至于河南至于穆陵北至于無棣人知有佛祖向上事者則皆其開鑿之力也可不謂賢哉著為辭以昭布來茲其誰曰不宜詞曰含生之慧目盲以癡所蒙論劫迷真道常行險惡中康衢誰與示出彼邪見叢我法自西來奕世有良工成風運吹毛智刃刮其瞳人天眼忽開大道絶隅封海岱惟青齊洋洋大哉風支竺代何賢格鬼孚王公山川孕靈淑蔚為僧中龍時丁象教衰濯濯牛山童玄音久不唱俗尚唯利功饑世或相食人類轉頑凶乃有至人起悲願夙所鍾撫茲末運儔慘怛填膺胸何以衆生魚使之脫罟量何以渡河獸使之立飛翀溟探川以浥厥懷未易充浩浩玄風播聲來太白峰勞輕求者重誠竭志乃通合卻鉢盂口八面光玲瓏歸豈戀鄉土揚化在我躬範人須自範尚口故滋窮虎可驅使令草可辦餐饔心若不異時諸法自玄同道大天人協德臻神鬼祟依教非面革說服本誠衷華嶽巨靈劈黃河一瀉東區區建置事潛以消啄訌蓋師末節爾何足為詫忪異哉豪吏鐸志壯心膽雄法師只一言翻然悔悟終死生有奇節況復在陶融我敬師大者一目仕與農東萊稱弟子跪拜無德容方在締搆初規疊制已鴻功成不自居謙讓度何洪一朝能事畢雲雨散長空分身往告訣千江月影逢師滅儀刑在高揭泰山聳銘詩告來者萬古開鴻濛金陵大報恩寺重建琉璃大殿碑記諸佛如來於一切法成最正覺以故其身充滿一切世間其音普順十方國土蓋以法為身亦即以法為宮殿者也所以經言如來宮殿廣無邊自然覺者處其中如是則金剛寶地本自天成菩提覺場匪從人得又奚假運成風之巧程匠石之能而取辦於世智辨聰哉第一真法性雖生佛同源過由明昧之岐以至升沈異趣勝劣殊形故凡有善世牖民之責者不得不開張化儀導歸覺路爰自大教東來千有餘歲其間聖帝明王一推我佛為群靈之首萬法之宗罔不嚴飾祠宇設像標尊所以開覺臣民者意在斯乎金陵梵剎經六朝建置凡四百八十寺鷲宮鹿苑之崇實甲天下而城南大報恩寺又為諸山之甲蓋在赤烏間吳大帝以康僧求獲舍利為創寺長千里所謂建初者是也晉大康中劉薩訶又於長千里掘得阿育王所藏舍利復建長干寺嗣後宋元代閲或章天禧或表元興咸仍舊蹟無增廓至明成祖永樂十年始敕臣工準大內式一攃新之賜今額為高皇帝后報厥劬勞由是琉璃紺殿與金色浮圖互相璀璨光燭瑤天而寺之輪奐至此稱冠絶一世無與京矣嘉靖乙丑殿毀於火以工繁費浩之故中外朝野莫敢問者數十年崇禎末國戚田弘遇疏請先師悟和尚住持將謀是舉師以老疾固辭事遂寢後有舉者功皆不竟卒及申酉之變又十年鐵山王公倡之於前俄而謝世提督管公和之於後未幾去官總東南王侯宰輔所樂助者未及萬緡此都使危公有僅得其袖即欲成衣之喻而三宜禪師所以深是其說也至順治十六年世祖章皇帝留神祖道璽書傍午徵詔宗門耆宿入朝顧問是歲沈君恆文亦以織造周公之勸請華山見師之贊成直毅然身肩其任矣隨於庚子鳩工壬寅集事落成於癸卯之季冬僅及四周上自象設幡幢下及階墀闌楯煥然一新費金三萬七千四百有奇而君之借貸子息無與焉計工十三萬三千四百有奇而城南五百家之助力者無與焉翻劫灰瓦礫為棟宇簷阿變苔莓塵土為金碧琉璃信夫有非常之事必賴非常之人也君家世奉佛子弟多恂願獨君詼諧廣肆年未三十即威震楚吳縣金肘後矣尤潛心內典日書雜華諸大部不輟所著詩文亦富及滿車蓋翰苑之英起為龍城飛將者也故說者謂君才兼文武智足籌機勇能決事是以有成不知四載之中風波坎折幾更憂虞君唯忍力守之不足則以大願持之大願持之不足則香然頂臂祈告韋天至所然之香與殿毀之年正等皆九十有九焉而後知成事之難未可以才智襲也夫明當隆萬全盛之朝邊烽不舉刁斗無聲太倉儲積至粟紅貫朽不可校尚於祖宗植福之地愛惜金資逮獻闖一呼天下土崩終於府庫非其財焉清興十五年戊戌世祖親擇南苑嘉祥之壤捐金億萬建寺曰德壽者為聖母皇太后集福儲庥及庚子工竣上備齊行宮命忞隨喜從容語忞朕虞兵興賦重民不堪命耳俟海內康安國用稍裕當為名山勝剎次第修葺一番不謂鶴鳴子和沈君即以是春手拈莖草灑掃南天徑從荒甓斷礎中扶出冠世寶坊異矣哉豈非國運法運同一盛衰而機緣湊合真有默司其間不可得而思議者與增山川之瑞色啓社稷之靈長萬衆歡騰人神協慶顧不當綴以高文壽之金石而昭示萬齡哉但豫學愧荒疏語慚率略深廑無能行遠之羞乃沈君固援德壽往例謂豫曾奉敕撰文有當宸衷北闕南藩何分朝市由是辭不克免謹殷重載筆而為之銘曰金陵勝地實甲真丹山鍾王氣虎踞龍蟠滔滔江漢天塹維雄捍茲南土萬寶以通民殷戶實轂擊肩摩居焉絃誦市也婆娑俗尚好修投誠三寶香火家家佛聲浩浩嗟誰使之蓋在孫吳僧求舍利聿降天衢金石為試堅莫可鑽光騰霄漢吞飲雙丸乃徵神異乃建寶坊法檀既普聲教斯張寶坊維何長干是隸崇祀千齡引之弗替爰至有明式增式廓金碧琉璃準以黃閣煌煌玉宇奕奕瓊臺天宮或遘下土何來四海趨風百神效命矧其在邇而不皈敬遂生魔妒舞馬奔騰一經毀墜屢舉莫興非無興者適非其辰運會之隆以待至人清開世祖明大文皇同乘悲願為法金湯長干舉事德壽功圓何心庚子璧合珠聯鶴鳴子和景陽銅山君臣一體神氣相關明明天子矯矯虎臣重開覺路掖我生民寶所仍還化城再出遠近來觀儼升兜率山川輝煥社稷靈長功德之利以佐我皇允矣君才國之禎幹文足經邦武能戡亂道旁築室鮮克有成風波反側何以底平君文能晦君武能權為謀為毖弼時仔肩香然頂臂昭格大神信有冥鑒數符毀春告文紀始會計程終華美堪匹檀弓考工君烈崔嵬我詩弘廣載之豐碑同流天壤
