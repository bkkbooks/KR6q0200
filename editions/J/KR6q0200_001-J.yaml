body:
  text: 住明州天童寺匡廬黃巖沙門道忞著風春葵風乙酉之役處士孫開遠舉義嘉禾戰沒孤城詩以誄之藹藹春葵向日而傾曾我𥊍御誰則匪臣交交桑扈晨去其枝青青子佩悠悠我思願言思子章服生儒蒿目神京奮挺大呼南風不競北馬蹻蹻孤城絕援聲凄夜刁鼓兵以出白日為黃結纓戰沒豈曰國殤彩仗雲旂歸神天上在帝左右招之或降相韓五世博浪椎秦子胡為者舍生取義殺身成仁中原血戰四海交腥鴛湖湜湜濯其潢涇百祀流馨春葵八章六章四句二章五句玉樹風玉樹旌孝節也清師入邗謝女希韞與母張氏同赴井子宸救之母絕宸不忍去死焉長子朝出護墟墓遇害於途于陛季子也感母兄之變亦悲憤而沒故作此詩以哀之謝家玉樹鬱鬱邗溝華開瓊萼五葉綢繆有風自北折屋傾舟飄然墜之香潔誰儔溫恭薦婦朝夕斯寅腥埃撲面何以潔身有冽者泉託彼澄鮮孰能芳桂蕭艾同捐宸也亢宗文心雕龍死母生護卒嬰凶鋒天何以醉何神不庇舍彼驕人維此胥忌摯爾希韞靜女其姝令儀令色淑慎維圖青鋒是佩用戒不虞見危授命終殞厥軀迅雷遄呼親懼則然忍看黃沙昏晦無天朝奔墟墓齊思見賢誰曰爾正而斃戈鋋陛幼孝友性自天成蘭芽方茁風雨交攖呼兄不至聽母無聲悠悠千載閉此愁城彗孛經天白晝宵昏煤山龍去誰從如雲嗟爾謝樹實繁有柯我心孔懷是用作歌玉樹七章章八句雅靖楊雅皇臨命鄭公陽備淮海卒靖淮海之亂也皇臨孔章昭茲若監靡有爾勞皇不爾鑒仁則爾柔威則爾悍哀我東人惠此良翰良翰伊何維鄭中州嵩嶽之靈申甫之儔我東曷棘于邗之溝宛宛周道四方來遊來遊來王高車大航盜思襲矣舞戈以狂以偵以誘裏我姦佌不畏爾元俾民流徙我翰戾至載安載集募茲拳勇弁為武什毋啟爾戎毋俾爾翼既訓乃稽盜偵斯得既獲盜偵我姦卒俘正之皇刑往即爾誅爾誅爾悍我柔我恃闔胡不悛覆狂以喜翰曰吁哉其饑而譁予而父母媿不而家乃陟其疆乃造其廬大降厥心畢叩且歔民之歔矣亂斯沮矣民之舞矣盜斯逋矣其曰未逋憂我厥肮孰躋我圉以泳大康莫此大康維翰實崇式崇式庸維皇之忠維忠于皇厥猷翼翼秉皇之彝訓于南國烈烈東南我翰營之湯湯江淮我翰清之既清而瀰王道之夷于萬斯年皇以治之皇臨九章章八句韓城雅韓城嘉瀚遠朱鎮君宦生潮陽復建節于其地也溥彼韓城瀕海之陽蜃蛟所宮鱷族維彊昌黎作牧文運開張濟濟多士賓于有唐化雨千春誰承遺則在帝神宗朱侯洵直去詠甘棠來歌九罭乃誕嗣君天鑒有德維此嗣君五色麟祥允文允武萬里騰驤纘戎顯考載鎮南荒四郊以靖海波不揚鎮君出遊虎纛龍旂釃酒臨江橫槊賦詩敷其文德率服島夷來獻其琛赤豹黃羆嵩高誕申玄鳥生契矧伊鎮君萬夫之傑潮水泱泱鳳臺嵲嵲允矣九苞式生丹穴韓城五章章八句詩一送以直愚禪師之雲間謁董太史乞黃檗和尚塔上之銘間生亞聖人愍世垂高格奮跡光黃間其道苦如檗怒罵恣憑陵佛祖驚且易盡渠神通來箇箇遭點額住世八十霜重譯流聲光疾彼投名者蛻委息影藏豐碑久不豎天龍嘗歎傷愚公邵武輩派出臞仙王投簪叩籌室一笑登其堂為覓先師骨洪波泛淼茫持向雲間去索取回天章太史聲名重文章繼子長書之擘窠字寶以金玉相千載頌明德景行永不忘送元白可公出天童青眼當初最直錢等閒不把費君前朅來相見出新篇拍案槌呼感往年豈為君詩動百千為君眉底裏雲煙春風吹翮又翩翩刷羽臨岡問所先予意言之君亦然咄嗟為祝予思賢予思何在西之偏汾水滔滔清且漣三十白來足不緣泊然亭箸蛻而僊古人細事尚光鮮何況其中大者焉君聽予歌志欲鐫予歌未卒予心卷法門大事悲若填君不惜予誰共憐送鹽梅鼎禪師住南嶽大鳥高舉摶風翔千里之行月聚糧嗟彼屈蠖動求臧進退猶如牴籓羊我友鼎公氣摩蒼雙瞳射得烏欲藏龍象三千蹴道場角蹄鐵硬數公彊叢林號予難比方方公眼惱足相當吳山越水已十霜打包別我上衡陽衡之高兮南極旁迴鴈峰前日月長金雞粟供僧中王山君自此壽而昌聞道年又告天荒君去須教喜若狂叢生茅茨搆君堂黃華白水獻壺漿待君果熟時飄香奔走鈞天亟躋蹌君不見大鳥高舉摶風翔黃嵒山居即景十六絕黃巖寺絕攀緣處路初入解轉身時岫始開排闥谿光金布地厭簷山色玉成臺寨雲峰嶄顏不宿埜盤客寂莫難留冠蓋群日暮林號狐兔遠開關只合延歸雲行龜峰嘉林不住況潛淵脫體全彰界外天自信生來能越格六藏何用小家禪犀牛峰不耕祖父閒田地肯守寒嵒異艸生觸處尚嫌頭角快又披風雨入高崢雙劍峰雙垂天末落群峰日炤寒芒血暈重在昔虛空曾剖判至今風雨尚磨礱鶴鳴峰惜傷羽翰遠江潯集老南天萬歲岑翹首不無華表恨戛然猶似發長吟香爐峰甄陶不費列中天信是安排造物先皎皎冰輪傳夜燭霏霏薄霧散朝煙紅石嵒丹嵒嵌壁切雲霓誰信通天步有梯蹋著始知來處迥虛空撲地萬山低羅漢嵒嵒背青峰月上遲森森白晝走魈魑雲長深鎖虎長嘯何似當年護定時空生石石中空可居人而上平如砥建閣其巔曰空生因遂得今名盡道孤危曾不立誰知大地自空擎欲看樓閣空中見請向虛空背上行鷂子石憑高岸立志霄摩豈易雄心付薜蘿對月端懷天上兔臨風恰欲過新羅姊妹石尋真偶共話煙巒幾度秋霜鬢未殘何事玉容人易老冰心端不似伊寒瀑布水聊將一線放渠開不覺流通露布來莫怪險崖能箭急江湖聲落已如雷龍潭山外清谿門外菴幾人親自到龍潭腥風況復吹長壑望眼何當迷曉嵐清源池古志雙劍峰頂有清源池生蓮華大如車輪而雍熙間瀑布流下紅蓮一瓣長三尺闊一尺三寸劍脊池開佛國蕖劈流曾下雍熙初靈根一瓣天然別借問東林種似無布水臺落處分明誰解看為伊覿面示來端因高就下誠難惜透頂還他徹骨寒哭廣陵三我蔣先生何當僊苑促雲鞃濁世應難奏廣陵天上少微淪月堀人間白璧掩霜棱方嗟後死來無幾未意先刑去復增吟就短章仍浩歎臨書不覺淚如謄初住黃巖松壑弟許為持缽乞浠上歲杪以兵荒見困寄次韻復之望君如渴路思梅蹋凌猶登布水臺鶴骨未看雲外至鱗音但說苦中來自慚省己躬難勝敢道求人口易開且喜留將空缽在免忝日後償他哀顧我青山住已殘幾回風雨憑前闌未將玉筍參天出且等蒼松奈歲寒大地斸開畬片片虛空撲碎月團團三條篾更牢加束不為閒情便解寬清宜嵒竇飽宜村二比難兼共一䑳為愛孤峰留晚炤幾忘寒瀑瀉微湲山光澹澹交眉睫松韻悠悠送耳根歠罷蒿湯茶步步不知天子若為尊壽匡山炤法師六秩四首青山未住早居菴謾道春光過二三兜率尚然留缽袋閻浮故自放癡憨每惺頑石推先覺為賣青松老翠嵐成就逝多非一一且攀千歲作司南看輕沙界等纖漚傲骨欺霜別出頭未肯虛空言老大那從甲子問春秋啝哆快合嬰兒行雪白胸鋪古澗流卻笑年來難捉摸生緣更復道蘇州但見山青復又黃誰知果熟自飄香山河百二拱高座華雨繽紛灑石床太乙峰騰標月指蘆華浪涌接人航無能九里沾河潤願頌千秋法水長少同師席誼同仁白髮相看一笑新毛骨奇君真是豹角蹄慚我苦非麟更翻歲月思前事別轉峰頭為故人把手共攜天外望海山落落何嶙峋同諸子度歲黃巖賦得通字共有凌霜節相依話夕窮威儀聲色外形影寂寥中故衲寒輕荷新條綠暗通何須千嶂放已見歲成功歲朝喜雪帝曆頒新日瑤光塹玉臺限催殘臘去敕辦好春來舉世傳清白何山受點埃誰知林下士生眼碧如苔歲朝雪後見晴柬曹源大中二公六出臨初節依然㫰曉菫豐和兆以協艸木怒方娠日月同今古寒暄送故新置身天地外自見宇無塵春宵雪霽步月碧落初開雪後天長空如洗月漫川山形有貌分高下樹影無支落正偏寒重春風猶刺骨光交午夜不成眠披衣起步中庭裏何似蛟宮玉殿前春前五日寄懷唯一道兄塞鴻將北燕南圖寄問寒暄近復如怯凍未開新歲筆折梅先發去年書莫嫌韻短句方絕須信懷深海有餘驛使怕傳春信後計程隔夜到君廬春朝喜搴玉孫居士見訪出登廬山歌飄然有出塵之志別後復寄廬陵殘雪圖次韻速之恐妨春信到山家竹塹疏籬戶未遮何來天外雲中客玉骨如梅雪綻華眉間隱隱五嶽氣顧之四壁流青霞須臾慷慨出長言牽曳西峰寒影邪山峻光寒君自回魚箋明日復傳來水墨作雪祇淺深半覆江天未盡開誰云紙上幻空碧自是君胸藏山澤山澤可藏亦可迻心眼胡為冷復赤世路風波莫等閒絕險幾人去復還君之來處坦且平千山況復破春顏人生急景如風度待等回頭已遲莫為君一夜索枯吟嵒前拈出截流句不見瞿曇語殃𣨢我住久矣君不住用前韻招搴玉孫陽江化鶴僊人歸故家華表空看艸色遮千載何勞歎陳跡過眼還同浪裏華君不見嵒前一派煙嵐色聚作風雲散作霞閒情故為立斯須半蒼半黃夕陽斜丈夫作事莫徘徊寬限遲君燕子來桃華水蘸武陵春古洞門將半掩開君之眉澹千山碧君之懷深彭蠡澤問君山華火欲然血點支頭為誰赤孤蹤何似白雲間日上月下任往還有時卷歸滄海宿有時淺抹青山顏空生嵒畔危梁度猿鳥幾回怨春莫無限遊人盡迷蹤況驚足底險崖句待君來時通一線別峰相見留君住送愚拙二禪人之雲間曉生鳳子出丹山彩翎一搏入雲間千年俊鷂趁不及食牛之氣何閒閒虎子鳳子種性同榑搖況復起天風一啄三泖便好歸日月之下皆樊籠歸來歸來將爾㚇去天百尺之危峰摘星辰而啖之千秋萬歲何終窮秋日寄懷介子黃居士碧流清徹漱江蓴上下同風只白蘋時事況逢秋葉落轉教天際憶真人玉局文章都尉禪脫空師語亦碑傳無人過與價三百贏得雙眸貫五天壽空林禪師五十新驚短鬢入霜豪保社爭傳老白袍是行便堪人藻鑑無言不應古風騷何如世年千朝酒說甚天寒百衲裯薑桂從來晚益烈願同寶掌壽吾曹毅宗烈皇帝哀詞擾擾勞生罪日繁九重聞已懈天恩雲車自去狩玄圃玉曆誰傳守帝籓山鎖諸陵驚落翠月明深院怯黃昏至尊勘破興亡夢觸處應知達本元袈裟吟十一首孤光橫罩覺山涯十界通身入一家莖縷蘸乾生死海何人出得者袈裟全封一幅絕邊涯稱體人人古式家緋早縱岐誰欠少過勞雞足護袈裟識青布幔裏生涯傀儡俳場盡作家黠過靈山偏落節袗衣換得獵袈裟祖關終古罕窺涯動著知君惡口家卻笑跛師能解道鐘聲咬破了袈裟襤襂半聽逐雲涯日炙風吹道者家可怪春寒人不禁朝陽日日補袈裟盡將格則做生涯誰信風流出當家但看堂前三下版何人不起整袈裟棒頭點出者生涯排闥春山曉入家一句風前何所似東京王長老袈裟走聲當世遍天涯若箇門風壁立家寂莫芙蓉冷似鐵民衣曾卻御袈裟天書三降紫雲涯拭目真人笑帝家雪刃臨頭剛不顧清風千載起袈裟煙簑一漿旁江涯風雨蘆灣處處家打點莫霞來日好趁晴且得曬袈裟垂鉤獨汎海東涯為有長鯨足猒家十轄絲綸拋未盡敢辭銀浪卷袈裟重陽前一日初度絕學銓商尊玄二上座以詩見壽次韻復之靡吾一日占仁先經緯無聞綴錦篇去日早驚毛有二來朝且喜菊猶鮮材艱繼祖慚前哲道足傳燈憶後賢何日三臺誇遍拍萬年歡佇奏師絃法社垂秋惜莫涼吾生何以恰廝當揮戈未返魯陽日披霧先看豹變章慧命從來空作壽背肩若箇鐵為梁不辭玉露凋楓葉珍重黃華送晚香禪門四超方鬥海泥牛去絕聲亂峰千疊向刀耕不期黃葉疏雲水何意玄言落翠崢碑版尚空專甲字江湖偏譒隱山名堪嗟無限方墳客春艸年年帶雨生龍山天華講得墜如戔誰信心工巧莫詮回首虛空真露布轉身嶽色正排連尤滋謾語嘗同社盍逐青峰入莫煙高躅不知懷近遠龐眉尚說政和年亮公得意西江一句乾菴居占斷古僊壇空山曆準黃為紀石庫書饒夢不餐熟爛何人堪下口摧殘祇自倚深寒至今幽討禪棲處風急雲仍白晝攢大梅海國江天寄漫遊目前蕩盡與誰侔滿船載月收綸晚一櫂扶風送客稠垂手寧誇紅錦套傳家贏得綠簑裘為人更入洪波裏春曉吳江凍不流船子送峻書記之大梅住山弔古予恆憶大梅蘿龕爾況藉雲隈荷衣應待深秋剪松食須連曉露裁將指隨流人得妙急徵嚼碎核還來真風要見當年社莫謾投荒又一回又擬梅送之落英銷歇步餘芳條例新攀豈故常不羨傲霜華有韻最憐濺齒果堪嘗景邀明月來還沼香引清風待襲裳珍重好收殘核子更鉏煙雨種斜陽次答趙將軍玉韻十四首附來韻世事于今難問天十方諸佛也徒然不如身逐浮雲去圍繞山翁自在禪男兒壯志薄雲天羨甚奇勛勒燕然拈起威音前一箭千重甲透祖師禪長青自古一般天纔動風雲便不然變態中知無別界鋒刀頭坐少林禪長安奕出又番天我國誰知自晏然寶殿苔生王不坐區區終日熾然禪避秦謾說洞中天劫火空居尚洞然百艸頭邊春薦得鑊湯爐炭裏安禪畫角聲催欲莫天八千義勇總凄然法身卻有驚殘夢晝夜山河信說禪謾言掘地討青天仰射徒勞亦復然箭後分明饒有路誰惺北斗面南禪粟散曾觀電裏天大千何異泡如然興亡不管蜀魂恨一例消歸法喜禪纖兒撞壞女媧天局破難完自古然野老摧心長飲泣哀聲只恐到三禪倒翻大海洗青天火德吹教死復然撥亂纔方成至治曹谿不說太平禪山河不見漢家天仗劍何勞問計然掇轉乾坤歸有道赤松子去好逃禪旬始忍看晝竟天長錟一埽壯君然殺人不眨將軍眼作佛還他血性禪帝化旁分閫外天蘇途四海誼當然問君何日昆陽戰倚馬長書露布禪聖哲從來不問天數歸陽九豈其然鬧籃扶出真天子大地從教定似禪黃茅霧塞綠楊天一霎雲收便皎然依舊大明依舊日江山不動本來禪丙戌孟秋送黃梅二司馬歸楚諱日芳之熉九死從君再造朝誰知風雨正飄颻黃冠未奪孤臣願楚魄尤煩弟子招千里關山收夕夢百年心史付重漻采薇我亦理歸楫匡阜期聽夜壑潮箕子歸周孔子仁君之處義亦申申獨傷有策能先祖堪歎靡階可哭秦轡正勾芒猶念楚風悲搖落豈思蓴遙天永恨如何釋請向空王問了因
