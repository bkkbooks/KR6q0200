body:
  text: 住明州天童寺匡廬黃巖沙門道忞著跋題血書法華經後佛如濟世大醫王隨根說法療諸病如病服藥無不瘥病瘥然非不死方天宮龍鬼及人間教網羅張三百會廣施法藥亦如是以方便說非真實稽首法華最後譚從前藥病俱捐棄三乘歸約一乘門彈指圜成正遍知衣珠獲自本來有非作故成離諸過亦如父財子克承受用無有留礙者以無留礙戲論除頓教火宅入清涼露地牛眠芳艸地春光依舊本風光所以玅根境俱忘絕朕兆聖凡景見大光中萬別千差都一炤法覿面何勞尋專甲大用堂堂知不知鵝王擇乳素非鴨蓮亭亭獨出自天然欻地千華生碓觜婀娜笑倒東風前華一塵一佛國一國一釋迦胡越誰云天地異不迻寸步越河沙經解語能言不是聲絲絲柳線牽長日滑滑鶯梭織曉春一字演經無量時全經只在剎那宣卷窮空劫不見頭展滿十虛罔窺尾日用勞生卷復舒夜月晨風光陸離革囊纏繳百千般錯過頭頭自不知伊余早歲竊知恩金刀曾割紅蓮舌瀝血流丹書此經字字經兮字字血以我身命即為經盡未來際周法界如經分布廣宣揚普願見聞同證入今此經王誰手書力禪刺血以為墨光通榴火珊瑚赤七軸行行如貫珠忘軀以為法如我即如我願願力禪分身如願與經俱如空不沒湛然存題潘天玉所書法華經後天玉潘子以自善根生正信解信解佛之知見一念相應可以長御大車疾登寶所衣珠宛在深嗟客作貧人王膳不餐長笑五千退席於是閉關卻埽覃思繹斯信解之不足又讀誦之讀誦之不足復書寫之書寫之不足更請真寂永老題跋之總之欲此七軸琅函流大千之宇俾凡有善根者靡不信解受持讀誦書寫一如潘子天玉此其心也乃申酉變革真寂之跋且隨兵燹遄逸而潘子時亦隱如有失歲在辛卯予赴道峰潘子天玉始喜隨以是跋問予予蓋未知真寂何如然聞之先德矣心迷法華轉心悟轉法華潘子果若心悟則此七軸者可以建立繇我埽蕩繇我何有於真寂之跋哉夫潘子抑知乎從世尊臍輪鼓氣齒牙敲磕焉而後有此三周九喻也析音聲而求之何者是法又從潘子手腕運旋紙墨淋漓焉而後有此千行百帙也離點畫而求之何者是經是則經有時而湮法有時而塞跋有時而晦而說者之與書者蓋通往古貫來今充乾塞坤可以塵而說剎而書熾然而跋而莫知其竟者如此則多寶佛塔可以掌置他方可以迻來此土如鍼鋒葉如陶家輪於真寂之跋何有哉於道峰之跋復何有哉書石衲道人家藏先司空所誦梵網經後釋迦文世尊舍金輪而登佛位神宗顯皇帝從佛位而御金輪風雲匌匝主伴重重一時同班鵷鷺之臣咸皆世主妙嚴之輩故其列在三公九卿臺中省中者莫不留神空宗摳衣禪室所以德行重當時理學推名世如越之石簣陶宗伯墨池王大司空之類蓋有由然也司空問道龍池激揚先子山僧以宗屬瓜葛竊知公之一班逮順治己丑予且承乏大能仁寺則于公居為甚近矣其子石衲道人復從予遊又從予得納菩薩優婆塞戒乃示予以公生平所誦梵網戒本且跽而請曰此先君司空公受之雲棲宏老人者也今某以先君之靈復從師得誦茲戒師必毋吝手澤庶幾家世傳之以為宗器可乎予謂梵網之流通諸夏也通都大邑無在無之第自司空公以及子之身兩世矣服之無斁此則希有者或疑公與道人皆菩薩優婆塞菩薩優婆塞自有菩薩優婆塞戒此非菩薩優婆塞之戒也予謂千華臺上千百億釋迦所誦之光明金剛寶戒豈即蓮華臺藏世界赫赫天光師子座上盧舍那佛之戒哉三世一切佛三世一切眾生之自性心地戒也心地無相而以事相求之可乎是故經言唯佛一人持淨戒其餘悉名破戒者言不達自性無相之心地戒也達自性無相之心地戒則全戒而全佛矣全戒而全佛者無戒而無佛者也於乎正言似反誰當信者使石衲道人一如司空公必知予言之不誣矣石衲道人者字予安蓋明之孝廉亹也書重修梵筴大藏後此藏經為商河郡王所請奉安城中心寺者歲久屋老僧殘經之壞於風蒸雨溼鼠傷魚蠹者有半寺僧無力修理復不忍其狼藉因捨歸大覺院中適東萊張相國靜香周觀察挽余江南承乏是院乃命僧五十餘輩於中或補書者或募貲者或出手裝潢者自秋徂春凡七閱月用金三百兩復成全藏念因緣非偶而成功之難如此謹書顛末以告後來凡居是院閱斯經者幸專意護持毋外借毋塵坌毋為風雨鼠魚之所蠹傷俾是經永鎮山門常為人天法藥則余之厚望也敬稽首合掌而說偈言佛求半偈舍全身百軸琅函豈小因珍重大家生眼護留將法藥惠天人書憨山清大師語後憨山老人居匡阜之七賢峰寺時余實從之納戒今老人圜逝且三十年矣頃余謝青州大覺院事歸渡大河以南乃于安丘準提精舍得觀老人示念外學公法語手墨淋漓彷若慈容儼睹余既不勝今昔興懷復念公奔走道途而事老人於艱虞險難之中雖老人有以服其厥心而盡瘁忘勞承事知識有如公者亦可以風矣勒數語于左方而示後之展翫者庶幾見賢思齊幸無作筆墨觀焉可也書禪燈世譜後此書壽梨棗在天童其編次也在閩川蓋予取福清吳君舊文而筆削者也流通則在崇禎四年至今甲午凡二十有三夏而徑山之嚴統始出則又取予成說而頒為新條者也嚴統出而海內紛然與之競辨者無他以不應收天王歸馬祖之門自馬祖之門有天王則法眼雲門皆為南嶽孫子矣歷來兩宗世系青原廣有載籍可稽徒以玄素之碑夏卿之銘與之徵詰恐然否未知誰屬也雖然青原不以兩宗之去減其家聲南嶽又豈以二派之留張大戶庭彼睦州啟悟韶陽乃使其承嗣象骨圜鑑亦發明投子而命其紹續新豐則南嶽且為曹洞雲門之所自出奚有於法眼之區區者如此則歸兩宗於青原而南嶽之為南嶽者自在也至若壽昌顯聖之光復吾宗彼所謂豪傑之士雖無文王尤興者溯始流于涓涓尚乃屈辱乎二老況置于未詳法嗣之列則吾豈敢抑當日此書之成予實無所攷鏡故為之序曰間有說法當世嗣代未詳者但附于其宗之末而先師為增一語曰俟其詳者補之予敬服先師深長思而小子愚不敏未之逮也或曰雙徑之為思乃始深長矣汰虛承存實繼凜乎若峻夷夏之防者或又曰天下有道守在四夷嚴外而不嚴內尤之乎不嚴也予蓋未知二說何如獨歎此書本為不泯先德孰知其反開諍論之端哉語云功德天黑暗女有智主人二俱不受信夫書天童悟和尚語後此乃先師為玅玄上人秉苣語也因記崇禎辛未余侍先師住今太白時頹垣破瓦滿院荒榛中有老屋一區在法堂址而上人與童顛二三輩蓋十數春守香火於茲一旦先師至不五稔而復還歷代巨觀上人以從心之餘猶獲見之故雪頂厖眉日渠渠與眾作息樂而忘倦掩息矣而先師實為之茶毗焉力作於前猒餐於後誰謂耕而無穫哉又十四年予承乏茲席其徒旭初明諒者出而視余且請書軸後志不忘也余嘉乃孝喜而為之題書謝氏一門五節傳後歲在乙酉清師入邗居民喪于屠戮羈俘者萬有餘家獨謝氏薦生一門母女子弟後先死者五人咸以節著靖軒趙進士為作歌五章紀其事足徵青史矣然予觀薦所著狀而知薦妻張氏當高藩困邗時即與女希韞籌所以應不虞之策莫如死長故城陷之日女先而母後共投深井蓋其素所蓄積有漸也子于宸從井救母冀有生理不知氣盡寒泉母生則生母死則死親屍在此子將焉往此謝氏三魂與邗溝一月所以長映廣陵之濤而夜夜有清輝者也若夫長子于朝之斃凶鋒也以墟墓出幼子于陛之歸黃壤也以痛念母兄傷死非無為節則有間矣雖然千秋廟社豈若蒿里之重不有開城而揖賊者乎百世君臣奚啻母兄之恩不有反面而事仇者乎朝也陛也情獨何深哉故予敬次五歌大書其後將以告夫天下後世龍樓鳳閣之家必以謝世一門為法焉書李孝貞傳後孔子傷明王之不作則曰鳳鳥不至河不出圖吾已矣夫夫鳳鳥河圖特鍾物之祥然且興兆明王矧人瑞而尤卓者乎在明神廟間嘉禾女子有李鳳者生而淑媛四歲喪母即悲痛踰常及長力肩事父任慮以有行遠父也遂終身矢不字人父固貧儒鳳益工女紅績飪以佐父讀如是者近四十年父適沾重恙鳳則默自禱天祈以身代俄鳳煮藥飲父乃有青鳥銜果落鐺中一劑以起父之危其貞孝感通有如此者故一時名儒碩學咸有歌詠著以揄揚鳳德以予博觀黃虞之遠也漢唐之廣大也人倫生齒之浩繁也詩書所論序史傳所紀載諸子百家所稱述稗官小說所網羅至于仁聖賢人忠孝節義瑰奇之行譎怪之夫顧何類不有獨鳳以幽閨女子非有黃鵠之哀柏舟之感一根本至孝乃能捐欲廢情反常合道有上下數千百祀不世見而鳳見之者此豈為檇李李氏一家一邑之祥已哉明興三百年太祖以承天啟運之聖人洗清日月釐正乾坤功實不在禹下復以聖子神孫繼繼承承鳳蓋為萬泰和氣所蒸結耳鳳鳥河圖出豈徒然者說者曰鳳生萬曆十年至崇禎二年乃卒卒未二十年而明遂厄者何也予曰此鳳所以生當其時死直其候也與書李梵君傳後節孝李梵君者嘗從予問道天童蓋甬東李進士仲偉女文玉也三生有異跡甫離襁褓聞王母諷經輒解義時已知世緣浮幻有願淨修不字人矣父母強之字一醮丘氏子即為夫別置媵自勤白業因夫赴省試沒于江披髮沿江號哭三晝夜痛感人神尸為之出隨欲絕脰尸旁親族相持亟勸復勉之以義始旛然念夫有孀母婢有遺胤宜為夫存宗祧奉旨甘奈何即死死易耳要當為其難者遂以義割情且循初志因剪髮自比於式叉摩那之致焉故傳稱玉剛方節孝是也然未知玉蓋有磊落不羈之致焉玉嘗一日在城菴聞鄉居回祿屬蕩盡則手舞而足蹈曰而今以後始稱寸絲不挂矣此其曠懷達識固非近代士大夫所能勉企萬一者況義烈凜凜如彼也邪子曰棖也慾焉得剛近代士大夫方其搢笏朝堂侃侃而論聲氣講戶門剛則似矣一旦賊闖都門敵臨城下其早以妾婦之巾幗蒙丈夫之面顏何求如玉之矢死從夫何啻九牛而一毛哉夫以祖宗之澤先帝之明非有甚惡於天地神祇而卒蹈覆亡之轍者何也惡為群狐城眾鼠社隳而墮之所以別白是輩抑俾幽潛發跡焉耳此則天地神祇之意也如歲有春陽而無秋肅則昂霄之柏聳壑之松反不得與葩緣飾者較厥妍媸及乎歲晚天寒來凰之梧葉既飄媾雨之丹楓亦落而是二君者始得以青青鬱鬱見焉故玉雖賢女子使其不遭異常變故則與中饋之里婦相較幾何國莫不願有忠臣家莫不願有孝子然國維多艱斯忠臣之孤芳乃著家惟不造始孝子義夫節婦之懿行式彰然則忠孝節義之顯于時也其家國之不幸乎悲哉書幼孺凌生詩後諸佛菩薩有如幻三昧善能神通遊戲往往出沒天上人間或為君公主持世界或為神王宰制幽司或以冥權示為同事之攝則或與人為父母或與人為妻子或與人為昆弟友朋并其臣虜僕妾而為之或順或逆或壽或夭巧設方便開其正信使其修持卒莫測其從所由來此佛菩薩神力不可得而思議者也晟舍凌氏有子名正綖年甫十三童而聰慧過人幼喪厥父以孤子撫孀母其愛之育之不啻如明珠在掌也宜矣然雖就外傳概未嘗咄嘔而吟也一旦有疾忽作七言近體一章從母索紙筆直擘窠書之而後掩息焉其詞有金紫何曾一挂懷石田茆屋自天開之句豈非以冥權行四攝者之明驗與不然一孩提之童耳此煙霞物外之語奚宜至哉或曰凌童之為開士是矣何不常住在世明以佛法開解夫母必使其憯逝傷懷憐才致感凄其手澤肝膽交摧聖人不為己甚之行此復何居予謂去聖時遙人心淡薄當安常處順之時語以氾氾悠悠之道將恐人而說者未有見出而喜者已可知矣惟其愛鍾于至性痛發乎真情而後重貲靡吝悉捐以為之植福且遍叩諸方亟求所以研幾乎死生者不遺餘力焉則其利益夫母也不亦大乎故吾直謂凌童之生也有故死也有由而有近于佛菩薩之神通遊戲者非誣也制書後跋國一標名清涼著號至德下南陽之問鄮山煥奎璧之章久矣輪王不作吾道寥寥忞生丁末運幸際昌時重以道涼德儉謬膺斯典自應閉藏篋笥庶幾無辱國恩第上曾拈案頭敕書有勒石天童用垂永久之詔緬惟皇上遇忞怡顏問道握手譚心每敕近臣傳語老和尚審勿君王視朕當如門弟子旅菴輩相接可也於乎管仲有言生我者父母知我者鮑叔竊謂上之知忞殆復過之然則言尤在耳念豈忘心此忞之所以日夜回遑而不能已于懷也所幸先帝位階十地慧性明敏一時因馬蹶而知解頓忘聞雨聲而得大自在所以升遐之日付託從容剋期坐化允為百王足法斯可尚耳書鹿門西禪師語後鹿門西兄晚棄講席力參先師時座下龍象甚眾獨與予交契稱莫逆迨予繼席天童而兄亦住白雲山寺相距不一程故彼此意興所至未嘗不命駕相從後予退耕五磊再遷廣潤尤歲一二見至應越之大能仁湖之道場山齊之大覺院則相距數千里然後離悰別況託之鴈足魚箋而已及予再住天童則兄景迫桑榆未踰年而化法從此太白之堂兄始音遐而跡遠矣今歲之秋其門人道元信公繼主延祥以省予來天童乃出此卷示予予腸痛西州不勝懷傷今昔且諗兄一往為法求人之切如此道元既匪門外遊人自應力肩師道光啟白雲奚俟予言而始勗勉哉因其乞題為書數語左方亦慫恿之誼云爾
