body:
  text: 住明州天童寺匡廬黃巖沙門道忞著序四壽愚菴三和尚序李耳聃者生衰周仕為柱下史身隱市朝之中通朝莫詰其行藏獨蒙莊評為古之博大真人孔子復以尤龍見稱意聃善言道德蛻委大化如龍之出此入彼非飛非躍時而淵潛時而天在時而雲行時而雨施蓋神變不測人也然聃死而秦失弔之固未嘗求異夫人間世者後世聽熒遂謂老聃騎青牛出函關殆仙去云皋亭浪杖人滑稽善辯為世有騎牛不下之夫別刱一論曰老子蓋出關化牛而去由是證佐龍山我見兩箇泥牛鬥入海直至如今不見蹤之語實之且謂嬾瓚之不為俗人拭涕華亭之蹋翻船子亮公之遯入千巖萬壑無尋處皆善用九六不為首尾所累者予謂泥牛鬥海自當別論若龍山船子輩亦只自行其心耳使徒悚首尾之累而固為是硜硜焉者不幾乎藏頭露尾之人哉安在為能善用九六者無已則有我愚菴老子在請得而借鏡焉可乎愚菴老子者三宜盂禪師也師以蘇張之舌肆張大慧之譚機辯縱橫詞鋒踔厲演為偈頌詩歌莫不妙絕當時疑古來洞上之師如師者未可一二數也然往往以遊戲三昧行心有時玄挺高提鞭笞龍象則傑號師王有時契經廣說聳聽人天則雄稱義虎時而躬默思道時而拍手行歌時而棲遲嵒壑之中時而放浪湖山之內夜叉頭菩薩面固已齣齣翻新矣乃當申酉變故之後六橋華柳已敗西湖歌舞且休獨割衣資刱別業于西泠之左雕甍繡闥紅楯朱欄幾希乎洛下名園而俗宦拘儒嗇夫醉漢日連袂來遊載讙載譊或嘲或譙師方陶陶陽陽儼奉一摩耶夫人于二天之上十旬休夏為之開宗明義殊不知為不知己者詬厲有如此也雖師倜儻不羇乎而誼重交情今秋戊戌師且登六旬髮已種種矣意有所之念予不置竟破夏發錢唐截江而來適海波未平道途梗塞舟車為遊徼所奪乃趼足走五百里訪予太白山中快譚數日深嗟晚葉法門近事不覺抆淚而別因回想師一往動履非有隱山西山之高尚嬾瓚船子之孤標酒仙遇泉大道之徉狂垢汙亦直自行其心耳然當世卒莫得以聖凡名貌貌之莫得以名場利藪釣弋之概未嘗硜硜用九六而首尾自無可累者其殆神變不測所謂猶龍者是邪非邪問之玄冥玄冥不知問之參寥參寥不知問之疑始疑始不知或曰非問諸愚菴老子不可予曰得之矣至若他日之或騎牛仙去或死而來秦失之弔也又何問焉壽龍池萬和尚六旬序魯儒之言曰人生而靜性之德也感于物而精搖神蕩焉是以不終其天年而中道夭惟仁者靜而有常故壽也則致壽之道在乎人箕子陳洪範九疇之訓曰惟君能建極臣與民能奉極天乃錫之厚福既獲多福矣非壽莫享故嚮用五福而壽居先甲焉則予壽之權本諸天或者疑焉而致詰之曰天如可問胡跖而長人如可期曷回而短遂六宇同昏悠悠萬世卒莫知其解者於是有大覺聖人者出焉為之推本而極言之而後知群生之來非一世矣過由無始於一真法界之內不覺岐分能所故爾虛空橫亙身世崢嶸業異而報亦殊焉惑為業本真為惑依苟能一念之間洞徹真元則死生見謝今古情亡了本無性得性自在達本無命得命自在以了達性命得自在故然後短長可以任物真俗不妨隨緣此靈山家法也壬辰冬季余退道峰寓婁婁諸善信以來歲午月之吉為法兄龍池萬和尚六旬初度求所以壽夫師者不得其詞因丐言於予予謂師上承靈山六十九葉之真傳為天童先師嫡胤其于一真之本性命之元已洞若觀火矣彼方海漚沙界電拂聖賢而我尤以人間區區甲子循環春秋代謝為之援天引人而支詞蔓說焉得無鐫鳥跡於空中繪魚蹤於水底也邪雖然壽身易壽世難壽世易壽法難夫師出檇李起如菴化闡閩吳知歸向垂手湖海江湘則入彀皆英俊奔騰盡象龍坐荊谿十年未嘗言言滿天下天下舉識與不識言龍池即知為師師之壽世顧不大與師之壽法顧不長與方今叢林列剎相望非無暴得聲名如秋雨之方集者然僅砥行矯節于一時究其終也立涸而已至使人扼腕而咨嗟曰某某亦奇衲子但晚年謬耳如此則俾之凶短折是謂福之益之壽考奚補法門哉若師者真可以壽矣壽古歙爾承吳君六秩序劫初生人壽皆八十千歲住阿僧祇年逮行十惡則百年減一千年減十漸次衰減止餘十歲時間繼膺饑疫刀屠之災國城空廢人類幾殫而後善法方興重見豐樂展轉行善壽益增延至二十千歲乃至八十千歲如是增減數周二十則有一大火災起上炎梵世下及大千焚蕩無餘謂之器世間已壞次成而住次壞而空如是七火一水七水一風三禪非固六欲奚堅哀我矜人從無始至今身蓋不知嘗幾大小之災歷幾塵沙之劫也嗟謠俗見聞不超聲色世儒置六合之外而不論彼中天五印之區莫紀厥詳責以窮神曠古又烏怪其溟涬弟之哉唯能仁智周無際視昔尤今所以經稱七佛次第出興始于人壽八萬歲時洎人壽三萬二萬歲時出至釋迦出衰周則已歲不盈百矣輪王久不作戾氣日于和以至診候無徵雩祈失效俄霜戈以刃接忽星劍而鋒交酷毒生人崩亡殆盡苟非植眾德本其在于今雖負猗生煮海之謀郭氏冶山之策家有金谷貴埒五侯愈恐孽禍而胎憂求其青氈如故玉樹成行登耳順之年來純嘏之錫如天都爾承吳君者所謂百城而見一者也說者謂君多材多藝達而能慮果而知權富而好行其德推君之孝于以事君則靖恭爾位推君之和衷于以端揆百僚則好是正直推君濟人利物之懷于以子黎元育萬方則所好必與聚所惡必勿施計然之策七蠡用其五而霸越既已施之國復欲用之家乃治產積居於一十九年之中三致千金焉唯君師蠡祖計然能擇人而任時故雖屢折凶烽數臻饒裕然失之不為慍得之不為矜推君皇皇之雅度于以託乃股肱寄乃心膂則必臨寵辱而不驚其神者也惜以家政隳科名不獲用之家者施諸國耳夫崑炎石化玉豈孤堅方國家運膺百六之窮彼淺艸易為長蘆者已不勝霜摧雪拉之虞矣獨君如黃海蒼松生丹嵒翠壁間根無以飲乎黃泉葉僅止披乎風露千盤其蓋百曲其枝若弗克遂其蕩日摩雲之勢者然而忝嶽色壯遊觀唯松獨也宜然則所以使君嗇其施者其蓋欲君豐其受乎予餐霞味道之夫未遑晉交乎君而識君之長君蘭根甫于邗原噫蘭之為蘭也其因君幽谷哉壽德輝何君六旬序粵稽古往牒聖若賢之樹德立功于時也恆見于垂暮之年故雖天縱如尼宣使不臻七十將聖而不神矣雖奇謀如尚使不登八十將終老磻谿而無以奏鷹揚之績矣豈不壽也者為五福之徵而生人之所欲必得者乎然世有非聖非賢非忠非孝而託于忠孝聖賢之倫者寧獨新莽早夭可盜姬周之名即鵠立永嘉德祐之朝豈無洋洋節義自多之君子苟其溘先朝露將恐王蠋不得擅美于前蘇武不至煢芳于後也及乎鼎湖龍去宗廟丘墟向之鳳翥鸞鳴者相率而化為鶉為鶩則是成人者古稀而敗人者又黃耇何也於乎疾風之下難為勁艸故欲傲雪淩霜必也翠柏蒼松而後可近吾于布衣中得一人焉曰德輝何君者君世族新安播遷于宛父早棄諸孤家日替零以至黃鳥可歌鶺鴒堪歎君乃毅然舍所學而經商淮甸遂由始有而至少有由少有而至富有還為父相幽宅為昆弟諸姪鳩集厥家卒怡如一堂之上焉謂君非大有為之士而能振興若是乎既而清師渡淮君度江南必亂復舍所居積走宛保母及淮北安堵諸商復業君獨奉母不來噫嘻人情重棄財輕趨利此溫嶠之所以絕裾朱公子之所以誠有不能忍也況君食苦為生難甘以一母之故棄若敝屣君真天下士耳豈曰貨殖中人哉君而貨殖其天下之不幸乎蓋天下之大也需才臣而後治廟社之崇也需節孝之臣而後有所託以君之才遇主於巷必能為君增其式廓以君之節孝當乘輿憂虞之日必能殺身成仁以從君于九天之上君而貨殖此天下之所以大不幸乎雖然今君始六旬耳安知八十不有磻谿之遇哉請得以是為君祝焉壽賓梧程君六十序歲在甲午三月暮春朔有七日為天都程君賓梧大長者六十初度之辰是日也巖壑生芳園林錯繡紫煙霏南陌旭日麗千門池塘梳楊柳澹澹之風院落點梨華輕輕之雨歸巢舊燕俯廉冪以雙窺出谷新鶯遷高枝而百囀于是君之親姻宗黨故舊賓從既欣嘉運復慶芳時莫不相與挈壺觴酌春酒以介君之眉壽者君尤子扶漢膚敏士也以為玉帛皇皇磬莞將將徒周章乎耳目耳念欲須君不朽非言不可乃即予徵詞焉予進扶漢而告之曰維我閻浮南州上壽一百二十五中壽一百下壽六十尚不足以望鬱單越之千齡況四王之九百萬歲忉利之三億六十萬歲乃至他化之九百二十一億六百萬歲哉然閻浮獨以三事一者勇猛彊記能造諸業二者勇猛彊記勤修梵行三者勇猛彊記佛出其土勝彼六天下此三洲又奚問焉故必有勝人之行斯可以壽矣君行謂何扶漢載言於予曰山君牧山而後寶藏貨財之繁殖斯詳焉水王王海而後黿鼉蛟龍魚鱉之廣生乃竟焉人盡戴天也而不知其高人盡履地也而不知其厚夫余于年父亦尤是也第彷彿而得其大都則仁能推恩故丘母有橋孝能錫類故殉孝有子守貞有媳勇能果敢故奸發大憝而除通國之蠹信能不侵然諾故貲運千里而歸鄧氏生寄之金智能知人善任使故所託皆忠謹而無隳事失墜之虞若乃決機應變以濟世之艱危攄素推誠以通人之蘊塞節儉持身澹泊明志堅忍厲操謙光接物則闔國知聞抑余小子又不勝其言之也噫予聞之先民曰唯奢損福祿盡斯亡以君素封之家乃有儉德焉又聞之契經曰慈母于恆河救子兒母俱沒得生梵天矧君孝母津濟無窮過此以往君齡必臻上壽然後乘天宮殿高升梵世方將與天地相終始日月同久長區區人間春秋甲子又烏足為君道哉壽廣陵蔣母孺人序孔子之為門弟子言孝也廣矣獨于色養無違之外別垂一訓曰父母之年不可不知也一則以喜一則以懼所以悚惕乎人子者真有凄然凜然不勝風燈命脆之虞薤露易晞之感俾凡孝思可展者宜無不殫其力焉然山舟藏而罔固壑澤負而能移蓼莪之浩歎方興小菀之憂傷已甚抑安能使夫春萱不老秋實靡凋菽水之歡終年膝下斑衣之舞長自婆娑也哉此則可問諸天而難必之人矣廣陵同菴蔣先生者高文懿德博學深思其今世之傳經劉向而抗疏匡衡者與獨才廣數奇至九乃中丙科則龍蛇起陸戎馬生郊倉卒之間僅奉一母走江上流離播遷者踰年及至復我邦族則三徑久已就荒松菊幾無條肄尤且忘己之貧急人之難破產廢居一枝莫寄至賃僧廬以容膝矣先生無悔焉采菊東籬下闔戶日高眠寧直不為五斗米折腰不為王刺史酺其糟歠其醨雖有同薦于鄉之郡使君曾無寸楮達殷勤片言修舊好夫妻臣妾日稯稯然典衣縮食求給乎甘毳者知有將母來諗而已審其愛日之誠殆將一刻值如千金如尺璧如寸珠而罔敢少弛焉者乃今歲丁酉母孺人竟登九十矣耳聰可以審樂目明可以刺繡自今伊始其為先生酌春酒介眉壽者又不知幾千萬億觴焉異哉人生七十古已云稀況願乎其外況當今日真淳已散大樸無存雲氣不待族而雨草木不待黃而落孺人顧獨享有殊福而獲此過量之年哉或曰先生之父為三我先生三我先生者言語必信經德不回動容周旋中禮孺人既已思齋思媚克相克承無違夫子矣使今富貴不能忘軒車尤在念先生且奈何乃能安貧而成先生之志樂賤而遂先生之高所謂孟光婦而實范滂母者也德厚而福臻壽也固宜予曰然然則孟光與范母固咸有一德豈盡如岡如陵眉壽無有害者乎而非然也夫以高文博學之先生不獲厚食其報天固有慚德矣今茲竭誠慮甘窮餓者凡而為其母也復不益之算而傷其心焉天則何辭而謝先生哉不然人命駛速速如川流其孰能挽之吾故曰此則可問之天而不能必諸人者蓋以是夫壽毛伯華母七十序須迷盧半有天鄰于日月之上者曰四天王人間五十年為彼天一晝夜彼天一歲周則人間萬八千年矣等而上之欲天有六禪天十八無色界天有四皆倍倍增況無色等極樂極樂等勝蓮華國土則又日劫倍倍增噫彼方電拂四王不啻奚有于人間哉雖然朝菌不知晦朔蟪蛄不知春秋然則人間百歲稱曰大年不亦宜乎異哉一真法界本無晷運寧有歲時乃此劫波彼晝夜此旦暮彼古今又復何也蓋由群生識心有定亂故世界成階差苟能一念不生前後際斷則剎那包十世曠劫即如今矣念既不生則自有無作妙力以之翻頭作尾則可迴過去世入見在世以之翻尾作頭則可移未來世置過去世化裁天地長育群萌直其能事之餘于以壽吾親也何有婁東毛伯華孝子也始為鄉塾之師以館糈養親焉不足繼學岐黃之術以藝業養親焉不足日夜籲天儻餘生有子荊一朝之祐願及親存而受之親亡雖與妻子轉溝壑弗恤也今伯華稍能奉甘毳則父喪僅母存且七十矣嗟乎孝子之至莫大乎尊親尊親之至莫大乎以天下養伯華乃無緣及親存與其未衰之日克承菽水歡哉雖然資口體何如益神明夫伯華固說吾祖菩提達磨之宗者也果能內心無喘心如牆壁一念緣起無生則無作妙力自可施由親始不見玄沙之父捕魚為生沒于閩江當沙築指嶺頭時其父忽見身致謝曰吾以殺生害命墮冥塗今賴師悟道之力得生天矣況及母無恙時使其垂老而聞極則之語優悠猒飫坐臻斯道方且與伯華長揖四生永辭三界眎彼生沈諸趣展轉輪迴者縱尊為天子父奉以天下養吾知毛母必唾而棄之矣七十稱觴而猥曰壽乎哉
