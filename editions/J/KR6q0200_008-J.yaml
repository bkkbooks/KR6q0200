body:
  text: 住明州天童寺匡廬黃巖沙門道忞著序三皇明歷科程墨徵序上大殊人尼丘乙己明道德之廣崇統仁義之條貫律天時而襲水土繼往聖而開來學蓋自有生民以來未有盛于孔子者也然其畏于匡也特自信而曉諸徒曰文王既沒文不在茲乎則奈何不言道而言文哉豈非文即道之華也道則文之精也文之渟蓄為道爾道文洩宣為文爾然則文也者豈易言哉前夫孔子之道在帝王帝王之道不可見而見于典謨誥誓則皆文也後夫孔子之道在師相師相之道不可見而見於語言述作則皆文也文有清濁由道有汙隆道有汙隆而世運之升降恆繫之故觀唐虞三代之文而唐虞三代之世可知也觀漢唐宋之文而漢唐宋之世可知也觀六朝前後五代之文而六朝前後五代之世可知也夫文一而已矣而氣格高下代更迥殊則又何也由于刱厥區宇之君故觀刱厥區宇之君而一代之文又可知也明太祖以匹夫起行間撥亂世反之正其俾天下重瞻日月光華再見江山佳麗者不具論論其施設頒宣化民成俗之道莫不外飾內修罔有宮壼之邇要荒之遠一時流風善政施及萌隸皆可教後世抑烏怪夫雲蒸霞蔚煥乎郁哉其文之昭而著盛而大也或曰三代之文尚矣戰國之文譎詭六朝之文務華絕根唯漢唐差近古體而宋與明則以帖括官人束功令而拘繩墨經生之所茹也才士之所吐也得之本無周于當世之務其失也啟剽竊而開濫幸之門以之扶顛則不足于以蠹國則有餘光熹之末之人可鑑己噫光熹之末雖高廟訏謨日已弛矣奚帖括之文之有哉直謂帖括不足官人則土木之災無須忠肅寧藩之變無俟文成二公何以尊安家國儼若子房借箸而籌策無遺也邪夫天有晴霾地有山澤人有死生世有治亂文之不能不弊也由世之不能不亂也亂而求其治弊而復其初故必有太祖之君斯有大明之文文豈易言乎廣陵同菴蔣先生以文鳴世者也老我天民自安衡泌既采東籬之菊亦擷西疇之芳信能言乎夏殷矣文獻恐遂無徵由是亟選洪武乙丑以來制藝止于崇禎癸未二百七十六年之中總帝十六元十七鄉會一百三十六科凡得士若干人文若干首題曰歷科程墨徵以惠來學心良苦矣於乎先生是舉奚啻有功學者殆堪遺鏡百世之王使百世之下由文而知世由世而知太祖之訏謨將必有君兢臣業思所以平成夫天地而罔或苟且焉者則其文其世也長見太和蒸洽雲漢昭回矣寧有闇汶不章覯痻而倉兄者乎先生心良苦哉靖揚雅序代國家臣一四海維祖宗霆蟄雨濡三百年豐亨豫太極于神廟熹皇末造寇攘式內盜祲斯作皇帝建元之初既赫然誅內攘乃命吏捕盜守臣忘備突踰河華東西蹂躝數千里由是江淮大震廷臣建議淮海惟揚州國之重地東吳西楚閩廣交廣島夷卉服各賦職方來獻于庭者咸涉其封是不可無備無備則擾擾乃亂臣昧死言惟茲帝臣二陽有文武材宜備兵東南天子曰可七年甲戌公受命眎揚是歲盜由商鄧入豫明年陷中都約姦民徐質等內應圖為亂公用分坊稽查之法閱實其罪笞殺之盜用是不獲逞志于我又明年掠舒及皖又明年屠涇雄攻殺縣令是歲場民饑叫讙大呼合賊婦子惶駭途奔道竄莫知所出公乃自往慰視立黑鹼相勞苦如父母更為申諭置禁民感說至泣叩首搶地散去海陵安盜氛以息揚民以生江淮清泚如故焉臣謹按公眎揚偉績以什數遏亂最大其遏亂之功以什數除姦最大蓋姦不除則亂不可遏亂不遏則民不獲有其生自遏亂以外若一政若課農興孝興悌之條以什數崇聖諭最大自除姦以外若誓師若厲禁訓兵練兵之方以什數勸捐最大雖皆遏亂而生乎民者然非所以緩急存亡他若按穎動當事者不前於以見公之慮直方自命不屈撓于權貴於以見公之節擁劍盾而敦詩書坐帷幄而譚性命於以見公之神之暇然而國家生民不繫焉故不書若夫以好生不殺消盜氛忠君報國壯皇猷則又公遏亂致治之所以大者於乎自內攘騰姦忠良軛伏人懷首鼠動襲載尸雖今天子多方揚厲之如初方謂外庭之士無復君國之憂乃公于狂鋒四逞黃沙白骨滿望無際之秋獨以忠君報國號呼二三臣衛千夫長百夫長父老子弟卒使同仇有賦庚癸無呼為天子澂江海生民保首領雖公豚魚之孚爰以化邦然感之即通提之即醒則又出夫帝力與民生至性有不可誣者於赫皇靈冒茲下土臣愚以為宜篹其事譒之歌詠光于史冊以昭國祚靈長上天篤厚有明之意愚不敏謹摹擬風雅再拜稽首而屬詞焉新蒲綠序過殷墟而興麥秀之歌行周道而發黍離之歎故國舊京人非物異一觸目警心之間所謂欲哭則不可欲泣近婦人因歌寫怨聊攄憤懣抑豈知有百世下從而諷詠之哉我毅宗烈皇帝以英明之主數直凶危家亡國破宗廟丘墟此天地人神所痛心疾首于甲申三月十九之變也維今癸巳去前莫春十閱星霜當僧忞投老匡廬之日雖倭遲遠道浪跡崑陰而雨露之思中懷悵而因鳩諸同人共修薦嚴佛事亦已澂心滌慮潔蠲為饎矣其如隱痛填膺驅除不去乘間輒來遂人各言所欲言總詩文若干首篇而什之日新蒲綠於乎新蒲細柳年年綠野老吞聲哭將何日而休哉杜工部哀江頭詩云少陵野老吞聲哭細柳新蒲為誰綠建文聖帝詩云新蒲細柳年年綠野老吞聲哭未休三山艸序余近得趙松雪墨蹟一幅蓋史龍灣家藏展轉至𨍏轢嚴氏嚴氏寶之已數十秋復割以奉余友潤兄者余一日出以示黃梅二司馬司馬曰佳哉墨妙若出自顏光祿手吾將奪之師矣子昂非所嗜也余戲之曰得無以追蠡哉曰否不然宋之社稷實敗亡于胡元氏子昂非趙氏宗乎委身而仕為翰林何也噫嘻艸書字聖今古幾人擅長至若子昂之筆可謂夌躐一世矣尤以節義少之不齒錄況中材無所表見徒附利沽權詫謠俗曾不顧有識之議後此志士仁人所以泥蟠蠖屈長遯世而不見知者也焦山如公以茂齡行腳遍見東南諸大老諸大老間嘗以法器目之矣顧其人義不苟合當世當世亦尟有知其人者終歲古寺閒房翛然一衲踽踽涼涼而已獨與余宛有夙契始余施茶邗上繼而歸隱匡廬及出住明之太白公恆遷徙從余遊余固重公懷獨行君子之德亦樂與之遊而尤未知公之事苦吟也丙戌秋余既退耕五磊矣公始從淮南寄余三山艸若干篇且曰不吝施數言冠卷首夫余固嘗從事筆硯至于詩其尤正牆面焉未之或窺也然鏡諸孔子之言矣曰小子何莫學詩詩可以興可以觀可以群可以怨邇之事父遠之事君多識于鳥獸艸木之名豈曰拈華摘豔弄月嘲風者之為哉以余觀公之詩溫厚靜深一以己事相映發其有得于魯論之旨多矣然則公詩豈待余文以傳傳其落穆不與一世浮沉如此者蓋感二司馬之言亦以曉晚近世知所重在此而不在彼也鄮山集序詩之義大矣哉用之朝廷則為清廟之歌明堂之奏用之邑里則為祈年之頌方社之謠籥舞笙鼓或歌或咢賓祭可施帷房可詠征途可賦故詩之為義大而詩之為用廣也若乃觸景傷心因時致感苦雨凄風之候跼天蹐地之時子不得于其父臣不得于其君貞而不見荅于其夫信而不見諒于其友人非木石誰能無情人之有情尤水之有江河也江河不使其流注而堙之塞之則必頹山岳漂廬舍生民將有昏墊之憂矣人情不令其宣洩而抑之鬱之則必規圖報復借寇興戎天下將有殆哉岌乎之患矣先王知其如此一聽其悲歌號咷天可以刺神可以詬君父可以諷誹夫友可以怨訕恬焉而莫之禁者所以導民志達民隱孚上下協人神杜乖戾之原開泰和之宇詩之為義固不大與詩之為用固不廣與由商至周人萬其家而寥寥三百雖由孔子之刪然穆如清風之吉甫僅見嵩高烝民二篇則詩之難言蓋可知已今時學者既無吉甫心眼復無小弁真有不可得已之情徒句推字敲棱磨縫合各求肖其所宗宗濟南則傑為渾雄之調宗景陵則麗為清新之詞昔也罪濟南今也攻景陵風雅之場未聞玉帛相見徒以兵戎使乖戾之氣日中乎人心殺機動亂亡兆吾不知天下將何底止焉異哉源發高子之為詩也直寫己衷直抒己見清新焉而悲壯愈甚渾雄焉而刻畫彌深甚矣高子之詩有得於風雅之道也或曰高子為今象先先生冢子先生蓋勝國名臣也當獻闖二賊踐藉中原時秦楚幾無完土先生提一孤軍開府鄖陽賊獨畏先生居官清正得民心越邑過都不敢窺藩者十年及夏臺鼎遷先生始角巾歸井里周宗吉甫疑先生無讓焉高子幼聞過庭之訓所謂家學淵源固有自與余曰不然蒙莊有言鄭人緩也呻吟裘氏之地祇三年而緩為儒河潤九里澤及三族使其弟墨儒墨相與辯其父助翟十年而緩自殺其父夢之曰使而子為墨者余也闔胡嘗眎其良既為松柏之實矣夫造物者之報人也不報其人而報其人之天彼故使彼夫人以己為有異于人而賤其親齊人之井飲者相捽也故曰今之世皆緩也請即以此定高子與今之為詩者案旅堂集序諸佛如來有十身相海具足十華藏世界海微塵數大人相一一相具足十不可說佛剎微塵數功德乃諸德相不逮音聲之一則又何也豈非波騰四辯舌覆三千廣為有情示教利喜之所致與使非梵音深妙令人樂聞則說者雖無倦聽者且猒生欲其剖迷開覺而成就慧身也不亦難乎此語言辭說文身句身之大有造於生人而世出世間若聖與仁卒無能躍冶而外斯文者所以能仁標號徽著迦文尼山自命斯文在茲五地稱雅思淵才文中王由是觀之文之為道至人得之可以化裁天地陶鑄萬靈英賢得之可以鼓吹休明煇煌治道處仁由義之君子得之可以興孝作忠見君父於風雨晦明之候劫波遠而可跡古聖往而可追則莫非文之所為然而有文情有文致有紀律有聲調有肌有骨有蒼茫之色有澹遠之神組織萬端機杼百出豈僅區區善讀三墳五典八索九丘者之未可窺藩即使泛博望之仙槎馳穆王之八駿投荒覽遠選勝蒐奇山閱須彌高樹徵閻浮大魚睹千里鯤鳥覘萬里鵬而心靈眼活無與焉則亦多聞障智浮識亂真又安能手抉雲漢幻出天韋大中現小小中現大入無間出無方語於作者之林哉錢唐為西浙名區湖山靈淑秀發人文至若生知夙慧則未有如彥遠胡君之獨擅其美者也楊億之才成七歲禰衡之學富髫年所謂天授非人力矣乃追風驥足困躓鹽車未得一騁其萬里騰驤之步而星辰早已易位日月旋復無光君由是任情丘壑銳志禪思既汲幽以造玄亦知微而之顯故得語言深臻三昧之海文字大入總持之門筆陣排雲天詞波倒三峽其往也莫可遏其來也莫可知可拈莖艸化金身可即毛端吞巨海況復風雨之思雞鳴之感慮無不可見君父而敦彝倫者豈若介甫之禪觀徒得句于胡笳十八拍之為愉志哉余嘗上下古今竊謂昌黎永叔之文可以入事不可入理明道晦菴之文可以入理不可入事入事理而無礙者其惟大蘇乎于君亦云故君始可與言文而旅堂集之文夫是以謂之文也李寶應語塔序羲軒以前書契之用未興民知結繩而已然各完真葆素復性而致乎命焉殆蒼頡造字則天雨粟鬼神泣何也禍亂之源兆于此矣嗟乎殷人作誥而民疑周人作誓而民叛固也抑未有穴我金縢藏彼奸宄如新莽之以詩書典謨攘奪神器者然害僅于一身禍止乎一世自宋及明始以帖括著為官人之令則往往真孝真廉之士詘于科名大奸大惡之徒致身魏闕傅虎以翼搏噬生民抉湯搗塹寧曰城壞而宗廟且隨之矣此祖龍未死前知今日所以欲焚而擯絕之也蒼頡之字奚足尚乎雖然楔以楔出毒以毒攻倒握魔王印逆執六師幡應以天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人身得度者即皆現之而為說法則又何嫌于叔則之語塔哉叔則高才達識下筆有神如傳賀對揚焦涵一二先生使人讀之不禁忠烈之氣聖賢之思油然而生真孝真廉叔則何多讓焉乃亦詘于科名弗克大有為于時蒼頡之字顧不足恨與北都城南放生社序成湯網開三面孔子釣而不綱弋不射宿當知放生法門蚤已濫觴于東土之聖人矣特以其時民性仁厚使由不使知俾無大戾斯已耳迨夫晚年則殘忍已甚傷殺滋多快鋒刀于一割忘業報之悠長於是我佛大聖既推本夫性命之理復為溯流窮源昭示往業而後知作因于始果必隨來真如形影之不可假易也故唐宋以後之仁人君子翕然歸向惻爾生慈哀人畜之無常痛形軀之慘裂或脫刀碪于垂死或蘇湯火於將危尤念其餘生莫必託命無家也遂有塹東海以為池濬西湖而作沼俾凡無足二足四足多足紅鱗翠羽剛介柔毛之族幸獲殘喘者悉游泳其間此放生之社在江南水國菱芡交加之地往往有之獨大河以西至于幽燕皆千里高原又人習騎射而京師則四方輻輳燕享之餘血肉盈俎羽毛委地恬不知怪者非一日矣徹機上人生緣南國遠禮五臺憩止都門延慶寺覿而愍之乃即柴襄明王惠吉范睿五諸君子謀唱此舉一時朝宰若金息齋曹厚菴輩同聲附和因購城南隙地若干畝相度隆窪為室為池方在經營之始則蓮生陸地早發殊祥泉涌金波頓成惠沼由是東海波臣得脫枯魚之肆十千天子預聞長者之經其最異者牝羊為枵腹而求餐三犢因全生而戴德咸皆夢告夙緣豈非往業推遷人羊反復之明驗與嗟乎報盡一朝改頭換面苟無宿命智通雖有至親之父子極愛之妻孥顛連在側苦毒當前誰則知之則又安知彼四畜者非警聾覺聵而現身說法者乎此在京放生之舉所亟亟宜講者也雖然生放矣命全矣何以使彼我生已盡所作已辦不受後有之為快哉先德有言護生須是殺殺盡始安居會得箇中意鐵船水上浮請在社諸公更下一語看北都城西紫竹院放生社序佛十力中業力最大諸業力中殺業尤大良以殺業能障大悲心能戕菩提種能招來世三途惡報能令生生冤對相仇互相賊害互相食噉無有窮已何故凡有血氣者莫不有知凡有知者莫不保命畏死況碎之以刀俎烹之以鼎鑊使其籲天無路毒痛糜軀能遂晏然于懷乎所以戾氣干和乖氛致祲兵凶繼作喪亂臶臻數十年來膏血沐川原白骨連山嶽皆此殺業為之釀致也而俗習成風恬不知怪固謂人靈而物蠢殺亦何妨然人矣或觸網而殞身物矣反傷弓而畏曲是則強弱有異靈蠢奚分且人物亦何常之有玄鳥降而胚商李生狂而變虎是在一念之善惡而人物之轉環立現矣曹谿有言吾負汝金不負汝命欠債還錢理應自償然則今之以命償我者豈非昔我以命貰彼者乎今我能不貸彼則頫仰無累已為大慶況全之以生復之以性使其飛潛食息樂育無虞將見慈祥德布豈弟仁流戾氣乖氛悉化為惠風甘雨是則泰和充于國善美浹于家還顧影衾不大有愉快者乎都城之西有紫竹院者蓋內臣宗公施莊居為精舍者也背城僻處活水環流綠圃蒼疇一望無際而羅青錯黛掩映眉端者則西山群峰之奇勝也一日容舒沈公與諸同人憩遊于此睹茲勝概慨然有發于懷遂襄諸同志謀為放生之所顧殿宇廊廡傾頹復甚乃各醵金錢更番修葺不旬日煥然復觀又歲以雙月為期遠近聞者無不踊躍隨喜雲赴川趨諸凡贖而至者潛鱗翔羽及角蹄介毛之屬咸各游泳自若安養得宜復延僧眾六時課修預為生物莊嚴淨土于是鐘魚交荅唄梵遙傳一時聞者見者各生慈怛互相勸化而華膴珍鯖之家或止或戒翕然移風無慮數十百家矣嗚乎容舒方留心祖道果能與同社諸公因放生而求厥無生之理求之既切豁然如龐襄陽之一口吸盡西江水寧止為一身一世洗業致祥且將使窮生盡劫我之與物共遊常樂我淨之鄉而後生不可得死不可得殺不可得放亦不可得乃至我之與物因業果報俱不可得則利樂夫人世者又烏可窮哉于時容舒與諸仁人聞是言已乃各合掌讚歎發大殊勝心仍即勒諸貞玟以為永久之券焉韓媧石畫象贊序曹谿六祖八十生為善知識故當貿薪養母時聞經即悟卒以居士身得受黃梅衣缽寧直嶺南獦獠根性太利蓋其素所從來有自矣大溈祐公親豫靈山之席特以三生曾作國王竟懵然于寒拾之詰問而木不能置荅焉五祖戒機鋒迅捷以雪竇之明敏望巖而即退況其下乎然後生為蘇眉公則語挫佛印未免輸卻腰間玉帶自以鈍根尤落箭鋒機則又何也流連詩酒之場進退利名之域一如老象沒溺汙泥復安能有所振拔哉山中苟乏老僧世上休言宰相今日三公鼎鼐即當時之百衲杜多也一迷于處胎隔陰之昏且有惡聞三寶名字者矣求其大願夙承不自忘念如媧石韓公其人者豈易企及乎公博學高文於齊國為巨擘之士雖今志尚勳業未能即謝聞名之累而以僧形自繪必欲置身長林豐草之間苟其得時則駕也又豈屬忘靈山而以吾法自外哉因其出圖索贊喜為之題恍然臺詩小序暮春修褉詎止永和之年獨美著蘭亭而芳流千載其故何也語不云乎山不在高有仙則名水不在深有龍則靈況逸少之文與筆使二者當之將恐靈名兩失而山水之謂稱或更有在然則蘭亭之煒煌今昔不亦宜乎廣陵屢經喪亂無論二十四橋無復舊時風月而芳草淒迷亂生宮館城郭尤然半是人民大抵全非矣唯卓月朱鎮君家以先大方伯之遺澤汪濊尤尚未艾宅東築土為臺建亭其上通以竹徑雜以華陰方其露溼梧桐風傳夜漏天階月上之時輒恍然有會于中因以名諸其臺然臺僅止于是而山水之高深不可問也一日五雲蕭使君來訪君殺雞為黍并呼其子雲卿出見鎮君以識曲周郎相對風流太守棋逢敵手琴遇知音由是分牌限韻俄爾之間遂得五言四韻者人各四章不獨筆黛潑煙霞抑亦五嶽起方寸彌覺山島聳峙天水淪漣使人恍然有會于其間者又不獨臺也於乎使君與卓月皆滇人聞滇山高壑浚萬寶生焉風土與人物恆相類是詩其蓋以是也夫
