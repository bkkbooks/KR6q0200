body:
  text: 住明州天童寺匡廬黃巖沙門道忞著尺牘復蠡源黃司馬諱日芳隋珠趙璧處於莊嶽之間雖欲什襲以藏知不可得然入則龍蟠出則霖雨圜轉無方自在門下環樞以應豈可定合山林野逸之見也梅惠老前有手教決意天台之行故遂因循廢閣歲云莫矣俟新正與敝友商確報命間關流寓費日不貲貧道自恨不如宏智佐佑四來乃過蒙遣問慚何如邪筆語遲日遣僧齎上弗備又臘底聞寶眷俱遷至山莊既無事分身兩處則生涯自然成片況復冰消北岸華發南支疊巘堆青層巒鎖翠翩翩蜨戲恰恰鶯啼觸處皆建化玄門豈不田地益寬腳頭愈闊雖則玲瓏嵒太白峰為君舊遊之鄉安知不一番提起更一番新哉非熊協卜太公已望子之久彼蟠谿一潯水計不足留連乎君長割餘閒而與我輩山僧野客平分風月亦安可得邪謹埽榻拂石以俟末後一遊又甬江分櫂敢期千里洋子竊附長風庶幾瓜步南徐猶得追陪名勝不謂貧道以四眾留慈居士亦虎林頓轍瞚息之間夢幻千岐始知般若六喻信非曲譚故今貧道願居士以華藏為床不可說須彌為枕子無邊浮幢王剎為茵褥十虛為被去來今為五更籌鼓世出世間為三春夢從他順也得逆也得如是則有極寵極辱之事出吾前亦如木人見華鳥矣否將嬰寧抑且如之何也雖今世路風波在貧道亦何所不有然稍能墨守不至見貌言如今之流俗一等者亦未嘗不作此觀耳春寒乍雨乍晴最宜珍調四大為禱又聞歸楚之帆已飽春風而南矣方恨不能握手江干訂此生再晤之期乃既發而中留何也毋亦天故幻出奇緣俾居士極生猒離之想而堅固出世心耳呂嵒丹成于下第黃龍定證于獄中古之人尟有不遭憂患而獲大寧者所以酒僊和尚云楊子江頭浪最深行人到此盡沈吟他時若到無波處還似有波時用心以此參知貧道之言未謬也匏繫有眾之累恕我候不躬親天氣正熟梅尤冀加餐自愛又昔元微之與白居易云自識君來三度別者回白盡老髭鬚戀君不去君須會知得後回相見無貧道與居士交情未敢竊比元白然蒙駿賞亦略驪黃矣乃僅一別而雲山飄渺會面無期豈真人生動如山與水一分而不可復合者也去歲晤王念老得詳起居且知長君已補弟子員今秋化變龍門會看角頭迥出未審太翁肯以先朝刑獻襲受昭代恩榮否邪別後數年屢為業風飄蕩爰自廣潤能仁及今湖之道峰雖則遷徙靡常但喜面顏不改可對故人耳吳地兵凶日見全楚賴德星想已民豐物阜矣玄鑒禪人以分衛來敬修短箋問候鴈遠魚艱餘不備及與惠連梅職方諱之煥延壽王去天童咫尺耳入山之駕未卜何日始命也聞欲轍環之台恐此邦亦猶吾大夫況今皇路未清夷我瞻四方正蹙蹙靡騁之時毋亦暫登太白少憩玲瓏一觀海嶽之雄乎專盻來旌可勝翹企與春曉紀海憲諱騰蛟羊羵首魚赬尾正繁霜臘不雪災祥之類斯繼見者頻年自台臺下車以來非但與人之誦孔邇有歌而時雨同雲曾無失候人事感于下天道應于上從此兵銷甲洗四海將見同文之治矣但拊字心勞簿書鞅掌尚虞貴體未暇攝調然萬井翕而尊俎百神自當呵護即貧道輩之枯木受陽春者亦未嘗不冥告佛天況台臺之禱久矣者乎入山窮忙有失拜賀敬遣僧訊問興居惟鑒炤弗備又客秋辱教言貧道時出天童已逾月矣所諭令姪至今未面意歸東將日久近有來自錢唐始知亭驂未稅鄉土情關旄丘葛誕牢騷之緒尋常在所不免乃居士固用佛治心者寧不知三界等郵傳人生如過客齊之僑楚之旅何所欣猒其間況行之與止非臧非樂要有默定之天焉故今貧道願居士始終以天自信總他方此界為一旅邸以自泯懷則安往而不自得其得哉未能造訪深懅寸私輒奏短章有冀寬廣耳與慈谿時邑侯靈山佛法付屬王臣誠以苾芻孱弱非憑託高顯則無以蔭庇其根荄況落穆寡合如貧道者處魔強之日當積毀之秋復與大檀無傾蓋之歡半面之識必覆護之安全之多方而回互之夫以民物為與包在大檀固無所不用其樂只而施之方外則已奢矣非受屬靈山而以宰官示見者曷能爾也極欲詣臺致謝然既以晏子待君侯矣又不敢不以越石父自待惟終身行道期於冥酬厚德而已臨書感慨曷勝惓然之至復清海魯太史夫子畏匡微服過宋至人之道一龍一蛇彼桓司馬曷從得其便哉然託在知愛之下不能不作於然疑耳承翰而後喜乃可知廣潤襟山帶海僅以瓦全非乏是輩也是知濁惡世中無適非苦所貴慧心人冷眼看破然後和盤掇轉直向自己命根上力下一刀則淨羸羸赤灑灑沒可把自然乾坤依舊日月重朗舍是無為也不慧薄福應宜長遯世無能只合住深山法幢高豎重言不當喫況卓錫西來乎言之不文行之不遠深慚拙集潦艸乃不鄙夷儼然重以珠璣弁首庶將賴借以傳矣幸何如之望風懷想不勝依依又一夏貧病交煎苦惱無量幸而富有風泉雲壑節巘明湖差足樂饑耳吳興之轍雖未有期然名山顯位望君之來君乎君乎候不邁哉余較相如病尤渴者敬以來歲春煖為約復玉齊耿兵憲諱應衡鵝換丹經韻流千載何虞琅函梵筴博以泡沫生餘況鐵畫銀鉤字字永和真蹟復壽梓以廣流通則熠燿非禪叢一處荷戴亦非不慧一人矣遠辱使星諄諄返杖見命若論有懷晤言之思何啻櫂舟雪夜而往乃歲云莫矣不慧遽翛然就道其若方來萬有餘指將何依託邪敬訂春風乍扇重沐分榮也前後尊稿詠而珍藏之矣裁復不莊統惟涵鑒餘希自玉以迓天庥又建法幢于法運垂秋之年雖二嚴素朢無虧者未免波旬側目矧福慧既涼且薄如貧道復丁茲兵凶臶至顧隱然半千緇侶得超遙容與于長峰怪石之下苟非光明遠炤曷克臻此乃復顧慮殷殷不遠千里遺牘當事諸君子屬以弘護帡幪之又從而雨露之何台臺之為人徹抑周回顧盻且靈襟之細密如絲也所媿貧道荒疏無聞無能補報萬一耳五磊豁役既蒙留念終戴二天必矣承惠謹對使拜嘉弗宣又娑婆險惡非得忍菩薩未易站腳況行道設教其間宜波旬之生憎嫉也然欲入虎穴取虎子寧惜橫身虎口所以山僧到此不敢存絲毫利害於衷直素乎其患難而行乃總憲公即以澤雉蓄之返得飲啄自如焉幸矣聞駕抵永興本圖便面但有數百衲子結冬在山朝夕無見糧不忍使其獨受饑寒特回與之共守寂寥耳艸率通候弗備又憂心悄悄慍于群小雖古聖不免特曰肆不殄厥慍亦不隕厥問則未易時常蹈襲耳昨訪寓次深慚齋施汪溢矣而一種平懷泯然自盡之風尤足生人曠遠然則般若有靈不于台臺茲益驗哉別後旋歸道峰駕至邸菴殊失陪奉罪歉并謝與子寅韋明州武林會晤正在靈雨方零之候別來幾何時𩖼𩖼秋風又將入戶矣歲月如梭人亦易老不審比來福履勝常前案結絕否聞郎君翰林公已屆臨安則彼婦之口庶幾見睍曰消冤業一釋天宇迥高頫仰身心更有何累邪從此超三界越六凡塵點劫來結末梢頭事亦當料理清楚不可更復因循矣萬望留神伏熱珍重不盡復文載祁南平諱熊佳尊嚴僊逝憂出非常山僧未能遣一介使用弔左右者以居士見越常情亦以山僧跡居方外者也不意疏拙嬰難反辱教札見唁悚惕有加耳況復達識高論尤足發人深省如曰末劫正臨古之至人如羑里畏匡俱從逆行持世夫子之說洪範也第曰僅云逆順不嬰尤非深知和尚者則山僧豈敢當哉相去日以遠相見日以疏回首能仁有同隔世矣春末夏初乍寒乍暄唯珍育不盡復皜菴費內史諱景烷比來江上風鶴騰疑貧道方停櫂吳門忽接華翰知愛念我者深至馳仰之私何啻春苕方增也邪別機西堂既荷栽培則道峰片席與繼席之者貧道更無復返顧之憂矣所恨華髮一天霜而殘雲莫鳥志在依山歸樹弗克長侍左右耳諸餘腕不勝既金風瑟瑟惟珍攝弗備又屢辱慈念感不去衷方媿僑寓行間未遑訊問為歉而又先以華音示我何情之深而渥也婁東邗上等是雁落沙汀宿水餐雲之志終當償之金輪五老間耳福無雙至既有蘭孫之慶合膺尤子之虞此堪忍娑婆所以為缺陷世界也抑人有言知事少時煩惱少令姪喜知事故應多受煩惱第不當憂及居士耳雖然周處反轍卒為晉代名儒安知今日之禍又非將來之福哉別機質陋無文叨承曲庇厚矣譽多溢美得無過情也乎梅綻新枝時有暗香入座柳含春意不禁青眼撩人明取箇中消息何間千里同堂吳門之櫂萬乞停舟臨書無任戴仰之至又闊別故人三見庭梧葉落眷念之私非不中心如失而奔走淮齊山川為間正莫詰興居之安否如何耳清長老來辱手教始知有鼓盆之戚家復多難苟非高明勘破空華幻影詎能堪忍如斯苦境惡緣也邪山僧識疏材淺既無神龜藏六之用復多業緣鼓蕩之風未必動而不遷亦曰物誠斯應不意居士曠識亦竟以為猶然棲棲也且道峰片席清長老既能勉承堂構復賴藉弘護威靈使山門不致寂寥化儀或將綿衍斯善矣又何必再三敦逼垂老無似之人哉江山悠渺恐增跋涉萬勿命駕庶不絕我芒鞋竹杖尋洞中人于苕溪深處也賤齒何足為念謹拜嘉賜秋風漸肅唯冀若時自愛不備又前有還山退居瑤席之復者蓋為辱承眷念之殷重違長者故耳一則欲清長老再領院事俾山僧得超遙容與時駕廣陵之鶴時揚霅水之舲相從香山九老或聽雲嵒下或賞雪峰頭庶幾頤真葆和以不夭札其天年而已今清長老既堅志不還則一任燈籠騎佛殿出山門抑山僧何苦龍鍾僕僕甘為兒孫作馬牛哉故定計明春二月祇可一到上方少慰勞勞闊別之思常住事宜不敢與知也先此布聞統惟恕悉不宣又到山數日聞大維摩示疾毘邪屢欲遣問正恐反更勞神然私不去心也適諸郎姪及兩張先生至知竟霍然殊為慰慊日者山僧棄昭易邗水萬有千金之功業直飄然歸臥空山者豈有所眷戀其間特以曩劫與居士有深緣而一往弘護之誼不忍違負耳山僧且不忍負居士顧于先師半生締搆之叢林忍見墓木未拱日就傾圮今往者拂袖已行來者皆掉頭不顧使山僧溘同朝露則亦已矣尚狗馬未填溝壑將宜何如為心者夫此安彼危此飽彼饑此簡閒彼憂勞寧獨灼如高鑒即至愚之夫亦知此行必凶多吉少然山僧所以為此極難者正如石齋合座師本一帖括書生當君國危亡之際必躬就戎行卒視死而如飴誠以國宜忘家君宜忘身臣子之分當如此耳將遂渡江而南不知奉教更復何日臨書愴懷曷勝凄清復靜香周觀察諱荃炎荒喪亂北地災仍唯青齊四境之中賴德星高炤屢見豐年穰穰夜戶不扃矣復軫念蒼生之盲無慧目也必欲借大法金鎞而開鑿之非內聖外王之道備乃厥躬何以臻此第媿山僧利眾乏珍無以副台臺之請求耳夫感應道交理無固必既承呼召敢不奔趨所以遲遲吾行者屬此間有未了之案然亦隨宜註銷行將曳杖就途矣相見匪遐率爾報命統惟慈原弗宣又勉承台命竭蹶赴青不謂遽逢居士之大故弗克安止檀陰之下相與光揚此事則我法可知矣道中獲一傾蓋無以為情復不能少致生芻之獻然居士方以道義廣交遊知不以世俗相期焉山僧安敢希蹤古人特以年運既往謬為諸方推許庶竭駑鈍少挽末年頹風是所報于萬一耳抑聞至人不以存沒間念不以生死縈懷惟望凝神自愛葆我天真儻後緣成熟再託弘護之中爾時唱拍相酬豈不寂莫中一段快事也臨楮曷勝神企之至復開來萬萊州諱代尚猥承賦贈及法殿之顏高挂雲堂頓覺華雨彌空龍蛇走壁正使藏之百葉且有考往蹟而興弔古之思者況此日之瑤章璀璨乎哉竊惟門下孝以作忠慈以使眾其于家國之間舉人道之所宜然者可謂罄無能事矣至若山僧之株守林泉罔裨宗教直一衰朽陳人已耳顧何煩高明齒頰而揄揚累幅也邪初夏賦歸來暫寓邗上小菴佇聽萊績告成行將藩蔽江南奉麈或當有自乎春光溢目想興居凡百如宜謹此借候餘希珍玉弗備復松交顧比部諱子咸向者承乏越州大能仁寺幸依檀蔭因得奠安厥居于萬有好惡之中嗣後弘法台垣竟以無妄罹災復藉讜言賴昭雪則又非僅託庇甘棠且將肉白骨起死者而生之矣乃數年之間萍蹤湖海浪跡淮齊遂不克以一函訊問興居罪也如何蒙慈宥弗棄夷更以報國禪院相推挽國未云報報我知己此其時矣其奈衰殘無似固利眾乏珍而邗江吳會抑多未了之局坐此分身不迭可若何或因便得一造龍門話往昔為厚幸至于金閶把斷化導一方則智短神疲恐雖方命亦有所不暇惜也死罪死罪不盡不盡復爾濤汪進士仰惟逸韻孤標聞諸敝檀費皜菴者飫矣昨過鴛湖得晉光儀如坐春風愛日中不啻錫我百朋之惠矧茲德音不已哉承諭欲山僧曲垂方便得唱還鄉曲者不妨居士即今磊磊落落作一破家散宅漢則自無家可坐無世可興又豈有鄉邑之可還也邪不見古德道還鄉盡是兒孫事祖父從來不出門是在居士留神而已旅菴月子在山僧門下未逮賜由之輩而盛德作人遂蒙獎藉乃爾然苟能堅自樹立其去時流也遠矣秋曙至深委近履殊為慶慰李道臺弘護無斁深荷鼎力吹歔并謝弗備復明州眾護法宰官先和尚典主斯席近十載餘荷大檀呵護之靈故得梵海無波道山高出今者天不惠弔哲人云逝閔予小子方深梁木之悲未諳父薪之重乃門下不泯先德儼然忘其固陋重之以堂搆是仍之命拊躬循省百慮摧填方欲山藏海竄曲匿高深而山中同門昆年過奉明詔霜督愈嚴今則山僧自知業緣無避抑以白楊蕭蕭先靈在望築室反場伊何人哉故敢勉承台命俟三年心喪之後度其可行則行之不可則與大檀共戴有德以不昧先和尚屬累群公之誼斯已矣所冀大檀弘護無斁保茲清眾俾不孝得安山鳥飲啄之嘗則食德寧有艾哉奉教有自艸復不虔統惟垂炤弗宣復常熟眾護法宰官承翰以勝法見召固當從喚自惟駑馬伏櫪不堪有所驅策矧廣潤殘局未終當破壞之餘一旦去其司守非但剎竿倒地將恐佛面生苔矣妨命之愆統惟慈炤臨書無任主臣之至復檇李諸護法宰官鴛湖浩渺秀水泚清所以蔚為文邦佛國者雖地靈乎亦由諸大君子動之以光風臨之以霽月遂如是其泱泱大風哉譬諸安養人之所樂生也復有觀音勢至垂手提攜焉不即往惑矣更掉頭不顧豈夫也哉然則貧道辱諸大君子棲真之命又何異是但日者謝事道峰期于投老匡廬金輪五老實聞斯言無幾而遂食之此固諸大君子之所不取也所冀玉成乎其大者庶不敏之是釋抑或相共諸大君子對臨乎空生嵒畔焉其不逖耳矣謹復弗宣復李灌谿姚文初吳止齋陳皇士諸護法宰官恭惟眾檀德合民望文為士宗正氣彌天既潔身以持世清風匝地尤起懦而鐫頑百艸出龐蘊之家章明祖意天女入維摩之室妙發辯才法喜逍遙豈等蘇黃以有間玄機旁礡將追楊李而上之某佛蔭叨承宗圖濫廁人非廣慧難酬郡尉之禪智遜金山敢下端明之帶辱諭般若廢寺欲侍者葦燈效恢復之勞且以中興文字委之山僧班門弄斧某固不敢即葦燈宗子學齒未長德能俱淺夫以白雲之洞徹見元發用太早尚來昔人非福之譏矧其下乎某聞君子愛人以德果諸檀愛其慧辨英敏可臻斯道當勸其竿頭進步再見文殊不應使彼坐向彌勒閣中生滅度想也抑道邊廢剎殊費經畫吳下叢林又近多奔競之風以血氣未定之人染其惡習名利薰心必致枉道辱身敗傷風教得不求益無幾而害實弘多哉尚冀諸檀策發而謝遣之則戴德之思當有倍于銜結者矣臨書無任主臣與祈遠唐孝廉諱元竤欽風慕德之久僅于天童一曙光華自此如武陵春色杳不重逢矣辛巳隱匡南遠承教札及黃檗老人碣上之詞拜跪展讀朗詠嵒前則猿啼危木鶴唳青霄會某適刪潤從兄伯子狀于時鶺鴒原上之思遂合作風雨雞鳴之感但幽棲既荒遠而嬾癖復中心脾不覺因循廢閣于今頃拮据天童先師銘事重嵒之感欻復見前方冀匈言左右不謂惠貺下頒謹此特遣侍僧走謝兼展夙懷伏望矜哀愚誠一字之褒非但先兄榮于華袞庶俾遠方殊俗聞風之下廉立而敦則凡自今以往之人心既死而之生者皆門下之賜也若謂誓言始出方三令而五申之不應自某決撒籓籬則此乃風世之言何與諸方之事敬以為請畏涉葛藤不敢縷復予安王孝廉緬懷玄致渴想殊深忽教札遠頒箑章寵被兼拙錄重辱題辭顧盻之間何止風清四座直令嵒壑光生矣先德有言功名美器造物不與人全人固欲之天必奪之矧內無實德而浪得虛名者邪褒嘉過逮與夫巨剎濫膺皆所謂負乘致寇者然藉是得以朝夕祇承大教非不願幸但廣潤住僅一周寒暑無尺寸之勞足以報效山林泉石正難撩起便行而恬作負心漢耳儻邀居士之靈主者或聽以客情相處則奉塵當在霜老華黃之候否則不敢與聞大命矣謹布腹心統惟裁察又明夷蒙難在昔聖賢莫可殫紀至若山僧又不足言矣東甌之質自是業種五百生前豈當事者有成心于我輩哉即有成心愈徵夙負難逃此我輩學佛之徒明見三世果因而不從違世儒諉天與命之說也如此則尚恐此番償酬不足致有餘殃可畏又焉肯打向別處流轉乎辱念殷殷至形歌詠是將不朽山僧也抑山僧何幸小出而大遇哉又見可而進知難而退來翰非不籌之至當山僧亦非不委悉深情但既承當箇事闡化一方不能洞察幾微綢繆未雨矣徒于舵折檣傾之後方議收綸罷釣未免貽譏有識抑山僧佛氏之徒而學夫佛者也夫佛必以深悲大願為心悲願之重身命是輕故曰將此身心奉塵剎又曰我觀三千大千世界無有芥子許而非菩薩舍身命處審若如是是則欠債還錢況已不中矧爭潛見校夷險而為趨避之地哉故識者謂山僧宜捐道峰而不知山僧早已捐夫身命矣蓋不如是是謂離悲棄願而佛必曰某非吾徒也然則在彼不妨已展不收在我難持退而不進庶幾將此身心用報佛恩酬知己耳唯高明其鑒諸
