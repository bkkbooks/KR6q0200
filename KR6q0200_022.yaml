body:
  text: 住明州天童寺匡廬黃嵒沙門道忞著書復玉齊耿兵憲諱應衡台臺踞菩薩地見宰官身苟非般若根深正因力大安能於心無事於事無心盡瘁家邦而復擷奇問道有如此也承諭夢中問畣語合經禪尚存作主與夫捏合之見貧道以為台臺切忌作夢會若作生死夢覺會則當人腳跟下大事隱矣不見舍利弗問彌勒大士夢中說六波羅蜜與覺時同異大士曰誰是彌勒誰名彌勒者所以古先哲人當見此道時直得十方三世盡空法界淨裸裸赤灑灑純一真實人體安可強生節目於其間邪即名品荔支淨剝皮㲉之說大慧當時漏逗不少石頭有言寧可永劫受沈淪不向諸聖求解脫不審台臺以為何如又家瘦民肥心夷政簡雖官署一山林也可以返收視聽可以省問己躬第台臺所患不在世緣轇轕而在用世心深不在玄途窒塞而在理障太多苟能絶言思路忘管帶心一以老維摩之空其室內龐居士之勿實所無心行而力究之一朝緣起無生方知趙清獻所謂默坐公堂虛隱几心源不動湛如水一聲霹靂頂門開喚起從前自家底灼有恁麼事然後即以從前自家底為諸官民提掇則公堂即妙善法堂豈僅曰一山林已哉與念尼王海憲諱爾祿往時曾嚮大名於耿玉老齒頰昨歸台次甬蒙虛懷下問得三夕快聆謦咳因知大檀靈根夙種迥越時流第必欲固其形骸然後求進斯道前雖略陳管見尚恐猶懷昔嫌茲復引而申之終希邇言之一察耳詳夫含生所以流轉不息者良由無始世來不覺遺真循照因照生能因能立所於無同異中突生同異同為根身異為器界遂使山河大地萬象森羅判然對立乃至四相崢嶸我人見隔生情動念造無邊業受無量苦莫不厲階於此經云十方虛空生汝心內猶如片雲點太清裏佛言豈誣也必如大檀煉形固體庶幾長生而久視焉無論惑夢幻為自己執苦本為真常者何如且一受其成形而不與之更化則一塊然匏繫而已求其身遍十方智入三世如佛菩薩之雲興善利我已失之矣抑亦偏小之見豈通人至計也邪即曰我畏處胎而或昏隔陰而致迷耳是亦不然何也迷悟在此事相應不相應而不在形骸之變易與不變易也蓋與此事相應則一念可使萬年縱或舍報還來決不流向別處不見雜華有言譬如丈夫食少金剛要當穿皮而出苟與此事不相應所謂暫時不在如同死人況復塵勞擾擾業識芒芒者乎所冀大檀舍短從長會萬物為自己直向毗盧頂上任運施為庶慰貧道之懷也何如不盡復中柱張相國附來書端頓首座下去冬聞飛錫北來之信不勝翹仰即大覺叢林有主一切七衆人等奉金鎞無迷也達和尚心願亦云圜滿矣端根器淺薄傾耳法音皈依久矣未能遂解組之志面奉開示倀倀奚從至西來大意不可以文字求意見索欲拈疑義質吾師而愧未能也幸惠教先之俾聞所未聞向年閒暇曾修念佛持咒法門慚無所得近滯跡熱鬧場中身心交瘁覺此事此志終不容釋惟日夕念利澤及民上報君國庶幾寡過然此願亦未易遽遂也世出世不二法門尤祈方便垂示令迷途知遵幸甚幸甚敬具微儀奉塵香供破顏存之亦云不遠之誠而已臨啓不勝瞻企依切去冬辱台命猥以大覺見招自審衰騫曷堪驅策但念達磨一宗響絶大河以北者彌運執殳言邁亦聊為法前驅云耳閣下少掇魏科壯居台鼎不以位貌之崇拒人千里之外尤復孳孳法道念不去心非夙承大願則蹩躠名場之不暇奚有于空宗哉來諭欲拈疑義相質尚愧未能夫疑者信之根悟之門也是以先德有言大疑大悟小疑小悟惟不信故不疑不疑故不悟也今閣下既有疑義可拈正不必山僧惠教聞所未聞但打併身心專一緣慮切於疑處著力瞥然打破疑團則拈與所拈覓其影跡了不可得矣世出世不二法門無別方便亦只要居士看透張中柱耳若看得張中柱透時則人尚不見誰為世出世間之法邪即今張中柱作麼生看透他但於一切處一切時能豪忽不自放過豈直工夫打成一片即行於世間且無纖豪過患與人指摘譬諸刃焉向外則傷人傷人斯有悖入之禍向內則克己克己反有歸仁之福今人處處放過自己而於他人則多方責備恐於世出世間未知其可也瞽矇之言唯高明采擇焉辱貺謹合爪以謝復柴菴吳相國伏承來翰滿祇忠膏義血不忍竟讀於乎先皇英主也乃數窮百六喪厥家邦回思甲申三月之禍寧獨閣臺疾首即草莽如殘拙亦復痛心不已矣抑聞之蕩蕩大千空於覺後明明六趣有若華胥苟正眼觀來則凡為蝸國楚亦乾城又孰存而孰亡哉雖然說夢癡前恐成剩法不有閣臺之節義錚錚彼鼠肝其父子芻狗我君臣者必將假託乎斯言而人道不幾澌滅與山僧二十年前即知海內有閣臺一人今來昭陽蒙不棄夷卒惠教先我則愈有以知乎閣臺也昔柳柳州作箕子廟碑而紀其德有三一曰正蒙難二曰法授聖三曰化及民夫閣臺不常忤權璫蒙貶黜乎則所謂正蒙難者是也不幸江海潢流明室之鼎且南徙于黔矣彼茁者雈莫不仰承新澤獨閣臺身中乎清廢中乎權孝忠一線于焉少留則所謂化及民者是邪非邪今天道茫昧洪範九疇之訓將遂湮夷閣臺既文且獻使有聖者從潭西而索求當必有法以授之矣獨山僧德不足以承先道無能而啓後雖私衷有激而發為言詞者不過候蟲時鳥自鳴自己曷足以當大方之一噱乃蒙許與過情不令山僧愧深而芒負哉咫尺不獲一聆謦咳慊也如何隆儀謹對使拜嘉臨楮可任企仰弗備柬牧齊錢虞山不孝幼為諸生習制藝即知海內有以文鳴世如老先生其人者矣繼行腳遊方間從碑銘傳志間見先生一二古文詞益歎先生之文非徒咀英而吐華者其致廣大而盡精微極高明而道中庸者與去歲因貴鄉許子得廣讀先生初學集益如橫開武庫如深入寶山如吳季札之觀樂至韶而止竊謂非胸藏萬卷眼碧秋空不可讀先生之文抑先生豈徒以文哉明治亂植人倫故先生之文為不可企及也今天下學者尚惜先生之文涉世忌不獲廣傳于時然古文有抑于漢魏淹于六朝至唐稍顯宋始著極崇尚于元明之世幾同六經而莊誦者遷史是也則先生之文晦諸一時其章明于千萬世者固有默司其柄者矣然則嵒穴之士欲聲施後世非附先生青雲不可抑先生至德作人靡間朝野緬維先師崛興末運振起先宗為佛滅後再五百世大法光明幢是亦先生之所樂道者矣今先師示寂且十七年塔上之銘亦有操觚以論次者而先師之道德終暗昧不彰也竊謂人如先師非先生之文不足以光揚至賾文如先生非先師之人不足以煥若昭回彼長蘅異度之流汰如竺璠之輩尚得借託先生矧俊偉如先師者先生豈有愛焉末後光明點出筆尖頭俾伊照天照地非不孝一人之幸實天下後世學者之幸也猛擬肅莊登龍請于下執事奈為山門匏繫特遣首座山曉執狀牘與不腆之儀代申鄙意統惟慈原恕悉臨書無仞翹企注瞻之至又附來書往在嘉禾得見李節女傳不但文詞爾雅而尚論閨門風義原本於祖宗之教化當墨穴世界點出金剛眼睛甚難希有徑山有言豫雖學佛者然愛君憂國之心與忠義士大夫等正於數行文字描寫出徑山老人鐵輪頂上圓明自此鄙人八識田中屈盤逼塞種得此一段根苗每至酒闌月落香銷燈灺此中影子落卸未嘗不與老和尚相晤對於大圓鏡中也腐儒失學拙集流傳積年餿飯嚼之便欲嘔噦不知何緣得入慧眼過為誇許當是此土衆生應以聲論語言得度如鄙人俚言朴學臭腐滿紙老和尚亦放眉間白豪相光收入文字海中邪以此知文字三昧不可思議如此往年擊節大篇故是霜鐘相應也密雲尊者塔銘十五年前已諾江上黃介子之請矣重以尊命何敢固辭第以此等文字關係人天眼目豈可取次命筆年來粗涉教乘近代語録都未省記須以三冬歲餘細加簡點然後可下筆具稿謹與曉上座面訂以明年浴佛為期爾時或得圍繞猊座覿面商確庶可於法門稍通一線亦可慰吾亡友于寂光中也上座還手勒奉謝蕭辰深山唯為佛法強飯自愛山曉回披讀教箋惠然賜諾許銘先師真令不孝式歌且舞躄踊俱興者矣竊惟不孝本一山林枯槁四方不諒其固陋無文輒以銘傳見委往往辭不獲命間亦操觚應其求索獨先師窣堵波前一片石于今十有八年未得其當每當鐘鳴漏盡之時未嘗不五內回遑惄然如搗乃蒙老先生肯散墨華俾留芳躅使今狗馬即填溝壑在所甘心其他慕說之私又奚可以言喻哉嘉禾李女傳深愧不成文理及閲尊集則皆此物此志方慶如蟲禦木亦自暗合孫吳乃反謂拙言影子落卸高懷何先生之與人為善而顧自忘其大美也邪經云雅思淵才文中王文如先生真五地聖人之所習者彼漢魏以還紛紛諸子尚不足供唾棄矧不孝之候鳥時鳴者乎再遣山曉擁篲龍門恭傒奎璧佇雨遲雲惟高空其沛然早及之春風尚寒有冀頤神善攝長為南邦文獻是祝是禱又開歲以來翹瞻雲漢以日為年不意王君山曉奉璋疊至盥手開函焚香展讀儼若赫赫明明天王復辟黯然而黑頎然而長眼如望羊心如王四國而我師復生焉中間發微闡幽或貶或諱文約指博義正詞嚴所謂法用春秋以繩當世則又雖有游夏不能贊一詞矣自惟墓木既拱之先師一旦借章麟筆遂得孤光揭露映照千秋不覺情至而悲生感深而涕隕自今伊始為不孝者宜何捐軀而報答也邪至若拙集加評卷端授辨亂九天之華雨飛六月之嚴霜此則老先生之正氣丹衷自橫自溢卻不關不孝事也於乎人生在三事之如一而戕倫賊義之夫每每變易天常斯人道所以鄰禽亂亡所以相繼孔子之懼即先生之憂也今人滅裂在三倒披裳服固揶揄先生之前顙不有泚抑獨何心哉銘稿即依後命繡鐫雙白歸忙草草布復嗣容專謝不宣復西遁超道人星霜四閲不通聞問而臭味相孚則無有閒然也竊惟天下之無人久矣非無人也人而虧道喪真焉猶之乎無人也不虧道不喪真則昭陽黎太沖與吾西遁道人其幾矣乎故山僧前柬昭陽曰微君福德持衰世敢保閻浮盡化燐今昭陽且即世以天下之大僅一西遁可名曰人夫以曰人之西遁乃復深諒山僧使今山僧縱得一世之名又不若西遁之見知見諒也以西遁人也為人之所見諒其人蓋自可知然則山僧何修而受知足下哉先師塔上之銘久空麟筆創懷非一日矣去秋所以重請虞山者不過借託文言以光昭先老人之徽烈庶幾有以行遠耳西遁固信山翁決不幸虞山舞弄筆舌而雌黃天下也況三峰為先師行二之子則於山僧為同氣連枝手右而戕其左葉滋而掊其根在他人或恬然為之不顧辱在西遁見諒之山僧斷不出此矣或虞山信筆直書不留餘地而猶子中如玄墓如靈隱即猶孫中如豁堂如仁菴輩走一使持片楮焉而問山僧豈可不手勒八行專人請改矧靈嵒之與山僧猶稱當世籍咸者乎見不出此乃規為布置斡旋虞山又動勞足下之管城君是謂無識且昧山僧夫以明白之山僧往往見疑於世獨一不虧道不喪真之西遁諦信之可慶也亦可弔也改易之銘即如命定刊雙白遠來多媟嫚乞為山僧修飾弗備復靈嵒儲姪禪師千里吳越山川相間不能時託鱗鴻唯從往來雲水詰問興居得知痰疾一發旋愈今遂平康無事以為慰也殘陽挂樹再荷天童徒白巔毛無俾叢社所幸飽柴足水遠市離囂豐儉可隨其家寵辱不關於慮得借以遂餘生耳我山突兀鬥諍堅牢道德本荒疏文章焉可恃惟用道樹御野人法行之數年寂無形影此則山僧自信較似差勝諸方也先老人塔銘去秋始託虞山屬筆七襄之報諾以今夏浴佛為期中間詞鋒有礙漢兄和尚則山僧都未省覽老姪既陰得其事狀何不移牘山僧俾為刪改乃假手張靜翁斡旋錢牧老抑復何也雖老姪出乎機入乎機妙有化裁但用之以待老阮籍則所謂附同氣荷同心之語又似信不由中矣老姪自是天生妙慧山僧深愧賦性顓愚然則患難欲其相成德業欲其相劭無乃太孤老姪之心邪老姪言滿天下道江湖先老人可謂有子有孫是則借光多矣區區十八年來松柏既實之枯骨寒原遠煩玉步或有媟嫚得不深山僧之罪而消老人之福哉乞泯此念荷感猶多改定銘詞謹依雙白頒宣口諭即如命施行矣復謝不宣又山僧向來於塤箎猶子之中視吾姪最為厚善以至忘名分夷高下甚欲舉爾住持天童者愛爾施設文言豁達通暢將來德業聞望殊有可觀故也不謂爾於先師包藏禍心每每筆舌譸張雌黃無忌山僧由是疏爾薄爾不爾聞問者于今七年去歲聞爾遷金粟往來僧俗謂爾辨髦先人欺侮尊宿稱師翁則曰天童大師祠三峰覺範則曰振祖之堂北堂有先人廟貌弗躬弗親弗問弗仕旬香月燈潦草塞白而已大不敬無孫禮也山僧以為金粟道場乃先師發蹟之鄉梵宇排空香田遍界在他宗之人承而襲之仰瞻俯視不興食德報恩之思且非人類矧爾孫子以茲弘功浩業易爾蠆戟蜂矛直摧枯拉朽耳顧何毒不消詎爾梟獍為心始終一德嗟嗟密雲彌布之扁何刺爾瞳亦自書親聞室三字糊之又糊抹之又抹此爾為人神猒棄以去山僧為四衆攀援而來之日親對諸山檀護剖抉重封而開顯者也於乎爾乎抑何喪心悖理欺祖逆天若此之甚哉昔人謂黃檗勝亦奇衲子但晚年謬耳今爾晚年則一味窮欲極奢抑人揚己慢山突兀高踰須彌貪壑汪洋深淪滄海出入務同卿宰則丹塗香柏之舟招搖而過市焉受用擬埒王侯則采買定窯之碗羅列而陳餐焉靡靡服御遊從事事動求精妙罔思歲比荒戎室十空九今我身衣口食非猶諸天報得要皆信脂檀膏減割妻孥施我而營福者也四大苦本爾之增苦也彌勤五蘊元空爾之描空也愈甚反先聖之良針成後昆之惡習不幾謬而倍謬乎最可恨者本一南通小販專賣李四囂虛如山僧居廣潤時爾應臨海天寧鄰封打齊諸山嘗套爾則載之語録曰廣潤某和尚請師上堂嗣後山僧與爾同遭吏議名挂按君白簡爾時祇託天城傳一口信上山僧旋即門封戶閉杳不知其所之矣山僧裁答爾後自分臨難不可苟免徑詣臬司投到遲爾三月始來至明年質獄東甌爾則不勝怨天尤人及乎杖決憲庭爾之徒屬益怨山僧剛愎自用輕出纍爾即爾亦謂此行不是法叔老和尚小姪不願有生何事畢之後遂有如許誇張之書見之樹泉集哉豈非爾生平之言類皆妝點出來以欺世盜名者乎昔也按君參奏劾為妖言彌勒下生今則以彌勒後身自命矣然則當日何不一款招承必高叫憲天以求哀赦其故何也昔也台邑圖形杭都畫影露布長書會打繼起賊禿今則以天台古佛自居矣然則當日何不臨凡降世化導衆生必通途畏過黃嵒偏僻遠繞家子又復何也則是爾欲欺世而世不爾欺爾欲盜名而名不爾盜究竟一文偷不得至今空作不良人非爾之謂與他若千籠百絡結勢要權謀徑山攘金粟正晝攫金之態蚖蛇戀窟之羞魔梵修羅之大慢過慢增上慢火刀血塗之苦因惡緣極障緣皆爾一身占盡矣所以珊瑚枕上之淚山僧為爾不啻日飲千行久欲向爾深規切諫未免慮爾驕矜傲兀不能盡厥所懷今因爾侮慢先師之故始得乘間有言所冀改往修來化凶為吉然則畢竟如何即得山僧不妨請爾所自比之妙喜杲為爾作五丁力士開山通道置爾康衢不見妙喜之言曰節儉放下乃修身之基入道之要歷觀古人鮮有不節儉放下者又曰日中則昃月滿則虧天地盈虛與時消息所以古之人當血氣盛壯之時慮光陰之易往則朝念夕思戒謹彌懼不恣情不逸欲惟道是求遂能全其令聞若夫隳之以逸欲敗之以恣情殆不可救方頓足扼腕而追之晚矣斯言也在時流足稱金石之藥對爾沈痾惡症苟能去忌勤服庶萬死起一生否則福消報盡厥戾非輕恐不止于頓足扼腕之追矣統惟鑒納無任縈懷復靜香周居士附來書雙白居士於七日過南岡歷言和尚待法姪法孫之寬大仁厚而歔植繼堂頭尤深篤自知孤負老人處甚多聞督責之語局蹐無地惶愧欲死辭婉意切其來非泛常可默會也荃叨為法嗣何敢向人一句今法戰已勝小杖渠已全受義無再加大杖之理學人傳語云有致靈嵒一書欲付梓工荃清夜思維似可商略伏乞以稿見擲令荃與看使之感服尤勝刊刻即興朝治天下撫妙于剿況同枝共葉乎萬祈和尚矜宥之倘以荃言為不然亦祈過吳門面呈一切商萬妥而行可也總在先師翁一脈曲全之幸甚幸甚季冬承晤佛日後將返櫂天童俟新春過越共話平陽佳山水不意曹溪金粟後先命至敦逼殺人緬思金粟一席乃先人起家之地頃以主失其道門徑荒蕪殊可惻愴因過武原擬商諸檀擇一代司俎豆之人始睹靈嵒所作所為百種千端日以陵毀先老人為賞心快意之事真令天地雖寬有所不容人神雖隔咸為抱憤他不具論即密雲彌布一扁糊抹至三況其小者使先師尚在人間行道將不深削跡伐檀之懼而大畏于匡哉此山僧聲罪致討扶綱維常義不容己所以反正有録杜逆有說賦感有詩讀告有篇移書以切責之苦口叮嚀以訓誡之故詞不一而足者也來諭述王雙老代渠修飾謂自知孤負山僧處甚多山僧自念道涼德儉何能于尾大不掉之人有所歔植第就楊太史王雙老為渠經營一事使非山僧左提右挈引渠出于正大光明之域恐終身為照提鬼不敢以面目對人矣此或山僧歔植靈嵒之一班然負與不負則渠心自有靈臺明神固有業鏡山僧于彼非但無責望之心即彼或謗或誹欲解欲截罔不如水遭割如光受吹而忍之弗校也獨是先師為祖繼起為孫以孫蔑祖以下陵上為不可長此厲階耳夫自有天地以來便有綱常名教自有生人以來便有父子翁孫今驅三尺童子使陵其祖毀其翁彼固瞿然有所不敢者何也天定之倫性生之分淪于肌浹于髓不可得而攸斁者也豈靈嵒身為人天知識非狂非惑公然陵毀祖翁必聞山僧督責之語而後局蹐無地惶愧欲死者豈不零仃洋裏更歎零仃惶恐灘頭重說惶恐乎哉雖然困于心衡于慮而後作徵于色發于聲而後喻或靈嵒賦性中下理固有之然蔑祖戕倫之罪逆又未可以惶愧一言為之寬恕也所諭治天下撫妙于剿者德布成湯網開三面蓋為赤子無知窮迫弄兵故耳若夫陳恆弒君尼山請討胡氏秉議尚謂此舉不妨先發後聞況山僧忝辱先師門下靈嵒又屬猶子既非匡人之比則無俟上告天王下請方伯復不口誅筆討故含濡隱忍以褫成其逆惡將蒙出疆不越境返國不討賊之誅較許世子不嘗藥而弒其君父者罪不綦大哉是則山僧于先師為敗子于名教為罪人有不獲戾于上下古今之忠臣孝子志士仁人者乎以上下古今之仁志忠孝未有不敦倫而衛義者也不審居士又何以矜宥山僧耶極知尊意為先師一脈開曲全之路然其告文自白素非先師一脈奈何奈何與繼公書臘底既封緘俟新春寄託轉致幸專人來附上郵傳靈嵒為感再復靜香周居士附來書獅駕行急未及述荃是夜同雙白至檗菴舟中一段話檗公楚人帶性負氣其平日文章施設全從氣骨上發揮虛衷劑物以通彼我之意本非其能然任事既剛認過亦勇昨代靈嵒下山之時原為本師禮足而來豈嘗有宰官在意任心之過以至傷於坦率如爾汝之呼重房輕扁之論同來者皆為縮頸掐指而彼尚不覺悟其不留心於酬問可知矣老人愛人以德不忍姑息養其過誤直提汝既為靈嵒嫡子便須認得我家宗派汝非吳江令我亦非吳江編氓翻手一掌當機剪截熊父母此時似冷水澆背陡然一驚然後知老和尚一片婆心無非慈愛子孫至意不忍以門外疏親相待也舟邊語次皆是銘感之詞但云老和尚如是慈悲非惟寸中知之本師亦知之今日原為本師而來既承提誨即可云榮及本師老和尚從此可以釋然如杜逆反正諸刻似宜寢閣議論俱可歇息矣荃今日不避杖叱敢復進言荃等婚宦後學道之人修持未熟每於不及檢點處露出本來習氣況檗公生平以骨氣自負固不免偶錯要其初來代師禮足之誠蒙誨後受過不辭之勇皆足仰祈慈照鑒諒于語言事跡之外若云必反正必杜逆則老人一掌示其意矣而又多乎哉萬祈弘宥寢此諸刻不日容同雙白居士再叩函丈代荊何如臨楮無任悚惕來翰述南岡草堂山僧與檗菴一掌及居士規諭檗菴之故蓋山僧原以祖宗一脈待檗菴若檗菴果以吳江知縣自待則是門外人又何必干預吾家事抑山僧縱年邁敢云非沙門釋子然則掌檀越且不可況掌吳江知縣唯檗菴自任為靈嵒法子則靈嵒亦是我家子姪山僧尚可以家法繩之又況檗菴哉聞檗菴因居士之言即幡然悔悟還是讀了兩行書到底知文識墨不敢自越倫常雖然檗菴唐突老僧不過措大家一時腐氣尚屬無心之失不審靈嵒又何心行種種毀侮師翁落之于筆見之于書以至糊抹先師名號使凡在先師門下者莫不聞之疾首見而痛心非但山僧毅然有說即古南亦正言對使璧還趙珍豈非事關彝倫義難緘默所謂以吾從大夫之後不敢不告者乎向使山僧狗馬得隨先師早填溝壑冥然幽閉重泉無所覺知斯亦已耳今不幸而殘喘尤存奈何非木非石甘自褎如充耳不與君父同仇則亦有靦面目何以視息人間故今居士正不必問山僧起倒唯多方曉諭靈嵒克順克孝勿以少陵長毋以小加大舉從前之當門觸祖翁者悉改弦而易轍則彼且皮之不存而山僧又毛將安附哉否則縱令山僧三緘其口豈天下後世盡皆戕倫滅義相胥為獸為禽抑于靈嵒豈真有暴秦之畏遂無心非而巷議者既從地倒還從地起唯高明其鑒裁之柬敬一主人郭子公相去萬里天各一方而英聲義聞碑著南人之口者如風傳響語云道無脛而能至名無翼而能飛于我公王斯為信之歲在壬寅曾修寸函託鴻問訊想已達慈座矣去夏因先帝有山陵之役特遣門人旅菴輩馳送薊州意殿下必入朝會葬復修候左右庶俾親承謦咳少慰遐思不謂奉旨勞免仍復山河阻越傷如之何今春有來自瀋陽者聞檀越子祁生蒙推屋烏之愛遂使怖鴿驚魂依光定魄抑山僧何幸叨榮施真勝祁生晝錦還鄉矣然此案遭誣枉至于家破身亡纍遺親族莫甚價人纘曾二錢子為最慘今兩家妻孥與其弟虞仲方叔咸遠配遐天流離瑣尾殊可惻愴就使山僧縣同陌路恝若途人尚當興慈運悲效先佛投嵒割肉之思況屬檀那承信施復有公王救世菩薩二天可戴慈蔭可依忍恬然坐視不一告哀又何顏廁緇流而稱慈悲眷屬也邪為此更瀆威嚴伏冀少舒蓮目普放豪光使其停酸息苦聽贖還鄉則死生銜結寧獨錢宗為然即日升月恆之福山僧沒齒亦難忘頌禱矣翹首企仰無任主臣
