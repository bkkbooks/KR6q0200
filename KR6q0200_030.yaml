body:
  text: 住明州天童寺匡廬黃巖沙門道忞著尺牘與靈峰權長老杖錫出山後每遭六群搆釁想八部神王隨錫而往不然何物非人乃爾規圖得便邪彼衆師首雖今暫出未必妒心遂歇然山僧近讀大乘修多羅所說波旬央俱賒鉤大略十有二種心懷我慢瞋恚無舍其一與樂住阿蘭若志存煩惱不動亦一而惡魔伺便反不與焉者何也內心不著外終無障耳戒期結夏旋至一衆咸思表率而歸安化士歸復有米若干石差足支持兩月向後闕乏安可預憂所歎爾我不幸生末法中為佛弟子若不堅佛利生之志弘佛接物之心是謂孤佛恩德縱有別作別為而十二魔鉤在所不免為可懼也期早返幢無勞衆望又跋涉如許山川往來泥濘中行使我極不安也歸山少病少惱不疲勞邪此時結夏否早晚與兄弟說話要須十成嚴密登千仞困九淵極必與之俱此黃龍道法所以光大一世也然深錐痛劄之餘尤宜導以佛祖行言一俾沈痾錮習潛消默奪之淘汰功深或有羽毛相似者蓋今時學者卑固而頑而鄙高亦為戾為𢤱種既敗于今禍必鍾于後雖山僧尚有一二不免況末流乎演祖嘗云我無法寧克勤諸子真法門中罪人矣不覺叨呾如斯者想能備悉此意耳又你我既忝為佛祖兒孫當以道契為主豈可以勤省儀供為事蓋先和尚素有明訓矣道遠途艱且尋常改歲又非大吉慶事而顓人走數百里何也山僧二嚴多憾浩歸湖海雖抱龍門之悲而老病相仍可奈何聞慕說及遐邇駸駸竊有風行草偃之意豈以寒冰三尺戶門與人爭旺化抑衆知向方則兆足以行為可喜也所引魏公焚諫草以況近事是矣然佛果作俑評唱佛鑑力言極諍使其章疏焚祕不傳則緇門警訓後世何從見而載之應知二老當年殊無所忌以為作既自我矣而欲諱之人也何為昌言拜而聖聞過喜而賢噫嘻聖賢我知之矣今公既以為言旋即付之丙丁童子無煩致慮不一復道峰清長老可止則止可速則速察人心之向背為杖底之去留稍有濡涊不決即為時輩描模此住持去就當如衲子之輕斯則善矣者此也既本山檀護力挽何妨仍舊解下腰包已甚之行至人亦有所不為焉山僧青淄之赴以大覺專使相守一年迫而後應然桑榆景晚那堪長苦風塵亦匪久即拂衣入山耳江南江北相去途遙為法為人尚須自愛與廣潤融長老凡為一方主者貴在弘道德張教化其次在知人情識世務至于落筆成章吐詞為訓亦其次也故或有志于道德教化而不周知人情物務祇名本色擔版其或人情物務頗亦周知而道德教化缺然未免世諦流布間有二事無虧矣而落筆吐詞不雅馴老師宿儒難言之則亦不能光遠而聲實有耀今你不幸忝主一方則三事在躬無容推託其敬之慎之毋貽山僧之憂為切屬與大覺升長老度夏五蓮雖為泰雨徹公苦留抑聞北兵駐邗諸菴寺鞠為養馬之場故遲遲吾行耳五月初旬揚之紳士催符復至始知淨慧一剎獨保無虞但既放下藤條不當曳起又行俟夏末動身則可少慰主者之心矣爾我雖急于行道而北方所重唯在一往動履所謂道眼精明不知復不問也今你不幸而行道于北直須身身矩度步步威儀久而弗渝當有信而歸從之者然為一方主者法應如是不專北地為然也至于用人之際尤宜寧質毋文寧拙毋黠蓋文與黠者多失之專意妄為而質愚之夫辦事或不足于以壞事則罕矣道途縣遠不能多屬你其善為住持庶免山僧憂勞斯為孝順之道也又執事輩來以江淮戎馬騷驛欲山僧還轅北海化彼東方理固不可抑廣陵專使相守月餘日催渡河之不迭矧化人擔子山僧出門之日業已卸肩于你語有之其父析薪其子弗克負荷你惟自著力負荷之耳法社傾危莫如今日你我忝為佛祖兒孫豈與有其責之人忍見門衰祚薄徒含垢包羞而視息人間哉又男兒自稱丈夫子既生閻浮提中苟不垂教法于千秋芳名于後世磊磊落落自利利他是謂空走人世一遭其可恥又孰甚也邪山僧衰朽無能恥實有餘所望幹乃蠱洗乃羞則在你之臥薪嘗膽矣聞明首座既住濟南宜遣一介使者通聞問為是又山僧忝託雞峰末裔則靈山慧命竊有攸關頃者謝事青州竟以大覺全肩委荷于你者亦惟你側身行道克己惠物俾濟北沿流靈長不止則山僧與從上列祖方賴你岡陵視息奚啻黃髮台背眉壽無有害而已哉苟不如斯縱使山肴海饌大地為盤奉獻將來抑夭折憂虞之不暇尚何心而納受乎你既函丈空疏復勞專人遠至得不益動山僧忉怛之思也邪後凡世禮宜一概俱蠲你當體悉此意復神鼎僼長老秋嵒至自常德持你手書述你近況頗慰遠思神鼎寺古山深田腴壤廣塵囂既遠吏卒不呼于此堅志行道未必一時聲名暴起久久自有一分光彩出來山僧可庶幾免西顧之憂矣但恨年運既往日就衰殘分心代勞之人益希且怠雖今普化直裰象骨難提所有末後句子無不一一理會得當便饒遭他授記不妨祇活三年其奈院務殷繁瓜期無代當此西山暮景詎堪鞅掌為勞詩曰誰能烹魚溉之釜鬵誰將西歸懷之好音正恐好音有懷而西歸難待耳興言及此可勝傷嗟復幻楫濟書記別機來見你手字畏同今時奔南走北騖利馳名之輩故晦跡湖山灰心林下許你於是輩獨出一籌然因是輩即甘為本色擔版亦尤之乎五十步而笑百步者耳釋迦老子不勝衆生頑慢之憂尚特生五濁惡世與調達尼乾輩共王閻浮蓋我之道德果超於彼則邪不勝正彼將自化不則我之負慚於彼也多矣當亟求所以化彼之方況因噎廢食而欲離異之乎故山僧尋常語學者你輩不須學佛但學水牯牛則善矣夫水牯牛者當東作方興之候不惜為人牽犁抴耙帶水拖泥及其千斯倉萬斯箱而西成告畢也則大功不宰曾無粒米之沾濡至不幸而摧於龍鍾死於刀砧也則筋骸血肉骨角皮毛咸為世用而無或棄焉水牯牛乎吾師乎吾師乎水牯牛乎是故學者苟不以水牯牛為師則豚犬而已今之騖利馳名者是也猒豚犬而復願乎其外抑不過如獐獨跳之徒耳何益於時哉請詳之慎之當不以山僧之言為誣也與冰菴張居士自怪一生無定力尋常多被業風吹應菴老祖蓋為山僧狀厥生平可怪去秋邗溝住未席暖而青州專使銜命至再春杪將弔東海之風首陽之蹟於臨淄即墨之間矣不亦去國滋遙而思人倍甚乎權長老出世未久後嗣無聞慨行業莫有為之捃拾者今其語録乃得居士不辭潦倒曲為敘首非直不朽五磊殆將不朽山僧也幸何如之世界滄桑先德語多散失人間久思彙刪宋元以來諸録定為一書總名續古尊宿庶幾不隨兵燹湮沒念此非足下莫與共也俟明春歸邗舉之衲衣一領非作人情物事願言朝夕服此無斁乎復大溈慧山海孫禪師五峰老人法脈如一縷繫千鈞汝師養拙獨承記莂厥荷匪輕矣惟汝服勤最久潛符密印業亦有年在今溈山法道之隆替責在汝躬苟能如應菴之起虎丘厥後當浸昌浸熾又何必以門衰祚薄為創心也哉拙公圓逝後汝獨毅然走使五千里外奉迎雪竇老人主席誠為盛舉緣雪竇本山修造未竣故不果行今復十載使者頻頻相望于道則汝為溈山一段苦心人神當亦共鑒聞雪竇和尚尤然力辭不赴山僧以為汝雖監院業已說法傳戒亦即匡徒領衆之長老也法席不可久虛汝自住持名實俱稱而紛紛外請似為不必來儀種種過于腆厚令人素受難當謹對使登嘉致謝小參數則生機儘有語脈亦清但中間缺于脫換未免有重復之病當自知之又先師門下十二人中長恨五峰法兄道韻孤標而後嗣不蕃披蓁同慶僅接得一養姪明公紹修其家又復溘先朝露明公既爾付授於你然則千二百斤擔子非吾孫誰克肩承巨業此老僧去秋所以因專人三復叮嚀申命你者總為五峰老人法系不忍視其中斬耳今吾孫能遵祖命慨然瓣香拈出可謂繼志述事善能有加哉但先德有言明道易守道難守道易行道難唯吾孫轉難成易毋使慢易滋難日就月將光前裕後則老僧亦與有榮施焉吾孫其勉之復雲居顯孫禪師丁丑之春獲晉光儀於太白山中一往駿賞之懷自信不減支公道林但此時足下方鋭志功名未敢以選官不如選佛之言進耳詎意陵谷代遷天若驅足下以從我語云非常之事必賴非常之人人如足下何如人事如佛祖之道何如事所冀資深以造臻於巧力不到之地然後起而恢張吾道則法門幸矣若寡陋如老僧者直道周杕杜而已寧煩高明依託哉願言勗德不盡鄙思復季超祁居士附來書駿不肖雖未獲深託道契之末然久遊老人座下獲瞻仰浩氣徑骨如泰山喬嶽可望不可攀者非一日矣數年以來道風遐振皆古人之厚德高致非晚年末法可一二見者企渴之私益切寤寐不肖每尚論古今之際雖代不乏人大要較之古人漸遜漸下者蓋古人皆唾手名利之人其氣骨高出于名利之上故棄若敝屣耳入此一門自能主張大法振起先宗後世之人每每不及名利之格而退處于空門之中間有一二發明大事或未能盡脫流俗鄙劣之習焉得不遠遜古人而出其下哉如大師者正所謂唾手名利之人而浩然棄若敝屣者也早已具古人之器量焉得不遠出今人之上乎法門似盛而大衰何幸得大師為宗門柱石使末法庸流猶得見古人存心行事此真法門之大幸非不肖一人之私慶私慕也又去古時遙或坐儱侗之大途或墮穿鑿之稠林如大師久得老人迅絶之旨固不必言近聞一二拈提皆古人閫奧中事仰窺大師于迅絶中自有古人深密之妙用此又豈近時可望一二哉救儱侗穿鑿之二弊非大師而誰望乎極擬趨聆教誨奈病廢已久跬步難前坐是不能渡慈水登五磊以申翹渴遙望慈雲曷勝炷香頂仰之至先師無恙時蒙昆季種種弘護以至餘波及于不慧癸未開法天童尚荷寵光加被可謂德周兩世豈曰尋常知遇已哉然五載以來無寸楮相聞問者誠以君子千里同風且重煩左右裁畣故卒安其愚陋耳乃辱教箋多所溢美之言極知高懷與人為善而聲聞過情不慧又何以對畣天人邪竊謂入此一門非但名利關頭而坐在掃除名利邊無入泥水為人心亦未免流為定性聲聞總之意中才有所重即過犯丘山自非髑髏粉碎者未可語于佛祖之道也法門將及百六之災奚啻似盛而衰使我輩今日之為法門者咸如令弟世培先生可濟則濟不可濟則捐七尺以殉之然為法門存典刑則可尚不能與波旬爭旦夕之命況苟且依違其間此不慧所以慚披來教汗流至踵而俯仰為之不可者也晤言何日尚冀後圖又別後不謂龍蛇起陸血戰郊圻獨平原深居無恙豈非道與之城德為之塹所謂長安甚鬧而我國晏然者邪塔襄雲門克終其緒皆自諸檀弘護與居士之靈耳又其弟子能自拮据若不慧勇斷徒觸忌僨事何足云然然俯仰內省生平唯不敢以私滅公一念薄云不疚即發揚化山和尚之美皆是物者但人微言輕章而得暗正自回皇乃居士褒為千秋絶舉洎拙録題詞中又復極其嘉與造物不忌其餘若斯不虞之譽殆有忌焉者辱命寂徵序及崇行録提語人言不足以重前已道之矣如葑菲不棄報命尚圖後時又海天涯角住既幽深復有風鶴之疑故致鱗鴻之隔春芳載吐福履如何承委崇行提語寂徵録序自慚動止多與道違況更佛頭著糞乎又以妨命是憂雖則勉為從事然率略奢矣書上塵覽尚冀有以造我也法門不幸日就凋敝讀三和尚語卓然一代偉人但此老頗有慈明不事事之風居士既在門下力能匡輔何不擇一名剎處之俾得力行祖道以福後昆不一善乎化山薪木何如亦有修我牆屋之旨不願聞清轍謹此附詢弗備又附來書不肖駿向侍諸大知識座下每每於出處之際勸退不勸進勸靜不勸喧勸山林不勸城市乃今日者獨以越城能仁大剎衆情趨匯之地竭誠勸請豈頓違宿志與豈姑以相嘗與豈僅以世情附諸公之同聲而和之與不肖生平所心服者惟大師一人諒不作是見也即大師亦能信不肖之必不然也則今日之勸請其必籌之熟矣酌之審矣見之真矣知之確矣大師苟能信不肖非狂昧輕率之人則不待駿辭之畢而有惠然俯允者矣所愧者病軀跬步難前不獲冒險親迓法駕仰冀俯諒于形跡之外耳不慧道德荒蕪識學疏淺無論仰愧先哲者如何即當世導師所謂機語淵玄愧吾興福牧兄作用峭峙愧吾報恩林兄縱橫辦博愧吾寶華朝兄稱心肆口如吾化山三兄之越量超情而吾愧焉敬嚴法道如吾雪竇奇兄之澄金汰玉而吾愧焉負愧之多如此而來教獨謂生平所心服者唯不慧一人屈到嗜芰曾皙嗜羊棗豈信有異乎人之口哉雖然二公好尚未易致詰而羊棗芰之受知于二公也則已深矣知深而報重亦恆物之大情也顧不慧獨無情乎況復以名藍相甄拔哉則來教所謂不待詞之畢而有惠然肯諾者又何說焉惟是廣潤坐未席暖遽拂袖它往無論情理有所未安其奈銅匜會見薶青草若之何故卻則重違知己赴則荒卻雲山或高明相體諒不以院事羇縻使獲春秋時晉光儀則善矣必欲據款結案則雖妨命亦無所逃罪焉又居士之撫有平原也割家之半與半生心力以營之故得原田每每棟宇參差乃一旦舉以捐之貧道且言貿而不言施不叨許王舍宅為寺之名而欲貧道于中耕雲種月遠追神鼎近步圜通人非木石誰能已已顧貧道聞之德薄而厚膺者召災人微而顯乘者致盜德人如貧道皆災與盜之所必尋者也又數年以來住經五剎坐未席暖時復播遷則從者已倦於追隨一番提起色色皆新粟非天雨杓不樹生即貧道亦勢難於作始語有之靡不有初鮮克有終揆貧道之初終固無一而可者是以搔首躊躇空壞則不敢遲早又難期更若付之惘然則又廢墜居士千秋勝舉故特浼白姪雪丆者應命蓋其人乃鶴林牧兄之嗣抑亦本色住山而無刀斧痕者昔大覺道光仁廟天下不多璉而多訥者謂其知人能舉賢也質之雅懷想不以專輒為嫌焉又恭聞和尚重舉金槍馬麥公案了卻一主急債親證本來空寂和尚分中正是順逆皆夢幻苦樂皆影響且從上黃龍歸宗大慧徑山沒量大人偶爾因緣相值指不勝屈不唯道價無損亦且揩金增光烏足為和尚歎惜憤鬱哉唯是宗風秋季假衣貿佛者比比砥柱法門為人天表帥者自是首推和尚次則繼師耳庸庸泛泛者獲福如彼皎皎表表者受禍如此則法運之修短可卜矣法門之盛衰可見矣得不為法運傷悲法門痛哭哉急欲面叩幾擬借翼奈夏病將發決計深秋但縣縣之私不能自已不但夢寐以之也日來道體不甚病否此後葛藤不牽纏否傳聞無的幸備示以慰縣切山僧近事風落江湖莫不心寒股栗親者諱密者歎高尚者呰議憎嫉者非笑求如左右知明見白言言爬搔湊著癢處不道全無直萬一耳但山僧今我非昔我愚意近復不然如往讀南公傳我繫星子獄百日親證法華三昧非不服膺此語亦固然視之云爾幸而叨嘗此番境界然後明見殺盜淫妄無非大用堂堂魁膾屠兒悉屬真善知識故今于苦樂順逆修短盛衰不生二法見于表帥人天者假衣貿佛者即授罰受罰者亦不作二人見頭頭讞議葛藤恰恰拈椎豎拂又豈有日來此後之見哉咄不合私用官物更與三十竹篦又附來書某年來渾身保社中益得備悉諸方知識道德佛法真可以師表人天砥柱末流者終無以踰我和尚益信平日決擇之不謬而此衷仰企夢寐無間每思越中得以一席地攀邀杖履俾終身近侍焉蓋朝夕為念如有重負不能去懷特以時值多艱兼之力綿身病願勇而機未諧悒悒者久矣天龍有靈感得耿玉翁俯鑒鄙衷力任金湯遍告之現任道府各廳諸當事無不人人欣諾至于紳士之歡仰更難枚舉也即本師三和尚身雖越境每有字及必諄諄以迎回法駕為越中造福今得此機會出于萬全又遐邇緇素無不愜心豈非天龍一大作用哉又豈非浙越一大福緣哉某睽違芝顏五載于茲積懷奚止八斗要非楮墨可罄統俟親侍座下一為傾倒耳專人至接翰教殷殷如同面晤深愧衰殘無似之人屢承足下推重過宜曷由而報知己之萬一哉定光金地遙招手智者江陵暗點頭況能仁一剎殊費神用經畫復煩耿玉老周爰咨度謀諸當事重以士紳弘護合詞共挽奈何晦養自高負違長者之心但山僧日者返轅邗上本欲了淨慧未完之局一旦因溪山絶勝之雲門遽更初念是謂見得而忘義直一商賈之道耳撫躬循省誠有所未慊于中焉寤寐光儀心焉如搗遠蒙垂念兼辱厚貺拜嘉之餘不勝惓然之至復聖月錢居士日者光賁林泉奉塵三夕至今倣佛間猶有十影神駒在心眼中以貧道風波摧拉之餘所謂爨後焦桐耳不謂賞音有足下人亦有言衆人皆欲殺吾意獨憐才足下第憐之已耳翊揚雅度則逢彼之怒恐非所以愛貧道也冬風漸肅惟珍重四大弗備又附來書癸秋一別倏忽五季玄黃異變傷心酸鼻偶從雲水緇流訊知道體清佳宗風弘暢大慰遠懷若繡三載之內喪父失偶破卵覆巢與死俱生與憂俱老屢欲皈命導師芟染從事而三喪未舉胤嗣乏人不能遽逃世網然百念已灰在家如客非久終當為所欲為耳為法鬥爭已屬師門不幸近者復欲牽入世諦為人罪案清夜捫心何以自解光繡路見不平出語每多憤激知我罪我自可聽之若和尚汪度天淵諸方贊誦愈切皈依仲尼日月也其何傷于日月乎頃因鴻便草率泐候秋冬之際當趼足五磊受和尚辣手鉗鎚圖箇出處慈腸或不我棄耳外附小刻詩箋呈覽臨楮不勝瞻戀世界等空華人生如幻夢幻成幻壞幻生幻死幻合幻離乾坤之內身世之交無適而非幻者惟至人了知是幻故在哀而不傷處樂而不淫遇寵而不驚當辱而不屈皎若夌空之月飄若出岫之雲雖汩爾塵緣之中而塵緣自不能為之纇也門下曠心達識固有芥于此乎若夫貧道求全之毀敢謂能自超然幻視抑深知薄福所召日惟反躬是省乃不意動高明激烈之懷則罪過正復不淺矣披讀先帝哀辭令人哭不成聲時情隱中自當與麥秀黍離共譒千秋豈曰一時傳誦已哉何日晤言寫此鬱思
