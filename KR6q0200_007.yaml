body:
  text: 住明州天童寺匡廬黃巖沙門道忞著序二四明雪竇山資聖寺志序春秋一書孔子作之以為經左丘明表之以為傳司馬遷考古徵今網羅上下數千百年之事纂之以為史記其間善善惡惡之條是是非非之案可以興可以觀可以感可以廣聞達識其有造於生民有功于學者甚大故此三書者實天壤間一大典故尤非群書之可得而擬也厥後班孟堅變太史公貨殖傳為志後世遂因之而志州志縣志民社其原蓋一本諸春秋然皆事拘方內徒使人增長塵勞之見耳求其摽落情封神遊八極使人超使人遠使人緣慮空而故我見則方外山林志有足多焉明州雪竇山者踞四明山心重岡復嶺千巖萬壑奔攢涌注匯于高空然後瀑落天半下此數里皆絶壁一竇飛流噴薄如雪山由此張名竇之上一亙緑野平川宛如武陵之桃華源而資聖寺實宅中焉到門卻立回翔四顧則疊嶂倚空錦屏開畫遊者益警心駭目儼登蓬島寺建於晉盛於唐極崇於宋之諸宗稍歇於元之中葉盡燬於明之末年今之興復者則我同門石奇禪師與其弟子山夫微菴師南輩披蒙茸斬荊棘驅豺狼狐豹之族而鼎建者也道嚴恂公久掌記室不泯其師之功德重畏此山勝迹奇觀不覯于時乃簡校山川招呼泉石按列聖之徽猷集諸宗之法要托王臣弘護之芳躅與夫蠟屐遊筇之迹騷人韻士之篇靡不探討而論次之乃成此書心良苦矣然豈僅曰有功於此山哉豫聞先佛有言曠野深山聖道場地皆阿羅漢所居世間粗人所不能見矧雪竇壤接天台固仙真之所來遊山君水王之所至止在昔聖師如智覺壽明覺顯皆前後住持此山固嘗著宗鏡録百拈頌以惠來學今其書遍布叢林且流通高駒麗之國日南海外之邦亦足占此山從來法澤之汪濊有如此矣獨宋之仁宗叨一夢遊窅然喪其天下以不獲親踐為恨苟使今志在御時一披覽不幾千峰寒色雪瀑飛聲恍然几席之前可神聆而目接之與況數十世老古錐之面目具在哉吾故曰使人超使人遠使人緣慮空而故我見可補麟經左史之所未逮者非誣也讀者幸毋徒作山林盛事觀焉可也高峰抱朴蓮和尚語録序西天二十八祖秉教外別傳之旨遠自迦維東來震旦愍此方學者溺於見聞不達性本遂一掃文字支離之障直示涅槃無相妙心指南有準跂而遄歸不第黃梅無姓兒獲傳衣授法即新州賣柴漢且濬發夫得道如林者而徑為之岷源矣又六傳至德山鑒臨濟玄則大作師子無畏吼音直排斥佛祖為幻化老比丘等妙二覺為擔枷鎖漢十地滿心為客作兒羅漢辟支為守古墓鬼三乘十二分教為拭不淨故紙而後世焦芽敗種之夫從而因噎廢食殆將鐵爐步自冒抑寧知得大機之百丈海不卯歲離塵三學該鍊乎再來人之備頭陀不閲首楞嚴發明心地由是應機敏捷與修多羅冥契乎禪判官之永明智覺壽不出入馳騖於方等契經者六十本參錯貫通此方異域聖賢之論者三百家卒折三宗之異義要歸於一源而著為百卷宗鏡録乎況夫搜羅五教吐納三乘乃能不數他珍寶參則真參悟而實悟因順風而疾馳載波斯之巨艦有如抱朴蓮和尚者宜乎其宗通説通開廓人天一似披雲霧而見青霄者也獨惜其緣不酬德行嗇於藏不獲布靉靆之慈雲澍滂沱之敢澤所設耆婆法藥僅見之乎此焉然嘗一臠而知鼎味安在目全潮而始占其洪濤也哉是在通人之自得已耳至於師之行業一底乎粹美則求仲韓太史銘之最詳業與茲録宣布久矣今其徒晝中證公復以辨首屬豫者痛師門祚日衰謂豫知言為能光揚夫師也顯聖三宣盂禪師語録序世尊有密語迦葉不覆藏夫一華拈出覿體全彰果世尊有密語乎然而百萬人天咸皆罔措者何也昔者趙簡子因姑布子卿以翟妃子毋恤為賢欲試之乃告諸子曰吾藏寶符於常山上先得者賞諸子馳之常山上求無所得毋恤還曰已得符矣簡子曰奏之毋恤曰從常山上臨代代可取也簡子於是知毋恤果賢則世尊拈華之旨蓋可心知而百萬人天且碌碌如諸子直以常山有符在焉耳故四十九年從佛口生皆如諸子而末後始以正法眼藏付屬摩訶迦葉者所謂廢太子伯魯而以毋恤為太子者也西天無論已東國自有宗門以來師師授手皆命世亞聖大人雖機用羅張於李唐語言絢爛乎皇宋一如青天霹靂旱地雷鳴南山起雲北山下雨苟非毋恤之雄略罕窺其意旨之所在者沿襲至於元明之年尊其師説而已無復神而明之之道遂使從上真規死於繩墨千秋堂搆墜之非人彼步趨尤難況奔逸絶塵得遊戲如風大自在三昧者邪三宜禪師天岸祥麟雲中逸翮茂齡悟道石筍抽洞上之條早歲分燈空華結雲門之果尤復涉南北於數千里外困風霜於二十年間始歸而遁迹化鹿山之陽會爾密澓公遷化顯聖席虛四衆挽之出世於是果熟之香風飄遍界盈科之水決而滔天遂有升堂示衆等語皆脫略窠臼鏟去塵封直欲與五祖共唱巴歌瞎堂同呼哨指乃過踐偃師之迹不許流傳一字侍者隨聞記集僅若干篇余過吼山始得讀於尼淨琦家不覺掩卷拊几長太息曰此龍光射斗者也曷為薶藏於此因持入天台為之參詳校訂復捐資壽梓公諸同好於乎師絃絶響野干亂鳴彼黃頭乳口尚往往以禪語衒侃社況牙似劍口如盆反深自韜藏有如師者往余與師同參黃檗繼今丁亥蓋草有餘祀始獲對談五雲山下然皆法門當大無他及逮過顯聖觀所為布置叢林締修堂舍亦可謂二嚴無憾者矣當丙戌之秋因事徑拂衣去不顧則視蚖蛇戀堀掩先業為己有者何如而增上慢之從且以風流瀟散短之龍象蹴踏抑豈跛驢所堪哉南嶽山茨際禪師語録序孔子以詩書禮樂教弟子蓋三千焉身通六藝者七十有二人至于默而識之其心三月不違仁則顏氏之子殆庶幾乎然不幸短命死矣深期所以痛悼之也故曰天喪豫天喪豫又曰惜乎吾見其進也未見其止也嗟嗟墓門有梅有梟萃止矣而九苞之鳳五色之麟曾畢世而莫之遘者何其中道折翼復創於車子鉏商哉此吾於山茨禪師不能無感傷焉師出報恩老叔之門報恩高臥磬山三十載學者非人物精奇不容廁籌室師以警敏之器英發之資茂齡親炙以迄于壯故師於報恩也固已升堂入室三拜得髓矣而報恩之於師則殆於祐之有寂演之有勤杲之有光焉會恩有東明之命雅推師出世然師心期方遠大不欲蹈襲時常住未有幾即拂衣去深遁衡嶽初止緑蘿菴玄學多歸之以口衆艱於食復下南源三遷一依古德枯淡住持磨礱鈯斧以砥厲方來遂有垂示拈頌若干語皆的的提持柄分者著子殊無語言文字與人咬嚼蓋與今時禾黍不陽豔競栽桃李春者迥異矣乃誤服野人之芹竟爾一朝趨寂於乎顏淵死孔子之道失傳師如永年吾宗可倚孰謂鸞鳳竄伏鴟梟翱翔豈真天不可與慮道不可與謀也邪雖然塗毒鼓聲尚未停音當有聞之而命不全活者師蓋未死吾復何憂哉翠巖古雪禪師語録序昔侃寧勇禪師出楊岐之門道聲不減雪竇至于提唱之語尤為精峭嘗曰風鳴條雨破塊曉來枕上鶯聲碎蝦蟆蚯蚓一時鳴妙德空生都不會都不會三箇成群四箇作隊向前村後村折得梨華李華一佩兩佩可謂抖擻尿腸為人説禪而南堂欲公尚道禾黍不陽豔競栽桃李春翻令力耕者半作賣華人則説法之難也審矣雖然諸佛威儀進止諸所施為無非佛事故其示人也或有以光明相好佛身焉或有以飯食臥具衣服焉或有以園林臺觀虛空焉或有以菩薩化人菩提樹清淨土焉或有以寂寞無言無説無示無識無作無為焉豈僅曰語言文字乎哉獨此方真教體清淨在音聞故雖德山臨濟棒喝交馳終亦不廢語言三昧然求其縱橫辨肆樂説無礙一以理勝不詭俗不淫陋言言見諦句句超宗非揚眉有正法眼藏點胸有涅槃妙心而能若是乎吾老矣何幸尤及見翠巖哲公禪師其人者公炙先師實當天童旺化之日一時鳳毛麟角爭相騰踏軒昂太白之門唯公年齒最少志願獨堅鑿索斧攛晝鞭夜策汲汲皇皇不間寒暑者十年始浩然大徹先師室中箠尺極嚴許可尤審肯諾之聲未嘗為耆年假也直以侍者參得禪為公助喜則其屬望于公也可知已乃公方鋭意住山徑爾別去遁迹亮公舊隱耕雲種月一钁十霜由是洪州道俗相率捐資贖古翠巖挽公出世為中興第一代祖道遂顯著于時卓哉公也幻有師翁不云乎除卻釋迦老子福慧兩足有幾人焉但於本領有實證則龍天必不相負況公律身之嚴求道之切奉師之恭謹事衆之勤渠固宜龍天推出無足為公怪者獨其問答提綱星馳電卷發揮玄賾光闡大猷駸駸乎山谷所謂青山白雲開遮自在碧潭明月撈摝方知鐵石崩巖霜弓劈箭不受然燈記莂自提三印正宗假令古佛出頭也下一椎定當乃足多耳惜乎先師未之見焉敬為敘次質諸當世明眼作家嵩乳禪師語録序壽昌古佛始于大好山中翻出祖爺田地便爾耕雲種月身世俱忘繼得博山為首座相與龍吟霧起虎嘯風生由是父子之間和雲唱出大震洪音而新豐一曲遂簧鼓于大江之西矣博山老人從千尋樹杪踏著一條活路三十年來只就玄途展手鳥道接人彼學者方措足無從望巖即退況復波瀾海闊門戶天高羅龍打鳳獨貴超宗異目之夫縱有齊眉共躅見與師齊者在所不屑焉是以半生開法未嘗肯諾一人猗與休哉敬嚴法道誰則如師然從使門風壁立不顧雲巖路相次斷絶則余未免疑師之把住太甚也朅來淮海得讀嵩乳禪師語深喜博山有後及過山陽來青齊則河北之彼緇若素莫不知有嵩乳禪師又莫不誦説嵩乳禪師乃知禪師之道高德厚而入人深也今時雛比丘之住村院而稱嗣祖沙門者彼非不印可諸方抑豈無侃社禪語哉其奈縱然生摘得終是不馨香何故余聞之大論曰多聞慧辨巧言語美説諸法轉人心自不知法行不正譬如雲雷而無雨驗諸禪師之若此雛比丘之若彼得非所重在此而不在彼也邪於乎北溟有魚其名為鯤鯤之大不知其幾千里也化而為鳥其名為鵬鵬之背不知其幾千里也彼鯤鵬之化變其誰使之然哉然則博山老人之把住也有以也夫徹嵒歇禪師語録序雪嶠老人風高一世氣壓諸方至於操切叢林匡領從衆彼固夷然有所不屑也及晚暮始住雲門僅得徹嵒歇公一人知明見諦行超履卓足傳語風之道無忝默識之回矣未幾出主雲門旋遷慧日俄而真歸寂示焉昔者顏淵死孔子深傷而痛惜之曰苗而不秀者有矣夫秀而不實者有矣夫今公苗而秀秀而實矣乃零落于風雨之交摧方來不獲受其利賴焉是則為可深惜也詩云誰能烹魚溉之釜鬵誰將西歸懷之好音況能為公收斂遺穗食我蒸民慮無好音耳懷之固宜也故吾于古木本上座之刻是集也樂而為之序湛菴常禪師語録序賈誼當文帝興朝之日即發為痛哭流涕長太息之言不無過激然治安無策則漢庭之事可計日而覘其非矣矧今日之禪門可為痛哭流涕長太息者奚啻如賈生所謂得以三四五六籌量而數計之與口口談空心心著有雪竇馳聲百頌峨嵋倍集千章固自謂不難陵大慧躐中峰而上之然究其本領茫無實證非但乏為人手眼抑且無利物誠心以故高者籠卿宰卑者結要權既檀膏信脂可以廣招亦法社名坊可以力攫門庭焰焰意氣洋洋彼且不自知其為僧又烏知夫行解相應之為祖哉我生不辰際茲風頽瀾倒之秋何幸尤及見夫説行俱到如吾湛菴常公禪師其人者公始親近天童先老人與今釋迦老子於往古過極無央世初發道心時同一軌轍皆以陶師承事古釋迦牟尼佛然我佛從是至二大阿僧祇劫始悟本來無有少法可得而受然燈記莂公則冥搜力索于十年之內遂得疑團打破土塊翻身不禁風磨雨洗重重覆護人天所謂行真而解的解至而行光者非乎自後出住台嶺一安遠方小剎殊無生情旺化冀遷大院之心然尤未足驗公生平及平禍出明夷災生無妄經大患臨大難之際直得水人毛豎石女攢眉乃公處之一如刀凌白水火燬晴空曾不少干其懷者視彼高籠卿宰之夫稍有利害當前則局天蹐地憂畏百端幸值風恬浪靜則高揚己德下視肇公者之何如存心豈非行在一處説又一邊所以説向飛龍之前行落跛鱉之後惟公則如行而説如説而行如説而行故其行也皆實際如行而説故其説也無支詞雖今公語僅寥寥數卷然皆一一胸襟流出六祖有言字即不識義即請問公則字義俱刪一以陶家輪下所真參實悟之乾爆爆底禪與諸方來共相咬嚼而已昔黃龍恭首座住衡之華光罹有司民其衣華光既遭回祿而恭語録獲于灰燼中餘紙皆盡而字畫無損遠近爭傳以為般若靈驗如使般若有靈則公茲録方將炳耀于劫火洞然之中又奚俟山僧揄揚贊説而後流傳于世哉公嗣法石奇雲蓋近出雪竇之門而實遠臻天童之奧者也大梅法幢幟禪師語録序一華拈出靈山五葉芬披少室所謂直指之宗兼不立語言文字者然一洞徹法源則性海瀾翻波光際天如風穴慈明翁孫東山昭覺父子唱彌高而和彌峻直令千秋震響寧惟一世警聞已哉沿至末流襲為卑近探之索然者無他見解偏枯中殊不足故耳雪竇奇兄敬嚴法道座下親炙諸公多至一二十秋未即放行輒以鉢袋子付我永嘉幟姪諸方不無老凍儂尤有官情世態之疑乃今永嘉出住大梅卒能力肩祖道弘闡大猷昨者過我天童山僧諭衆特請升座舉揚親見其雷奔電掃王應金春唱提大有過人處益信奇兄眼光爍破四洲天而尤子肖我豈鳥名山中真千里塵談神契固有素與洪波浩渺法海瀾翻非深徹乎源底殆難矣哉其沛然若決之如斯也幟公謙退方謂山僧譽過乎情抑當世尚有高鑒之夫其亟拈出而問之大溈慧山海禪師語録序五峰學兄發明禹海記莂通玄實為先師首出之子適住溈山同慶寺未幾即唱滅金陵九鼎一絲幸不中絶者賴養拙明公紹而繼之也明公種田博飯最稱孤硬而慧山海孫能于鋤畬種粟之間撼樹插鍬之際薦得己躬下事與之互相唱酬固已奇矣殆明公趨寂遺以伽黎屬令繼席在今時短販之徒方且撾鼓升堂晨不待夕乃海孫專人五千里走雪竇山中力以天下第一名藍起我奇兄和尚恂恂監院自守者十年歲挽雪竇益堅及奇兄力辭不赴則又商諸山僧山僧痛明公門祚衰薄因以繼志述事勉令住持然後瓣香拈出露其一斑則真本色住山人實無刀斧痕者山僧既愛其行已高尚且喜五峰學兄之法道有寄故為之序次如此巢枸集序靈山正法眼東土破砂盆相共傳持者寧僅四七二三類皆聖真降迹即自曹溪散席以來凡出而主導一方建法幢立宗旨未有不見超佛祖學貫天人者於乎羽嘉不世出應龍亦間生逮夫年深代遠則山雞貌鳳者有矣孔雀充凰者有矣而世乃少圓通之利衆多德貫之眠雲於是揚化一途遂為高尚者所夷然不屑夫稷顏同道易地皆然如徒使情耽丘壑目視雲霄已也則處者之荒唐猶之出者之悠謬又何以生泉石光作山靈氣哉餘杭靈章蘊禪師者靈根慧質標格軼倫且也世未遠於黃牛居甚近乎風穴則孑爾單丁之操苦吟達旦之風固其所素習者然也獨憶三十年前余已倦遊叢席師方棄經論學參太白禪一時龍象之衆蓋三千有奇焉至若五色麟九苞鳳余直歸之師者以師氣岸孤搴不可控勒故也未幾果於先師鎚拂之下洞徹見元繼余出山復拉師掩關邗上故師與余相從最久締交亦甚深然師浙客孤搴余亦廣蠻杜拗相與目擊時流遂共有不出人前之語乃余生無定力益之業風鼓吹十數年來不億毒流長河以北惡播大江之南正使海若揚波殆將流澌不盡矣唯師願屹如山不為五欲八風之所搖撼自操鈯斧品火寒鐺階多蛙蠙之衣戶鮮輪蹄之迹世人欽風慕德唯向青峰遙禮磬聲而已罕識其面也適當雲披月嘯觸景遇緣亹亹發為篇章輒使見者聞者恍若清商振耳白雪投襟綿乎邈乎不禁超世獨立之想乃知師出緒餘尤能移我情況其大者乎昔有忘名古宿深隱龍山因洞山價密師伯二公披榛訪及不得已發數言酬答之故後世知馬大師一百三十人中有隱山禪師且知隱山之非徒隱也夫師之非徒隱余知之矣而天童門下復有如師者世未之或知也余故于師之所撰著亟為論次而題曰巢枸集者蓋師榜所居吾因采而名其集亦古之制爾若夫殺青而壽諸梓則余意非師意也
