body:
  text: 住明州天童寺匡廬黃巖沙門道忞著警語老死至近佛法將滅善來仁者希聽讜言夫念生死苦發菩提心因菩提心成無上覺非千聖出離之本致乎以迷自心無依住本無性妙理取相生著以著因緣起貪瞋癡乃至造無窮生死業報非三界衆生浪流終古往而不返之由來乎所以大集經云汝日夜念念常起無量百千衆生淨土三昧經云一念受一身善念受天上人間身惡念受三惡道身百念受百身千念受千身一日一夜種生死根後當受八億五千萬雜類之身乃至百年之內種後世身體骨皮毛遍大千剎土間無空地況人身難得異類恆生是故提謂經言如有一人在須彌山上以纖縷下之一人在下持針迎之中有旋嵐猛風吹縷難入針孔人身難得甚過于是又菩薩處胎經言盲龜值木孔時時尤可遇人一失命根億劫復難是海水深廣大三百三十六一針投海底求之尚可得又云吾從無數劫往來生死道舍身復受身不離包胎法計我所經歷記一不記餘純作白狗身積骨億須彌是知風燈命脆胡蝶夢長電景露華詎堪玩愒又復林林萬井總總群黎幾人于此念生死苦發菩提心即發心矣而良導難逢他岐易惑不見雜華經云一切世間群生類鮮有欲求聲聞乘求緣覺乘轉復少求大乘者甚希有求大乘者尤為易能信此法為甚難安似爾我得在宗門以一念相應慧直開如來頂眼然不假方便唯叩己參諸仁者無始時來波流苦海無益之事尚以行之況有法于此能令一期之內了辦己躬又復推託無由假合千劫流連會須自己著力何不盡此一生早求解脫夫有成佛作祖之勝因如此而不知求有將來舍身受身之劇報如彼而不知避是尚得為人倫有識之徒與誦大集淨土之深經可教石女寒心衣毛卓豎審提謂處胎之梵説將恐木人號泣聲震大千如此而不曰如之何如之何則真吾末如之何也矣規約一共住緣起娥眉羞畫嫠媰兵事猒談老將法應如是理實當然況山僧任運住持早忝六山承乏隨宜説法曾經八會闡揚今茲罷釣歸來拋盡雲山海月自應橫舟野渡從他淺水蘆華蓑笠長間笑綸竿之盡卷蘭橈不事顧煙浪以何關但念後學因循日滋于甚叢林法範漸次將頽挽回深愧無能成敗坐觀非義因時救敝聊為約法三章條令斬新豈曰徒行故事勗哉仁者幸共勉旃咨爾方來各宜遵守一額定人數象王之步圍繞特尊而不見其多師子之行單己無侶而不嫌其寡乃契經深誡若要衆者必受衆惱其故何也豈非枝繁則折獨開省緣一法啓佑我後人咸以正無缺哉所以在昔靈山雖甚王化其常隨大阿羅漢止于千二百五十人俱然皆厥突不黔不過食時分衛而已嗣後大法東流震旦即溈山象骨衆至三千極叢林之盛時亦自斬荊棘闢草萊墾土開畬刈茅葺屋插鍬彰大用度篾顯真機初未嘗以日用身口事事仰給檀膏也身口既仰檀施勢必勞人遠化而奔競生焉所以神鼎首山法道為天下冠有衆才三十輩衲子非人物精奇不敢登其門者蓋鑑諸此也況時丁象法之末人心淡薄國土耗衰奈何以毛如之德綿若之才強欲張大戶庭叢至貸積如山饘粥不繼因而緣化四出奔競百生得不人己之間交相為纍乎故本山共住之約首先額定人數二限定住期夫到處求人火急乃名本色參方是故煙水百城童子之雲蹤莫定洞山九上象骨之金錫時搖諸人果爾憤悱若此則入叢林出保社舉足下足無非般若道場矣奚必三條椽下七尺單前眉毛廝結而後謂之計明此事乎其奈心舲汜汜意棹悠悠遇便風則飄忽無涯因逆境則徘徊不進適來吳山度夏旋往浙水經冬半歲之間三回挂搭數旬之內兩處抽單以至操存不一出入無時正念猋爾方興轉盻依然打失將遂一生空過寧復有成辦之期哉所以僧問仰山禪宗頓悟畢竟的意如何山云此意極難若是祖師門下上根利智一聞千悟得大總持其有根微智劣若不安禪靜慮到者裏總須茫然則又不得不頓定腳跟置心一處與之著力捱排矣故從長酌量次當限定住期三楷定住法夫爐頭熱自三冬臘人冰于九夏簾垂黃閣迥帳合紫羅寒當爾之時燒尾者從此升騰心空者即茲及第矣復更于春華秋月之候聽其撥草瞻風遍參博訪焉此先德御衆之弘規善有加于此者乎雖然今古人根之不齊奚啻或相什伯或相千萬殆有倍屣而無算者焉何以知之昔人淳誠今人虛偽昔人專一令人間斷昔人願力堅剛今人志氣昏惰昔人師勝資強今人上下偷安以此較量倍尤甚矣不見仰山偉有言道業未辦歲月如流大根器如雲門趙州尤曰我惟粥飯二時是雜用心又曰我豈有工夫間處用矧行偉根性日劫相倍者夫仰山偉公為黃龍高弟去趙州雲門之世未久也根性乃爾遠遜豈我輩去聖時遙之夫固能高超邃古而欲坐臻斯道哉則又何異蚊負山而商蚷渡河也邪然則奚為而可傳曰人一能之己百之人十能之己千之果能此道矣雖愚必明雖柔必強請即以此道楷定本山住法四潔清三業諸佛百福莊嚴故得多身清淨衆生十惡增長遂乃九孔常流是以欲色諸天有明同日月而光飲大千者三塗獄種有皮肉爛焦而身毛皆臭者豈非染淨之攸殊馴致雲泥之迥隔乎然端本所由皆自貪瞋等十惡與不貪瞋等十善為之階差耳故上上十善為諸佛業上上十惡為無間業總十法界之若聖若凡或升或墜莫不由此岐分則身口意業之不可不戒懼也明矣而説者謂祖師有言生來坐不臥死去臥不坐本是臭骨頭何須作工課又不見道聖名凡號悉是虛聲劣相殊形皆為幻色如是則山前水牯任書大溈某僧清淨法身豈諱爛膿滴滴貴顯超方作者直須異類中行於乎是謂不學而混絶學語言在根而作歸根證據矣第恐木刻鷂子不解從禽羊蒙虎皮其奈契草何哉殊不知夢裏明明有六趣覺後空空無大千者蓋由凡而入聖之梯也陋巷不騎金色馬回途且著破襴衫者乃自聖而之凡之謂也事相天殊混殽奚可故于行法之中尤務潔清三業五敬慎威儀夫三業聿修則俯仰身世無所負虧寧惟梵行清白來報莊嚴抑宿霧潛消重昏自廓即此心月孤圓亦可披雲一嘯矣然白玉以無瑕為美黃金挾礦為纇滋多豈大間不踰小德遂無妨其出入哉夫涓涓不息終成江河兩葉不去將尋斧柯諺規剪爪宜侵膚易訓履霜堅冰至皆言其漸也漸不可長長此安窮必也動容周旋中禮乃名盛德之士乎如使微過無愆則膽膊釘簾亦失之小者何以雪峰記其來衆有千中無一人禪子而宗靖後受錢王供養逮住六通果有衆千人皆三學講誦之徒卒如其言無忒也邪詩曰辟爾為德俾臧俾嘉淑慎爾止不愆于儀不僭不賊鮮不為則投我以桃報我以李彼童而角實虹小子詎不信然乎哉故更勗諸人各當敬慎威儀規約二衲僧行履入林不動草入水不動波如火消冰泯絶心迹固宜捧足諸天失路尋伺障蔽無門奈何哉東觸西觸犯苗犯稼豈無律儀曾畫地為牢之不足于是增圜土設囹圄更張法令以繩之此豈太平景象也哉然狂象肆而無鉤騰猿趠而得樹則又不得不即其太甚者曲為防間所謂約法三章與民更始耳幸遵毋忽訓衆十二條長慶坐破七箇蒲團香林四十年打成一片趙州除二時粥飯是雜用心處石霜置枯木堂有一生兀坐如枯株者懶安終身牧牛一回入草去驀鼻抴將來歷觀從上先德為者一件事直是盡形拼命抵死忘生與他挨排故得超然徹證光賁千春澤流萬世以至報緣將謝之日一如門開相似撩起便行者何多也良以此事雖曰本自圜成非由功勛造作但無始時來情塵識浪和會一團與之生疏日久乍然趨向安能一時入作不見晦堂有箇悟處詣南公曰大事本來如是和尚何用教人看話下語百計搜尋南公曰若不令你如此究尋到無心用處自見自肯吾即薶沒汝也年來斯道荒唐日甚知識以登壟之術蒙昧方來僧徒亦以裨販之心出入禪社師資道喪古範無存寧惟他日生死不得力即今舉措施為大有駭聞驚見處三十年後無人説著此事定矣山僧道慚往哲德愧時賢不知承何福蔭得寺主印明甄致斯席良田沃壤可飲可餐兼之道鎮破格尊崇縣父母多方曲庇知事頭首極力劻勷既獲內寧重無外憂思不摩厲一番深惜良緣錯過故敢與見前有志弟兄從長商略憶昔慈明有言善造道者不出千日之功今矢以三載為期沈舟破釜背城借一儻邀般若之靈確與此事有相應分則以弘慈大願挽古頽風不則各自持經念佛把本修行去若但畏難苟安則山僧即不敢望如南嶽思大禪師臨終告衆若有十人不惜身命勤修法華三昧隨有所須必相利益如無此人吾當遠逝一衆默然竟爾趨寂之高標亦即以此長揖諸人循山旁澗便恁自家取性過時去請質諸賢計其宜者僧寶傳稱仰山偉律身甚嚴燕坐忘夜旦占一室謝絶交遊有過偉者虛己座以延之躬起炷香叉手而立南公聞之以為大絶物非和光同塵之義面誡之對曰道業未辦歲月如流大根器如雲門趙州猶曰我惟粥飯二時是雜用心又曰我豈有工夫間處用矧行偉根性日劫相倍者寧暇囿世情事清談諛説人增我相乎夫黃龍門下雖麟鳳駢集至若仰山偉則尤其出類拔萃者尚以根性不等懷日劫相倍之憂若以我輩較之豈不倍而益倍乃生滅流注豪不警心甚而有因涓滴之流忽起滔天之浪古德云暫時不在如同死人又云一念瞋心起百萬障門開然則草根久鎖骷髏祇恐將來舍身受身佛法二字尚不得聞況能成辦道業得如先德之縱橫自在者山僧道德荒蕪詎堪模範賴諸賢不恥下問相依如此使各各志烈秋霜心心計明大事固不惜己朽之香用熏龍象儻其境界為緣我人是競山僧縱精嚴遠遜仰山又豈肯以遲暮之年甘諛説人增我相哉南山之南北山之北亦自此遠矣先此豫白作家相見對衆激揚須是其人非同雜劇所以汾陽例有十八問所謂請益呈解察辨投機偏僻心行探拔不會擎擔置故借實假審徵明默大意除實問默問難辨須識來意餘者總有時節言説淺深相度祇應不得妄心穿鑿彼此無利益雖是善因而招惡果切須子細則問話之貴審機宜古有明條于今為烈況祝聖上堂祈禳升座及四大節臘官員入山檀越設供植福追嚴之類一一各有時節安可語無輪次一味掠虛非惟猒聽龍天抑且取笑有識今後凡遇如上因緣須自知時如更仍前拍盲造次擯罰不貸示此風月何緣事苦吟擬將英譽厭雞林幾回立盡三更月一字搜空萬劫心夢裏忽驚霜入鬢眉邊不覺淚沾襟可憐半世聰明種甘為浮詞又陸沈讀中峰此偈足為詩魔針砭亦見浮詞之無益于人甚矣乃末法師僧多不根道稍能搦管即從事于斯廢日荒月惟恨揣摩之未工苟工矣則傲倪當世輕忽上流甚而有鳩呼禪肆社結章縫而詞壇牛耳終為白衣所操由是追陪俗客衲衣空間身雖出家心不染道可不哀哉間有躡屩叢林盜法而已山僧行腳時親見此輩作薄福業而招短促之報者何限故今特申嚴諭凡僧堂寮舍一切案頭除經論禪策外世典詩文諸人染翰除偈頌外長歌短句一概禁絶如違此約連案擯出示此若真學道人身衣口食以至莖絲滴水須知來處今天氣炎蒸覓流亦斷茶頭早夜井汲肩擔而勤渠事衆如此則飲之者當自忖量未為過也乃既浣衣滌裳矣叉復澆抹身體何也夫濯有清池沐有香水尤尚未快于心與昔雪峰嵒頭欽山同行過新吳山下見溪有黃菜葉一片欽喜指而示二人曰此中必有道者可沿流訪之峰恚曰你智眼何濁彼不惜福觀前言往行則古人之存心可知也我輩奈何荒唐終日而不自檢責哉知安則榮禮奢寧儉回以屢空故庶賜以貨殖匪賢況我輩出家兒裂世網而寄空門外形骸以求真道然欲求真見道會須息慮忘緣苟其物務是崇況復豐饒相尚將增馳求之念必開攀援之端則緣曷以忘抑慮何由息此芙蓉所以分歲入為三百六十分而不因人增減者鑒諸此也本寺田畝千地畝百約賦餉差徭之外參旱乾水溢之間月計雖有餘歲計則不足矣與其不足以控之人曷若量餘而裕諸己借令檀膏靡吝抑思安享若消託園木以棲神殷鑒非云遠為酬恩而割肉所得較孰多謹陳畫一之規庶塞浮遊之議一款客除諸方尊宿客司一色四果四菜增二色以別方丈尊住持也一路燈除風雨晦冥時定以黑月十八日起至白月初七日止不點一諸寮局果燭五日一發不得越限庫司遵此毋違堂名雲水所以待十方勝流者也故十方來者不曰賢聖則曰龍象所以經言若佛子先在僧坊中住後見客菩薩比丘僧來而先住應迎來送去飲食供養事事給與若無物應賣自身及割自身肉賣供給所須雖則先佛教誡固難責備末法比丘然般若禪叢有賓有主有禮有樂安可輕意唐突殊無孝順之心今與主者約凡新到至當體其衝寒冒暑之勞詢其疾痛資以藥餌間有隨衆不得者則遷諸延壽堂中安息調養其求單共住者須三日客禮相款後乃俾同衆作止即暫至隨喜亦依三日例若抽單時宜看天色晴明不可驅遣令去反先聖律儀非叢林福也至于方來師德亦宜入林不動草入水不動波或坐禪時或課誦時或作務時行來出入故意梗衆不步趨規繩則于接納無禮者正等均非我輩同流不可共住此白不拘堂內堂外諸人凡患病之時輕者各自調理或所患覺重則當使人通知客司遷過延壽堂中醫治如所費不能自辦山僧縱薄福乎苟有可救之方雖罄竭衣資為之支承不惜也萬有不幸而至于殆則延壽堂主預白方丈客司集兩序頭首抵病者前為其説法轉經導其神識不至迷亂屬纊己然後用香湯沐浴舁至龕室即鳴鼓三下普請內外諸人齊集龕前唪經轉咒助彼往生出龕茶毗亦復如是除公務羈身及病外山僧親自鑒察有一人不到者罰銀三錢歸延壽堂以為濟病之資特示家有主國有君無君則亂無主則爭爭與亂豈國若家之福哉然竟其原始于政出多門而不稟之一尊故傳曰天下惡乎定曰定于一雖我叢林亦然山僧道德荒蕪詎堪四衆依歸獨遐邇一致物我無間之懷蓋自摳衣方外以至今領衆叢林未嘗不拳拳服膺況海衆同居當如水乳斯合而我親你疏可乎惟主者一念之依違其後遂至疆分界立而山門由之破壞者何多本寺由破壞而為袈裟院子復由袈裟院子而為十方住持其終變至道尚須後人而始變至魯則自山僧也國不可一日無君家不可一日無主山僧今赴廣潤特命權公座元繼席住持矣誠恐山僧平日父兄之教不嚴致茲一二小師子弟之率不謹恣睢傲兀罔識規繩或獨占一室以恃頑或私自出入而梗化叢林破壞職為厲階故與方丈嚴約儻有是輩許鳴鼓集衆登時擯斥不得姑貸須至約者食則同堂寢則一處此百丈住持家法也在昔叢林盛時夏前出草單依戒臘分位次故念誦有圖被位有圖鉢位有圖即一坐立之間且無絲豪紊亂況其也者所以威儀濟濟三代禮樂魯儒歎為盡在是矣者此也今我不能規模先德已屬大恥奈何恣情適意起止違衆或就案版而食或打飯便處而食堂堂僧體下同奴隸之養尚得為叢林規制乎除柴園廚下病寮公務寮如有仍前蹈此習者許執事巡照糾察白之方丈擯罰不貸一默詞喪尚口乃窮是故弭謗何以惟曰無辨就令曲以歸己直以與人抑我輩所學蓋釋聖師子又不當恆順衆生如海之垢藏而污納乎況己是緣誰是他非我不非哉今特申嚴約自山僧以下有論説諸方及新天童長短者罰油三斤或暫到或自彼中來傳告如何若何即以生端起釁論登時揖出不容共住退休老人某曰禨死祥生本俗夫之常見遺身忘世乃衲子之真修況宅心于空導衆以寂者哉所以靈源禪師真歸告云雖從本覺應緣出生而了緣即空初無自性氏族親里莫得而詳多見叢林每失此意凡遇長老母難之辰兩序輒率衆出資辦供謂之慶誕夫誕若可慶則是以生為可戀矣以生為戀有不以死為悲者乎死悲生戀與我學道人己分覿體相違大非長老所以訓衆之規也本月八日蓋山僧應緣出生之期恐兩序仍襲舊套先此諭知除四方善信外有創此議者責罰不貸示此
