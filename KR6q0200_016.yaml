body:
  text: 住明州天童寺匡廬黃巖沙門道忞著行狀明天童密雲悟和尚行狀師諱圓悟號密雲荊谿蔣氏子四歲有成人之度坐若禪思八歲知念佛每至春三二月輒動世間無常之想念尤猛切二十六歲因閱壇經發心參究計明大事因緣二十七歲負薪過山彎突見堆柴有省三十歲棄妻孥從幻有傳和尚脫白執爨負舂身任眾務不以為勞獨念己事未明歲月飄忽為之積憂成疾三十三歲納僧服矢明此事告傳掩關千日傳雖屢變徵師師固未嘗爽厥玄旨然傳獨不肯師師亦終不自肯以目前昭昭靈靈一似有物如是者復六載一日偶城歸過銅棺山頂豁然大悟覺情與無情煥然等現覓纖豪過患不可得師故常論劑限所悟即有向上向下最初末後如世尊睹明星初祖契拈華還有向上事也無還有末後句也無諸方謂埽除悟跡取東坡手忘筆筆忘心為喻老僧直不謂然嘗有頌云迷悟都來第二頭箇中唯悟可為儔若還一息不由悟觸境依前隨事流五祖師翁靠此一著子如座須彌山圓悟道暫時不在即不堪良有以也其悟處剋的如此時傳和尚已先入燕都四十歲偕報恩修特往省覲傳見便問老僧離你輩三載還有新會處也無師即出曰有傳曰何不呈似老僧師曰一人有慶萬民樂業傳曰你又作麼生師曰某甲特特來省覲和尚傳曰念子遠來放你三十棒師珍重便出一晚同眾侍立次傳曰如人落水坐觀成敗不救一救師即推攙眾兄弟出眾不從師曰爭怪得某甲又一晚問是大盡小盡有者道是小盡有者道莫是大盡師曰敢保不在曆本上論量嗣是傳故為師示以師王迷子之法師亦為傳縱以狻猊返擲之威門外人見方心魂欲死而傳與師師資相契已超然情謂之表矣四十二歲告傳還南上天台探禹穴為周海門陶石簣王墨池所賞識三公皆海內人望復留神空宗有素師與之本色相見脫略窠臼益敬服師師後道化闡于海東由三公始也四十六歲傳返龍池師因歸省傳問你到諸方曾見什麼人師以腳打地以手拍膝傳曰你許多時一些氣息也無師曰和尚疑則別參傳乃撾鼓集眾付師衣拂師堅辭不受傳詰其故師曰待師天年然後行止聽緣耳復命師及修入室屬累扶持佛法師即呈偈曰若據某甲扶佛法任他都來總與三十棒莫道分明為賞罰傳由是默喜以為倚以支臨濟也四十九歲傳歿師心喪席苫枕塊如喪所生者三年五十二歲心喪畢眾請繼傳開法乃陞座舉揚號令森然至若提唱本有指蹤極則皆前此諸方所未見聞者蓋禪宗自宋元以還嵩少之庭久已流為傳習即江西湖南別有商量浩浩匪綿在工夫即密在話頭列聖綱宗至為繩墨死盡不道無禪只是無師天蓋假師一掀翻露布洞示真元後三十年來說法之式駸駸復返正始者師實啟之自此出世六坐道場祇以一棒接人如大火聚觸著便燒如太阿劍血不濡縷如金翅鳥劈海直取龍吞使學人言語道斷心行處滅琉璃缾撲落粉碎摩尼珠驀面白拈唯餘條條赤手又遭截去升天伎倆枯竭無餘擲地金聲不暇回顧直饒乾坤大地艸木叢林盡為衲僧異口同聲各置百千問難棒頭一指靡不結舌亡鋒三賢未曉十聖罔通等妙二覺曝腮龍門更饒佛來祖來不可放過超佛越祖放過不可大矣哉一切眾生之平等寂滅光明幢也住五年百廢具修以故山行道意殊不樂一日因事上堂舉話畢良久曰者裏無人證明且向別處尋討下座便行五十七歲遊匡廬將之衡嶽矣天台諸山削牘迎住古通玄寺茅堂艸座山衲十數輩師為朝參暮請一如坐大寶坊儼臨萬眾無異也五十九歲復遷金粟廣慧寺破屋敗椽始或饘粥不繼居六年遠邇來學如赴召師無作無為而大廈崇成食堂幾滿萬指初師出龍池夢至一處見巨井足飲千人適蓋亭其上有偉衣冠者進曰此師住處也金粟故有千人井蓋前定云六十五歲復循閩人之請闡法斷際故山曰黃檗者僅五閱月返度嶺而甘露滂濡群萌甲折有男子盲無所見嚮師求示師為開覺其來也扶杖而至其往也掉臂而行矣清漳王大司憲志道亦致書通所得曰法錫南來遂令黃檗千年道場儼然未散祇此道場非古非今然不因師來爭知非古今也大師為人不惜身命寧使喪身失命終不為開第二門徹骨徹髓獨超千七百則而遠近傳者多作棒頭商量或言可度有智人不可度無智人或曰止可度未悟人不可度己悟人如此等見蒼天蒼天敝漳近有僧歸述六月一日上堂若汗淋淋時是乾爆爆時如何若乾爆爆時是汗淋淋時如何此是向茫茫無可據中抉出人人眼睛令他自見其法施之惠及四眾皆此類六十六歲又應鄮山阿育王寺先是明州黃司李端伯久參壽昌不契因赴春闈小憩匡廬夜坐有省然開口則礙雖屢激博山莫去膺至是赴官見師語大驚異因多方請師具道所以願見之意師乃就之故開堂日指法座者便是司李大護法于廬山開先寺撞倒底鐵山今對人天眾前扶起去也還見麼遂陞一眾譁言善司李亦脫然首肯故為師作真贊曰菩薩面夜叉心惡聲流播滿叢林禹門浪急龍騰處翻轉山河大地沈佛也打祖也打眼光爍破四天下阿師大似敗家婆教得孩兒會相罵牛頭沒馬頭回狂風驟雨滿天來四方八面相追逼縱有神通掣不開行腳僧會不會腦後一槌百雜碎沙界眾生結大冤禿奴忒殺無慚媿風顛漢老成魔諸方那箇奈伊何巖頭獨現大人相直向德山頭上屙然師殊無肯可司李之意一回相見必深錐痛拶不以檀越作從官少為假借微獨李也方侍御震孺謁師天童語及工夫不切實師劈面便掌方矍然汗下遂呈偈曰倚牆靠壁多生迷賺海偷天似也無劈面原來真箇熱更從何處說糢糊與王大司憲之言前薦得一皆要津把斷寧使生身陷地獄不將佛法當人情師之絕情離識第一相為人為若此也住鄮山三月復為紳士與司李請住太白名山當是時師臘既日高寺規模又極宏大建炎之殿上干雲日一朝從艸萊中欲斬新扶起師固謙讓未遑也乃不數年而幻出寶坊飛樓涌殿萬礎千楹崇宏壯麗冠絕一時然尤不足以居來學計袂連踵接而至者極衣冠之國達羇縻之邦公卿貴人接足頂禮魋結編髮之君長多自重譯函書問道由是名聞九重將葺長干大報恩寺纘成祖文皇之緒俾師唱道留都師以老疾願終林麓再辭不赴識者尤為歎服蓋師生性剛直壁立萬仞意有不可撩起即行門弟子有持某宰輔書住某院者師深痛絕之嘗語學者貞觀嚮道欲瞻風彩上表遜謝往返三四引頸就刃神色儼然吾敬道信大師茅茨石室累煩聖主且請前行吾從別道澡身淨髮結跏趺逝吾敬汾陽無業休心息念斷絕攀援賜紫及號力陳昔誓收付有司恬然受刑吾敬芙蓉道楷牢著艸鞋腰包住院去就之間輕同學子不為蚖蛇戀彼窟穴吾敬應菴華祖魏國弘基欲為龍池標師一扁直峻辭謝卻他可知矣故師住天童十又一年拂衣者三皆為緇素強留而止至辛巳年秋幡然出門萬眾挽之不可將比雲鶴遨遊海天矣為祁大中丞彪佳與兄駿佳要止別業故棧絕往來省師酬應然四方問道者日戶屨晨滿如市莫能禁也七十七歲明州宋海憲特遣使迎師還山且託中丞勸駕不得已過甬水以天童屬累宋公徑取道入天台仍住通玄寺通玄山紆路僻澗肅林寒又頹廢久師旋為葺理而學者力作攻苦加諸敺逐有僕隸所不堪者益親依奔赴而至至孟秋七日師以衰頓之故竟爾趨寂焉世壽七十七僧臘四十四六坐道場說法二十六年化溢支那言滿天下以至日南景慕海外欽風且祠奉為中興臨濟之祖矣乃晚年愍世說法者多陷牛跡著說纍數萬言極論之不已若是其齦齦何也師固曰與之直辨到底待他開口不得枯竭無餘無可奈何彼自心折而休矣故彼曰身見則以身見激揚之曰一橛頭則以一橛頭發揮之曰極麤一棒則以極麤一棒整頓之或援古德機緣即折之以古德機緣或攀從上綱宗即讞之以從上綱宗或流為世諦言譚紕說繆論即斷之以世諦言譚紕說繆論唐子元竑有言彼示與師軋者其人大都負大力深智鳴鐘鼓撼山嶽以相加遺而師晏然踞坐張空拳而八面應之攻者屢變應者不變無不給也即無不摧也便後來聰明辨智之夫知此道果不借他力廢然失其增上慢心頫首以入爐鞴其知言哉卒之師說出而風聞寰海江湖閩粵之人雖猒飫保社操鈯斧而山邊水邊者莫不憮然自失願就弟子之列其與師軋者至為狂詈為凶短折為吐光紅爛盡真枯竭無餘無可奈何而大慈攝受之心師終無間也師凡缾錫所到萬眾喧闐瞻禮恐後晚居太白奔走天下如一佛出現室中未嘗以顏色假人語言文字羅籠學者當門踞坐如西河師子人與非人驀頭生按又普請煩重廿里河干不時輸運土木之役半出學人玲瓏嵒負薪鳥道嶔崎動致頭破足傷而眾等堪忍依止辛苦都忘一時英靈畢集號曰僧海焉其嗣法弟子受師記莂者自大溈如學鄧尉法藏以下一十二人過此以往若招手橫趨闚鞭即去憑雲漢以高視入西山而不還者未之或知也蓋師生平以真實心行真實行悟真實道說真實法化真實眾方其始貧食力也耕稼陶漁無不備嘗繼而出家苦為生死事大歷一十三載窮神極慮心力俱疲然後打失從前唯覺情與無情煥然等現當其煥然等現之時無復情與無情差別等相矣所以折旋俯仰咳唾掉臂乃至垂手為人策諸學者搬磚運瓦挑土拽石或喊或罵與人詰與物諍固無事而非真實法門者也復不以言教而以躬親名利視若浮雲金帛等諸糞土故凡在及門非甚不才未有不孤芳自樹開鑿人天者今一十二人外如四明智遠白雲悟西皋亭智蘊武林寂然雙林海懷翠巖通哲輩其選也然則師承夙智悲為法舟航又奚俟神告朱君上申而始定其為慈受深禪師後身哉崇禎十六年癸未門弟子建塔天童迎師全身歸窆幻智菴之右隴適霖雨經旬泥濘沒骭而道俗哀哀奔送者萬人非師化育之深曷由臻此叢林公論師以賣薪出家遂傳衣缽有類曹谿求道猛切深徹法源有類高峰以一宗鏡炤空萬法有類永明聖凡彼我等心一視有類元珪豪貴當前臨機贈掌有類三角至于力爭祖命靡愛厥身旋嵐偃嶽弗震弗戁其黃龍大慧之流亞與崛起尋常中興濟北傾企窮八表芳躅映千秋夫豈偶然者門人道忞謹狀開先若昧明和尚行狀師諱智明字若昧海陵毛氏子也父為郡小吏沒廣陵故師驅烏廣陵之東隱精舍方數周而都雅白皙眉目如世所畫善財者其師愛憐之少不以繩墨削廣陵故豪華多少年日牽引為鬥雞走狗彈棋六博之事師既生長任意便與人博輒爭道不讓其人怒欲鼠牙師而窘辱之師大媿畏家有僕善緣得徒步日三百里乃挈之遊奮然登金焦過南徐將蹤跡天下名山大水而問途焉莫宿銀山菴見其徒方經營相嘈雜而方來又憧憧不已怪問之曰山門將延三大師講首楞嚴四方英賢戾至子遠近誰里將不為法來乎師聞而疑信半且曰吾將觀焉旦日趨堂司視門牓一楞嚴必稔前五卷者與床曆師從未聞經有所謂楞嚴者復卒不得楞嚴經既而購求乃得楞嚴者誦則展誦如故誦不終日誦而前五卷者已如建瓴下矣於是竟誦乃大師至至則人人奮厲欣勇見師反感切涕慕淋襟不自禁卒仰天於乎誓如今大師者而師志始由三大師決焉三大師者雪浪恩和尚也恩辨慧滉漭無涯岸苟其詞河下注則谷陵深高易面況泐名相之石齧章封句守之隄故當時三宗之學幾明而一世俶儻瑰偉之夫亦罕不揵鬐奮鬣其門恩一尺箠赴之罔假唯愛師超逸雖師受如響然恩未嘗不輸壼奧見淵微蓋喜海有再授之經三車負獨聞之說故及門豎義則後至先鳴雖一時嶄然見頭角者亦自遜其捷足矣師既綸貫諸部慧聲日遠則慨然自命曰嗟乎戒急乘緩止可自利膺城自守亦不可利人某微大師則溝中斷耳不及此兼利所以報也吾將為四戰之國乎乃南走越北走燕納尸羅于雲棲叩禪扉于紫柏既而聞其徒之老有善百氏家言漢人魏人開元貞元之體曰堯山者復躍然起曰於乎五地聖人習之矣不曰雅思淵才文中王是不可失于是日夜趍太行瞻伊闕徘徊伏牛物色其人于古澗寒溜之下卒獲其善者而還于時則有南郡之命紫柏之輓不得固讓益作而曰嗟乎吾所學欲有所用之也用而不蓄將竭久矣吾欲為吾用地也夫乃陟匡廬之巔放赦餘聞思泊然禪寂者三年復循山之陽梯空杙險而上百折得所謂古黃巖者居之又十年愛其山川秀美且有終焉之志而星渚都人士則又以開先輓矣當是時玄學日親四方勸請之命日至言默而道光身隱而名隨珠媚于川玉潤于山師蓋無意也一以慈炤臨之不猥附合亦不皦絕離故來而畏敬去而慕思死而哀人父子感往昔雖墓之木拱矣如始亡皆師有以致之也師學始汜濫終渟滀而究則淨極光通如擷奇探勝者造幽嵒出深壑霄然洞開天際頫而視下則千里一目攬不盈掌蓋其所眓者高故其所指者遠聖言淵博學士俴夷苟非忘筌誰與見諦然尤厚行而薄說雖極辨海波翻終則咨嗟感發間有一座之間凄惋不勝而去者生平以尸羅為足禪那為腹首楞嚴為清淨寶目其入匡阜時與三者偕來而黃巖則自謂于首楞嚴有深證牓所居曰智光者志證也故叢林有昧楞嚴之稱而學者無異詞師道被東南因在黃巖緣在楚然其間則皆若前定一昔黃巖有黃冠者來曰我許氏之苗裔也旌陽讖後八百歲多得道者興散林莽同時僊去我師命我當建玄元太乙之壇于此從徒數十畚鍤俱具師乃禱後山之龍與之約曰雨我也晴則君讓君我則去矣俄而雲生劍岫風雨至驟撼山莊雷電挾屋焉羽人懼曰噫佛氏之宮也非我有然師殆非常人矣郢之役陽朔安居蘄春僧後至度失期間行甚迫夜宿荒陂有告者曰昧法師期改矣孟冬八日也我乃其衛法者既而夢師陞座服布木蘭色伽黎面黃髮紺如蠃蓋佛也及至果然而師衣如夢衣故楚人至今尤敬虔焉其走燕時僑旅邸有善許負之術者隔垣聞師聲驚曰此宜擅大名何為者趨謁則師也結驩而去早歲孤騫自喜行往一橐中載寂音僧寶傳當山水得意處則出而吟哦既又頓足拊膺曰嗟乎我獨不得與此八十一人者同遊哉則又泣復傲然挈之而往窮山絕澗至不能前復又還遇岐路則脫屣占之往往多獲道中歲則精嚴玉立有類清涼晚忽超放又類棗柏眾固疑之莫能測也然規學子甚詳有攜其室灑來覲者班其師之下拜之以為瀆無人師訓立斥之甌之溫嶺來聘享禮有加而無主狀則曰此慢而貨我也貨而可行如我法何摽之使去其惜大體多此類師刱自襄南終至秣陵中間或荊或吳或甌或越說法三十年大小經論四十餘座四方遺問無虛日身以外無長焉去來不晨豫意至則行追隨者方喘急而師已莽蒼在望矣崇禎四年夏五以開先殿事遊西昌忽示疾于淨土蘭若六月十日手勒別諸護法狀洎門人弟子遺誡函封已自詣龕室跏趺笑謂眾曰我且試耳遂奄然坐化世壽六十有三僧臘五十有八門弟子奉龕歸開先建塔葬全身于黃石嵒之前雙劍峰之下體先志也蓋師每歎此山水麗峰銛文中武外君子哉增人志力居者多得道云於乎師生而孤嬰出家踽涼蕭寺辛苦萬千重以內無說德外有賞心不自殄滅足矣乃能起勞侶奮行間登覺者之城休宮止舍莫之與禁當師之隆結軼玄途追亡逐北以紫柏之陵轢無嚴亦曰昧公天授迨其燕坐黃巖山若為高水若為深當世仰之若慶雲焉乃晚年喜建靈廟恆暴露于外竟不克願而終何也語曰人能弘道其如命何詎不信哉然馳走學者三十年名震公卿間一以遊戲三昧行心死生若脫豈曰法傑亦人雄哉師有智光空響諸集行世嗣法門人若干人剃度弟子若干人忞不天依師得度開發蒙昧咨決于外十數年乃今僅得與于執斧之役恐師行業將放失後學無所考鏡竊閔然不敏葺餘論次為乞銘之狀尚冀有以傳師焉道忞謹狀故兄知廣西平南縣事文林郎亦采林公行狀公之先由殷少師得姓世有顯人曰穎為晉黃門曰茂為隋右丞相仕于唐曰藻為江陵府使仕于宋曰訔為廣州司戶仕于元曰詮以解元除評事判潮自黃門入閩而子祿守晉安因家晉安司戶值幼帝播遷起兵會張世傑討賊卒于軍而子迪因家南海評事既遷石壁卒于官葬大麻而子孫因家大麻由大麻遷新豐里則公始祖八十八者也公諱淳字崇古曾王父山王父一嵩皆有隱德不仕皇考時慶則詠歌白沙陳文恭之風薄進取止于庠唯公幼耽學有能文聲聲藹鬱甚凡十就棘闈弗第卒循資銓選得廣州司訓凡八載弗遷大吏廉知其能則交章薦稍遷廣西平南尹政成例得州牧以不能媚權司方垢索毛吹冀中以禍卒之無纖豪挂議則以不及去官凡公如此一裁之義命無諂上之容躁進之失蓋公為諸生時方慨然于周公孔子孟軻氏之傳而環嶺以東秉觚牘者則以公文為模範一時貳州牧伯與薦紳先生之家爭致師席其百里重趼趨門下者歲不止以百數然公卒教之以孝悌忠信無倦有貴人子驕公自以為不狎不順擯之而後諸生知公意之所在也則人人刮濯諸凡北面公者皆有懿行可述其居司訓時念國家承平既久所在弟子員習浮靡寡能媚于天子邦家民命之託使萬有一而赫然震疊之及則屈辱師聖非是乃輯為學之要切于修己治人者八條日為申儆期與諸生更始平南交夷徼姦民樂于為訟而贓胥污吏多行誨盜之方故縱其首事而招徠之民卒流亡莫有禁禦公則淑問而得其情哀矜以畏其志納諸禮讓之域示以禍福之門凡陳嘗率育之道靡不有志載焉如指諸掌既而不獲大用于時則退而居鄉鄉人無少長畏公如父敬公如師間有舉事過當者則不欲使公有聞既聞矣則羞縮庰避眎不敢直曰吾終不可以見長者惟公邑居抵京國萬里聖天子威靈德化雖外薄四海而土瘠民貧俗恬固陋忘達識遠見漸靡久之以至仁之屬義之族不相知問民生之鄙薄風俗之不長厚而公式生其間蓋若有使之者公二十喪父四十喪母于生計蕭條之日而身孤母寡弟妹方稚公一提攜奉負以至于長長則擇妻以妻擇夫以嫁凡嫁二妹為弟再婚焉初弟灝失怙過痛得痰瘰疾如是枕床席者連歲月方趨救療則有糊口之累欲行糊口則有內顧之憂出入狼蹌莫與為生公卒多方求善劑而調攝之如初惟公性恬澹不亟亟于富貴而家貧親老不去心逮喪母吳則哀毀蔬食內盡其志外盡其物慮無有不得于心者然終以不獲祿養為憾每與家人道父妣事未嘗不感慨欷歔泣數行下則謂福輕禍重賴先人與庭闈之訓獲有寧宇使子孫知為學與善足矣曷求焉乃舉祿仕之所入者度足以奉公賦餉歲時其餘悉以分贍族人親友知識置大宗小宗嘗食之田若干畝與食貧亡役之妻子皆有以賚而又與人以讓遇物以誠方居東時有虛以告貸者曰我公之鄉人也我本字某名某以某行某役困此需貸公曰是與曰是也則如其所稱之貸而貸之凡負公貸者若而人與若而緡若而歲月旬日公未嘗舉而問焉於乎予行閱天下多矣所睹州牧令長以官為威以法為阱漁獵生民吸肌膚以至于髓既而墨薉彰聞上官論斥則包苴請託踰巨萬其有彌縫善巧歸獲自公者則恐喝傳丞追呼遞卒輜車繹絡載道涂爛其盈門而至既至則伐徹近巷以大第居割里人世守桑麻以連阡陌僕御聲伎雜沓飲食相過從無舊識皆新知苟其賤貧雖期功厚善妻子轉溝壑不一哀悲賑恤之反非笑焉者皆是也此夫所謂為盜不操弧矢攻而不用弦刃欺父母未有罪而弒君未伐者方坦坦施施騎從十百出入里閈上先人丘隴自以為丈夫子生人世得志一時當如此者聞公之風又何如施顏面邪公生穆宗五年生十九年而補弟子員生二十六年而進廩諸生生四十七年而賜明經進士明經六年而訓司廣州令粵西平南則公六十矣令三年而公歸歸三年而公卒從生至卒僅六十有六年而崇事乎生人之理孝友義讓之道則未可以一二三四指籌而算蓋公所得于天者甚厚致力于學問者甚深而又有達觀以大之積憂重慮以淬礪之以至如此其醇且備也竊嘗論之古今人品若范希文之惠族王彥方之式鄉人陽亢宗之心勞拊字道光師儒皆有聖人之一體而公則似乎具體焉者然三君子受其豐而公享其嗇故吾于三君子尤獨為公難公先配孺人何氏早喪止一女繼配梁氏生二子又一女長曰于達邑廩生次曰于逵邑庠生公沒之明年予始歸省姪二子與宗老頫泣再拜涕興以請曰日月有時將葬矣唯是碣上之銘無辭以徵氏唯吾叔言之文余先君子將賴以不朽請狀之噫吾忍狀吾兄哉雖然予奈何自遜固陋使吾兄遂泯滅卒不稱知于天下後世哉因次狀于左以俟立言之君子采擇以傳
