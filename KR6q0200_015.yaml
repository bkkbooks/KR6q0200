body:
  text: 住明州天童寺匡廬黃巖沙門道忞著塔銘三敕賜五蓮山護國光明寺心空開法師塔銘有明神宗顯皇帝以佛心天子手握金輪統御萬方端拱以致治無為而化成以故積歲有豐登普天皆絃誦民生其間婆娑永日鼓腹謳歌相與嬉樂乎升平者四十年一時熙熙皞皞之風真足媲隆三代矣而萬機之暇尤復遊心內典因諭近侍簡校天下名山寺院擇僧之有道行者敕令住持躬齎大藏以往俾集名緇專誠披閲上以福國下以佑民甚盛典也而五蓮心空開法師首膺其選由是名聞大內時國母皇太后適患眼疾意師戒德高崇必能消弭乃遣內璫顧問師為咒水一洗而痊愈生信敬于時光宗尚居少海特命受名於師俾保聖躬及其踐祚也即日遣官省視副以滲金大士焉後毅廟繼登大寶不忘先帝初心復遣掌內官監印太監蘇晉霖等發內帑金若干修崇勝蹟則師實受三朝寵被身為帝者之師矣順世圜寂則當表達上聞請加誄諡以終始朝廷眷顧之恩者禮也今滅且二十有七載其孫海徹將謀遷師塔始乞銘于豫豫惟師剪荊棘發天藏以啓佑後之來者其有功于山林髡士甚大則銘之烏可後顧豫林下無顯望曷由發揚乎師哉雖然不朽者言豫將終靳乎一言則師朽卒無從以振厲後賢矣豫罪奈何因托師實以為之序曰師諱明開字心空成都龐氏子為人性卓朗而梗橛甫入鄉校即圭角稜嶒不屑雁行諸子矣年十八適宗人有死而無後者巨富也孰師聞而歎曰信夫黃金空積聚難脫鬼門關師即進曰若為脫得孰師曰出家修行即得師內銘於心俄因小嫌拂意遂密逃決志離塵間行且疾馳復赧言求丐殊饑甚念欲還家忽群猴逸出其前擲果而去審視皆山栗也因盡取食之得前邁遇一行腳僧控所由來僧為披削攜之出蜀歷荊楚陟匡廬憩止金竹坪學諸經咒一年咸通曉復下金陵聽講經論於雪浪恩師之門三年聲焉始默心已光通益知般若之聞熏有素也恩甚器之然師志意高遠不甘以語言文字埋沒此生聞雲棲唱道東南門風壁立頗愜素心即日挾復往聞法受具親炙二年復動寶掌芒笻之興將欲踏遍支那以求稱己所遊者于是潔己輕裝飄然雲鶴孤翔天外然往往有欽其道貌敬其行藏至不愛資財願割而祠奉者有之抑攀援已甚謝卻無從至絶襟裾捐衣鉢而脫逃者亦時有之截江渡淮阻雨安東野廟五日不食矣適有挈榼叩扉以至者言夜來神式見夢俾餉師耳遍告鄉民聚族爭謀供養詰朝齊獻而師逸去過雲臺眷山菴岑寂寓止焉時有婺女瞷幽扉復去之乃入齊登琅琊觀海日分衛諸城忝鉢于敬軒臧氏之家而臧與師宛有夙契心切因依援師益力然師亦愛其學佛知儒留書雜華大典三年朝夕供奉簪珥盈前而師一如木人對華鳥無欣猒見也聞九仙五垛玉筍參天金莖插地山光與海色競秀而爭流子瞻直謂其不減天台雁蕩心殊向往之切及乎躡屩登山則奇峰怪石古洞靈巖若環埤如列戟若虎踞如師蹲若鸞鳳之翀霄若蓮華之初放若應真仙子之遨遊乎蓬島者殆不可悉索而數計焉徘徊不忍去則依巖結宇面壁跏趺危坐天柱峰之下凡三年僧俗歸附日新月盛咸欲為師興厥禪叢師因疇念茲山僻處海堧雖雲堂有寺而芳躅無聞者固僧非祥麟威鳳乎抑天章寶篆未有以光被之也且東武素悍而驕輕我驟而建大寶坊則必嘖有煩言正恐未可以慈悲攝受之耳天作高山非萬乘荒之曷由光且大哉由是定議入請大藏于神京初至之日京師大德群疑山非岱宗寺非名剎未易上聞紫閣師但唯唯聽之護法龍天而已屬閒居無事偶遊西山蘭若適惜薪司內監王忠者在焉與師相見一語心契遂以師名與山奏上且白其狀上大說敕賜山曰五蓮寺曰光明仍手敕師管領御藏遵持禮誦儲集弘庥載賜紫伽黎金千兩差御馬監太監張思忠齎藏以往師如敕供誦保安聖躬為國祈祥與民消災弭患已赴闕謝恩上復賜內帑金錢若干命師重修殿宇師奉旨鳩工匪舒匪棘載謀載惟環翠以為城倚天以作塹因其高就其下端其表宅其中地不封而爽塏宇不飾而虛明越六載工竣屢致山川效順風雨時若而後東武之民始誕者信而慳者捨悍而嫚侮者崇事而敬虔焉皆師誘掖得方善為利導有以使之然也師神儀挻特風度遒然適而笑談則山林振響性尤剛猛不可觸當其義有所激念有所之則堅如金發若矢雖千萬人鼎鑊在前必往也然詒謀作始復慮遠而思深每灼事機運精力恆曠百世邇如今焉居臧宅日有座主講演城菴邑令故往詰難主偶挫詞立待擯斥師聞而倒舄馳前為之救義令方機鋒迅發師於結角羅紋處劈面便掌一衆皇駭師神色自若令乃屈服深歎佛法有人山中締搆方興旋即建菴于帝城之東撥僧往董其役衆多疑阻師曰是非爾所知也今長老徹公家世關東以遼陽失守航海依師年少於衆而好攻摘衆瑕衆短之師曰休矣勿復言他日山門與你輩當賴此子安全在師卒公走燕居城菴甲申之變菴衆星散遺公獨守菴之比鄰即平西王第也王請清師討賊全家被難尸積如山公挺然顧義而不顧害為掩藏之王故德公而公之弟姪亦多仕清為顯官時方鼎革東武之悍而驕者復起侵漁山寺衆乃迎公為長老公既治內復捍其外山門果由是奠安焉豈師諳練而達乎抑亦夙慧而通乎未可知也往來京畿恆馭羊頭車子一兩使僧推之越邑過都則相率來迎遞程而送蓋自齊至燕凡持齊而信佛者多師弟子其為衆所知識如此生平長坐不臥日誦大悲陀羅尼無虛晷暇則為衆講演而尤喜談圜覺將寂之日命侍僧焚香設座鋪置罘罳椅子於千佛殿中侍僧以師將講說如命嚴辦已覆師師問何時曰已也乃拄笻升座衆集而師已泊然逝矣蓋崇禎二年元旦也世壽六十有二僧臘四十有四僧俗弟子哀慕不已留供三春至四月八日始依法闍維則顏貌如生焉向非履踐明白有見於道而能然乎是宜銘而志之銘曰琅玡名勝擅于五蓮岱宗泰嶽屏倚九仙其一神工斫削鬼斧雕鐫流霞飛翠聳霧凌煙其二中有梵宇輪奐何沺閈閎特起樓閣明鮮其三問誰伊始在我昔賢道焉斯備德也式全其四詔頒奎璧帑發金錢昭格天子結茲勝緣其五談經匪舌說法匪筌繽紛華雨蓋亦有年其六光我緇侶澤我林泉千松蘚裹萬木蘿纏其七緣盡而滅歸復重玄猿哀落日鶴唳空阡其八白鳥煙沒秋水天連青山自去寶座依然其九林泉鬱鬱包絡山川佳城既築靈骨是遷其十我來豈暮師往不先歌以載揚百祀攸傳其十一湖州禪定菴比丘尼大賢墓碣銘春風之行萬國與一雨之潤群萌也凡有根自非枯槁無餘罔弗條達與遂厥生惟大雄氏之道亦然不分男女靡間智愚能如其說身體而力行之其于超凡入聖脫死離生也蓋如麵作䭔如金貿市如執券而索要如白晝之經營亦莫不從心所欲者世衰道微持戒則僧不如俗精進則女倍乎男然未有食我桑黮不懷好音如近代之庸妄可訝也坐解脫之床恣無明之焰計其我慢生滅己業主鬼借宅矣更胸臆籠人而真碑贋本世亦混淆莫辨然則所謂身體力行者亦何自而詳之先德有言觀其死生之際如賈胡傳吏留即留去即去則吾于大賢尼事不能無感焉尼大賢者出烏程朱氏族父豸湖生三子長曰士器官廉憲年曰士鼇掌銓曹賢蓋其仲子也性嬐娓幼無妣於母家及笄而歸為倪氏婦則恭謹尤篤衣素飯蔬卻鉛華弗御曰吾畢生將近事女矣時夫承基亦以績佐宛平無幾何而承基卒諗死生之大故哀人命之脆危因祝髮為尼復具咨所以超越之道于雲棲宏真寂印後先二師咸為指蹤安養且曰正當念佛時更究即茲念者畢竟為誰是謂禪淨俱修法于是服膺請從事焉乃結廬別墅一榻寒缸兀坐其中或并日而餐或數旬不出當是時伯若年方貴顯門炎可炙母同有兩子一女念其獨瘁也而隱之賢固不為矯名行避離兄母然畏涉塵緣分道念雖以母命有所餽遺與伯若年之時通音問咸絶弗往來辭弗拜受即受矣立惠饑寒弗以私長四壁蕭然內戶不扃盜入室至無所攜負且去賢躬起傾瓿粟謝遣之其慈人愛物皆此類若其灰心泯志飲檗茹冰則真有人世所不堪者賢處之餘三十年晏如也一日忽書其座右曰我九月十三日且去矣并遍告諸同行者及期衆咸聚觀之如市逮午果跏趺合掌誦佛號而逝玉墜雙垂異香滿室七日而顏貌猶生焉賢生嘉靖辛酉年三十三而剃髮則萬曆癸巳也又三十二年而坐化則天啓甲子也又二十年僧寂顯者為承基之弟始以其故處為十方菴且請名當事題曰禪定則崇禎癸未也賢始終無憾有如此者顧其陶龕尚在宇下顯議別塔瘞之重其久而湮沒也圖所以不朽賢者走乞銘于豫豫悲末法人心懈怠始則忍苦悍勞終則名聞利養差沱白首惆悵仍歸而世鮮明達將謂般若無靈如此豫嘉賢勞耕而卒穫故樂而為之銘銘曰群生昧己兮逐物以征循名失實兮外鶩色聲我山巀嶭兮業海蚴蟉險墮四生兮噬吞三有六宇同昏兮迷雲垂布芒芒大有兮孰醒其故悲生拯拔兮佛日以暾羅張教網兮有萬其門頓漸斯開兮群機普被如說而行兮無思弗遂如雨培根兮如春和燮萬卉千葩兮實葟且曄人亦有言兮耕乃得禾吁嗟末世兮違負何多始勤終怠兮白首留連鹵莽滅裂兮報豈云偏爰有淑媛兮式生大家絅衣未脫兮螓首既髽文鴛載隻兮幻夢乃晨靚妝淨洗兮等若埃塵託彼空王兮覃咨明導既獲要言兮資深以造一榻寒缸兮諸緣寢削弔景寧惸兮家聲熇熇進幢高豎兮三十二年報緣將謝兮聲告人天死生之故兮夫豈小者誰當敝屣兮如棄斯也嗟爾敗壞兮不日而胹曷為其故兮我慢自侈香飄玉墜兮般若之靈曰如不信兮視茲碣銘明中憲大夫分巡兗東兵備道王公墓銘崇禎元年戊辰秋七月興化中憲大夫王公卒于家十二年己卯九月冢君貴一舉公與元配陳宜人合葬于南亭之新阡公壻大學士吳相國甡擷公生平之大者著為詞銘其墓矣今順治十三年丙申冢君復細論公終始事蹟請豫曲紀之按公諱繼美號元玉高曾世居通州餘西場父纍贈奉政大夫綱避倭遷興化富而好義凡邑中有大徭役必首先率倡縣凌侯與邑長者咸稱王君積德有餘慶後必克昌生四子繼曾繼祖繼芳公其叔子也性獨沈毅而端簡甫入小學即嶄然立崖岸矯矯諸兒中若雞群鶴識者知為鳳沼英物矣父以末致財顧自謂吾操奇贏走四方商賈家安有奢望顧呫嗶詩書謾為儒冠誤邪子無少長當侍吾商歲往來毗陵婁水間公慨然曰丈夫生當衣被天下奈何以一身一家之故日孳孳持籌而算為由是發憤志學日成數藝輒作于將吹毛師子搏象之勢同舍生方環視為諧謔而不知其氣陵一世意欲出其長才有所用之也未幾補弟子員明年補餼膠庠嘖嘖有聲大小試恆居首冠以屢困棘闈乃援例入北雍為國學生一試而領丁酉賢書三上公車而成甲辰進士選授河南府孟津縣知縣不以牛刀小試為嫌下車清果稅革黃河渡船掯索之弊拔前大學士王鐸冠卷首甫三月商民稱便絃誦有聲調知本府雒陽縣事雒當七省之衝重以藩王掣肘送往事居最為繁劇公廉明果毅端方自持一時號稱二鮑以不善事按君大計調簡丁未補福建順昌知縣縣居劍州上游山水暴發漂民舍恆數千家公備舟募善水者操而往援救活無算痛民貧墨善教罔聞為之除火耗革拘差善者勸惡者懲創水南書院進民之俊秀者既父且師而申訓之三年給由方伯大參咸稱公政為八閩卓異以獲罪按君又挂白簡謫山東鹽運司知事家食三載至乙卯升江西貴溪知縣以委署府同知侵漁帑金三千兩公要其交割分明而後視篆撫道為同知戚里怒公不留餘地復挂彈章改授松江府儒學教授公掀髯笑曰使吾日煩俗史簿書與今往對名人彥士孰為重輕欣然束裝受事課松士凡居前列者俱後先接翼去為高岡鳴鳳庚申由南雍助教升刑部貴州清吏司主事經略熊公廷弼一見公即以邊事相期許握公手曰先生當世有心人吾為朝廷出死力幹蠱封疆正苦軍前贊畫無人非先生誰共裏厥事異己者聞之不懌轉公戶部郎尋奉敕總理密雲餉務密為京畿左臂中原財賦轉輸之地國家末造戎政不修餉肥貪墨其來舊矣公建議以為上兵伐謀其次財粟蓋士馬性命攸關司餉者所當珍惜如護元氣者也頻年以來海內困於加派則出者之源既竭全宇疲于轉輸則入者之額恆虧況密兵非澤潞雄邊子弟之兵密餉乃民髓民膏千里饋運之餉筮龜理財以養民為先今沿邊一帶屯牧盡廢樹藝久蕪所仰給大司農者一皆取辦催科不于此時省冗濫之端清出入之竇少寬民力而穌之命則天下事正未可知也乃按籍稽核剔逃勾亡得清省銀米二十萬胥吏謂宜中分之輸官之半皆公物也公正色曰你欲以吾為市邪并掃除銀三千兩悉歸之縣官具疏奏報已即日單車復朝命而前後受事者畏其軋己多方壅遏祕不上聞公抗言本部大司農面為公深墨如土故京師有鐵郎中之稱是歲超擢山東布政司右參議奉敕分巡兗東兵備道按察司僉事拜命之日公喟然曰沂兗久經白妖蹂蹸城郭空虛十無其一譬諸尪羸之夫元氣已散唯有參芪差可延年撫議是也大黃青枳所宜嚴戒勦說是也方今百姓危于倒縣乃必以虜級為功恐東齊百萬生靈盡遭冤覆夫攻培之法無心誤用之而以上遺君父下禍蒼生尤且不可況欲假此為高官厚利父母妻子之澤哉司臣所不敢出也檄郡縣吏為殲其元魁恕其脅從凡不得已淪入妖黨者不惟開其一面且與以安全無夫者為之嫁無妻者為之娶始鴻鴈有中澤之歌黃鳥無剝啄之歎矣然大吏主勦而公主撫由是相左特疏調公就簡公曰噫吾本楚水書生豈有私于東省哉不過為今上愛憐赤子耳吾子幼以未能從吾宦且縈懷顧殺人之父兄子弟圖保一官其若吾子何徑拂衣南歸行李蕭然一如吳越遊學老孰師歲暮還家攜得古書兩篋而公所多者惟黃蓋儀仗而已歸里之日閉門謝事日課子貴一與從孫延禧俾就外傳而程督焉延禧者公仲弟繼祖之孤遺也公撫養教育視同己子而子貴一實張孺人所出陳宜人亦愛護珍惜不啻己子蓋公能錫類故宜人能不妒忌所謂惠于宗公神罔時怨神罔時恫刑于寡妻至于兄弟而御于家邦者非公之謂與公幼懷澄清天下之志長而不遇有司至四十既壯尚淹滯場屋釋進士褐時且四十又九矣老黃榜博一外知縣復不遇上官調繁調簡乍升乍降邅回而不克進者僅十六年始達承明出為司道庶幾可行其志矣又以不遇上官終卷而懷之騫迍厄塞不當為公弔哉然衆貪而我介衆忍而我慈由今論昔向之墨穢而擅富豪者今則子孫流為傭保矣向之暴橫而躋顯要者今則殘楊衰草翻為絶祀之魂矣獨公襲素封之後尚有郭內外田數頃公賦之餘饘粥桑麻足奉賓祭子庠生貴一世守而勿失焉孫仲儒喜儒敦儒悉淵源家學有能文聲固方進而未艾也是則公之穫于人者嗇而食于天者則己厚矣復不可為公慶哉豫懷明德公銘何敢辭銘曰明賤科目黃甲是珍入供臺省出據要津朋從揖揖唱和詵詵一仆九援孰問豺麟公登黃甲久受苦辛風窗雪案後夜凌晨五十筮仕政歷多春乃民乃社維惕維夤包苴羞薦冰玉自璘清滋衆惡惠徒在民柳下三黜匪直也人公實為之自致騫迍穹蒼曰否天道唯均枉終自屈直道還申公去何時之子塵湮幽宮作牧玉宇歸鄰天眷公德厥後振振封高馬鬣祀享明禋天豈公私報你廉仁謂豫不信曰有高旻敬山徐府君墓志銘敬山徐君諱德龍越之諸暨人也為人醇誠篤厚持然諾矜己讓明萬曆間歲販茶來京都人愛之得娶京師周氏女生二子長曰純修次曰昌期甫年十二君以疾卒二子與母煢煢在疚留京則上無伯叔終鮮親姻歸里則舉目鄉關雲山迢遞不得已落籍燕都二子賴依蔭母家僅免瑣尾流離之歎母周氏亦以有子訓育故得遂其柏舟孀志焉然其間寒燈雪案之凄涼飲檗茹荼之孤苦殆有匪夷所堪者矣純修既長以中官入侍禁帷昌期繼晉黌儒生三子長天錫復補郡庠弟子員由是書香不斷家聲再振周母且享年七十乃考終卒以未亡人之身歸祔君之原壤純修孝思無斁重其久而先業遂湮也後世子孫罔知水木根源之如此故丐豫論次而為之銘曰浮幢幻宅兮天地蘧廬他鄉異國兮夢裏華胥繄維節義兮保爾孫子千秋萬歲兮封是幽居
